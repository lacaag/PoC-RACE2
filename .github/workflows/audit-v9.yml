          echo "H04 Accept=$ACCEPT PATCH main = HTTP_$CODE"
        done

        echo ""
        echo "--- Method override headers ---"
        for OVERRIDE in \
          "X-HTTP-Method-Override: PUT" \
          "X-HTTP-Method-Override: PATCH" \
          "X-HTTP-Method: PATCH" \
