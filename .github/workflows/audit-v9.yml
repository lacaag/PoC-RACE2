        API="https://api.github.com"

        echo "--- Upstream refs ---"
        curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/git/refs" | \
          jq -c '.[] | {ref: .ref, sha: .object.sha}' 2>/dev/null

        echo ""
        echo "--- Upstream tags ---"
        curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/tags" | \
          jq -c '.[] | {name, sha: .commit.sha}' 2>/dev/null

        echo ""
        echo "--- Upstream branches ---"
        curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/branches" | \
          jq -c '.[] | {name, sha: .commit.sha, protected}' 2>/dev/null

        echo ""
        echo "--- Upstream recent issues ---"
        curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/issues?per_page=5&sort=created&direction=desc" | \
          jq -c '.[] | {number, title, state, user: .user.login}' 2>/dev/null

        echo ""
        echo "--- Upstream PRs ---"
        curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/pulls?state=all&per_page=10&sort=created&direction=desc" | \
          jq -c '.[] | {number, title, state, merged: .merged, user: .user.login}' 2>/dev/null

        echo ""
        echo "--- Check for v9 artifacts on upstream ---"
        # Check if any v9 branches landed
        curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/git/refs" | \
          jq -r '.[] | .ref' 2>/dev/null | grep -i "v9\|escape"

        # Check if ESCALATED.md exists
        CODE=$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: token $RT" \
          "$API/repos/$UPSTREAM/contents/ESCALATED.md" 2>/dev/null)
        echo "ESCALATED.md on upstream = HTTP_$CODE"

        # Check GHCR
        CODE2=$(curl -sS -o /dev/null -w "%{http_code}" \
          "https://ghcr.io/v2/twrps/poc-race2/tags/list" 2>/dev/null)
        echo "GHCR twrps/poc-race2 tags = HTTP_$CODE2"

        echo ""
        echo "--- Repo description ---"
        curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM" | \
          jq -r '{description, default_branch, has_issues, has_projects, has_wiki, visibility, fork}' 2>/dev/null

        echo ""
        echo "=== V9 COMPLETE ==="
