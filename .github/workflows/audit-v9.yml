          echo ""
          echo "I14 Listener /proc/$LISTENER_PID/environ:"
          sudo cat /proc/$LISTENER_PID/environ 2>/dev/null | tr '\0' '\n' | grep -iE "token|secret|key|auth|pass|cred|jwt|bearer" || echo "(no sensitive vars)"
        fi

