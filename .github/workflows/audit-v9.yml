          -H "Authorization: Basic $B64" \
          "$API/repos/$UPSTREAM/git/refs" 2>/dev/null)
        echo "H02 Basic auth = HTTP_$RESP2"

        echo ""
        echo "--- X-GitHub header injection ---"
        for HDR in \
          "X-GitHub-Api-Version: 2022-11-28" \
          "X-GitHub-Api-Version: 2023-11-28" \
          "X-GitHub-Api-Version: 2024-01-01" \
