        echo "v9: got tokens for ALL scopes but push denied 'installation not exist'"
        echo "Strategy: try different registry paths, manifest types, blob uploads"
        echo ""

        echo "--- Login with RT ---"
        echo "$RT" | docker login ghcr.io -u "x-access-token" --password-stdin 2>&1

        echo ""
        echo "--- Try different namespace patterns ---"
        for NS in \
          "ghcr.io/twrps/poc-race2" \
