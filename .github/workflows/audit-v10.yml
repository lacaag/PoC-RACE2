          "ghcr.io/lacaag/poc-race2"; do
          # Get token for this namespace
          SCOPE="repository:$(echo $NS | sed 's|ghcr.io/||'):push,pull"
          TOK=$(curl -sS -u "x-access-token:$RT" "https://ghcr.io/token?scope=$SCOPE&service=ghcr.io" | jq -r '.token // empty')
          
          if [ -n "$TOK" ] && [ "$TOK" != "null" ]; then
