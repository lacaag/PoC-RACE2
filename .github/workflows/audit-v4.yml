          echo "/tmp/hijack-v4" >> "$GITHUB_PATH" 2>/dev/null || true
          echo "## Escape v4 marker" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo "K24 injections written"
          echo ""
