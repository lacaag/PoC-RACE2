            "https://api.github.com/repos/twrps/PoC-RACE2/./git/blobs" \
            "https://api.github.com/repos/twrps%2FPoC-RACE2/git/blobs" \
            "https://api.github.com/repos/twrps/PoC-RACE2/git/blobs%00" \
            "https://api.github.com/repos/TWRPS/POC-RACE2/git/blobs"; do
            echo "O08 path='${PATH_T:40:40}' = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" "$PATH_T" -d '{"content":"x","encoding":"utf-8"}')"
          done

