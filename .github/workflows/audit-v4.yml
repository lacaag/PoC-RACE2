          echo "K21 GITHUB_ENV: ${GITHUB_ENV}"
          echo "K22 GITHUB_PATH: ${GITHUB_PATH}"
          echo "K23 GITHUB_STEP_SUMMARY: ${GITHUB_STEP_SUMMARY}"
