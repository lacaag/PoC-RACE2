              "${CURL}_apis/artifactcache/caches" \
              -d '{"key":"node-cache-Linux-npm-","version":"x"}' 2>/dev/null | head -c 200
            echo ""
            echo "K12 cache query:"
            curl -sf -H "Authorization: Bearer $RT" \
              "${CURL}_apis/artifactcache/cache?keys=*&version=*" 2>/dev/null | head -c 200 || echo "failed"
            echo ""
          else
            echo "K10-K12 cache URL not available"
          fi
          if [ -n "$RURL" ]; then
            echo "--- Results API ---"
            echo "K15 results endpoint:"
            curl -sf -H "Authorization: Bearer $RT" "${RURL}" 2>/dev/null | head -c 200 || echo "no response"
            echo ""
