          echo "Z08 description:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP" 2>/dev/null | jq -r '.description' 2>/dev/null
          echo "Z09 labels:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/labels" 2>/dev/null | jq -r '.[].name' 2>/dev/null | head -10
          echo "Z10 branch-protection:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/branches/main/protection" 2>/dev/null | jq '.' 2>/dev/null | head -10
          echo ""
