          echo "H02 Docker bridge 172.17.0.2 port scan:"
          for PORT in 22 53 80 443 2375 3000 4243 5000 8080 8443 9090 10250; do
            (echo >/dev/tcp/172.17.0.2/${PORT}) 2>/dev/null && echo "  172.17.0.2:$PORT OPEN ***" || true
          done
          echo ""
